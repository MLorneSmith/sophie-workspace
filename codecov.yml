# CodeCov Configuration
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  # Set coverage precision (2 decimal places)
  precision: 2
  
  # Round coverage to nearest integer
  round: down
  
  # Coverage range for color coding
  range: "70...100"
  
  # Ignore specific paths
  ignore:
    - "**/*.d.ts"
    - "**/types/**"
    - "**/schema/**"
    - "**/dist/**"
    - "**/coverage/**"
    - "**/node_modules/**"
    - "**/*.test.ts"
    - "**/*.test.tsx"
    - "**/*.spec.ts"
    - "**/*.spec.tsx"
    - "**/index.ts"
    - "apps/web/next.config.js"
    - "apps/payload/payload.config.ts"
    - "**/*.config.ts"
    - "**/*.config.js"

  # Project-level status checks
  status:
    # Overall project coverage
    project:
      default:
        target: 80%
        threshold: 1%
        base: auto
        
    # Patch coverage (new code)
    patch:
      default:
        target: 80%
        threshold: 1%
        base: auto

# Pull request comment configuration
comment:
  # Post coverage comment on PRs
  require_changes: false
  
  # Comment layout
  layout: "diff, files, footer"
  
  # Show coverage for all changed files
  behavior: default
  
  # Hide project coverage if no changes
  hide_project_coverage: false

# Status checks on GitHub PRs
github_checks:
  annotations: true

# Flags for different test suites
flags:
  unittests:
    paths:
      - packages/
      - apps/
    carryforward: true
  
  # Future flags for integration/e2e tests
  # integration:
  #   paths:
  #     - tests/integration/
  # e2e:
  #   paths:
  #     - tests/e2e/

# Notification settings
slack:
  # Disable Slack notifications for now
  default:
    only_pulls: false
    notify: false