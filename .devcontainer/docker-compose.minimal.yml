# Minimal configuration for faster Codespace startup
# Only includes essential services for development

services:
  # Main development container only
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
      - pnpm_store:/home/node/.pnpm-store
    environment:
      - NODE_ENV=development
      - FORCE_COLOR=1
      - HOME=/home/node
      - MINIMAL_MODE=true
    ports:
      - "3000:3000"
      - "3001:3001"
      - "9229:9229"
    init: true
    command: sleep infinity
    hostname: slideheroes-app

volumes:
  node_modules:
  pnpm_store: