# Docker Compose file for multi-container devcontainer setup

services:
  # Main development container
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        TZ: ${TZ:-America/Los_Angeles}
        CLAUDE_CODE_VERSION: latest
        GIT_DELTA_VERSION: 0.18.2
        ZSH_IN_DOCKER_VERSION: 1.2.0
    volumes:
      # Mount workspace
      - ..:/workspace:cached
      # Docker socket for Docker-in-Docker (conditional for local dev)
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist volumes for performance
      - node_modules:/workspace/node_modules
      - pnpm_store:/home/node/.pnpm-store
      - next_cache:/workspace/.next
      - turbo_cache:/workspace/.turbo
      - supabase_data:/workspace/apps/web/.supabase
      - command_history:/home/node/.zsh_history
      - claude_config:/home/node/.claude
    environment:
      - NODE_ENV=development
      - FORCE_COLOR=1
      - TERM=xterm-256color
      - NODE_OPTIONS=--max-old-space-size=4096
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - GIT_PROMPT_SHOW_UNTRACKED_FILES=no
      - NEXT_TELEMETRY_DISABLED=1
      - TURBO_TELEMETRY_DISABLED=1
      - EDITOR=code --wait
      - HOME=/home/node
      - COREPACK_ENABLE_AUTO_PIN=0
      - COREPACK_ENABLE_STRICT=0
    networks:
      - slideheroes
    ports:
      - "3000:3000"     # Next.js development server
      - "3001:3001"     # Next.js HMR
      - "6006:6006"     # Storybook
      - "9229:9229"     # Node.js debugger
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    init: true
    command: sleep infinity
    hostname: slideheroes-app

  # E2E testing container
  e2e:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.e2e
      args:
        TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ..:/workspace:cached
      - node_modules_e2e:/workspace/node_modules
      - pnpm_store_e2e:/home/node/.pnpm-store
      - playwright_cache:/home/node/.cache/ms-playwright
    environment:
      - NODE_ENV=test
      - FORCE_COLOR=1
      - TERM=xterm-256color
      - PLAYWRIGHT_BROWSERS_PATH=/home/node/.cache/ms-playwright
      - CI=false
      - HOME=/home/node
    networks:
      - slideheroes
    depends_on:
      - app
    command: sleep infinity
    hostname: slideheroes-e2e

  # MCP servers container
  mcp-servers:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.mcp
      args:
        TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ..:/workspace:cached
      - mcp_data:/home/node/.mcp
      - mcp_servers:/workspace/.mcp-servers
    environment:
      - NODE_ENV=development
      - MCP_SERVERS_PATH=/workspace/.mcp-servers
      - HOME=/home/node
    networks:
      - slideheroes
    ports:
      - "3010-3020:3010-3020"  # Range for MCP server ports
    command: sleep infinity
    hostname: slideheroes-mcp

  # PostgreSQL for Supabase
  postgres:
    image: supabase/postgres:17.5.1.021-orioledb
    environment:
      # Required Supabase environment variables
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      # Supabase-specific settings
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      JWT_EXP: 3600
      # Performance tuning for Codespaces
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_WORK_MEM: 4MB
      # Disable OrioleDB by default in Codespaces (can cause issues)
      POSTGRES_ORIOLEDB_ENABLED: "false"
    volumes:
      # Use named volume for data persistence
      - postgres_data:/var/lib/postgresql/data
    networks:
      - slideheroes
    ports:
      - "54322:5432"
    # Command without OrioleDB
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements,pg_net,pgsodium,pgaudit
      -c log_statement=none
      -c log_min_messages=warning
      -c max_connections=100
      -c shared_buffers=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -U postgres || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s  # Give Supabase PostgreSQL 3 minutes to start
    hostname: slideheroes-db
    restart: unless-stopped
    # Resource limits for Codespaces
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Supabase Studio (optional - comment out if not needed)
  studio:
    image: supabase/studio:latest
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DEFAULT_ORGANIZATION: "Default Organization"
      DEFAULT_PROJECT: "Default Project"
      STUDIO_PG_META_URL: postgresql://postgres:postgres@postgres:5432/postgres
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:8000}
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2UiLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
    networks:
      - slideheroes
    ports:
      - "54321:3000"
    depends_on:
      postgres:
        condition: service_started  # Changed from service_healthy to avoid blocking
    hostname: slideheroes-studio
    restart: unless-stopped

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - slideheroes
    command: redis-server --appendonly yes
    restart: unless-stopped
    hostname: slideheroes-redis

  # Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - slideheroes
    restart: unless-stopped
    hostname: slideheroes-mail

networks:
  slideheroes:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  # App volumes
  node_modules:
  pnpm_store:
  next_cache:
  turbo_cache:
  supabase_data:
  command_history:
  claude_config:
  
  # E2E volumes
  node_modules_e2e:
  pnpm_store_e2e:
  playwright_cache:
  
  # MCP volumes
  mcp_data:
  mcp_servers:
  
  # Database volumes
  postgres_data:
  redis_data: