# Fallback PostgreSQL configuration if Supabase image fails to pull
# Use this with: docker-compose -f docker-compose.yml -f docker-compose.postgres-fallback.yml up

services:
  postgres:
    # Override with standard PostgreSQL if Supabase image unavailable
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB