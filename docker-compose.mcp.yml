# Docker Compose configuration for MCP servers
# This replaces unreliable npx-based servers with containerized versions
version: '3.8'
name: mcp-servers

services:
  # Node.js based MCP servers
  mcp-perplexity:
    build:
      context: ./.mcp-servers/perplexity-ask
      dockerfile: Dockerfile
    container_name: mcp-perplexity
    environment:
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-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}
      - PORT=8001
    ports:
      - "3051:8001"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-supabase:
    build:
      context: ./.mcp-servers/supabase
      dockerfile: Dockerfile
    container_name: mcp-supabase
    environment:
      - SUPABASE_ACCESS_TOKEN=${SUPABASE_ACCESS_TOKEN:-sbp_0d60974b0dd5515e361ed129431845251c84ebfd}
      - PORT=3000
    ports:
      - "3002:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-context7:
    build:
      context: ./.mcp-servers/context7
      dockerfile: Dockerfile
    container_name: mcp-context7
    environment:
      - DEFAULT_MINIMUM_TOKENS=${DEFAULT_MINIMUM_TOKENS:-6000}
      - PORT=3000
    ports:
      - "3003:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-postgres:
    build:
      context: ./.mcp-servers/postgres
      dockerfile: Dockerfile
    container_name: mcp-postgres
    environment:
      - POSTGRES_CONNECTION_STRING=${POSTGRES_CONNECTION_STRING:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}
      - PORT=3000
    ports:
      - "3004:3000"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-browser-tools:
    build:
      context: ./.mcp-servers/browser-tools
      dockerfile: Dockerfile
    container_name: mcp-browser-tools
    environment:
      - PORT=3000
      - DISPLAY=${DISPLAY:-:0}
    ports:
      - "3005:3000"
    restart: always
    volumes:
      # Share X11 socket for browser automation
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-code-reasoning:
    build:
      context: ./.mcp-servers/code-reasoning
      dockerfile: Dockerfile
    container_name: mcp-code-reasoning
    environment:
      - PORT=3000
    ports:
      - "3006:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-github:
    build:
      context: ./.mcp-servers/github
      dockerfile: Dockerfile
    container_name: mcp-github
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-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}
      - PORT=3000
    ports:
      - "3007:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Remote server proxies
  mcp-exa-proxy:
    build:
      context: ./.mcp-servers/exa
      dockerfile: Dockerfile
    container_name: mcp-exa-proxy
    environment:
      - EXA_API_KEY=${EXA_API_KEY:-9c7c0675-4d56-4aae-a039-f93cf72a6cbb}
      - REMOTE_URL=https://mcp.exa.ai/mcp
      - PORT=3000
    ports:
      - "3008:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-cloudflare-observability:
    build:
      context: ./.mcp-servers/cloudflare-observability
      dockerfile: Dockerfile
    container_name: mcp-cloudflare-observability
    environment:
      - REMOTE_URL=https://observability.mcp.cloudflare.com/sse
      - PORT=3000
    ports:
      - "3009:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-cloudflare-bindings:
    build:
      context: ./.mcp-servers/cloudflare-bindings
      dockerfile: Dockerfile
    container_name: mcp-cloudflare-bindings
    environment:
      - REMOTE_URL=https://bindings.mcp.cloudflare.com/sse
      - PORT=3000
    ports:
      - "3010:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-cloudflare-playwright:
    build:
      context: ./.mcp-servers/cloudflare-playwright
      dockerfile: Dockerfile
    container_name: mcp-cloudflare-playwright
    environment:
      - REMOTE_URL=https://slideheroes-playwright-mcp.slideheroes.workers.dev/sse
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-Bearer a49353e7155fe097ecc939b4275cedc2a1be0ff137c5a06dc8aa4f7671712aa7}
      - PORT=3000
    ports:
      - "3011:3000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: mcp-network
    driver: bridge

# Usage Commands:
# Start all MCP services:     docker-compose -f docker-compose.mcp.yml up -d
# Start specific services:    docker-compose -f docker-compose.mcp.yml up mcp-perplexity mcp-supabase
# View logs:                  docker-compose -f docker-compose.mcp.yml logs -f mcp-perplexity
# Stop all services:         docker-compose -f docker-compose.mcp.yml down
# Rebuild and restart:       docker-compose -f docker-compose.mcp.yml up --build -d