name: 'Setup Dependencies'
description: 'Setup Node, pnpm, and install dependencies with caching'
runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      shell: bash
      run: |
        # Try frozen lockfile first (fast path for when everything is in sync)
        if pnpm install --frozen-lockfile 2>/dev/null; then
          echo "✅ Dependencies installed successfully with frozen lockfile"
        else
          echo "⚠️ Lockfile mismatch detected - this is expected when dev is ahead of main"
          echo "📦 Installing with --no-frozen-lockfile to handle version differences..."
          
          # Use no-frozen-lockfile for integration tests since dev may be ahead
          pnpm install --no-frozen-lockfile
          
          echo "✅ Dependencies installed successfully (without frozen lockfile)"
          echo "ℹ️ Note: This is normal for integration tests when dev branch is ahead of main"
        fi

    - name: Verify turbo installation
      shell: bash
      run: |
        pnpm turbo --version || echo "⚠️ Turbo not available"

    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/.next/cache
          ${{ github.workspace }}/apps/web/.next/cache
        key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
          ${{ runner.os }}-nextjs-