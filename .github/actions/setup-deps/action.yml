name: 'Setup Dependencies'
description: 'Setup Node, pnpm, and install dependencies with caching'
runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.29.2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      shell: bash
      run: |
        # Function to install with retries
        install_with_retries() {
          local max_attempts=3
          local attempt=1
          local wait_time=30
          
          while [ $attempt -le $max_attempts ]; do
            echo "🔄 Installation attempt $attempt of $max_attempts..."
            
            # Try frozen lockfile first (fast path for when everything is in sync)
            if pnpm install --frozen-lockfile 2>/dev/null; then
              echo "✅ Dependencies installed successfully with frozen lockfile"
              return 0
            else
              echo "⚠️ Lockfile mismatch detected - this is expected when dev is ahead of main"
              echo "📦 Installing with --no-frozen-lockfile to handle version differences..."
              
              # Use no-frozen-lockfile for integration tests since dev may be ahead
              # Add network concurrency limit to avoid rate limiting
              if pnpm install --no-frozen-lockfile --network-concurrency 1; then
                echo "✅ Dependencies installed successfully (without frozen lockfile)"
                echo "ℹ️ Note: This is normal for integration tests when dev branch is ahead of main"
                return 0
              fi
            fi
            
            if [ $attempt -lt $max_attempts ]; then
              echo "⚠️ Installation failed (likely due to rate limiting). Waiting ${wait_time}s before retry..."
              sleep $wait_time
              wait_time=$((wait_time * 2))  # Exponential backoff
            fi
            
            attempt=$((attempt + 1))
          done
          
          echo "❌ Failed to install dependencies after $max_attempts attempts"
          return 1
        }
        
        install_with_retries

    - name: Verify turbo installation
      shell: bash
      run: |
        pnpm turbo --version || echo "⚠️ Turbo not available"