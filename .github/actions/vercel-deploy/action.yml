name: 'Vercel Deploy'
description: 'Deploy to Vercel with consistent configuration'
inputs:
  token:
    description: 'Vercel authentication token'
    required: true
  org-id:
    description: 'Vercel organization ID'
    required: true
  project-id:
    description: 'Vercel project ID'
    required: true
  environment:
    description: 'Deployment environment (preview, staging, production)'
    required: true
    default: 'preview'
  build-artifacts:
    description: 'Whether to use pre-built artifacts'
    required: false
    default: 'false'
  health-check-url:
    description: 'URL path for health check (e.g., /api/health)'
    required: false
    default: '/api/health'
  health-check-timeout:
    description: 'Health check timeout in seconds'
    required: false
    default: '60'
  protection-bypass-secret:
    description: 'Vercel protection bypass secret for automated health checks'
    required: false
    default: ''

outputs:
  url:
    description: 'The deployment URL'
    value: ${{ steps.deploy.outputs.url }}
  
runs:
  using: "composite"
  steps:
    - name: Install Vercel CLI
      shell: bash
      run: |
        if ! command -v vercel &> /dev/null; then
          # Try npm first (more reliable for global installs)
          npm install -g vercel@latest || {
            # Fallback to pnpm if npm fails
            export SHELL=/bin/bash
            export PNPM_HOME="$HOME/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
            pnpm setup
            pnpm add -g vercel@latest
          }
        else
          echo "✅ Vercel CLI already installed"
        fi

    - name: Setup Vercel environment
      shell: bash
      env:
        VERCEL_ORG_ID: ${{ inputs.org-id }}
        VERCEL_PROJECT_ID: ${{ inputs.project-id }}
      run: |
        # Pull Vercel environment configuration
        vercel pull --yes --environment=${{ inputs.environment }} --token=${{ inputs.token }}

    - name: Deploy to Vercel
      id: deploy
      shell: bash
      env:
        VERCEL_ORG_ID: ${{ inputs.org-id }}
        VERCEL_PROJECT_ID: ${{ inputs.project-id }}
      run: |
        # Deploy to Vercel
        echo "🚀 Deploying to Vercel..."
        
        # When build-artifacts is false, Vercel handles the entire build process
        # This is the optimized path for CI/CD deployments
        if [ "${{ inputs.build-artifacts }}" = "false" ]; then
          echo "📦 Letting Vercel handle the build process (optimized path)"
        else
          echo "⚠️ Using pre-built artifacts (legacy path - consider removing)"
        fi
        
        if [ "${{ inputs.environment }}" = "production" ]; then
          url=$(vercel deploy --prod --token=${{ inputs.token }} --yes)
        elif [ "${{ inputs.environment }}" = "staging" ]; then
          url=$(vercel deploy --target=staging --token=${{ inputs.token }} --yes)
        else
          # Preview environment deployment
          url=$(vercel deploy --token=${{ inputs.token }} --yes)
          
          # For dev branch, assign the dev.slideheroes.com alias
          if [ "$GITHUB_REF_NAME" = "dev" ] || [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "📌 Assigning dev.slideheroes.com alias to this deployment..."
            # Use vercel alias to point dev.slideheroes.com to this deployment
            vercel alias set "$url" dev.slideheroes.com --token=${{ inputs.token }} --yes --scope=${{ inputs.org-id }} || {
              echo "⚠️ Failed to set alias. Make sure dev.slideheroes.com is added as a domain in Vercel project settings"
            }
          fi
        fi
        
        echo "url=$url" >> $GITHUB_OUTPUT
        echo "✅ Deployed to: $url"

    - name: Wait for deployment readiness
      shell: bash
      run: |
        echo "⏳ Checking deployment readiness..."
        # Instead of arbitrary sleep, do a quick readiness check
        url="${{ steps.deploy.outputs.url }}"
        max_attempts=20
        attempt=0
        
        while [ $attempt -lt $max_attempts ]; do
          if curl -f -s -o /dev/null -w "%{http_code}" \
             -H "x-vercel-protection-bypass: ${{ inputs.protection-bypass-secret }}" \
             "$url" 2>/dev/null; then
            echo "✅ Deployment is ready"
            break
          fi
          
          attempt=$((attempt + 1))
          if [ $attempt -lt $max_attempts ]; then
            echo "Attempt $attempt/$max_attempts - waiting 2s..."
            sleep 2
          fi
        done

    - name: Health check
      if: inputs.health-check-url != ''
      shell: bash
      run: |
        url="${{ steps.deploy.outputs.url }}${{ inputs.health-check-url }}"
        echo "🏥 Running health check: $url"
        
        # Set curl options based on whether protection bypass is needed
        BYPASS_SECRET="${{ inputs.protection-bypass-secret }}"
        if [ ! -z "$BYPASS_SECRET" ] && [ "$BYPASS_SECRET" != "" ]; then
          echo "🔐 Using protection bypass header"
          CURL_OPTS="-H 'x-vercel-protection-bypass: $BYPASS_SECRET'"
        else
          echo "⚠️ No protection bypass secret provided"
          CURL_OPTS=""
        fi
        
        for i in {1..6}; do
          response=$(eval "curl -s -w '\n%{http_code}' $CURL_OPTS \"$url\"" 2>&1)
          http_code=$(echo "$response" | tail -n1)
          
          if [ "$http_code" = "200" ]; then
            echo "✅ Health check passed!"
            exit 0
          else
            echo "⏳ Attempt $i/6 failed with HTTP $http_code, waiting..."
            if [ "$i" -eq 1 ]; then
              echo "Response preview: $(echo "$response" | head -c 200)..."
            fi
          fi
          sleep 10
        done
        
        echo "❌ Health check failed after ${{ inputs.health-check-timeout }} seconds"
        exit 1

    - name: Comment deployment URL
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const url = '${{ steps.deploy.outputs.url }}';
          const environment = '${{ inputs.environment }}';
          const body = `🚀 **Vercel Deployment**\n\n` +
                      `Environment: \`${environment}\`\n` +
                      `URL: ${url}\n\n` +
                      `[View Deployment](${url})`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });