# Dependabot configuration for automated dependency updates
# Documentation: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # JavaScript/TypeScript dependencies via pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      # Check for updates every Monday at 10:00 UTC
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "UTC"
    # Target branch for PR creation
    target-branch: "dev"
    # Automatically rebase PRs when base branch is updated
    # This ensures Dependabot PRs always have latest workflow configuration
    rebase-strategy: "auto"
    # Dependency update strategy
    versioning-strategy: "increase"
    # Open up to 10 PRs at a time (default is 5)
    open-pull-requests-limit: 10
    # Group updates to reduce PR noise
    groups:
      # Group all production dependencies
      production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@supabase/*"
          - "stripe"
      # Group all development dependencies
      development-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
        exclude-patterns:
          - "typescript"
          - "vitest"
          - "playwright"
      # Group React ecosystem updates
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Group Next.js updates
      nextjs:
        patterns:
          - "next"
          - "@next/*"
      # Group Supabase updates
      supabase:
        patterns:
          - "@supabase/*"
          - "supabase"
      # Group testing tools
      testing-tools:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "playwright"
          - "@playwright/*"
          - "@testing-library/*"
      # Group TypeScript and type definitions
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      # Group linting and formatting tools
      code-quality:
        patterns:
          - "@biomejs/*"
          - "biome"
          - "husky"
          - "lint-staged"
    # Labels to add to PRs
    labels:
      - "dependencies"
      - "automated"
    # Commit message configuration
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    # Reviewers for dependency updates
    reviewers:
      - "MLorneSmith"
    # Assignees for dependency updates
    assignees:
      - "MLorneSmith"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates every Monday at 10:00 UTC
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "UTC"
    # Target branch for PR creation
    target-branch: "dev"
    # Automatically rebase PRs when base branch is updated
    # This ensures Dependabot PRs always have latest workflow configuration
    rebase-strategy: "auto"
    # Open up to 5 PRs at a time for Actions
    open-pull-requests-limit: 5
    # Group all GitHub Actions updates
    groups:
      github-actions:
        patterns:
          - "*"
    # Labels to add to PRs
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    # Commit message configuration
    commit-message:
      prefix: "chore"
      include: "scope"
    # Reviewers for action updates
    reviewers:
      - "MLorneSmith"
    # Assignees for action updates
    assignees:
      - "MLorneSmith"

# Security updates configuration
# These are handled automatically and bypass some restrictions
# They create PRs immediately when vulnerabilities are detected
# Note: Dependabot uses npm commands but pnpm-lock.yaml is automatically detected and used