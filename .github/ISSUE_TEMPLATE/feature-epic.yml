name: Feature Epic
description: Large feature requiring multiple stories and sprints
title: "[EPIC] "
labels: ["epic", "needs-refinement"]

body:
  - type: input
    id: epic-title
    attributes:
      label: Epic Title
      description: Brief, descriptive title for the feature
      placeholder: "AI-Powered Presentation Outline Generator"
    validations:
      required: true
      
  - type: textarea
    id: business-context
    attributes:
      label: Business Context
      description: Problem statement and business value
      placeholder: |
        **Problem**: What problem does this feature solve?
        **User Impact**: How will this benefit users?
        **Business Value**: What is the expected business impact?
    validations:
      required: true
      
  - type: textarea
    id: user-stories
    attributes:
      label: High-Level User Stories
      description: User stories that will be broken down into implementable stories
      placeholder: |
        - As a SlideHeroes user, I want to generate presentation outlines using AI so that I can quickly structure my content
        - As a user, I want to customize generated outlines so that they match my specific presentation needs
    validations:
      required: true
      
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Epic-Level Acceptance Criteria
      description: High-level criteria that define epic completion
      placeholder: |
        - [ ] Users can generate AI-powered presentation outlines
        - [ ] Generated outlines integrate with existing canvas system
        - [ ] Outline generation completes within acceptable time limits
    validations:
      required: true
      
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Business priority for this epic
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
      
  - type: checkboxes
    id: technical-domains
    attributes:
      label: Technical Domains
      description: Which areas of the system will this epic touch?
      options:
        - label: Frontend (React components, UI)
        - label: Backend (Server actions, APIs)
        - label: Database (Schema changes, queries)
        - label: AI (AI integration, prompts)
        - label: DevOps (Build, deployment)
        - label: Testing (Test implementation)
        
  - type: textarea
    id: technical-overview
    attributes:
      label: Technical Overview
      description: Architecture impact, required technologies, database changes, API changes
      placeholder: |
        ### Architecture Impact
        How will this feature affect the current architecture?
        
        ### Required Technologies
        What new technologies or libraries are needed?
        
        ### Database Changes
        What database schema changes are required?
        
        ### API Changes
        What new API endpoints or changes are needed?
        
  - type: textarea
    id: cross-cutting-concerns
    attributes:
      label: Cross-cutting Concerns
      description: Security, performance, testing, and documentation considerations
      placeholder: |
        ### Security
        What security considerations are relevant?
        
        ### Performance
        What performance implications should be considered?
        
        ### Testing
        What testing strategy is needed?
        
        ### Documentation
        What documentation updates are required?
        
  - type: textarea
    id: implementation-approach
    attributes:
      label: Implementation Approach
      description: High-level implementation phases
      placeholder: |
        ### Phase 1: Foundation
        - {High-level implementation step}
        - {High-level implementation step}
        
        ### Phase 2: Integration
        - {High-level implementation step}
        - {High-level implementation step}
        
  - type: textarea
    id: success-metrics
    attributes:
      label: Success Metrics
      description: How will we measure the success of this feature?
      placeholder: |
        - **Technical**: {Performance/quality metrics}
        - **User**: {User experience metrics}
        - **Business**: {Business impact metrics}
        
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and Risks
      description: Dependencies and risk mitigation strategies
      placeholder: |
        ### Dependencies
        - [ ] {Dependency description}
        - [ ] {Dependency description}
        
        ### Technical Risks
        - **Risk**: {Description}
          - **Impact**: {High/Medium/Low}
          - **Mitigation**: {Approach}
          
        ### Business Risks
        - **Risk**: {Description}
          - **Impact**: {High/Medium/Low}
          - **Mitigation**: {Approach}