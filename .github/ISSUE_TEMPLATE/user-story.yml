name: User Story
description: Implementable user story for development
title: "[STORY] "
labels: ["story", "ready-for-estimation"]

body:
  - type: input
    id: story-title
    attributes:
      label: Story Title
      description: Clear, concise title for the story
      placeholder: "Generate AI Presentation Outline"
    validations:
      required: true
      
  - type: textarea
    id: story-description
    attributes:
      label: Story Description
      description: Standard user story format
      placeholder: |
        **As a** {type of user}
        **I want** {some goal or functionality}
        **So that** {some reason or benefit}
    validations:
      required: true
      
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Specific, testable criteria for story completion
      placeholder: |
        - [ ] User can access outline generator from canvas page
        - [ ] User can input presentation topic (required field)
        - [ ] AI generates outline with 3-7 main sections
        - [ ] Generated outline appears in canvas outline panel
        - [ ] User receives feedback during generation process
        - [ ] Generation completes within 10 seconds or shows progress
    validations:
      required: true
      
  - type: textarea
    id: technical-tasks
    attributes:
      label: Technical Tasks
      description: Detailed tasks for implementation
      placeholder: |
        - [ ] Create OutlineGeneratorDialog component with form validation
          - **Files to modify**: apps/web/app/home/(user)/ai/canvas/_components/
          - **Estimated time**: 2 hours
        - [ ] Implement generateOutlineAction server action with Portkey integration
          - **Files to modify**: apps/web/app/home/(user)/ai/canvas/_actions/
          - **Estimated time**: 3 hours
        - [ ] Add AI usage tracking to user account
          - **Files to modify**: packages/supabase/src/schema/
          - **Estimated time**: 1 hour
        - [ ] Write unit tests for outline generation logic
          - **Files to modify**: Test files
          - **Estimated time**: 1.5 hours
    validations:
      required: true
      
  - type: textarea
    id: implementation-notes
    attributes:
      label: Implementation Notes
      description: Reference existing patterns and technical approach
      placeholder: |
        ### Existing Patterns
        Reference similar implementations in the codebase:
        - **Pattern**: {Description of similar feature}
        - **Location**: {File paths to reference}
        
        ### Technical Approach
        - **Frontend**: {React components, state management}
        - **Backend**: {Server actions, API endpoints}
        - **Database**: {Schema changes, queries}
        - **Testing**: {Test strategy and coverage}
        
  - type: textarea
    id: context-requirements
    attributes:
      label: Context Requirements for Claude Code
      description: Information needed for effective AI development sessions
      placeholder: |
        ### Role to Load
        - **Primary**: {AI Engineer/UI Engineer/Data Engineer}
        - **Secondary**: {Additional role if needed}
        
        ### Files to Read for Context
        - `{file-path}` - {Why this file is relevant}
        - `{file-path}` - {Why this file is relevant}
        
        ### Documentation to Review
        - {Documentation section or external docs}
        - {Project patterns or standards}
        
  - type: dropdown
    id: story-points
    attributes:
      label: Story Points (Estimation)
      description: Complexity and effort estimation
      options:
        - "To be estimated"
        - "1"
        - "2"
        - "3"
        - "5"
        - "8"
        - "13"
        - "21"
    validations:
      required: true
      
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Development priority for this story
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
      
  - type: checkboxes
    id: technical-domains
    attributes:
      label: Technical Domains
      description: Which areas of the system will this story touch?
      options:
        - label: Frontend (React components, UI)
        - label: Backend (Server actions, APIs)
        - label: Database (Schema changes, queries)
        - label: AI (AI integration, prompts)
        - label: DevOps (Build, deployment)
        - label: Testing (Test implementation)
        
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Blocking and related work
      placeholder: |
        ### Blocking Stories
        - #{Issue numbers that must be completed first}
        
        ### Related Stories
        - #{Issue numbers for coordination}
        
        ### External Dependencies
        - {Third-party services, APIs, etc.}
        
  - type: textarea
    id: definition-of-done
    attributes:
      label: Definition of Done
      description: Checklist for story completion
      value: |
        - [ ] All acceptance criteria met
        - [ ] Unit tests written and passing
        - [ ] Integration tests passing
        - [ ] Code review completed
        - [ ] Documentation updated
        - [ ] No linting or type errors
        - [ ] Accessibility requirements met
        - [ ] Performance requirements met