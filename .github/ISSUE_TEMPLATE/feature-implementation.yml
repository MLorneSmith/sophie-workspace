name: Feature Implementation
description: Feature implementation plan with decomposed tasks (created by /feature:sync)
title: "Feature: "
labels: ["feature", "implementation"]

body:
  - type: input
    id: epic-title
    attributes:
      label: Epic Title
      description: Brief, descriptive title for the feature
      placeholder: "AI-Powered Presentation Outline Generator"
    validations:
      required: true
      
  - type: textarea
    id: business-context
    attributes:
      label: Business Context
      description: Problem statement and business value
      placeholder: |
        **Problem**: What problem does this feature solve?
        **User Impact**: How will this benefit SlideHeroes users?
        **Business Value**: What is the expected business impact?
    validations:
      required: true
      
  - type: textarea
    id: user-stories
    attributes:
      label: High-Level User Stories
      description: User stories that will be broken down into implementable stories
      placeholder: |
        - As a SlideHeroes user, I want to generate presentation outlines using AI so that I can quickly structure my content
        - As a user, I want to customize generated outlines so that they match my specific presentation needs
    validations:
      required: true
      
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Epic-Level Acceptance Criteria
      description: High-level criteria that define epic completion
      placeholder: |
        - [ ] Users can generate AI-powered presentation outlines
        - [ ] Generated outlines integrate with existing canvas system
        - [ ] Outline generation completes within acceptable time limits
        - [ ] AI usage is tracked for billing purposes
    validations:
      required: true
      
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Business priority for this epic
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
      
  - type: textarea
    id: technical-domains-note
    attributes:
      label: Technical Domains
      description: "Note: Technical domains will be added as labels after issue creation"
      value: |
        **Technical Domain Labels to Add:**
        
        Check which domains this epic touches, and the maintainer will add the appropriate labels:
        - [ ] `domain:frontend` - React components, UI
        - [ ] `domain:backend` - Server actions, APIs  
        - [ ] `domain:database` - Schema changes, queries
        - [ ] `domain:ai` - AI integration, prompts
        - [ ] `domain:devops` - Build, deployment
        - [ ] `domain:testing` - Test implementation
        
        *These will be converted to GitHub labels for better filtering and automation.*
        
  - type: textarea
    id: technical-overview
    attributes:
      label: Technical Overview
      description: High-level technical approach and requirements
      placeholder: |
        **Architecture Impact**: How will this feature affect SlideHeroes architecture?
        **Required Technologies**: What new technologies or libraries are needed?
        **Database Changes**: What database schema changes are required?
        **API Changes**: What new API endpoints or changes are needed?
        **Integration Points**: How does this integrate with existing features?
    validations:
      required: false
      
  - type: textarea
    id: cross-cutting-concerns
    attributes:
      label: Cross-cutting Concerns
      description: Shared components, security, performance, and other considerations
      placeholder: |
        **Security**: What security considerations are relevant?
        **Performance**: What performance implications should be considered?
        **Testing**: What testing strategy is needed?
        **Documentation**: What documentation updates are required?
        **AI Usage**: How will AI usage be tracked and billed?
    validations:
      required: false
      
  - type: textarea
    id: success-metrics
    attributes:
      label: Success Metrics
      description: How will we measure the success of this feature?
      placeholder: |
        **Technical**: Performance/quality metrics
        **User**: User experience metrics  
        **Business**: Business impact metrics
    validations:
      required: false
      
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: What must be completed before this epic can be worked on?
      placeholder: |
        - [ ] Dependency description
        - [ ] External service integration
        - [ ] Other epic completion
    validations:
      required: false
      
  - type: textarea
    id: risks
    attributes:
      label: Risks and Mitigation
      description: Potential risks and how to address them
      placeholder: |
        **Technical Risks**:
        - Risk: Description | Impact: High/Medium/Low | Mitigation: Approach
        
        **Business Risks**: 
        - Risk: Description | Impact: High/Medium/Low | Mitigation: Approach
    validations:
      required: false