name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      branch:
        description: 'Branch to deploy (leave empty for current branch)'
        required: false
        type: string
      skip-tests:
        description: 'Skip tests (emergency only)'
        required: false
        type: boolean
        default: false
      reason:
        description: 'Reason for manual deployment'
        required: true
        type: string

permissions:
  contents: read
  deployments: write
  pull-requests: write
  issues: write
  checks: write
  security-events: write

jobs:
  validate-request:
    name: Validate Request
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check permissions
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Production deployments require admin permissions
            if ('${{ github.event.inputs.environment }}' === 'production') {
              const { data: user } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.actor
              });
              
              if (user.permission !== 'admin' && user.permission !== 'maintain') {
                core.setFailed('Production deployments require admin permissions');
                return;
              }
            }
            
            core.setOutput('proceed', 'true');

      - name: Log deployment request
        if: steps.check.outputs.proceed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Deploy] Manual deployment to ${{ github.event.inputs.environment }}`,
              body: `## Manual Deployment Request
              
              **Environment**: ${{ github.event.inputs.environment }}
              **Branch**: ${{ github.event.inputs.branch || github.ref_name }}
              **Skip Tests**: ${{ github.event.inputs.skip-tests }}
              **Requested By**: @${{ github.actor }}
              **Reason**: ${{ github.event.inputs.reason }}
              **Time**: ${new Date().toISOString()}`,
              labels: ['deployment', 'manual', '${{ github.event.inputs.environment }}']
            });

  # Run tests unless skipped
  test:
    name: Run Tests
    needs: validate-request
    if: needs.validate-request.outputs.proceed == 'true' && github.event.inputs.skip-tests != 'true'
    uses: ./.github/workflows/pr-validation.yml
    secrets: inherit

  # Deploy to selected environment
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: [validate-request, test]
    if: |
      always() && 
      needs.validate-request.outputs.proceed == 'true' &&
      (needs.test.result == 'success' || github.event.inputs.skip-tests == 'true')
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: ./.github/actions/setup-deps

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Set Vercel environment
        id: vercel-env
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "env=production" >> $GITHUB_OUTPUT
            echo "prod=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.environment }}" = "staging" ]; then
            echo "env=preview" >> $GITHUB_OUTPUT
            echo "prod=false" >> $GITHUB_OUTPUT
          else
            echo "env=development" >> $GITHUB_OUTPUT
            echo "prod=false" >> $GITHUB_OUTPUT
          fi

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=${{ steps.vercel-env.outputs.env }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: |
          if [ "${{ steps.vercel-env.outputs.prod }}" = "true" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ steps.vercel-env.outputs.prod }}" = "true" ]; then
            url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to: $url"

      - name: Update deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deployment,manual,${{ github.event.inputs.environment }}',
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 1
            });

            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `✅ Deployment completed successfully!\n\nURL: ${{ steps.deploy.outputs.url }}`
              });
              
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                state: 'closed'
              });
            }

  # Post-deployment validation
  validate-deployment:
    name: Validate Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Health check
        run: |
          sleep 30
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ needs.deploy.outputs.url }}/api/health || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status $response"
            exit 1
          fi

      - name: Notify success
        if: success()
        run: |
          echo "✅ Manual deployment to ${{ github.event.inputs.environment }} completed successfully"

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[URGENT] Manual deployment to ${{ github.event.inputs.environment }} failed`,
              body: `## Deployment Failure
              
              The manual deployment to ${{ github.event.inputs.environment }} has failed.
              
              **Details**:
              - Environment: ${{ github.event.inputs.environment }}
              - Branch: ${{ github.event.inputs.branch || github.ref_name }}
              - Requested by: @${{ github.actor }}
              - Reason: ${{ github.event.inputs.reason }}
              
              Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`,
              labels: ['bug', 'deployment', 'urgent'],
              assignees: ['${{ github.actor }}']
            });