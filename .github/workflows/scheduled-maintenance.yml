name: Scheduled Maintenance

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        type: choice
        options:
          - all
          - dependencies
          - security
          - cleanup

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read  # Required for artifact management

jobs:
  # Check for dependency updates
  dependency-updates:
    name: Check Dependencies
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    if: github.event_name == 'schedule' || contains(github.event.inputs.task, 'dependencies') || contains(github.event.inputs.task, 'all')
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "store-path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Check for updates
        id: updates
        run: |
          # Install dependencies first
          pnpm install --frozen-lockfile
          # Check for outdated packages
          pnpm outdated --format json > updates.json 2>/dev/null || true
          if [ -s updates.json ] && [ "$(cat updates.json)" != "[]" ]; then
            echo "has-updates=true" >> $GITHUB_OUTPUT
            echo "✅ Updates available"
          else
            echo "has-updates=false" >> $GITHUB_OUTPUT
            echo "✅ No updates needed"
          fi

      - name: Create update PR
        if: steps.updates.outputs.has-updates == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const branch = `deps/update-${date}`;
            
            // Create branch and PR logic here
            console.log('Dependency updates available - PR creation would happen here');

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    if: github.event_name == 'schedule' || contains(github.event.inputs.task, 'security') || contains(github.event.inputs.task, 'all')
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "store-path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run audit
        id: audit
        run: |
          # Run audit and capture output and exit code
          set +e
          pnpm audit --production --json > audit-results.json 2>&1
          AUDIT_EXIT_CODE=$?
          set -e
          
          # Check if there are vulnerabilities
          if [ $AUDIT_EXIT_CODE -ne 0 ]; then
            echo "has-vulnerabilities=true" >> $GITHUB_OUTPUT
            echo "❌ Security vulnerabilities found"
            # Extract summary for the issue body
            pnpm audit --production 2>&1 | head -200 > audit-summary.txt
          else
            echo "has-vulnerabilities=false" >> $GITHUB_OUTPUT
            echo "✅ No security vulnerabilities found"
          fi

      - name: Check for secrets
        run: |
          echo "TruffleHog secret scanning will be implemented in Week 3"
          # TODO: Add TruffleHog scanning

      - name: Create security report
        if: steps.audit.outputs.has-vulnerabilities == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let auditSummary = 'Security vulnerabilities were found during the weekly audit.\n\n';
            
            try {
              // Read the audit summary if it exists
              const summary = fs.readFileSync('audit-summary.txt', 'utf8');
              auditSummary += '## Vulnerability Summary\n\n';
              auditSummary += '```\n' + summary.substring(0, 3000) + '\n```\n\n';
              auditSummary += 'Please review the full workflow logs for complete details.';
            } catch (e) {
              auditSummary += 'Please review the workflow logs for vulnerability details.';
            }
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Weekly audit findings - ${new Date().toISOString().split('T')[0]}`,
              body: auditSummary,
              labels: ['security', 'maintenance']
            });

  # Clean up old artifacts and caches
  cleanup:
    name: Clean Up Resources
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    if: github.event_name == 'schedule' || contains(github.event.inputs.task, 'cleanup') || contains(github.event.inputs.task, 'all')
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v8
        continue-on-error: true
        with:
          script: |
            const daysToKeep = 7;
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - daysToKeep);

            try {
              const artifacts = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              let deletedCount = 0;
              for (const artifact of artifacts.data.artifacts) {
                const createdAt = new Date(artifact.created_at);
                if (createdAt < cutoffDate) {
                  try {
                    await github.rest.actions.deleteArtifact({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      artifact_id: artifact.id
                    });
                    console.log(`✅ Deleted artifact: ${artifact.name}`);
                    deletedCount++;
                  } catch (deleteError) {
                    console.error(`❌ Failed to delete artifact ${artifact.name}: ${deleteError.message}`);
                  }
                }
              }
              console.log(`Cleanup complete. Deleted ${deletedCount} artifacts.`);
            } catch (error) {
              console.error(`❌ Failed to list artifacts: ${error.message}`);
              if (error.status === 403) {
                console.log('⚠️ Insufficient permissions for artifact management. This is expected for some repositories.');
                console.log('✅ Cleanup completed (artifacts skipped due to permissions)');
              } else {
                throw error;
              }
            }

      - name: Report cleanup results
        run: |
          echo "✅ Cleanup completed successfully"

  # Generate maintenance report
  report:
    name: Maintenance Report
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [dependency-updates, security-audit, cleanup]
    if: always() && github.event_name == 'schedule'
    steps:
      - name: Generate report
        uses: actions/github-script@v8
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const results = {
              dependencies: '${{ needs.dependency-updates.result }}',
              security: '${{ needs.security-audit.result }}',
              cleanup: '${{ needs.cleanup.result }}'
            };

            let body = `# Weekly Maintenance Report - ${date}\n\n`;
            body += '## Results\n\n';
            body += `- Dependencies Check: ${results.dependencies === 'success' ? '✅' : '❌'} ${results.dependencies}\n`;
            body += `- Security Audit: ${results.security === 'success' ? '✅' : '❌'} ${results.security}\n`;
            body += `- Cleanup: ${results.cleanup === 'success' ? '✅' : '❌'} ${results.cleanup}\n`;
            
            // Add context about what each status means
            body += '\n## Summary\n';
            if (results.dependencies === 'success') {
              body += '- ✅ Dependencies are up to date or updates are available (check for PRs)\n';
            } else {
              body += '- ❌ Dependencies check encountered an issue\n';
            }
            
            if (results.security === 'success') {
              body += '- ✅ Security audit completed (vulnerabilities may have been found - check for security issues)\n';
            } else {
              body += '- ❌ Security audit could not complete\n';
            }
            
            if (results.cleanup === 'success') {
              body += '- ✅ Cleanup tasks completed\n';
            } else {
              body += '- ❌ Cleanup tasks encountered issues (may be permissions related)\n';
            }
            
            body += '\n## Next Steps\n';
            body += '- Review any created PRs or issues\n';
            body += '- Address any security findings\n';
            body += '- Update dependencies as needed\n';

            // Only create report for scheduled runs, not manual triggers
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Maintenance] Weekly report - ${date}`,
              body: body,
              labels: ['maintenance', 'automated']
            });