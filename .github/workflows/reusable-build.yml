name: Reusable Build

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Environment to build for (development, staging, production)'
      node-version:
        required: false
        type: string
        default: 'lts/*'
        description: 'Node.js version to use'
    outputs:
      build-cache-key:
        description: 'Cache key for build artifacts'
        value: ${{ jobs.build.outputs.cache-key }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_ENABLED: ${{ secrets.TURBO_TOKEN != '' && 'true' || 'false' }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY || '' }}

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      cache-key: ${{ steps.cache.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Cache turbo build
        uses: actions/cache@v4
        id: turbo-cache
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ inputs.environment }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ inputs.environment }}-

      - name: Build application
        run: |
          # Debug environment
          echo "::group::Environment Info"
          echo "Node version: $(node --version)"
          echo "pnpm version: $(pnpm --version)"
          echo "Working directory: $(pwd)"
          echo "Environment: ${{ inputs.environment }}"
          echo "::endgroup::"
          
          # Show Turbo cache status
          echo "::group::Turbo Cache Status"
          npx turbo build --dry-run --summarize | head -20 || true
          echo "::endgroup::"
          
          # Run build with appropriate cache settings
          echo "::group::Build Output"
          if [ -n "$TURBO_TOKEN" ]; then
            echo "Building with remote cache enabled"
            pnpm build --cache-dir=.turbo || {
              echo "::warning::Build with remote cache failed. Retrying without remote cache..."
              TURBO_REMOTE_CACHE_ENABLED=false pnpm build --cache-dir=.turbo --force
            }
          else
            echo "Building without remote cache (no TURBO_TOKEN)"
            TURBO_REMOTE_CACHE_ENABLED=false pnpm build --cache-dir=.turbo
          fi
          echo "::endgroup::"
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_ENV: ${{ inputs.environment }}
          TURBO_FORCE: ${{ github.event.inputs.force_build == 'true' && '1' || '' }}
          # Add required environment variables for payload build
          # These are needed at build time for type generation
          # Note: Both DATABASE_URI and DATABASE_URL are set for compatibility
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          PAYLOAD_PUBLIC_SERVER_URL: ${{ vars.PAYLOAD_PUBLIC_SERVER_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            apps/web/.next
            apps/web/public
            apps/payload/dist
            packages/*/dist
            .turbo
          key: build-${{ inputs.environment }}-${{ github.sha }}

      - name: Generate build info
        run: |
          echo "{
            \"commit\": \"${{ github.sha }}\",
            \"branch\": \"${{ github.ref_name }}\",
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            \"environment\": \"${{ inputs.environment }}\",
            \"actor\": \"${{ github.actor }}\"
          }" > build-info.json

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info-${{ inputs.environment }}
          path: build-info.json
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ inputs.environment }}
          path: |
            apps/web/.next
            apps/payload/dist
            build-info.json
          retention-days: 1