name: Reusable Build

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Environment to build for (development, staging, production)'
      node-version:
        required: false
        type: string
        default: 'lts/*'
        description: 'Node.js version to use'
    outputs:
      build-cache-key:
        description: 'Cache key for build artifacts'
        value: ${{ jobs.build.outputs.cache-key }}

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Cache turbo build
        uses: actions/cache@v4
        id: turbo-cache
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ inputs.environment }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ inputs.environment }}-

      - name: Build application
        run: |
          pnpm build
        env:
          NODE_ENV: ${{ inputs.environment }}
          NEXT_PUBLIC_APP_ENV: ${{ inputs.environment }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            apps/web/.next
            apps/web/public
            apps/payload/dist
            packages/*/dist
            .turbo
          key: build-${{ inputs.environment }}-${{ github.sha }}

      - name: Generate build info
        run: |
          echo "{
            \"commit\": \"${{ github.sha }}\",
            \"branch\": \"${{ github.ref_name }}\",
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            \"environment\": \"${{ inputs.environment }}\",
            \"actor\": \"${{ github.actor }}\"
          }" > build-info.json

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info-${{ inputs.environment }}
          path: build-info.json
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ inputs.environment }}
          path: |
            apps/web/.next
            apps/payload/dist
            build-info.json
          retention-days: 1