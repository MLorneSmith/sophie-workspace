name: Reusable Build or Reuse

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Environment to build for (development, staging, production)'
      reuse-from:
        required: false
        type: string
        description: 'Environment to reuse build from (e.g., staging for production)'
      force-rebuild:
        required: false
        type: boolean
        default: false
        description: 'Force a rebuild even if reuse is possible'
    outputs:
      build-cache-key:
        description: 'Cache key for build artifacts'
        value: ${{ jobs.build-or-reuse.outputs.cache-key }}
      build-source:
        description: 'Source of the build (new or reused)'
        value: ${{ jobs.build-or-reuse.outputs.source }}

jobs:
  build-or-reuse:
    name: Build or Reuse Application
    runs-on: runs-on=${{ github.run_id }},runner=2cpu-linux-x64
    outputs:
      cache-key: ${{ steps.build-output.outputs.cache-key }}
      source: ${{ steps.build-output.outputs.source }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for reusable build
        id: check-reuse
        if: inputs.reuse-from != '' && !inputs.force-rebuild
        run: |
          # Check if we can reuse a build from another environment
          echo "Checking for reusable build from ${{ inputs.reuse-from }}..."
          
          # Try to download build artifacts from the specified environment
          if gh run download -n build-artifacts-${{ inputs.reuse-from }} --repo ${{ github.repository }} 2>/dev/null; then
            echo "reusable=true" >> $GITHUB_OUTPUT
            echo "✅ Found reusable build from ${{ inputs.reuse-from }}"
          else
            echo "reusable=false" >> $GITHUB_OUTPUT
            echo "❌ No reusable build found from ${{ inputs.reuse-from }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Reuse existing build
        if: steps.check-reuse.outputs.reusable == 'true'
        id: reuse-build
        run: |
          echo "Reusing build from ${{ inputs.reuse-from }}..."
          
          # Re-upload the artifacts with the new environment name
          mv build-artifacts-${{ inputs.reuse-from }} build-artifacts-${{ inputs.environment }}
          
          # Update build info
          jq '.reused_from = "${{ inputs.reuse-from }}" | .reused_at = now | .environment = "${{ inputs.environment }}"' \
            build-artifacts-${{ inputs.environment }}/build-info.json > temp.json
          mv temp.json build-artifacts-${{ inputs.environment }}/build-info.json
          
          echo "cache-key=reused-${{ inputs.reuse-from }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "source=reused-from-${{ inputs.reuse-from }}" >> $GITHUB_OUTPUT

      - name: Upload reused artifacts
        if: steps.check-reuse.outputs.reusable == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ inputs.environment }}
          path: build-artifacts-${{ inputs.environment }}
          retention-days: 1

      - name: Build new application
        if: steps.check-reuse.outputs.reusable != 'true'
        uses: ./.github/workflows/reusable-build.yml
        with:
          environment: ${{ inputs.environment }}

      - name: Set build outputs
        id: build-output
        run: |
          if [[ "${{ steps.check-reuse.outputs.reusable }}" == "true" ]]; then
            echo "cache-key=${{ steps.reuse-build.outputs.cache-key }}" >> $GITHUB_OUTPUT
            echo "source=${{ steps.reuse-build.outputs.source }}" >> $GITHUB_OUTPUT
          else
            echo "cache-key=build-${{ inputs.environment }}-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "source=new-build" >> $GITHUB_OUTPUT
          fi

      - name: Report build source
        run: |
          echo "## 🏗️ Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.check-reuse.outputs.reusable }}" == "true" ]]; then
            echo "♻️ **Reused build from:** ${{ inputs.reuse-from }}" >> $GITHUB_STEP_SUMMARY
            echo "⏱️ **Time saved:** ~3-5 minutes" >> $GITHUB_STEP_SUMMARY
          else
            echo "🆕 **Created new build for:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Cache key:** ${{ steps.build-output.outputs.cache-key }}" >> $GITHUB_STEP_SUMMARY