name: Dev Integration Tests

# This workflow runs integration tests against the dev deployment
# Note: This workflow runs from the main branch but tests the dev deployment
# The setup-deps action handles dependency mismatches gracefully since
# dev branch is typically ahead of main with newer dependencies

on:
  workflow_run:
    workflows: ["Deploy to Dev"]
    types: [completed]
  workflow_dispatch:
    inputs:
      deployment_url:
        description: 'Dev deployment URL to test'
        required: false
        default: 'https://dev.slideheroes.com'

permissions:
  actions: read  # Required for downloading artifacts from workflow_run
  contents: write  # Changed from read to write to allow commit comments
  issues: write
  pull-requests: write
  checks: write

env:
  DEPLOYMENT_URL: ${{ github.event.inputs.deployment_url || 'https://dev.slideheroes.com' }}

jobs:
  # URLs will be dynamically set from the Deploy to Dev workflow outputs
  check-should-run:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      web_deployment_url: ${{ steps.check.outputs.web_deployment_url }}
      payload_deployment_url: ${{ steps.check.outputs.payload_deployment_url }}
    steps:
      - name: Download deployment URLs
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: deployment-urls
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Check conditions
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            # For manual dispatch, use the configured URL (defaults to dev.slideheroes.com for web)
            echo "web_deployment_url=${{ env.DEPLOYMENT_URL }}" >> $GITHUB_OUTPUT
            # TODO: Get payload URL from environment or make it configurable
            echo "payload_deployment_url=https://dev.slideheroes.com" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT

            # Try to read deployment URLs from artifact
            if [ -f "urls.json" ]; then
              echo "📦 Using deployment URLs from artifact:"
              cat urls.json

              WEB_URL=$(jq -r '.web_url' urls.json)
              PAYLOAD_URL=$(jq -r '.payload_url' urls.json)

              echo "web_deployment_url=$WEB_URL" >> $GITHUB_OUTPUT
              echo "payload_deployment_url=$PAYLOAD_URL" >> $GITHUB_OUTPUT

              echo "ℹ️ Using direct Vercel deployment URLs (bypasses protection):"
              echo "ℹ️ Web app tests will use: $WEB_URL"
              echo "ℹ️ Payload/GraphQL tests will use: $PAYLOAD_URL"
            else
              echo "⚠️ Deployment URLs artifact not found, falling back to dev.slideheroes.com"
              echo "web_deployment_url=https://dev.slideheroes.com" >> $GITHUB_OUTPUT
              echo "payload_deployment_url=https://dev.slideheroes.com" >> $GITHUB_OUTPUT

              echo "ℹ️ Note: Using dev.slideheroes.com for both services (fallback)"
              echo "ℹ️ Web app tests will use: https://dev.slideheroes.com"
              echo "ℹ️ Payload/GraphQL tests will use: https://dev.slideheroes.com"
            fi
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Skipping: Deploy to Dev workflow did not succeed"
          fi

  # Wait for deployment to be ready
  wait-for-deployment:
    name: Wait for Deployment Ready
    needs: check-should-run
    if: needs.check-should-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deployment_ready: ${{ steps.wait.outputs.ready }}
    steps:
      - name: Wait for deployment to be ready
        id: wait
        shell: bash {0}  # Prevent shell from auto-failing on non-zero exit
        run: |
          set +e  # Don't exit on error - handle it explicitly
          echo "⏳ Waiting for web deployment to be ready at ${{ needs.check-should-run.outputs.web_deployment_url }}"
          
          # First, validate the deployment URL format and basic connectivity
          echo "🔍 Validating deployment URL format..."
          if [[ "${{ needs.check-should-run.outputs.web_deployment_url }}" =~ ^https?://[^/]+(/.*)?$ ]]; then
            echo "✅ Web URL format is valid"
          else
            echo "❌ Invalid web URL format: ${{ needs.check-should-run.outputs.web_deployment_url }}"
            echo "ready=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Simple DNS resolution check
          DOMAIN=$(echo "${{ needs.check-should-run.outputs.web_deployment_url }}" | sed -E 's|^https?://([^/]+).*|\1|')
          echo "🔍 Checking DNS resolution for $DOMAIN..."
          if nslookup "$DOMAIN" > /dev/null 2>&1; then
            echo "✅ DNS resolution successful"
          else
            echo "⚠️ DNS resolution failed - continuing anyway (might be temporary)"
          fi
          
          MAX_WAIT_TIME=600  # 10 minutes (increased from 5)
          CHECK_INTERVAL=15  # Increased from 10
          RETRY_COUNT=0
          MAX_RETRIES=5  # Increased from 3
          elapsed=0
          
          while [ $elapsed -lt $MAX_WAIT_TIME ]; do
            echo "Checking deployment readiness (${elapsed}s elapsed)..."

            # Use comprehensive health check endpoint instead of simple HTTP check
            # This verifies database, auth, and application readiness
            # Using /healthcheck which is guaranteed to exist in web app deployment
            # See: https://github.com/MLorneSmith/2025slideheroes/issues/591
            HEALTH_URL="${{ needs.check-should-run.outputs.web_deployment_url }}/healthcheck"

            # Fetch health check response
            if [ ! -z "${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" ]; then
              RESPONSE=$(curl -s --max-time 30 \
                -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
                "$HEALTH_URL" 2>/dev/null) || RESPONSE=""
            else
              RESPONSE=$(curl -s --max-time 30 "$HEALTH_URL" 2>/dev/null) || RESPONSE=""
            fi

            # Parse health check response
            if [ ! -z "$RESPONSE" ]; then
              # Check if response is HTML (Vercel auth page) instead of JSON
              if echo "$RESPONSE" | grep -q "Authentication Required\|Vercel Authentication\|<!doctype"; then
                echo "❌ CRITICAL: Vercel protection is blocking the health endpoint"
                echo "🔧 The bypass header is not working correctly"
                echo "💡 Solution: Verify VERCEL_AUTOMATION_BYPASS_SECRET matches Vercel project settings"
                echo "📖 See: https://vercel.com/docs/deployment-protection/methods-to-bypass-deployment-protection/protection-bypass-automation"
                echo "ready=false" >> $GITHUB_OUTPUT
                exit 1
              fi

              # Check if route doesn't exist yet (404 from Next.js)
              if echo "$RESPONSE" | grep -q "Route not found"; then
                echo "⏳ Health endpoint route not available yet (Vercel still initializing)"
                echo "ℹ️ This is normal - API routes can take 45-60s to become available after deployment"
                echo "⚠️ Waiting ${CHECK_INTERVAL}s before retrying..."
              else
                # Route exists - parse the health check
                # /healthcheck returns: {services: {database: true/false}}
                DATABASE=$(echo "$RESPONSE" | jq -r '.services.database // false' 2>/dev/null)

                echo "Health Status: Database=$DATABASE"

                # Check if database is healthy (deployment is ready when database is healthy)
                if [ "$DATABASE" = "true" ]; then
                  echo "✅ Deployment is fully ready - database operational"
                  echo "ready=true" >> $GITHUB_OUTPUT
                  exit 0
                else
                  echo "⚠️ Database still initializing. Waiting ${CHECK_INTERVAL}s..."
                fi
              fi
            else
              # Fallback to basic HTTP check if health endpoint not available yet
              echo "⚠️ Health endpoint not responding, trying basic check..."

              if [ ! -z "${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" ]; then
                HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
                  --max-time 30 \
                  -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
                  "${{ needs.check-should-run.outputs.web_deployment_url }}" 2>/dev/null) || HTTP_CODE="000"
              else
                HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
                  --max-time 30 \
                  "${{ needs.check-should-run.outputs.web_deployment_url }}" 2>/dev/null) || HTTP_CODE="000"
              fi

              # Only log basic check results, don't mark as ready yet
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "304" ]; then
                echo "ℹ️ Server responding (HTTP $HTTP_CODE) but health endpoint not ready"
              elif [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
                echo "ℹ️ Server protected (HTTP $HTTP_CODE) but health endpoint not ready"
              else
                echo "⚠️ Got HTTP $HTTP_CODE - deployment still initializing"
              fi

              # Increment retry count for fallback checks
              RETRY_COUNT=$((RETRY_COUNT + 1))

              # After max retries, if we're getting HTTP responses, proceed
              if [ $RETRY_COUNT -ge $MAX_RETRIES ] && [ "$HTTP_CODE" != "000" ]; then
                echo "⚠️ Health endpoint not available after $RETRY_COUNT attempts"
                echo "Server is responding but comprehensive checks unavailable"
                echo "Proceeding with basic readiness assumption"
                echo "ready=true" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi

            sleep $CHECK_INTERVAL
            elapsed=$((elapsed + CHECK_INTERVAL))
          done
          
          echo "❌ Deployment not ready after ${MAX_WAIT_TIME}s"
          echo "ready=false" >> $GITHUB_OUTPUT
          exit 1

  # API Contract Testing
  api-contract-tests:
    name: API Contract Tests
    needs: [check-should-run, wait-for-deployment]
    if: needs.check-should-run.outputs.should_run == 'true' && needs.wait-for-deployment.outputs.deployment_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev  # Explicitly checkout dev branch to match deployment

      - uses: ./.github/actions/setup-deps

      - name: Run API contract tests
        run: |
          # Test all API endpoints are responding correctly
          echo "🔍 Testing API endpoints at ${{ needs.check-should-run.outputs.deployment_url }}"
          
          # Add retry logic for health checks
          MAX_RETRIES=5
          RETRY_DELAY=10
          
          # Function to test endpoint with retries
          test_endpoint() {
            local url=$1
            local name=$2
            local retries=0
            
            # Add Vercel protection bypass header if available
            CURL_OPTS=""
            if [ ! -z "${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" ]; then
              CURL_OPTS="-H 'x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}'"
            fi
            
            while [ $retries -lt $MAX_RETRIES ]; do
              echo "Attempt $((retries + 1))/$MAX_RETRIES for $name..."
              
              HTTP_CODE=$(eval "curl -s -o /dev/null -w \"%{http_code}\" --max-time 30 $CURL_OPTS \"$url\"")
              
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
                echo "✅ $name: HTTP $HTTP_CODE"
                return 0
              elif [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
                echo "⚠️ $name: HTTP $HTTP_CODE (deployment protection) - considering as ready"
                return 0  # Consider protected deployment as ready
              elif [ "$HTTP_CODE" = "404" ]; then
                # 404 might mean Vercel protection with incorrect bypass header
                # Try without bypass header to confirm
                HTTP_CODE_NO_HEADER=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
                if [ "$HTTP_CODE_NO_HEADER" = "401" ] || [ "$HTTP_CODE_NO_HEADER" = "403" ]; then
                  echo "⚠️ $name: HTTP 404 with bypass header, $HTTP_CODE_NO_HEADER without - deployment protected, considering as ready"
                  return 0
                else
                  echo "❌ $name returned HTTP 404 (route not found)"
                  return 1
                fi
              elif [ "$HTTP_CODE" = "522" ] || [ "$HTTP_CODE" = "521" ] || [ "$HTTP_CODE" = "523" ]; then
                echo "⚠️ Cloudflare error $HTTP_CODE for $name. Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
                retries=$((retries + 1))
              else
                echo "❌ $name returned HTTP $HTTP_CODE"
                return 1
              fi
            done
            
            echo "❌ $name failed after $MAX_RETRIES attempts"
            return 1
          }
          
          # Test health endpoints with retry logic
          test_endpoint "${{ needs.check-should-run.outputs.web_deployment_url }}/healthcheck" "Health check" || exit 1
          test_endpoint "${{ needs.check-should-run.outputs.web_deployment_url }}/api/health" "API health" || exit 1
          
          # TODO: Add more comprehensive API testing
          # - Authentication endpoints
          # - User management endpoints
          # - Billing endpoints
          # - Content management endpoints

      - name: Test GraphQL endpoint
        run: |
          echo "🔍 Testing GraphQL endpoint..."
          
          # Skip introspection test entirely for dev environment
          # Introspection is typically disabled in production/dev deployments
          echo "⚠️ GraphQL introspection test skipped for dev environment"
          echo "ℹ️ Introspection is disabled by default in production deployments"
          
          # Instead, test basic GraphQL connectivity with a simple query
          MAX_RETRIES=5
          RETRY_DELAY=10
          retries=0
          
          # Add headers for GraphQL and Vercel protection bypass
          CURL_HEADERS="-H \"Content-Type: application/json\""
          
          # Add Vercel protection bypass header for Payload project if available
          if [ ! -z "${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET_PAYLOAD }}" ]; then
            CURL_HEADERS="$CURL_HEADERS -H \"x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET_PAYLOAD }}\""
          elif [ ! -z "${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" ]; then
            # Fallback to web secret if payload-specific secret not available
            CURL_HEADERS="$CURL_HEADERS -H \"x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}\""
          fi
          
          while [ $retries -lt $MAX_RETRIES ]; do
            echo "Attempt $((retries + 1))/$MAX_RETRIES for GraphQL endpoint..."
            
            # Test with a simple non-introspection query
            RESPONSE=$(eval "curl -s -X POST \
              $CURL_HEADERS \
              -d '{\"query\":\"{ __typename }\"}' \
              --max-time 30 \
              \"${{ needs.check-should-run.outputs.payload_deployment_url }}/api/graphql\"")
            
            # Check for Cloudflare error pages
            if echo "$RESPONSE" | grep -q "Cloudflare\|522\|521\|523"; then
              echo "⚠️ Cloudflare error detected. Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              retries=$((retries + 1))
              continue
            fi
            
            # Check for any GraphQL response (errors are OK, we just need connectivity)
            if echo "$RESPONSE" | grep -q -E "data|errors|extensions"; then
              echo "✅ GraphQL endpoint is reachable and responding"
              echo "Response preview: $(echo "$RESPONSE" | head -c 200)"
              exit 0
            elif echo "$RESPONSE" | grep -q "Vercel Authentication"; then
              echo "⚠️ GraphQL endpoint is protected by Vercel authentication"
              echo "ℹ️ This is expected for dev environment - marking as success"
              exit 0
            else
              echo "⚠️ Unexpected response from GraphQL endpoint"
              echo "Response: $(echo "$RESPONSE" | head -c 500)"
              # Don't fail on GraphQL issues as it may be deployed separately
              if [ $retries -eq $((MAX_RETRIES - 1)) ]; then
                echo "⚠️ GraphQL endpoint may not be available - continuing with other tests"
                exit 0
              fi
            fi
            
            sleep $RETRY_DELAY
            retries=$((retries + 1))
          done
          
          echo "⚠️ GraphQL endpoint connectivity could not be verified - continuing anyway"
          exit 0

  # Integration Tests
  integration-tests:
    name: Integration Tests
    needs: [check-should-run, wait-for-deployment]
    if: needs.check-should-run.outputs.should_run == 'true' && needs.wait-for-deployment.outputs.deployment_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Increased from 15 to allow integration tests to complete
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev  # Explicitly checkout dev branch to match deployment
          sparse-checkout: |
            apps/e2e
            packages
            tooling
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            .npmrc
            .nvmrc
            .github/actions/setup-deps
            tsconfig.json
            scripts

      - uses: ./.github/actions/setup-deps

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web-e2e exec playwright install --with-deps chromium

      - name: Run integration test suite
        env:
          BASE_URL: ${{ needs.check-should-run.outputs.web_deployment_url }}
          SKIP_EMAIL_VERIFICATION: true
          CI: true
          PLAYWRIGHT_TEST: true  # Enables Cloudflare Turnstile test keys bypass
          PLAYWRIGHT_BASE_URL: ${{ needs.check-should-run.outputs.web_deployment_url }}
          PLAYWRIGHT_API_URL: ${{ needs.check-should-run.outputs.payload_deployment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET_PAYLOAD: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET_PAYLOAD }}
          ENABLE_BILLING_TESTS: true  # Enable billing integration tests
          ENABLE_TEAM_ACCOUNT_TESTS: true  # Enable team account integration tests
          # E2E test user credentials
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
          E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          # Supabase configuration for E2E tests
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          # Add debug logging for Playwright
          DEBUG: pw:api
        run: |
          echo "🧪 Running integration tests..."
          echo "⚠️ Email verification will be SKIPPED (testing against deployed environment)"
          echo "ℹ️ Note: Tests may fail if Vercel protection bypass is not properly configured"
          echo "ℹ️ Ensure VERCEL_AUTOMATION_BYPASS_SECRET is set in GitHub Secrets"
          
          # Run integration tests (not just smoke tests)
          pnpm --filter web-e2e test:integration || {
            EXIT_CODE=$?
            echo "⚠️ Integration tests failed with exit code $EXIT_CODE"
            echo "ℹ️ Common issues:"
            echo "  - Vercel protection blocking test automation"
            echo "  - Missing or incorrect VERCEL_AUTOMATION_BYPASS_SECRET"
            echo "  - Dev deployment not fully ready"
            echo "📝 Check test artifacts for screenshots and traces"
            exit $EXIT_CODE
          }

  # Security Quick Scan
  security-scan:
    name: Security Quick Scan
    needs: [check-should-run, wait-for-deployment]
    if: needs.check-should-run.outputs.should_run == 'true' && needs.wait-for-deployment.outputs.deployment_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # Don't block on security issues initially
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev  # Explicitly checkout dev branch to match deployment

      - name: Run security headers check
        run: |
          echo "🔒 Checking security headers with simplified approach..."
          
          # Use system timeout to prevent infinite hangs - hard limit of 90 seconds
          timeout 90 bash -c '
            URL="${{ needs.check-should-run.outputs.web_deployment_url }}"
            BYPASS_SECRET="${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}"
            
            echo "Testing connectivity to $URL..."
            
            # Simple curl with minimal complexity
            if [ -n "$BYPASS_SECRET" ]; then
              CURL_CMD="curl -s -I --max-time 30 -H \"x-vercel-protection-bypass: $BYPASS_SECRET\" \"$URL\""
            else
              CURL_CMD="curl -s -I --max-time 30 \"$URL\""
            fi
            
            echo "Executing: $CURL_CMD"
            if eval "$CURL_CMD" > /tmp/headers 2>/dev/null; then
              echo "✅ Successfully fetched headers"
              echo "Headers received:"
              cat /tmp/headers | head -10
              
              # Simple header checks without complex parsing
              if grep -qi "x-frame-options" /tmp/headers; then
                echo "✅ X-Frame-Options header found"
              else
                echo "⚠️ X-Frame-Options header missing"
              fi
              
              if grep -qi "content-security-policy" /tmp/headers; then
                echo "✅ Content-Security-Policy header found"
              else
                echo "⚠️ Content-Security-Policy header missing"
              fi
              
              if grep -qi "x-content-type-options" /tmp/headers; then
                echo "✅ X-Content-Type-Options header found"
              else
                echo "⚠️ X-Content-Type-Options header missing"
              fi
              
            else
              echo "⚠️ Could not fetch headers - this is acceptable for a quick scan"
              echo "ℹ️ Deployment may be protected or temporarily unavailable"
            fi
          ' || echo "⚠️ Security scan timed out after 90s - continuing with other tests"

      - name: Check for exposed sensitive paths
        run: |
          echo "🔍 Checking for exposed sensitive paths..."
          
          # Check that sensitive paths return 404 or 403
          PATHS=("/.env" "/.git" "/config.json" "/package.json" "/.github")
          
          for path in "${PATHS[@]}"; do
            # Retry logic for Cloudflare errors
            MAX_RETRIES=3
            RETRY_DELAY=5
            retries=0
            
            while [ $retries -lt $MAX_RETRIES ]; do
              if [ ! -z "${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" ]; then
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
                  -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
                  "${{ needs.check-should-run.outputs.web_deployment_url }}$path" 2>/dev/null) || STATUS="000"
              else
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
                  "${{ needs.check-should-run.outputs.web_deployment_url }}$path" 2>/dev/null) || STATUS="000"
              fi
              
              # Check if it's a Cloudflare error that needs retry
              if [[ "$STATUS" == "522" ]] || [[ "$STATUS" == "521" ]] || [[ "$STATUS" == "523" ]]; then
                echo "⚠️ Cloudflare error $STATUS for $path. Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
                retries=$((retries + 1))
                continue
              fi
              
              # Check if properly protected
              if [[ "$STATUS" == "404" ]] || [[ "$STATUS" == "403" ]]; then
                echo "✅ $path properly protected (HTTP $STATUS)"
                break
              else
                echo "❌ $path may be exposed (HTTP $STATUS)"
                exit 1
              fi
            done
            
            # If we exhausted retries with Cloudflare errors, skip this check
            if [ $retries -eq $MAX_RETRIES ]; then
              echo "⚠️ Skipping $path check due to persistent Cloudflare errors"
            fi
          done

  # Performance Baseline
  performance-baseline:
    name: Capture Performance Baseline
    needs: [check-should-run, wait-for-deployment]
    if: needs.check-should-run.outputs.should_run == 'true' && needs.wait-for-deployment.outputs.deployment_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse performance test
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ needs.check-should-run.outputs.web_deployment_url }}
            ${{ needs.check-should-run.outputs.web_deployment_url }}/pricing
            ${{ needs.check-should-run.outputs.web_deployment_url }}/templates
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Store performance metrics
        uses: actions/github-script@v7
        with:
          script: |
            // Store metrics for comparison in promotion readiness
            const metrics = {
              timestamp: new Date().toISOString(),
              environment: 'dev',
              deployment_sha: '${{ github.sha }}',
              // Lighthouse scores would be parsed here
            };
            
            console.log('Performance baseline captured:', metrics);
            
            // TODO: Store in artifact or external service for comparison

  # Aggregate Results
  integration-summary:
    name: Integration Test Summary
    needs: [wait-for-deployment, api-contract-tests, integration-tests, security-scan, performance-baseline]
    if: always() && needs.check-should-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate test summary
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'API Contract Tests': '${{ needs.api-contract-tests.result }}',
              'Integration Tests': '${{ needs.integration-tests.result }}',
              'Security Scan': '${{ needs.security-scan.result }}',
              'Performance Baseline': '${{ needs.performance-baseline.result }}'
            };
            
            let summary = `## 🧪 Dev Integration Test Results\n\n`;
            summary += `| Test Suite | Status |\n`;
            summary += `|------------|--------|\n`;
            
            let allPassed = true;
            for (const [name, status] of Object.entries(jobs)) {
              const emoji = status === 'success' ? '✅' : 
                           status === 'failure' ? '❌' : '⚠️';
              summary += `| ${name} | ${emoji} ${status} |\n`;
              
              if (status === 'failure') {
                allPassed = false;
              }
            }
            
            summary += `\n### Overall Status: ${allPassed ? '✅ Ready for Promotion' : '❌ Issues Found'}\n`;
            
            if (allPassed) {
              summary += `\nDev environment is stable and ready for staging promotion.\n`;
              summary += `Next step: Review and approve the automated promotion PR.\n`;
            } else {
              summary += `\nDev environment has issues that need to be resolved before promotion.\n`;
              summary += `Check the failed jobs above for details.\n`;
            }
            
            // Write to summary
            await core.summary
              .addRaw(summary)
              .write();
            
            // Set output for next workflow
            core.setOutput('all_passed', allPassed);
            
            // Create comment on commit (with error handling)
            if (context.eventName === 'workflow_run') {
              try {
                const sha = context.payload.workflow_run.head_sha;
                await github.rest.repos.createCommitComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: sha,
                  body: summary
                });
                console.log('✅ Posted test results as commit comment');
              } catch (error) {
                console.log('⚠️ Could not create commit comment:', error.message);
                console.log('Test results are available in the workflow summary above');
              }
            }

      - name: Trigger promotion readiness if all passed
        if: steps.summary.outputs.all_passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Trigger the promotion readiness workflow
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'dev-promotion-readiness.yml',
              ref: 'dev',
              inputs: {
                integration_test_run_id: context.runId.toString()
              }
            });
            
            console.log('✅ Triggered promotion readiness assessment');