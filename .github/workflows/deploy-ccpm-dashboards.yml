name: Deploy CCPM Dashboards to GitHub Pages

on:
  # Manual trigger
  workflow_dispatch:

  # Automatic trigger on push to main/dev branches
  push:
    branches:
      - main
      - dev
    paths:
      - '.claude/tracking/**'
      - '.claude/dashboards/**'
      - '.github/workflows/deploy-ccpm-dashboards.yml'

  # Run daily at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '.claude/dashboards/pnpm-lock.yaml'

      - name: Install dependencies
        run: |
          cd .claude/dashboards
          pnpm install --frozen-lockfile --prefer-offline || pnpm install

      - name: Generate dashboards
        run: |
          cd .claude/dashboards
          pnpm run generate

      - name: Add dashboard metadata
        run: |
          cd .claude/dashboards/output
          echo "Generated at: $(date)" > build-info.txt
          echo "Branch: ${{ github.ref_name }}" >> build-info.txt
          echo "Commit: ${{ github.sha }}" >> build-info.txt

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.claude/dashboards/output'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Get deployment URL
        id: get_url
        run: |
          # Extract repository info
          REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          # Construct GitHub Pages URL
          if [ "$REPO_NAME" == "${REPO_OWNER}.github.io" ]; then
            PAGES_URL="https://${REPO_OWNER}.github.io/"
          else
            PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/"
          fi

          echo "pages_url=${PAGES_URL}" >> $GITHUB_OUTPUT

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.get_url.outputs.pages_url }}';
            const comment = `## 📊 CCPM Dashboards Deployed!

            The dashboards have been successfully deployed to GitHub Pages:

            - 📈 [Executive Dashboard](${url}executive.html)
            - 📋 [Manager Dashboard](${url}manager.html)
            - 🔧 [Developer Dashboard](${url}developer.html)

            Generated from commit: \`${{ github.sha }}\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });