name: Deploy to Dev

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '**.md'
      - '**.mdx'
      - 'docs/**'
      - '.github/**.md'
      - '.claude/**'
      - '.vscode/**'
      - 'LICENSE'
      - '.gitignore'
      - '.env.example'
  workflow_dispatch:

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  pull-requests: write
  issues: write
  checks: write
  actions: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_ENABLED: ${{ secrets.TURBO_TOKEN != '' && 'true' || 'false' }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY || '' }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  # Check if we should skip deployment (e.g., if recently deployed)
  check-skip:
    name: Check Skip Deployment
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check recent deployments
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Skip if this is a PR merge and we recently deployed successfully
            const isPRMerge = context.payload.head_commit?.message?.includes('Merge pull request');
            
            if (!isPRMerge) {
              console.log('Not a PR merge, proceeding with deployment');
              core.setOutput('should_deploy', 'true');
              return;
            }
            
            // Check if we have a successful deployment in the last 30 minutes
            const thirtyMinutesAgo = new Date(Date.now() - 30 * 60 * 1000);
            
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'dev-deploy.yml',
              branch: 'dev',
              status: 'success',
              per_page: 5
            });
            
            const recentSuccessful = runs.data.workflow_runs.find(run => 
              new Date(run.created_at) > thirtyMinutesAgo && 
              run.conclusion === 'success'
            );
            
            if (recentSuccessful) {
              console.log(`Found recent successful deployment from ${recentSuccessful.created_at}, skipping`);
              core.setOutput('should_deploy', 'false');
            } else {
              console.log('No recent successful deployment found, proceeding');
              core.setOutput('should_deploy', 'true');
            }

  # Pre-deployment validation (quick checks before deploying)
  validate:
    name: Pre-deployment Validation
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64  # Reduced CPUs - sufficient for lint/typecheck
    needs: check-skip
    if: needs.check-skip.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-validate-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-validate-
            ${{ runner.os }}-turbo-

      - name: Run validation checks in parallel
        run: |
          # Run typecheck and lint in parallel for faster feedback
          pnpm typecheck &
          TYPECHECK_PID=$!
          
          pnpm lint &
          LINT_PID=$!
          
          # Wait for both to complete and capture exit codes
          wait $TYPECHECK_PID
          TYPECHECK_EXIT=$?
          
          wait $LINT_PID
          LINT_EXIT=$?
          
          # Report results
          if [ $TYPECHECK_EXIT -ne 0 ]; then
            echo "❌ TypeScript check failed"
          else
            echo "✅ TypeScript check passed"
          fi
          
          if [ $LINT_EXIT -ne 0 ]; then
            echo "❌ Lint check failed"
          else
            echo "✅ Lint check passed"
          fi
          
          # Exit with failure if either check failed
          if [ $TYPECHECK_EXIT -ne 0 ] || [ $LINT_EXIT -ne 0 ]; then
            exit 1
          fi

  # Deploy Web App to Vercel Dev environment (let Vercel handle the build)
  deploy-web:
    name: Deploy Web App to Dev
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64  # Increased CPUs for faster Vercel operations
    needs: [check-skip, validate]
    if: needs.check-skip.outputs.should_deploy == 'true'
    environment:
      name: development
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions/vercel-deploy
            vercel.json
            .vercelignore

      - name: Setup minimal deps for deployment
        run: |
          # Install pnpm and vercel CLI only, not all project dependencies
          npm install -g pnpm@latest
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"
          pnpm setup
          source ~/.bashrc 2>/dev/null || true
          pnpm add -g vercel@latest

      - name: Deploy to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          org-id: ${{ secrets.VERCEL_ORG_ID }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          environment: preview
          build-artifacts: false  # Let Vercel handle the build
          protection-bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          health-check-url: /healthcheck

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'development-web',
              required_contexts: [],
              auto_merge: false,
              production_environment: false
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Web app deployed to dev environment'
            });

  # Deploy Payload CMS to Vercel Dev environment (let Vercel handle the build)
  deploy-payload:
    name: Deploy Payload CMS to Dev
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64  # Increased CPUs for faster Vercel operations
    needs: [check-skip, validate]
    if: needs.check-skip.outputs.should_deploy == 'true'
    environment:
      name: development-payload
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions/vercel-deploy
            vercel.json
            .vercelignore

      - name: Setup minimal deps for deployment
        run: |
          # Install pnpm and vercel CLI only, not all project dependencies
          npm install -g pnpm@latest
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"
          pnpm setup
          source ~/.bashrc 2>/dev/null || true
          pnpm add -g vercel@latest

      - name: Deploy to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          org-id: ${{ secrets.VERCEL_ORG_ID }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID_PAYLOAD }}
          environment: preview
          build-artifacts: false  # Let Vercel handle the build
          protection-bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          health-check-url: /api/health

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'development-payload',
              required_contexts: [],
              auto_merge: false,
              production_environment: false
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Payload CMS deployed to dev environment'
            });

  # Run E2E tests against dev environment
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    needs: [check-skip, deploy-web, deploy-payload]  # Wait for both deployments
    if: needs.check-skip.outputs.should_deploy == 'true'
    environment: development
    continue-on-error: false # Make it blocking to catch issues early
    timeout-minutes: 8 # Reduced from 10 for faster feedback
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            apps/e2e
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            .npmrc
            tsconfig.json

      - name: Setup E2E dependencies
        run: |
          # Install only what's needed for E2E tests
          npm install -g pnpm@latest
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"
          pnpm setup
          source ~/.bashrc 2>/dev/null || true
          pnpm install --frozen-lockfile --filter web-e2e...

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/e2e/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web-e2e exec playwright install --with-deps chromium

      - name: Ensure Playwright dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter web-e2e exec playwright install-deps chromium

      - name: Verify deployments are ready
        run: |
          echo "🔍 Verifying deployments are accessible..."
          
          # Check web deployment
          if ! curl -f -s -o /dev/null -w "Web: %{http_code}\n" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
            "${{ needs.deploy-web.outputs.url }}/healthcheck"; then
            echo "❌ Web deployment not ready"
            exit 1
          fi
          
          # Check payload deployment
          if ! curl -f -s -o /dev/null -w "Payload: %{http_code}\n" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
            "${{ needs.deploy-payload.outputs.url }}/api/health"; then
            echo "❌ Payload deployment not ready"
            exit 1
          fi
          
          echo "✅ Both deployments are ready"

      - name: Run E2E smoke tests
        run: |
          # Run only critical path tests for fast feedback
          # Reduced retries from 2 to 1 for faster feedback
          pnpm --filter web-e2e exec playwright test --grep @smoke --project=chromium --retries=1
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-web.outputs.url }}
          # Provide deployed environment URLs
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Vercel preview protection bypass
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          # Skip local server startup
          CI: true
          # Optimize Playwright for CI
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

  # Notify New Relic of deployment
  notify-monitoring:
    name: Notify Monitoring
    runs-on: runs-on=${{ github.run_id }}/runner=1cpu-linux-x64  # Minimal runner for notification
    needs: [check-skip, deploy-web, deploy-payload]
    if: needs.check-skip.outputs.should_deploy == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions/newrelic-notify

      - uses: ./.github/actions/newrelic-notify
        with:
          api-key: ${{ secrets.NEW_RELIC_API_KEY }}
          app-id: ${{ secrets.NEW_RELIC_APP_ID }}
          account-id: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          insert-key: ${{ secrets.NEW_RELIC_INSERT_KEY }}
          environment: development
          deployment-url: ${{ needs.deploy-web.outputs.url }}