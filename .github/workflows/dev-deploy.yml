name: Deploy to Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  pull-requests: write
  issues: write
  checks: write
  actions: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_ENABLED: true
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  # Check if we should skip deployment (e.g., if recently deployed)
  check-skip:
    name: Check Skip Deployment
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check recent deployments
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Skip if this is a PR merge and we recently deployed successfully
            const isPRMerge = context.payload.head_commit?.message?.includes('Merge pull request');
            
            if (!isPRMerge) {
              console.log('Not a PR merge, proceeding with deployment');
              core.setOutput('should_deploy', 'true');
              return;
            }
            
            // Check if we have a successful deployment in the last 30 minutes
            const thirtyMinutesAgo = new Date(Date.now() - 30 * 60 * 1000);
            
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'dev-deploy.yml',
              branch: 'dev',
              status: 'success',
              per_page: 5
            });
            
            const recentSuccessful = runs.data.workflow_runs.find(run => 
              new Date(run.created_at) > thirtyMinutesAgo && 
              run.conclusion === 'success'
            );
            
            if (recentSuccessful) {
              console.log(`Found recent successful deployment from ${recentSuccessful.created_at}, skipping`);
              core.setOutput('should_deploy', 'false');
            } else {
              console.log('No recent successful deployment found, proceeding');
              core.setOutput('should_deploy', 'true');
            }

  # Build application
  build:
    name: Build Application
    needs: check-skip
    if: needs.check-skip.outputs.should_deploy == 'true'
    uses: ./.github/workflows/reusable-build.yml
    with:
      environment: development
    secrets: inherit

  # Deploy Web App to Vercel Dev environment
  deploy-web:
    name: Deploy Web App to Dev
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-x64
    needs: [check-skip, build]
    if: needs.check-skip.outputs.should_deploy == 'true'
    environment:
      name: development
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-development
          path: .

      - name: Deploy to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          org-id: ${{ secrets.VERCEL_ORG_ID }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          environment: preview
          build-artifacts: true
          protection-bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          health-check-url: /healthcheck

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'development-web',
              required_contexts: [],
              auto_merge: false,
              production_environment: false
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Web app deployed to dev environment'
            });

  # Deploy Payload CMS to Vercel Dev environment
  deploy-payload:
    name: Deploy Payload CMS to Dev
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-x64
    needs: [check-skip, build]
    if: needs.check-skip.outputs.should_deploy == 'true'
    environment:
      name: development-payload
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-development
          path: .

      - name: Deploy to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          org-id: ${{ secrets.VERCEL_ORG_ID }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID_PAYLOAD }}
          environment: preview
          build-artifacts: true
          protection-bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          health-check-url: /api/health

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'development-payload',
              required_contexts: [],
              auto_merge: false,
              production_environment: false
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Payload CMS deployed to dev environment'
            });

  # Run E2E tests against dev environment
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-x64
    needs: [check-skip, deploy-web]
    if: needs.check-skip.outputs.should_deploy == 'true'
    environment: development
    continue-on-error: true # Non-blocking for now
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Install Playwright browsers
        run: pnpm --filter web-e2e exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: |
          echo "E2E smoke tests will run against dev environment"
          # TODO: Configure Playwright to run against dev URL
          # pnpm --filter web-e2e test:smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-web.outputs.url }}

  # Notify New Relic of deployment
  notify-monitoring:
    name: Notify Monitoring
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-x64
    needs: [check-skip, deploy-web, deploy-payload]
    if: needs.check-skip.outputs.should_deploy == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/newrelic-notify
        with:
          api-key: ${{ secrets.NEW_RELIC_API_KEY }}
          app-id: ${{ secrets.NEW_RELIC_APP_ID }}
          account-id: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          insert-key: ${{ secrets.NEW_RELIC_INSERT_KEY }}
          environment: development
          deployment-url: ${{ needs.deploy-web.outputs.url }}