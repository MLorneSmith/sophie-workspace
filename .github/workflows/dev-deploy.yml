name: Deploy to Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write
  issues: write
  checks: write
  security-events: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  # Run all validation checks first
  validate:
    name: Validate
    uses: ./.github/workflows/pr-validation.yml
    secrets: inherit

  # Deploy Web App to Vercel Dev environment
  deploy-web:
    name: Deploy Web App to Dev
    runs-on: ubuntu-latest
    needs: validate
    # Always run deploy job even if validation fails (temporary for testing)
    if: always()
    environment:
      name: development
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information for Web
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Web Project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Web App to Vercel Dev
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to: $url"
          
          # Note: Custom domains are automatically configured via Vercel project settings
          # dev.slideheroes.com should be configured in Vercel dashboard
          echo "🔨 Web app deployment complete. Custom domain routes automatically if configured."

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'development-web',
              required_contexts: [],
              auto_merge: false,
              production_environment: false
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Web app deployed to dev environment'
            });

  # Deploy Payload CMS to Vercel Dev environment
  deploy-payload:
    name: Deploy Payload CMS to Dev
    runs-on: ubuntu-latest
    needs: validate
    # Always run deploy job even if validation fails (temporary for testing)
    if: always()
    environment:
      name: development-payload
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PAYLOAD }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information for Payload
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Payload Project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Payload to Vercel Dev
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to: $url"
          
          # Note: Custom domains are automatically configured via Vercel project settings
          # dev-cms.slideheroes.com should be configured in Vercel dashboard
          echo "🔨 Payload CMS deployment complete. Custom domain routes automatically if configured."

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'development-payload',
              required_contexts: [],
              auto_merge: false,
              production_environment: false
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Payload CMS deployed to dev environment'
            });

  # Run E2E tests against dev environment
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-web
    environment: development
    continue-on-error: true # Non-blocking for now
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: |
          echo "E2E smoke tests will run against dev environment"
          # TODO: Configure Playwright to run against dev URL
          # pnpm --filter e2e test:smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-web.outputs.url }}

  # Notify New Relic of deployment
  notify-monitoring:
    name: Notify Monitoring
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-payload]
    continue-on-error: true
    steps:
      - name: Create New Relic deployment marker
        run: |
          echo "📊 Sending CI/CD metrics to New Relic..."
          
          # Create deployment marker
          curl -X POST "https://api.newrelic.com/v2/applications/${NEW_RELIC_APP_ID}/deployments.json" \
            -H "X-Api-Key:${NEW_RELIC_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"deployment\": {
                \"revision\": \"${GITHUB_SHA}\",
                \"user\": \"${GITHUB_ACTOR}\",
                \"description\": \"Development deployment from ${GITHUB_REF_NAME}\",
                \"changelog\": \"Automated deployment via GitHub Actions\"
              }
            }"

          # Send CI/CD custom event
          curl -X POST "https://insights-collector.newrelic.com/v1/accounts/${NEW_RELIC_ACCOUNT_ID}/events" \
            -H "Content-Type: application/json" \
            -H "X-Insert-Key: ${NEW_RELIC_INSERT_KEY}" \
            -d "[{
              \"eventType\": \"CICDEvent\",
              \"timestamp\": $(date +%s),
              \"environment\": \"development\",
              \"deployment_id\": \"${GITHUB_SHA}\",
              \"branch\": \"${GITHUB_REF_NAME}\",
              \"workflow\": \"dev-deploy\",
              \"actor\": \"${GITHUB_ACTOR}\",
              \"repository\": \"${GITHUB_REPOSITORY}\",
              \"status\": \"success\",
              \"deployment_url\": \"${{ needs.deploy-web.outputs.url }}\",
              \"build_duration_seconds\": \"${{ job.duration || 0 }}\",
              \"commit_sha\": \"${GITHUB_SHA}\"
            }]"
          
          echo "✅ New Relic metrics sent successfully"
        env:
          NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
          NEW_RELIC_APP_ID: ${{ secrets.NEW_RELIC_APP_ID }}
          NEW_RELIC_ACCOUNT_ID: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          NEW_RELIC_INSERT_KEY: ${{ secrets.NEW_RELIC_INSERT_KEY }}