name: PR Validation

on:
  pull_request:
    branches: [main, staging, dev]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to validate (for manual trigger on automated PRs)'
        required: false
        type: string
  workflow_call:
    secrets:
      TURBO_TOKEN:
        required: false
      SUPABASE_SERVICE_ROLE_KEY:
        required: false
      SUPABASE_DB_WEBHOOK_SECRET:
        required: false
      STRIPE_SECRET_KEY:
        required: false
      STRIPE_WEBHOOK_SECRET:
        required: false
      CODECOV_TOKEN:
        required: false

# Allow only one validation per PR at a time
concurrency:
  group: pr-validation-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true  # Cancel older runs when new commits are pushed

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  security-events: write
  actions: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.14.0'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  # Check if we should skip validation for promotion PRs
  check-skip:
    name: Check Skip Conditions
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    outputs:
      should-skip: ${{ steps.check.outputs.skip }}
      skip-reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check if validation can be skipped
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Skip validation for staging-to-dev sync PRs (already validated on staging)
          if [[ "${{ github.head_ref }}" == sync/staging-to-dev-* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=✅ Automated staging-to-dev sync - changes already validated on staging" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Skip validation for promotion PRs if source branch recently passed
          if [[ "${{ github.base_ref }}" == "staging" && "${{ github.head_ref }}" == "dev" ]]; then
            echo "🔍 Checking if dev branch recently passed validation..."
            
            # Get most recent successful workflow run on dev
            RECENT_RUN=$(gh api \
              "/repos/${{ github.repository }}/actions/runs?branch=dev&status=success&per_page=1" \
              --jq '.workflow_runs[0] | select(.conclusion == "success") | {created_at: .created_at}')
            
            if [ ! -z "$RECENT_RUN" ]; then
              RUN_TIME=$(echo $RECENT_RUN | jq -r '.created_at')
              RUN_AGE=$(( $(date +%s) - $(date -d "$RUN_TIME" +%s) ))
              
              # Skip if successful run was less than 30 minutes ago
              if [ $RUN_AGE -lt 1800 ]; then
                echo "skip=true" >> $GITHUB_OUTPUT
                echo "reason=✅ Dev branch passed all checks $((RUN_AGE/60)) minutes ago" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
          fi
          
          # Similar check for staging->main promotion
          if [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" == "staging" ]]; then
            echo "🔍 Checking if staging branch recently passed validation..."
            
            RECENT_RUN=$(gh api \
              "/repos/${{ github.repository }}/actions/runs?branch=staging&status=success&per_page=1" \
              --jq '.workflow_runs[0] | select(.conclusion == "success") | {created_at: .created_at}')
            
            if [ ! -z "$RECENT_RUN" ]; then
              RUN_TIME=$(echo $RECENT_RUN | jq -r '.created_at')
              RUN_AGE=$(( $(date +%s) - $(date -d "$RUN_TIME" +%s) ))
              
              if [ $RUN_AGE -lt 1800 ]; then
                echo "skip=true" >> $GITHUB_OUTPUT
                echo "reason=✅ Staging branch passed all checks $((RUN_AGE/60)) minutes ago" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
          fi
          
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "reason=Full validation required" >> $GITHUB_OUTPUT

      - name: Comment skip status on PR
        if: steps.check.outputs.skip == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const comment = `## ✅ Validation Skipped - Promotion PR
            
            **Reason**: ${{ steps.check.outputs.reason }}
            
            Since the source branch recently passed all validation checks, we're skipping redundant tests for this promotion PR.
            
            ✨ **This saves ~15 minutes of CI time!**
            
            You can safely merge this PR once any required reviews are complete.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Check what files changed to optimize CI runs
  changes:
    name: Detect Changes
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: check-skip
    if: needs.check-skip.outputs.should-skip != 'true'
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      markdown: ${{ steps.filter.outputs.markdown }}
      yaml: ${{ steps.filter.outputs.yaml }}
      dependencies: ${{ steps.filter.outputs.dependencies }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.json'
              - 'tsconfig*.json'
            markdown:
              - '**/*.md'
              - '**/*.mdx'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
            dependencies:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '**/package.json'
            docker:
              - '**/Dockerfile*'
              - '**/*.dockerfile'
              - '.dockerignore'

  # Lint and format check
  lint:
    name: Lint & Format
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [check-skip, changes]
    if: needs.check-skip.outputs.should-skip != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: ./.github/actions/setup-deps

      - name: Check formatting with Biome
        run: pnpm biome format . --diagnostic-level=error

      - name: Lint with Biome
        run: pnpm biome lint . --diagnostic-level=error

      - name: Check dependencies with manypkg
        run: pnpm manypkg check

  # TypeScript type checking
  typecheck:
    name: TypeScript Check
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [check-skip, changes]
    if: needs.check-skip.outputs.should-skip != 'true' && needs.changes.outputs.typescript == 'true'
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_WEBHOOK_SECRET: ${{ secrets.SUPABASE_DB_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      DO_NOT_TRACK: 1
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: ./.github/actions/setup-deps

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-typecheck-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-typecheck-

      - name: Run TypeScript check
        run: pnpm typecheck

  # Unit tests
  test-unit:
    name: Unit Tests
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    needs: [check-skip, changes]
    if: needs.check-skip.outputs.should-skip != 'true' && needs.changes.outputs.typescript == 'true'
    timeout-minutes: 15
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_WEBHOOK_SECRET: ${{ secrets.SUPABASE_DB_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      DO_NOT_TRACK: 1
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: ./.github/actions/setup-deps

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-test-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-

      - name: Run unit tests
        timeout-minutes: 5
        env:
          TURBO_TOKEN: ''
          TURBO_TEAM: ''
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ''
        run: pnpm -r --parallel --if-present --filter=!web-e2e --filter=!payload --filter=!@slideheroes/alpha-scripts --filter=!@slideheroes/orchestrator-ui run test

  # YAML linting
  yaml-lint:
    name: YAML Lint
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [check-skip, changes]
    if: needs.check-skip.outputs.should-skip != 'true' && needs.changes.outputs.yaml == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps

      - name: YAML Lint
        run: pnpm lint:yaml

  # Markdown linting
  markdown-lint:
    name: Markdown Lint
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [check-skip, changes]
    if: needs.check-skip.outputs.should-skip != 'true' && needs.changes.outputs.markdown == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps

      - name: Markdown Lint
        run: pnpm lint:md

  # Note: Secret scanning is handled by the dedicated trufflehog-scan.yml workflow
  # to avoid duplicate scans when this workflow is called by dev-deploy.yml and staging-deploy.yml

  # Aikido Security scan
  # NOTE: AikidoSec/github-actions-workflow is deprecated (May 2025).
  # Migrate to Aikido Dashboard PR Gating when ready.
  # See: https://help.aikido.dev/doc/github-ci-pr-gating-via-aikido-dashboard/docZayPeps1j
  aikido-security:
    name: Aikido Security Scan
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: changes
    # Only run on pull requests with relevant changes
    if: (needs.changes.outputs.dependencies == 'true' || needs.changes.outputs.typescript == 'true') && github.event_name == 'pull_request'
    continue-on-error: true  # Non-blocking - allows security findings to be triaged separately
    steps:
      - uses: actions/checkout@v6

      - name: Run Aikido Security Scan
        uses: AikidoSec/github-actions-workflow@v1.0.13
        continue-on-error: true  # Deprecated action fails with 400 errors; unblock CI while migrating to Dashboard PR Gating
        with:
          secret-key: ${{ secrets.AIKIDO_SECRET_KEY }}
          fail-on-timeout: true
          fail-on-dependency-scan: true  # Enabled for visibility; job is non-blocking via continue-on-error
          fail-on-sast-scan: false  # Enable when on paid plan
          fail-on-iac-scan: false   # Enable when on paid plan
          minimum-severity: 'HIGH'
          timeout-seconds: 180
          post-scan-status-comment: 'only_if_new_findings'
          post-sast-review-comments: 'off'
          github-token: ${{ secrets.GITHUB_TOKEN }}


  # Bundle size check
  bundle-size:
    name: Bundle Size Check
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    continue-on-error: true # Non-blocking for now
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_WEBHOOK_SECRET: ${{ secrets.SUPABASE_DB_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      DO_NOT_TRACK: 1
      # Payload CMS requires these environment variables at build time
      PAYLOAD_SECRET: 'test_payload_secret_for_e2e_testing'
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:54522/postgres'
      DATABASE_URI: 'postgresql://postgres:postgres@localhost:54522/postgres'
      PAYLOAD_PUBLIC_SERVER_URL: 'http://localhost:3020'
    steps:
      - uses: actions/checkout@v6
      
      - uses: ./.github/actions/setup-deps
      
      - name: Build applications
        run: pnpm build
      
      - name: Check bundle sizes
        run: |
          echo "📦 Bundle Size Report"
          echo "==================="
          
          # Check web app bundle sizes
          if [ -d "apps/web/.next" ]; then
            echo "🌐 Web App (.next):"
            du -sh apps/web/.next || echo "  No .next directory found"
            
            if [ -d "apps/web/.next/static" ]; then
              echo "  Static assets:"
              du -sh apps/web/.next/static/* 2>/dev/null || echo "  No static assets found"
            fi
          fi
          
          # Check payload app bundle sizes
          if [ -d "apps/payload/.next" ]; then
            echo "📝 Payload App (.next):"
            du -sh apps/payload/.next || echo "  No .next directory found"
          fi
          
          # Check if any bundles are unusually large (basic check)
          echo "🔍 Large file detection:"
          find apps/*/dist apps/*/.next -name "*.js" -size +1M 2>/dev/null | head -10 || echo "  No large JS files found"
          
          echo "✅ Bundle size check completed (advisory only)"

  # Accessibility testing
  accessibility-test:
    name: Accessibility Tests
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [check-skip, changes]
    if: needs.check-skip.outputs.should-skip != 'true' && needs.changes.outputs.typescript == 'true'
    continue-on-error: true  # Non-blocking for now - E2E database setup issues
    env:
      # E2E Database Configuration
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}

      # Next.js build requires public Supabase config for client-side code
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}

      # Legacy environment variables (for backward compatibility)
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_WEBHOOK_SECRET: ${{ secrets.SUPABASE_DB_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      DO_NOT_TRACK: 1
      PLAYWRIGHT_SERVER_COMMAND: 'pnpm dev'
      # Payload CMS requires these environment variables at build time
      PAYLOAD_SECRET: 'test_payload_secret_for_e2e_testing'
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:54522/postgres'
      DATABASE_URI: 'postgresql://postgres:postgres@localhost:54522/postgres'
      PAYLOAD_PUBLIC_SERVER_URL: 'http://localhost:3020'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: ./.github/actions/setup-deps

      - name: Install Playwright browsers
        run: pnpm --filter e2e playwright install --with-deps chromium

      - name: Build application
        run: pnpm build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set up E2E database for accessibility tests
        run: |
          cd apps/web
          # Start E2E Supabase instance (exclude unused services to speed up Docker pulls)
          supabase start -x studio,migra,deno-relay,pgadmin-schema-diff,imgproxy,logflare
          
          # Wait for database to be ready
          sleep 5
          
          # Reset database (applies migrations, --no-seed avoids project ref lookup)
          supabase db reset --no-seed || {
            echo "⚠️ Database reset failed, continuing with existing state"
            true
          }

      - name: Run accessibility tests
        run: pnpm --filter e2e a11y:test:ci  # Use CI-specific script with JUnit reporter
        continue-on-error: true

      - name: Upload accessibility report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: accessibility-report
          path: apps/e2e/accessibility-report/
          retention-days: 30

      - name: Comment on PR with accessibility results
        uses: actions/github-script@v8
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            try {
              // Check if accessibility report exists
              const reportPath = 'apps/e2e/accessibility-report/index.html';
              if (fs.existsSync(reportPath)) {
                const comment = `## 🔍 Accessibility Test Results
                
                The accessibility tests have completed. 
                
                📊 **Report**: Download the \`accessibility-report\` artifact to view detailed results.
                
                💡 **WCAG 2.1 AA Compliance**: This test suite validates against WCAG 2.1 AA standards including:
                - Color contrast requirements
                - Keyboard navigation
                - Screen reader compatibility
                - Form accessibility
                - Semantic HTML structure
                
                ⚠️ **Note**: Any violations found should be addressed before merging.`;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (error) {
              console.log('Could not post accessibility comment:', error);
            }

  # Docker container security scanning
  docker-scan:
    name: Docker Security Scan
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Find Dockerfiles
        id: dockerfiles
        run: |
          # Find all Dockerfiles that were changed
          DOCKERFILES=$(find . -name "Dockerfile*" -type f | grep -v node_modules | grep -v ".mcp-servers" | head -5)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$DOCKERFILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Check if we have critical Dockerfiles
          if echo "$DOCKERFILES" | grep -E "(apps/payload/Dockerfile|.github/docker/Dockerfile.ci)"; then
            echo "critical=true" >> $GITHUB_OUTPUT
          else
            echo "critical=false" >> $GITHUB_OUTPUT
          fi

      - name: Scan Dockerfile configurations
        if: steps.dockerfiles.outputs.files != ''
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'  # Don't fail on config issues

      - name: Upload config scan results
        # Skip SARIF upload in PR context due to GitHub permission restrictions
        # SARIF upload requires 'security-events: write' which is limited in fork PRs
        if: steps.dockerfiles.outputs.files != '' && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-config.sarif'
          category: 'dockerfile-security'

      - name: Fail if critical Dockerfiles have issues
        if: steps.dockerfiles.outputs.critical == 'true'
        run: |
          echo "🔍 Scanning critical Dockerfiles for security issues..."
          trivy config . --severity HIGH,CRITICAL --exit-code 1 || {
            echo "❌ Critical Dockerfile security issues found!"
            echo "Please fix HIGH and CRITICAL issues before merging."
            exit 1
          }

  # Final status check
  pr-status:
    name: PR Status Check
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [check-skip, lint, typecheck, test-unit, yaml-lint, markdown-lint, aikido-security, accessibility-test, docker-scan]
    # always() ensures this runs even when jobs are skipped, but !cancelled() prevents
    # the job from getting stuck when the workflow is cancelled mid-flight
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Check status
        run: |
          # If workflow was cancelled, exit cleanly
          if [[ "${{ needs.check-skip.result }}" == "cancelled" ]]; then
            echo "⚠️ Workflow was cancelled"
            exit 0
          fi

          # If validation was skipped, report success
          if [[ "${{ needs.check-skip.outputs.should-skip }}" == "true" ]]; then
            echo "✅ Validation skipped - promotion PR with recent successful checks"
            echo "${{ needs.check-skip.outputs.skip-reason }}"
            exit 0
          fi

          # Otherwise, check individual job results
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.test-unit.result }}" == "failure" ]] || \
             [[ "${{ needs.yaml-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.markdown-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.docker-scan.result }}" == "failure" ]]; then
            echo "❌ PR validation failed"
            exit 1
          elif [[ "${{ needs.aikido-security.result }}" == "failure" ]] || \
               [[ "${{ needs.accessibility-test.result }}" == "failure" ]]; then
            echo "⚠️ Advisory checks failed (Aikido security and/or accessibility) - please review"
            echo "✅ Core PR validation passed (these checks are non-blocking)"
          else
            echo "✅ PR validation passed"
          fi