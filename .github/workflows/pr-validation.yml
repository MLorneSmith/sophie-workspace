name: PR Validation

on:
  pull_request:
    branches: [main, staging, dev]
    types: [opened, synchronize, reopened]
  workflow_call:
    secrets:
      TURBO_TOKEN:
        required: false
      SUPABASE_SERVICE_ROLE_KEY:
        required: false
      SUPABASE_DB_WEBHOOK_SECRET:
        required: false
      STRIPE_SECRET_KEY:
        required: false
      STRIPE_WEBHOOK_SECRET:
        required: false
      CODECOV_TOKEN:
        required: false
      SNYK_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  security-events: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Check what files changed to optimize CI runs
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      markdown: ${{ steps.filter.outputs.markdown }}
      yaml: ${{ steps.filter.outputs.yaml }}
      dependencies: ${{ steps.filter.outputs.dependencies }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.json'
              - 'tsconfig*.json'
            markdown:
              - '**/*.md'
              - '**/*.mdx'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
            dependencies:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '**/package.json'

  # Lint and format check
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting with Biome
        run: pnpm biome format . --diagnostic-level=error

      - name: Lint with Biome
        run: pnpm biome lint . --diagnostic-level=error

      - name: Check dependencies with manypkg
        run: pnpm manypkg check

  # TypeScript type checking
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_WEBHOOK_SECRET: ${{ secrets.SUPABASE_DB_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      DO_NOT_TRACK: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-typecheck-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-typecheck-

      - name: Run TypeScript check
        run: pnpm typecheck

  # Unit tests
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_WEBHOOK_SECRET: ${{ secrets.SUPABASE_DB_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      DO_NOT_TRACK: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-test-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-test-

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

  # YAML linting
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.yaml == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: YAML Lint
        run: pnpm lint:yaml

  # Markdown linting
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Markdown Lint
        run: pnpm lint:md

  # Secret scanning with TruffleHog
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@v3.82.13
        id: trufflehog
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: |
            --only-verified
            --max-depth=5
        continue-on-error: true

      # Note: --github-actions flag outputs directly to GitHub Actions, no SARIF upload needed

      - name: Comment on PR if secrets found
        uses: actions/github-script@v7
        if: failure() && steps.trufflehog.outcome == 'failure' && github.event_name == 'pull_request'
        with:
          script: |
            const comment = `## 🚨 Security Alert: Potential Secrets Detected!
            
            TruffleHog has detected potential secrets in your code. Please review and remove any sensitive information before merging.
            
            **What to do:**
            1. Review the security findings in the checks section
            2. Remove any real secrets from your code
            3. If it's a false positive, add it to \`.secretsignore\`
            4. Never commit real API keys, tokens, or passwords
            
            For more information, see our [Secret Management Guide](/.claude/docs/security/secret-management.md).`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if secrets detected
        if: steps.trufflehog.outcome == 'failure'
        run: exit 1

  # Security scan for dependencies
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dependencies == 'true' || needs.changes.outputs.typescript == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities
        id: snyk_check
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=upgradable --sarif-file-output=snyk.sarif

      - name: Display Snyk Results
        if: always()
        run: |
          echo "Snyk scan outcome: ${{ steps.snyk_check.outcome }}"
          if [ -f snyk.sarif ]; then
            echo "SARIF file generated successfully"
            echo "File size: $(ls -lh snyk.sarif | awk '{print $5}')"
          else
            echo "Warning: SARIF file not generated"
          fi
          
      - name: Fail if vulnerabilities found
        if: steps.snyk_check.outcome == 'failure'
        run: |
          echo "❌ Snyk found high severity vulnerabilities that must be fixed"
          echo "Check the Snyk output above for details"
          exit 1

      - name: Upload Snyk report as sarif
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

      - name: Run Snyk Code (SAST)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high

  # Bundle size check
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    continue-on-error: true # Non-blocking for now
    steps:
      - uses: actions/checkout@v4
      - name: Bundle Size Check
        run: |
          echo "Bundle size checking will be implemented in Week 2"
          # TODO: Implement bundlewatch

  # Accessibility testing
  accessibility-test:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_WEBHOOK_SECRET: ${{ secrets.SUPABASE_DB_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      DO_NOT_TRACK: 1
      PLAYWRIGHT_SERVER_COMMAND: 'pnpm dev'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter e2e playwright install --with-deps chromium

      - name: Build application
        run: pnpm build

      - name: Run accessibility tests
        run: pnpm --filter e2e a11y:test
        continue-on-error: true

      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: apps/e2e/accessibility-report/
          retention-days: 30

      - name: Comment on PR with accessibility results
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            try {
              // Check if accessibility report exists
              const reportPath = 'apps/e2e/accessibility-report/index.html';
              if (fs.existsSync(reportPath)) {
                const comment = `## 🔍 Accessibility Test Results
                
                The accessibility tests have completed. 
                
                📊 **Report**: Download the \`accessibility-report\` artifact to view detailed results.
                
                💡 **WCAG 2.1 AA Compliance**: This test suite validates against WCAG 2.1 AA standards including:
                - Color contrast requirements
                - Keyboard navigation
                - Screen reader compatibility
                - Form accessibility
                - Semantic HTML structure
                
                ⚠️ **Note**: Any violations found should be addressed before merging.`;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (error) {
              console.log('Could not post accessibility comment:', error);
            }

  # Final status check
  pr-status:
    name: PR Status Check
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, yaml-lint, markdown-lint, secret-scan, security-scan, accessibility-test]
    if: always()
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.test-unit.result }}" == "failure" ]] || \
             [[ "${{ needs.yaml-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.markdown-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.secret-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "❌ PR validation failed"
            exit 1
          elif [[ "${{ needs.accessibility-test.result }}" == "failure" ]]; then
            echo "⚠️ Accessibility tests failed - please review violations"
            echo "✅ Core PR validation passed (accessibility is advisory)"
          else
            echo "✅ PR validation passed"
          fi