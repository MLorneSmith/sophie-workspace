name: Devcontainer Prebuild

on:
  push:
    branches:
      - main
      - dev
    paths:
      - '.devcontainer/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/devcontainer-prebuild.yml'
  schedule:
    # Run weekly to keep the prebuild fresh
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # Convert repository name to lowercase for Docker tags
      - name: Set lowercase repository name
        id: repo
        run: |
          echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.name }}/devcontainer
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=prebuild-{{date 'YYYYMMDD'}}

      - name: Build devcontainer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Build and cache dependencies
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/${{ steps.repo.outputs.name }}/devcontainer:latest \
            bash -c "
              # Install pnpm dependencies
              pnpm install --frozen-lockfile
              
              # Build the project to cache compiled output
              pnpm build || true
              
              # Generate Supabase types
              pnpm --filter web supabase:typegen || true
            "

      - name: Create Codespaces prebuild configuration
        run: |
          cat > .devcontainer/devcontainer.prebuild.json << 'EOF'
          {
            "build": {
              "dockerfile": "Dockerfile",
              "context": "..",
              "cacheFrom": "ghcr.io/${{ steps.repo.outputs.name }}/devcontainer:latest"
            }
          }
          EOF

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Devcontainer prebuild failed. Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).'
            })