name: Semgrep

on:
  pull_request:
    branches: [ main, staging, dev ]
  push:
    branches: [ main, staging, dev ]
  schedule:
    # Run weekly on Sundays at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual triggers

jobs:
  semgrep:
    name: Scan
    runs-on: ubicloud-standard-2
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
    
    container:
      image: semgrep/semgrep:1.45.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full git history for better analysis

      - name: Run Semgrep
        run: |
          # Run Semgrep CI - rules are configured in Semgrep Cloud
          # For PRs, only scan changed files to speed up analysis
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            semgrep ci --baseline-commit="${{ github.event.pull_request.base.sha }}"
          else
            semgrep ci
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          SEMGREP_TIMEOUT: 1200  # 20 minutes
          SEMGREP_VERSION_CHECK: false
          SEMGREP_SEND_METRICS: off
          SEMGREP_ENABLE_VERSION_CHECK: false
          
      # Semgrep Cloud handles PR comments automatically when SEMGREP_APP_TOKEN is used
      # No need for manual SARIF upload or PR commenting