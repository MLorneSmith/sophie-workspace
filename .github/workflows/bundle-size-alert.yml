name: Bundle Size Alert

on:
  pull_request:
    branches: [main, staging, dev]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.29.2'

jobs:
  bundle-size-alert:
    name: Bundle Size Alert
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    if: github.event_name == 'pull_request'
    env:
      BUNDLEWATCH_GITHUB_TOKEN: ${{ secrets.BUNDLEWATCH_GITHUB_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_WEBHOOK_SECRET: ${{ secrets.SUPABASE_DB_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      DO_NOT_TRACK: 1
    steps:
      # Optimization #2: Shallow clone - only fetch PR commit, not full history
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base ref
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # Optimization #1: Cache base branch bundle sizes to skip rebuilding
      - name: Restore base bundle cache
        id: base-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/base-analysis
          key: bundle-sizes-${{ github.event.pull_request.base.ref }}-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            bundle-sizes-${{ github.event.pull_request.base.ref }}-

      # --- Base branch build (skipped entirely on cache hit) ---
      - name: Checkout base branch
        if: steps.base-cache.outputs.cache-hit != 'true'
        run: git checkout origin/${{ github.event.pull_request.base.ref }}

      - name: Install dependencies (base)
        if: steps.base-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build base branch
        if: steps.base-cache.outputs.cache-hit != 'true'
        run: |
          pnpm --filter @kit/shared build
          pnpm --filter web build
        env:
          NEXT_PUBLIC_MONITORING_PROVIDER: ""
          NEXT_PUBLIC_ANALYTICS_PROVIDER: ""

      # Optimization #4: Use exact byte counts instead of fragile human-readable parsing
      - name: Analyze base bundle sizes
        if: steps.base-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/base-analysis
          if [ -d "apps/web/.next/static/chunks/app" ]; then
            find apps/web/.next/static/chunks/app -name "*.js" -exec stat --format=%s {} + | awk '{sum+=$1}END{print sum+0}' > /tmp/base-analysis/app-bytes.txt
          else
            echo "0" > /tmp/base-analysis/app-bytes.txt
          fi
          for chunk in framework main webpack; do
            file=$(ls apps/web/.next/static/chunks/${chunk}-*.js 2>/dev/null | head -1)
            if [ -n "$file" ]; then
              stat --format=%s "$file" > /tmp/base-analysis/${chunk}-bytes.txt
            else
              echo "0" > /tmp/base-analysis/${chunk}-bytes.txt
            fi
          done
          find apps/web/.next/static -name "*.js" -exec stat --format=%s {} + | awk '{sum+=$1}END{print sum+0}' > /tmp/base-analysis/total-bytes.txt

      - name: Save base bundle cache
        if: steps.base-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/base-analysis
          key: bundle-sizes-${{ github.event.pull_request.base.ref }}-${{ github.event.pull_request.base.sha }}

      # --- PR branch build ---
      - name: Checkout PR branch
        if: steps.base-cache.outputs.cache-hit != 'true'
        run: git checkout ${{ github.event.pull_request.head.sha }}

      # Optimization #3: Skip reinstall when lockfile unchanged between branches
      - name: Install dependencies (PR)
        run: |
          if [ "${{ steps.base-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm install --frozen-lockfile
          elif git diff origin/${{ github.event.pull_request.base.ref }} HEAD -- pnpm-lock.yaml | grep -q .; then
            pnpm install --frozen-lockfile
          else
            echo "Lockfile unchanged between base and PR, skipping reinstall"
          fi

      - name: Build PR branch
        run: |
          pnpm --filter @kit/shared build
          pnpm --filter web build
        env:
          NEXT_PUBLIC_MONITORING_PROVIDER: ""
          NEXT_PUBLIC_ANALYTICS_PROVIDER: ""

      - name: Analyze PR bundle sizes and compare
        id: bundle-analysis
        run: |
          mkdir -p /tmp/pr-analysis

          # Collect PR bundle sizes in exact bytes
          if [ -d "apps/web/.next/static/chunks/app" ]; then
            find apps/web/.next/static/chunks/app -name "*.js" -exec stat --format=%s {} + | awk '{sum+=$1}END{print sum+0}' > /tmp/pr-analysis/app-bytes.txt
          else
            echo "0" > /tmp/pr-analysis/app-bytes.txt
          fi
          for chunk in framework main webpack; do
            file=$(ls apps/web/.next/static/chunks/${chunk}-*.js 2>/dev/null | head -1)
            if [ -n "$file" ]; then
              stat --format=%s "$file" > /tmp/pr-analysis/${chunk}-bytes.txt
            else
              echo "0" > /tmp/pr-analysis/${chunk}-bytes.txt
            fi
          done
          find apps/web/.next/static -name "*.js" -exec stat --format=%s {} + | awk '{sum+=$1}END{print sum+0}' > /tmp/pr-analysis/total-bytes.txt

          # Format bytes to human-readable for the report table
          format_bytes() {
            local bytes=$1
            if [ "$bytes" -ge 1048576 ]; then
              local whole=$(( bytes / 1048576 ))
              local frac=$(( (bytes % 1048576) * 10 / 1048576 ))
              echo "${whole}.${frac}M"
            elif [ "$bytes" -ge 1024 ]; then
              echo "$(( bytes / 1024 ))K"
            else
              echo "${bytes}B"
            fi
          }

          # Generate comparison report
          echo "# Bundle Size Analysis" > /tmp/bundle-report.md
          echo "" >> /tmp/bundle-report.md
          echo "| Bundle | Base Size | PR Size | Change | Status |" >> /tmp/bundle-report.md
          echo "|--------|-----------|---------|--------|--------|" >> /tmp/bundle-report.md

          ALERT_NEEDED=false
          CRITICAL_ALERT=false

          for bundle in app framework main webpack total; do
            base_bytes=$(cat /tmp/base-analysis/${bundle}-bytes.txt 2>/dev/null || echo "0")
            pr_bytes=$(cat /tmp/pr-analysis/${bundle}-bytes.txt 2>/dev/null || echo "0")
            base_bytes=${base_bytes:-0}
            pr_bytes=${pr_bytes:-0}

            base_display=$(format_bytes "$base_bytes")
            pr_display=$(format_bytes "$pr_bytes")

            if [ "$base_bytes" -eq 0 ]; then
              if [ "$pr_bytes" -eq 0 ]; then
                change=0
              else
                change=100
              fi
            else
              change=$(( (pr_bytes - base_bytes) * 100 / base_bytes ))
            fi

            if [ "$change" -gt 10 ]; then
              status="🚨 Critical (+${change}%)"
              CRITICAL_ALERT=true
              ALERT_NEEDED=true
            elif [ "$change" -gt 5 ]; then
              status="⚠️ Warning (+${change}%)"
              ALERT_NEEDED=true
            elif [ "$change" -gt 0 ]; then
              status="📈 Increased (+${change}%)"
            elif [ "$change" -lt 0 ]; then
              status="📉 Decreased (${change}%)"
            else
              status="✅ No change"
            fi

            echo "| ${bundle^} | $base_display | $pr_display | ${change}% | $status |" >> /tmp/bundle-report.md
          done

          echo "ALERT_NEEDED=$ALERT_NEEDED" >> $GITHUB_OUTPUT
          echo "CRITICAL_ALERT=$CRITICAL_ALERT" >> $GITHUB_OUTPUT

      - name: Create PR comment for significant changes
        if: steps.bundle-analysis.outputs.ALERT_NEEDED == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/bundle-report.md', 'utf8');

            const isCritical = '${{ steps.bundle-analysis.outputs.CRITICAL_ALERT }}' === 'true';
            const header = isCritical
              ? '🚨 **Critical Bundle Size Alert**'
              : '⚠️ **Bundle Size Alert**';

            const body = `${header}

            This PR introduces significant bundle size changes:

            ${report}

            ${isCritical
              ? '**Action Required**: Bundle size increased by more than 10%. Please review and optimize before merging.'
              : '**Review Recommended**: Bundle size increased by more than 5%. Consider optimization if possible.'
            }

            ### Optimization Tips:
            - Check for new large dependencies
            - Use dynamic imports for heavy components
            - Review tree-shaking opportunities
            - See [Bundle Optimization Guidelines](./docs/bundle-optimization.md)

            ---
            Generated by Bundle Size Alert workflow`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(comment =>
              comment.body.includes('Bundle Size Alert')
            );

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Fail build for critical size increases
        # Skip failure for promotion PRs (dev->staging, staging->main)
        if: |
          steps.bundle-analysis.outputs.CRITICAL_ALERT == 'true' &&
          !(github.head_ref == 'dev' && github.base_ref == 'staging') &&
          !(github.head_ref == 'staging' && github.base_ref == 'main')
        run: |
          echo "❌ Critical bundle size increase detected (>10%)"
          echo "Bundle size increase is too significant and requires optimization before merging."
          exit 1

      - name: Warn but don't fail for promotion PRs
        if: |
          steps.bundle-analysis.outputs.CRITICAL_ALERT == 'true' &&
          ((github.head_ref == 'dev' && github.base_ref == 'staging') ||
           (github.head_ref == 'staging' && github.base_ref == 'main'))
        run: |
          echo "⚠️ Bundle size increased for promotion PR"
          echo "This is acceptable for promotion PRs but should be reviewed."

      - name: Bundle size summary
        if: always()
        run: |
          echo "## Bundle Size Analysis Complete"
          if [ "${{ steps.base-cache.outputs.cache-hit }}" == "true" ]; then
            echo "📦 Base bundle sizes restored from cache (skipped base build)"
          else
            echo "📦 Base bundle sizes built from source (cache miss)"
          fi
          if [ "${{ steps.bundle-analysis.outputs.CRITICAL_ALERT }}" == "true" ]; then
            echo "🚨 Critical alert: Bundle size increased by more than 10%"
          elif [ "${{ steps.bundle-analysis.outputs.ALERT_NEEDED }}" == "true" ]; then
            echo "⚠️ Warning: Bundle size increased by more than 5%"
          else
            echo "✅ Bundle size changes are within acceptable limits"
          fi
