name: Weekly Security Scan

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: read
  security-events: write
  issues: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.14.0'

jobs:
  # Scan container images for vulnerabilities
  container-security-scan:
    name: Container Security Scan
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    outputs:
      container_critical: ${{ steps.container_summary.outputs.container_critical }}
      container_high: ${{ steps.container_summary.outputs.container_high }}
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan CI Docker image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/ci:latest'
          format: 'sarif'
          output: 'ci-trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          vuln-type: 'os,library'
          scanners: 'vuln,secret,misconfig'
        continue-on-error: true

      - name: Upload CI image scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'ci-trivy-results.sarif'
          category: 'ci-container-weekly'

      - name: Generate container scan summary
        id: container_summary
        run: |
          echo "## Container Security Summary" > container-report.md
          echo "" >> container-report.md
          
          # Scan CI image and capture results
          trivy image ghcr.io/${{ github.repository }}/ci:latest --format json > ci-scan.json || true
          
          if [ -f ci-scan.json ] && [ -s ci-scan.json ]; then
            CRITICAL=$(cat ci-scan.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')
            HIGH=$(cat ci-scan.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length')
            MEDIUM=$(cat ci-scan.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length')
            LOW=$(cat ci-scan.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="LOW")] | length')
            
            echo "container_critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "container_high=$HIGH" >> $GITHUB_OUTPUT
            echo "container_medium=$MEDIUM" >> $GITHUB_OUTPUT
            echo "container_low=$LOW" >> $GITHUB_OUTPUT
            
            echo "### CI Image Vulnerabilities" >> container-report.md
            echo "- Critical: $CRITICAL" >> container-report.md
            echo "- High: $HIGH" >> container-report.md
            echo "- Medium: $MEDIUM" >> container-report.md
            echo "- Low: $LOW" >> container-report.md
          else
            echo "No container scan results available" >> container-report.md
            echo "container_critical=0" >> $GITHUB_OUTPUT
            echo "container_high=0" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

  aikido-comprehensive-scan:
    name: Aikido Comprehensive Security Scan
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    outputs:
      container_critical: ${{ needs.container-security-scan.outputs.container_critical }}
      container_high: ${{ needs.container-security-scan.outputs.container_high }}
    needs: [container-security-scan]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps

      # NOTE: AikidoSec/github-actions-workflow is deprecated (May 2025).
      # Migrate to Aikido Dashboard PR Gating when ready.
      - name: Run Aikido Security Scan
        id: aikido_scan
        uses: AikidoSec/github-actions-workflow@v1.0.13
        with:
          secret-key: ${{ secrets.AIKIDO_SECRET_KEY }}
          fail-on-timeout: false  # Don't fail weekly scans on timeout
          fail-on-dependency-scan: false  # Report but don't fail
          fail-on-sast-scan: false
          fail-on-iac-scan: true  # Enable IaC scanning
          minimum-severity: 'LOW'  # Report all severities
          timeout-seconds: 300  # 5 minutes for comprehensive scan
          post-scan-status-comment: 'off'  # No PR comments for scheduled scans
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Temporary: Also run npm audit for comparison
      - name: Run npm audit
        id: npm_audit
        run: |
          echo "Running npm audit for security vulnerabilities..."
          pnpm audit --json > audit-report.json || true
          
          # Parse results
          VULNERABILITIES=$(cat audit-report.json | jq '.metadata.vulnerabilities // {}')
          HIGH=$(echo $VULNERABILITIES | jq '.high // 0')
          CRITICAL=$(echo $VULNERABILITIES | jq '.critical // 0')
          MODERATE=$(echo $VULNERABILITIES | jq '.moderate // 0')
          LOW=$(echo $VULNERABILITIES | jq '.low // 0')
          TOTAL=$((HIGH + CRITICAL + MODERATE + LOW))
          
          echo "vulnerabilities_total=$TOTAL" >> $GITHUB_OUTPUT
          echo "vulnerabilities_high=$HIGH" >> $GITHUB_OUTPUT
          echo "vulnerabilities_critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "vulnerabilities_moderate=$MODERATE" >> $GITHUB_OUTPUT
          echo "vulnerabilities_low=$LOW" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Create comprehensive security report
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const aikidoOutcome = '${{ steps.aikido_scan.outcome }}';
            const npmTotal = ${{ steps.npm_audit.outputs.vulnerabilities_total || 0 }};
            const npmCritical = ${{ steps.npm_audit.outputs.vulnerabilities_critical || 0 }};
            const npmHigh = ${{ steps.npm_audit.outputs.vulnerabilities_high || 0 }};
            const npmModerate = ${{ steps.npm_audit.outputs.vulnerabilities_moderate || 0 }};
            const npmLow = ${{ steps.npm_audit.outputs.vulnerabilities_low || 0 }};
            
            const containerCritical = ${{ needs.container-security-scan.outputs.container_critical || 0 }};
            const containerHigh = ${{ needs.container-security-scan.outputs.container_high || 0 }};
            
            const hasIssues = aikidoOutcome === 'failure' || npmTotal > 0 || containerCritical > 0 || containerHigh > 0;
            const hasHighCritical = (npmCritical + npmHigh + containerCritical + containerHigh) > 0;
            const priority = hasHighCritical ? 'high-priority' : 'medium-priority';
            const urgency = hasHighCritical ? '🚨 URGENT' : '⚠️ Review Required';
            
            if (!hasIssues) {
              console.log('No security issues found in weekly scan');
              return;
            }
            
            let body = `# ${urgency}: Weekly Security Scan Results\n\n`;
            body += `## Summary\n`;
            body += `Scan Date: ${new Date().toISOString()}\n\n`;
            
            body += `### Aikido Security Scan\n`;
            if (aikidoOutcome === 'success') {
              body += `✅ No issues detected by Aikido\n\n`;
            } else if (aikidoOutcome === 'failure') {
              body += `❌ Issues detected - [View detailed results in Aikido Dashboard](https://app.aikido.dev/)\n\n`;
            } else {
              body += `⚠️ Scan completed with warnings or timeout\n\n`;
            }
            
            if (npmTotal > 0) {
              body += `### NPM Audit Results\n`;
              body += `**Total vulnerabilities:** ${npmTotal}\n`;
              body += `- **Critical:** ${npmCritical}\n`;
              body += `- **High:** ${npmHigh}\n`;
              body += `- **Moderate:** ${npmModerate}\n`;
              body += `- **Low:** ${npmLow}\n\n`;
            }
            
            if (containerCritical > 0 || containerHigh > 0) {
              body += `### Container Security Results\n`;
              body += `**Docker Image Vulnerabilities:**\n`;
              body += `- **Critical:** ${containerCritical}\n`;
              body += `- **High:** ${containerHigh}\n\n`;
              body += `⚠️ Container vulnerabilities require updating base images or system packages.\n\n`;
            }
            
            body += `## Action Required\n`;
            if (hasHighCritical) {
              body += `⚠️ **High/Critical vulnerabilities detected** - immediate action required.\n`;
              body += `1. Review the Aikido dashboard for detailed vulnerability information\n`;
              body += `2. Update vulnerable dependencies where possible\n`;
              body += `3. Apply security patches or workarounds\n`;
              body += `4. Test thoroughly after updates\n\n`;
            } else {
              body += `✅ No high/critical vulnerabilities, but review recommended.\n`;
              body += `1. Review the detailed reports when convenient\n`;
              body += `2. Consider updates during next maintenance window\n\n`;
            }
            
            body += `## Resources\n`;
            body += `- [Aikido Dashboard](https://app.aikido.dev/)\n`;
            body += `- [SlideHeroes Security Policy](https://github.com/slideheroes/2025slideheroes/blob/main/docs/SECURITY.md)\n`;
            body += `- [GitHub Security Advisories](https://github.com/slideheroes/2025slideheroes/security/advisories)\n`;
            body += `- [Dependabot Alerts](https://github.com/slideheroes/2025slideheroes/security/dependabot)\n\n`;
            body += `---\n`;
            body += `*Generated by automated weekly security scan on ${new Date().toISOString()}*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Security Scan: Issues Detected`,
              body: body,
              labels: ['security', priority, 'automated']
            });
            
            console.log(`Created security issue for weekly scan`);

      - name: Upload scan reports as artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: security-scan-reports
          path: |
            audit-report.json
          retention-days: 90