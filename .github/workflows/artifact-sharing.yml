name: Build Artifact Sharing

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment (staging or production)'
      commit_sha:
        required: true
        type: string
        description: 'Git commit SHA to build or retrieve'
      force_rebuild:
        required: false
        type: boolean
        default: false
        description: 'Force a rebuild even if artifacts exist'
    outputs:
      artifact_key:
        description: 'The artifact cache key used'
        value: ${{ jobs.build-or-reuse.outputs.artifact_key }}
      artifact_found:
        description: 'Whether existing artifacts were found and reused'
        value: ${{ jobs.build-or-reuse.outputs.artifact_found }}
      build_time:
        description: 'Build time in seconds (0 if reused)'
        value: ${{ jobs.build-or-reuse.outputs.build_time }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_ENABLED: true
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  build-or-reuse:
    name: Build or Reuse Artifacts
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    outputs:
      artifact_key: ${{ steps.artifact.outputs.key }}
      artifact_found: ${{ steps.check.outputs.found }}
      build_time: ${{ steps.build.outputs.time }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
      
      - name: Generate artifact key
        id: artifact
        run: |
          # Generate a unique key based on commit and important files
          FILES_HASH=$(find . -name "package.json" -o -name "pnpm-lock.yaml" -o -name "turbo.json" -o -name "*.config.*" | xargs sha256sum | sha256sum | cut -d' ' -f1)
          ARTIFACT_KEY="build-${{ inputs.commit_sha }}-${FILES_HASH:0:8}"
          echo "key=${ARTIFACT_KEY}" >> $GITHUB_OUTPUT
          echo "📦 Artifact key: ${ARTIFACT_KEY}"
      
      - name: Check for existing artifacts
        id: check
        if: inputs.force_rebuild != true
        continue-on-error: true
        run: |
          # Check if artifacts exist for this exact commit
          echo "🔍 Checking for existing artifacts with key: ${{ steps.artifact.outputs.key }}"
          
          # Try to restore from cache
          if gh run list --workflow "Deploy to Staging" --json databaseId,headSha,status \
             | jq -r '.[] | select(.headSha == "${{ inputs.commit_sha }}" and .status == "completed") | .databaseId' \
             | head -1 | xargs -I {} gh run download {} -n "build-artifacts-staging" 2>/dev/null; then
            echo "✅ Found existing staging artifacts for commit ${{ inputs.commit_sha }}"
            echo "found=true" >> $GITHUB_OUTPUT
            
            # Validate artifacts
            if [ -d "apps/web/.next" ] && [ -d "apps/payload/dist" ]; then
              echo "✅ Artifacts validated successfully"
            else
              echo "❌ Artifacts incomplete, will rebuild"
              echo "found=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "📦 No existing artifacts found, will build fresh"
            echo "found=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Setup dependencies if building
        if: steps.check.outputs.found != 'true'
        uses: ./.github/actions/setup-deps
      
      - name: Restore build cache
        if: steps.check.outputs.found != 'true'
        uses: actions/cache@v5
        with:
          path: |
            .turbo
            apps/web/.next/cache
            apps/payload/.next/cache
          key: ${{ runner.os }}-build-cache-${{ inputs.environment }}-${{ steps.artifact.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-build-cache-${{ inputs.environment }}-
            ${{ runner.os }}-build-cache-
      
      - name: Build application
        id: build
        if: steps.check.outputs.found != 'true'
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_ENV: ${{ inputs.environment }}
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          PAYLOAD_PUBLIC_SERVER_URL: ${{ vars.PAYLOAD_PUBLIC_SERVER_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          START_TIME=$(date +%s)
          
          echo "🔨 Building application for ${{ inputs.environment }}"
          
          # Show Turbo cache status
          echo "::group::Turbo Cache Status"
          npx turbo build --dry-run --summarize | head -20 || true
          echo "::endgroup::"
          
          # Build with Turbo
          echo "::group::Build Output"
          pnpm build --cache-dir=.turbo
          echo "::endgroup::"
          
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))
          echo "time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "⏱️ Build completed in ${BUILD_TIME} seconds"
      
      - name: Create build manifest
        run: |
          cat > build-manifest.json << EOF
          {
            "commit": "${{ inputs.commit_sha }}",
            "environment": "${{ inputs.environment }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "artifact_key": "${{ steps.artifact.outputs.key }}",
            "build_time": ${{ steps.build.outputs.time || 0 }},
            "reused": ${{ steps.check.outputs.found == 'true' && 'true' || 'false' }},
            "runner": "${{ runner.os }}-${{ runner.arch }}",
            "node_version": "$(node --version)",
            "pnpm_version": "$(pnpm --version)"
          }
          EOF
          
          echo "📋 Build manifest created:"
          cat build-manifest.json
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts-${{ inputs.environment }}-${{ inputs.commit_sha }}
          path: |
            apps/web/.next
            apps/web/public
            apps/payload/dist
            packages/*/dist
            build-manifest.json
          retention-days: 7
          compression-level: 6
      
      - name: Save to long-term cache
        if: inputs.environment == 'production'
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next
            apps/payload/dist
            packages/*/dist
            build-manifest.json
          key: production-build-${{ steps.artifact.outputs.key }}
      
      - name: Report metrics
        if: always()
        run: |
          echo "## 📊 Build Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ inputs.commit_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Key | \`${{ steps.artifact.outputs.key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Reused Artifacts | ${{ steps.check.outputs.found == 'true' && '✅ Yes' || '❌ No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | ${{ steps.build.outputs.time || 0 }}s |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check.outputs.found }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🚀 Performance Boost" >> $GITHUB_STEP_SUMMARY
            echo "Reused existing artifacts, saving approximately 3-5 minutes of build time!" >> $GITHUB_STEP_SUMMARY
          fi

  validate-artifacts:
    name: Validate Build Artifacts
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: build-or-reuse
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
      
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts-${{ inputs.environment }}-${{ inputs.commit_sha }}
          path: .
      
      - name: Validate artifacts
        run: |
          echo "🔍 Validating build artifacts..."
          
          # Check Web build
          if [ ! -d "apps/web/.next" ]; then
            echo "❌ Web build artifacts missing!"
            exit 1
          fi
          
          # Check Payload build
          if [ ! -d "apps/payload/dist" ]; then
            echo "❌ Payload build artifacts missing!"
            exit 1
          fi
          
          # Check manifest
          if [ ! -f "build-manifest.json" ]; then
            echo "❌ Build manifest missing!"
            exit 1
          fi
          
          # Validate manifest
          MANIFEST_COMMIT=$(jq -r '.commit' build-manifest.json)
          if [ "$MANIFEST_COMMIT" != "${{ inputs.commit_sha }}" ]; then
            echo "❌ Manifest commit mismatch! Expected ${{ inputs.commit_sha }}, got $MANIFEST_COMMIT"
            exit 1
          fi
          
          echo "✅ All artifacts validated successfully!"
          
          # Show artifact sizes
          echo ""
          echo "📦 Artifact Sizes:"
          du -sh apps/web/.next || true
          du -sh apps/payload/dist || true
      
      - name: Generate artifact report
        run: |
          cat > artifact-report.md << 'EOF'
          # Build Artifact Report
          
          **Environment:** ${{ inputs.environment }}
          **Commit:** `${{ inputs.commit_sha }}`
          **Artifact Key:** `${{ needs.build-or-reuse.outputs.artifact_key }}`
          **Reused:** ${{ needs.build-or-reuse.outputs.artifact_found == 'true' && 'Yes ✅' || 'No ❌' }}
          **Build Time:** ${{ needs.build-or-reuse.outputs.build_time }}s
          
          ## Validation Results
          
          ✅ All artifacts validated successfully
          
          ## Manifest
          
          ```json
          $(cat build-manifest.json)
          ```
          
          ## Next Steps
          
          These artifacts are ready for deployment to ${{ inputs.environment }}.
          EOF
      
      - name: Upload validation report
        uses: actions/upload-artifact@v6
        with:
          name: artifact-validation-${{ inputs.environment }}-${{ github.run_id }}
          path: artifact-report.md
          retention-days: 30