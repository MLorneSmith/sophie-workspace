name: Deploy to Staging

# Test RunsOn syntax fix - deployment trigger
on:
  push:
    branches:
      - staging
  schedule:
    # Run weekly load tests every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'

# Prevent multiple deployments from running simultaneously
concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel in-progress deployments

permissions:
  contents: read
  deployments: write
  pull-requests: write
  issues: write
  checks: write
  security-events: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_ENABLED: true
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  # Check if validation is needed
  check-validation:
    name: Check if validation needed
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    outputs:
      should-validate: ${{ steps.check.outputs.should-validate }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      
      - name: Check if already validated
        id: check
        run: |
          # Skip validation if this commit was already validated in a PR
          # This happens when PRs are merged to staging
          COMMIT=${{ github.sha }}
          PARENT_COMMIT=$(git rev-parse HEAD^)
          
          # Check if this is a merge commit from a PR
          if git log --format=%s -n 1 | grep -q "^Merge pull request"; then
            echo "This is a PR merge, validation already done"
            echo "should-validate=false" >> $GITHUB_OUTPUT
          # Also skip if merging from dev (already validated there)
          elif git log --format=%B -n 1 | grep -q "Merge.*dev"; then
            echo "This is a merge from dev, validation already done"
            echo "should-validate=false" >> $GITHUB_OUTPUT
          else
            echo "This is a direct push, validation needed"
            echo "should-validate=true" >> $GITHUB_OUTPUT
          fi

  # Run validation checks inline (without reusable workflow)
  validate:
    name: Pre-deployment Validation
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    needs: check-validation
    if: needs.check-validation.outputs.should-validate == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-validate-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-validate-
            ${{ runner.os }}-turbo-

      - name: Run validation checks in parallel
        run: |
          # Run typecheck and lint in parallel for faster feedback
          pnpm typecheck &
          TYPECHECK_PID=$!
          
          pnpm lint &
          LINT_PID=$!
          
          # Wait for both to complete and capture exit codes
          wait $TYPECHECK_PID
          TYPECHECK_EXIT=$?
          
          wait $LINT_PID
          LINT_EXIT=$?
          
          # Report results
          if [ $TYPECHECK_EXIT -ne 0 ]; then
            echo "❌ TypeScript check failed"
          else
            echo "✅ TypeScript check passed"
          fi
          
          if [ $LINT_EXIT -ne 0 ]; then
            echo "❌ Lint check failed"
          else
            echo "✅ Lint check passed"
          fi
          
          # Exit with failure if either check failed
          if [ $TYPECHECK_EXIT -ne 0 ] || [ $LINT_EXIT -ne 0 ]; then
            exit 1
          fi

  # Run full test suite for staging
  test-full:
    name: Full Test Suite
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    needs: [check-validation, validate]
    if: always() && !failure() && !cancelled()
    timeout-minutes: 30
    env:
      # NOTE: SUPABASE_SERVICE_ROLE_KEY is exported from local Supabase in "Export Supabase environment variables" step
      # Do NOT set it here from secrets as it will be empty and override the exported value
      SUPABASE_DB_WEBHOOK_SECRET: ${{ secrets.SUPABASE_DB_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      ENABLE_BILLING_TESTS: true
      DO_NOT_TRACK: 1
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Start Supabase
        uses: supabase/setup-cli@v1
      
      - name: Start Supabase services
        run: pnpm run supabase:web:start -- -x studio,migra,deno-relay,pgadmin-schema-diff,imgproxy,logflare

      - name: Export Supabase environment variables
        run: |
          # Get Supabase status and extract URLs and keys
          cd apps/web
          SUPABASE_URL=$(npx supabase status | grep "API URL" | awk '{print $3}')
          SUPABASE_ANON_KEY=$(npx supabase status | grep "Publishable key" | awk '{print $3}')
          SUPABASE_SERVICE_KEY=$(npx supabase status | grep "Secret key" | awk '{print $3}')

          # Export to GITHUB_ENV for subsequent steps
          echo "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_KEY" >> $GITHUB_ENV

          # Verify variables were set
          echo "✅ Exported NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL"
          echo "✅ Exported NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:0:20}..."
          echo "✅ Exported SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_KEY:0:20}..."

      - name: Start Stripe CLI
        run: |
          docker run --add-host=host.docker.internal:host-gateway --rm -it --name=stripe -d \
            stripe/stripe-cli:latest listen \
            --forward-to http://host.docker.internal:3000/api/billing/webhook \
            --skip-verify --api-key "$STRIPE_SECRET_KEY" --log-level debug

      - name: Build application
        run: pnpm turbo build:test --filter=web

      - name: Start application
        run: pnpm --filter web start:test &

      - name: Wait for application
        run: |
          npx wait-on http://localhost:3000 -t 60000

      - name: Run full E2E test suite
        run: pnpm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-staging
          path: apps/e2e/playwright-report/
          retention-days: 7

  # Build application with artifact sharing
  build:
    name: Build Application
    needs: [check-validation, validate, test-full]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/artifact-sharing.yml
    with:
      environment: staging
      commit_sha: ${{ github.sha }}
      force_rebuild: false
    secrets: inherit

  # Deploy Web App to Vercel Staging environment
  deploy-web:
    name: Deploy Web App to Staging
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    needs: build
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: build-artifacts-staging-${{ github.sha }}
          path: .

      - name: Deploy to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          org-id: ${{ secrets.VERCEL_ORG_ID }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          environment: staging
          build-artifacts: true
          protection-bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          health-check-url: /healthcheck

      - name: Create deployment status
        uses: actions/github-script@v8
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'staging-web',
              required_contexts: [],
              auto_merge: false,
              production_environment: false
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Web app deployed to staging environment'
            });

  # Deploy Payload CMS to Vercel Staging environment
  deploy-payload:
    name: Deploy Payload CMS to Staging
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    needs: build
    environment:
      name: staging-payload
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: build-artifacts-staging-${{ github.sha }}
          path: .

      - name: Deploy to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          org-id: ${{ secrets.VERCEL_ORG_ID }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID_PAYLOAD }}
          environment: staging
          build-artifacts: true
          protection-bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          health-check-url: /api/health

      - name: Create deployment status
        uses: actions/github-script@v8
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'staging-payload',
              required_contexts: [],
              auto_merge: false,
              production_environment: false
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Payload CMS deployed to staging environment'
            });

  # Run smoke tests against staging
  smoke-tests:
    name: Staging Smoke Tests
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    needs: deploy-web
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-deps

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging environment"
          # TODO: Create staging-specific smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-web.outputs.url }}

  # K6 Load Testing
  k6-load-test:
    name: K6 Load Testing
    needs: [deploy-web, deploy-payload]
    uses: ./.github/workflows/k6-load-test.yml
    with:
      environment: staging
      base_url: ${{ needs.deploy-web.outputs.url }}
      test_scenario: user-journey
      duration: '5m'
      vus: 50
      fail_on_threshold: false  # Don't block staging deploys on performance
    secrets:
      K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
      NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
      NEW_RELIC_ACCOUNT_ID: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
  
  # Weekly scheduled load test with higher load
  schedule-load-test:
    name: Weekly Load Test
    if: github.event_name == 'schedule'  # Only run on schedule
    needs: [deploy-web, deploy-payload]
    uses: ./.github/workflows/k6-load-test.yml
    with:
      environment: staging
      base_url: ${{ needs.deploy-web.outputs.url }}
      test_scenario: user-journey
      duration: '15m'
      vus: 200  # Higher load for weekly stress test
      fail_on_threshold: false
    secrets:
      K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
      NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
      NEW_RELIC_ACCOUNT_ID: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
  
  # Visual Regression Testing
  visual-regression:
    name: Visual Regression Testing
    needs: [deploy-web, deploy-payload]
    uses: ./.github/workflows/visual-regression.yml
    with:
      environment: staging
      base_url: ${{ needs.deploy-web.outputs.url }}
      test_suite: critical
      update_snapshots: false
      fail_on_diff: false  # Don't block staging on visual differences
  
  # Container Security Scanning
  container-security:
    name: Container Security Scan
    needs: build
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/container-security.yml
    with:
      dockerfile_path: 'apps/payload/Dockerfile'
      scan_type: 'all'
      severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
      fail_on_severity: 'CRITICAL'
      ignore_unfixed: false

  # Dynamic Application Security Testing with Nuclei
  dast-security-scan:
    name: DAST Security Scan (Nuclei)
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    needs: [deploy-web, deploy-payload]
    continue-on-error: true  # Don't block deployment on security findings initially
    permissions:
      contents: read
      issues: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      
      - name: Run Nuclei DAST scan
        uses: ./.github/actions/nuclei-scan
        with:
          target: ${{ needs.deploy-web.outputs.url }}
          scan-type: 'standard'
          severity: 'low,medium,high,critical'
          fail-on-severity: 'none'  # Don't fail staging deploys initially
      
      - name: Create security issue if critical findings
        if: env.VULN_CRITICAL > 0
        uses: actions/github-script@v8
        with:
          script: |
            const criticalCount = process.env.VULN_CRITICAL;
            const highCount = process.env.VULN_HIGH;
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Critical Security Vulnerabilities Found in Staging`,
              body: `## Security Scan Alert
              
              The DAST security scan found critical vulnerabilities in the staging deployment.
              
              **Scan Results:**
              - 🔴 Critical: ${criticalCount}
              - 🟠 High: ${highCount}
              
              **Deployment:** ${context.sha}
              **Environment:** Staging
              **URL:** ${{ needs.deploy-web.outputs.url }}
              
              **Action Required:**
              1. Download the scan artifacts from the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              2. Review the vulnerabilities in detail
              3. Fix critical issues before promoting to production
              
              cc @${context.actor}`,
              labels: ['security', 'critical', 'staging']
            });
            
            console.log(`Created security issue #${issue.data.number}`);

  # Notify New Relic of staging deployment
  notify-monitoring:
    name: Notify Monitoring
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    needs: [deploy-web, deploy-payload]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      
      - uses: ./.github/actions/newrelic-notify
        with:
          api-key: ${{ secrets.NEW_RELIC_API_KEY }}
          app-id: ${{ secrets.NEW_RELIC_APP_ID }}
          account-id: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          insert-key: ${{ secrets.NEW_RELIC_INSERT_KEY }}
          environment: staging
          deployment-url: ${{ needs.deploy-web.outputs.url }}

  # Auto-rollback functionality (temporarily disabled - reusable workflow causes startup_failure)
  # TODO: Re-enable auto-rollback once reusable workflow compatibility with RunsOn is resolved
  # auto-rollback:
  #   name: Auto Rollback
  #   needs: deploy-web
  #   uses: ./.github/workflows/auto-rollback.yml
  #   with:
  #     environment: staging
  #     deployment_url: ${{ needs.deploy-web.outputs.url }}
  #   secrets:
  #     VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}