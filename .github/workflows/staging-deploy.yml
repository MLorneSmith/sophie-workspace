  #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

  # Sync staging back into dev after successful deployment
  # This prevents merge conflicts in future promotion PRs when using squash merge strategy.
  # Without this sync, staging has squashed commits while dev has individual commits,
  # causing Git to see divergent history on the next promotion attempt.
  # See: Issue #1848 - PR conflicts due to squash merge history divergence
  sync-dev-with-staging:
    name: Sync Dev with Staging
    runs-on: runs-on=${{ github.run_id }}/runner=4cpu-linux-x64
    needs: [check-validation]
    if: always() && !cancelled()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge staging into dev
        id: merge
        run: |
          echo "🔄 Syncing staging into dev to prevent future merge conflicts..."

          # Fetch latest staging and dev
          git fetch origin staging
          git fetch origin dev
          git reset --hard origin/dev

          # Check if there are differences to merge
          if git merge-base --is-ancestor origin/staging HEAD; then
            echo "✅ Dev is already up-to-date with staging, no merge needed"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Use squash merge to avoid creating a merge commit
          # (dev branch protection forbids merge commits)
          if git merge --squash origin/staging; then
            # Exclude workflow files from sync - they originate on dev and flow to
            # staging via PRs. Neither GITHUB_TOKEN nor GitHub App tokens have the
            # 'workflows' permission needed to push .github/workflows/ changes.
            git checkout origin/dev -- .github/workflows/ 2>/dev/null || true

            # Check if squash produced any changes (branches may already be aligned)
            if git diff --cached --quiet; then
              echo "✅ No differences after squash merge - branches are already in sync"
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            git commit -m "chore(ci): sync staging into dev after promotion [skip ci]"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Successfully squash-merged staging into dev"
          else
            echo "⚠️ Merge conflict detected, attempting auto-resolution..."

            # For spec-manifest.json conflicts, prefer the staging version
            git checkout --theirs .ai/alpha/specs/*/spec-manifest.json 2>/dev/null || true
            git add .ai/alpha/specs/*/spec-manifest.json 2>/dev/null || true

            # Exclude workflow files from sync (see comment above)
            git checkout origin/dev -- .github/workflows/ 2>/dev/null || true
            git add -A

            # After excluding workflow files, there may be nothing left to commit
            # (e.g., all differences were in .github/workflows/). That's a success.
            if git diff --cached --quiet; then
              echo "✅ No differences after excluding workflow files - branches are already in sync"
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            if git commit -m "chore(ci): sync staging into dev after promotion (auto-resolved) [skip ci]"; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "✅ Merge completed with auto-resolved conflicts"
            else
              echo "❌ Could not auto-resolve conflicts, manual intervention required"
              git reset --hard origin/dev
              exit 1
            fi
          fi

      - name: Create sync PR
        if: steps.merge.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SYNC_BRANCH="sync/staging-to-dev-${{ github.run_id }}"
          git checkout -b "$SYNC_BRANCH"
          git push origin "$SYNC_BRANCH"

          # Create PR and enable auto-merge (squash)
          PR_URL=$(gh pr create \
            --base dev \
            --head "$SYNC_BRANCH" \
            --title "chore(ci): sync staging into dev after promotion [skip ci]" \
            --body "Automated sync of staging back into dev to prevent merge conflicts in future promotion PRs.

          This PR is auto-merged. All changes were already validated on staging." \
            --label "automated")

          echo "✅ Created sync PR: $PR_URL"

          # Enable auto-merge so it merges once PR Status Check passes
          gh pr merge "$PR_URL" --squash --auto

          echo "✅ Auto-merge enabled on sync PR"

      - name: Add workflow summary
        if: always()
        run: |
          echo "## 🔄 Dev Branch Sync" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Created a sync PR to merge staging back into dev." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This prevents merge conflicts in future \`dev → staging\` promotion PRs." >> $GITHUB_STEP_SUMMARY