name: Deploy to Staging

on:
  push:
    branches:
      - staging

permissions:
  contents: read
  deployments: write
  pull-requests: write
  issues: write
  checks: write
  security-events: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Run all validation checks first
  validate:
    name: Validate
    uses: ./.github/workflows/pr-validation.yml
    secrets: inherit

  # Run full test suite for staging
  test-full:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_WEBHOOK_SECRET: ${{ secrets.SUPABASE_DB_WEBHOOK_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      ENABLE_BILLING_TESTS: true
      DO_NOT_TRACK: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Start Supabase
        uses: supabase/setup-cli@v1
      
      - name: Start Supabase services
        run: pnpm run supabase:web:start -- -x studio,migra,deno-relay,pgadmin-schema-diff,imgproxy,logflare

      - name: Start Stripe CLI
        run: |
          docker run --add-host=host.docker.internal:host-gateway --rm -it --name=stripe -d \
            stripe/stripe-cli:latest listen \
            --forward-to http://host.docker.internal:3000/api/billing/webhook \
            --skip-verify --api-key "$STRIPE_SECRET_KEY" --log-level debug

      - name: Build application
        run: pnpm turbo build:test --filter=web

      - name: Start application
        run: pnpm --filter web start:test &

      - name: Wait for application
        run: |
          npx wait-on http://localhost:3000 -t 60000

      - name: Run full E2E test suite
        run: pnpm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging
          path: apps/e2e/playwright-report/
          retention-days: 7

  # Deploy to Vercel Staging environment
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [validate, test-full]
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=staging --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Staging
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --target=staging --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to: $url"
          
          # Note: Custom domains are automatically configured via Vercel project settings
          # staging.slideheroes.com should be configured in Vercel dashboard
          echo "🚀 Staging deployment complete. Custom domain routes automatically if configured."

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'staging',
              required_contexts: [],
              auto_merge: false,
              production_environment: false
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Deployed to staging environment'
            });

  # Run smoke tests against staging
  smoke-tests:
    name: Staging Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging environment"
          # TODO: Create staging-specific smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.url }}

  # Performance testing (placeholder)
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true
    steps:
      - name: Run performance tests
        run: |
          echo "Performance testing will be implemented in Week 3"
          # TODO: Implement Lighthouse CI / k6 load testing

  # Security scan (placeholder)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true
    steps:
      - name: Run security scan
        run: |
          echo "Security scanning will be implemented in Week 3"
          # TODO: Implement Snyk/OWASP scanning

  # Notify New Relic of staging deployment
  notify-monitoring:
    name: Notify Monitoring
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true
    steps:
      - name: Create New Relic deployment marker
        run: |
          echo "📊 Sending staging metrics to New Relic..."
          
          # Create deployment marker
          curl -X POST "https://api.newrelic.com/v2/applications/${NEW_RELIC_APP_ID}/deployments.json" \
            -H "X-Api-Key:${NEW_RELIC_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"deployment\": {
                \"revision\": \"${GITHUB_SHA}\",
                \"user\": \"${GITHUB_ACTOR}\",
                \"description\": \"Staging deployment from ${GITHUB_REF_NAME}\",
                \"changelog\": \"Staging deployment via GitHub Actions\"
              }
            }"

          # Send staging CI/CD custom event
          curl -X POST "https://insights-collector.newrelic.com/v1/accounts/${NEW_RELIC_ACCOUNT_ID}/events" \
            -H "Content-Type: application/json" \
            -H "X-Insert-Key: ${NEW_RELIC_INSERT_KEY}" \
            -d "[{
              \"eventType\": \"CICDEvent\",
              \"timestamp\": $(date +%s),
              \"environment\": \"staging\",
              \"deployment_id\": \"${GITHUB_SHA}\",
              \"branch\": \"${GITHUB_REF_NAME}\",
              \"workflow\": \"staging-deploy\",
              \"actor\": \"${GITHUB_ACTOR}\",
              \"repository\": \"${GITHUB_REPOSITORY}\",
              \"status\": \"success\",
              \"deployment_url\": \"${{ needs.deploy.outputs.url }}\",
              \"commit_sha\": \"${GITHUB_SHA}\"
            }]"
          
          echo "✅ Staging metrics sent successfully"
        env:
          NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
          NEW_RELIC_APP_ID: ${{ secrets.NEW_RELIC_APP_ID }}
          NEW_RELIC_ACCOUNT_ID: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          NEW_RELIC_INSERT_KEY: ${{ secrets.NEW_RELIC_INSERT_KEY }}

  # Auto-rollback workflow
  auto-rollback:
    name: Auto Rollback
    needs: deploy
    uses: ./.github/workflows/auto-rollback.yml
    with:
      environment: staging
      deployment_url: ${{ needs.deploy.outputs.url }}
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}