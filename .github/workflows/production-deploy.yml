name: Deploy to Production

on:
  push:
    branches:
      - main

# Prevent multiple deployments from running simultaneously
concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel in-progress deployments

permissions:
  contents: read
  deployments: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_ENABLED: true
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  # Check if validation is needed
  check-validation:
    name: Check if validation needed
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    outputs:
      should-validate: ${{ steps.check.outputs.should-validate }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check if already validated
        id: check
        run: |
          # Skip validation if this commit was already validated in staging
          COMMIT=${{ github.sha }}
          
          # Check if this is a merge commit from staging
          if git log --format=%B -n 1 | grep -q "Merge.*staging"; then
            echo "This is a merge from staging, validation already done"
            echo "should-validate=false" >> $GITHUB_OUTPUT
          else
            echo "This is a direct push to main, validation needed"
            echo "should-validate=true" >> $GITHUB_OUTPUT
          fi

  # Final security check
  security-check:
    name: Final Security Check
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: check-validation
    if: needs.check-validation.outputs.should-validate == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for security scans
      
      - name: TruffleHog Secret Scan
        uses: docker://trufflesecurity/trufflehog:3.63.7
        with:
          args: |
            git file://./ \
            --since-commit HEAD~1 \
            --fail \
            --no-update
      
      - name: Aikido Security Scan
        uses: AikidoSec/github-actions-workflow@v1.0.13
        with:
          secret-key: ${{ secrets.AIKIDO_SECRET_KEY }}
          fail-on-timeout: true
          fail-on-dependency-scan: true
          fail-on-sast-scan: true
          fail-on-iac-scan: true
          minimum-severity: 'HIGH'
          timeout-seconds: 300
      
      - name: Run Weekly Security Scan
        uses: ./.github/workflows/security-weekly-scan.yml

  # Build application once
  build:
    name: Build Application
    needs: [check-validation, security-check]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/reusable-build.yml
    with:
      environment: production

  # Deploy Web App to Vercel Production
  deploy-web:
    name: Deploy Web App to Production
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: build
    environment:
      name: production
      url: https://slideheroes.com
      # Add protection rules via GitHub Settings:
      # - Required reviewers: 2
      # - Restrict deployments to specific users/teams
      # - Add deployment delay for manual review
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-production
          path: .

      - name: Deploy to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          org-id: ${{ secrets.VERCEL_ORG_ID }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          environment: production
          build-artifacts: true
          health-check-url: /healthcheck
          health-check-timeout: 120
          protection-bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production-web',
              required_contexts: [],
              auto_merge: false,
              production_environment: true
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Web app deployed to production'
            });

  # Deploy Payload CMS to Vercel Production
  deploy-payload:
    name: Deploy Payload CMS to Production
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: build
    environment:
      name: production-payload
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-production
          path: .

      - name: Deploy to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          org-id: ${{ secrets.VERCEL_ORG_ID }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID_PAYLOAD }}
          environment: production
          build-artifacts: true
          health-check-url: /api/health
          health-check-timeout: 120
          protection-bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production-payload',
              required_contexts: [],
              auto_merge: false,
              production_environment: true
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Payload CMS deployed to production'
            });

  # Post-deployment monitoring
  health-check:
    name: Production Health Check
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [deploy-web, deploy-payload]
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment propagation
        run: sleep 30

      - name: Check production web health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ needs.deploy-web.outputs.url }}/healthcheck)
          if [ $response -eq 200 ]; then
            echo "✅ Production web health check passed"
          else
            echo "❌ Production web health check failed with status $response"
            exit 1
          fi

      - name: Check production payload health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ needs.deploy-payload.outputs.url }}/api/health)
          if [ $response -eq 200 ]; then
            echo "✅ Production payload health check passed"
          else
            echo "❌ Production payload health check failed with status $response"
            exit 1
          fi

      - name: Run critical path tests
        run: |
          echo "Critical path testing will be implemented"
          # TODO: Implement critical path E2E tests

  # Production DAST security scan (informational only)
  production-security-scan:
    name: Production Security Monitoring
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-payload, health-check]
    continue-on-error: true  # Never block production
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      
      - name: Run Nuclei quick scan
        uses: ./.github/actions/nuclei-scan
        with:
          target: ${{ needs.deploy-web.outputs.url }}
          scan-type: 'quick'  # Quick scan only for production
          severity: 'critical,high'
          fail-on-severity: 'none'  # Never fail production
      
      - name: Log security metrics
        if: always()
        run: |
          echo "📊 Production Security Scan Metrics"
          echo "Critical: ${VULN_CRITICAL:-0}"
          echo "High: ${VULN_HIGH:-0}"
          
          # Send metrics to monitoring (when configured)
          # TODO: Send to DataDog/New Relic/CloudWatch

  # Notify monitoring services
  notify-monitoring:
    name: Notify Monitoring Services
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [deploy-web, deploy-payload]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: ./.github/actions/newrelic-notify
        with:
          api-key: ${{ secrets.NEW_RELIC_API_KEY }}
          app-id: ${{ secrets.NEW_RELIC_APP_ID }}
          account-id: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          insert-key: ${{ secrets.NEW_RELIC_INSERT_KEY }}
          environment: production
          deployment-url: ${{ needs.deploy-web.outputs.url }}

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '🚀 Production deployment completed successfully!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: 'repo,commit,author'

  # Auto-rollback workflow
  auto-rollback:
    name: Auto Rollback
    needs: deploy-web
    uses: ./.github/workflows/auto-rollback.yml
    with:
      environment: production
      deployment_url: ${{ needs.deploy-web.outputs.url }}
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}