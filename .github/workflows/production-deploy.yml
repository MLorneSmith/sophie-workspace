name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Check if validation is needed
  check-validation:
    name: Check if validation needed
    runs-on: ubicloud-standard-2
    outputs:
      should-validate: ${{ steps.check.outputs.should-validate }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check if already validated
        id: check
        run: |
          # Skip validation if this commit was already validated in staging
          COMMIT=${{ github.sha }}
          
          # Check if this is a merge commit from staging
          if git log --format=%B -n 1 | grep -q "Merge.*staging"; then
            echo "This is a merge from staging, validation already done"
            echo "should-validate=false" >> $GITHUB_OUTPUT
          else
            echo "This is a direct push to main, validation needed"
            echo "should-validate=true" >> $GITHUB_OUTPUT
          fi

  # Final security check
  security-check:
    name: Final Security Check
    runs-on: ubicloud-standard-2
    needs: check-validation
    if: needs.check-validation.outputs.should-validate == 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Run security checks
        run: |
          echo "Running final security checks"
          # TODO: Implement comprehensive security scan
          # - Secret scanning with TruffleHog
          # - Dependency vulnerabilities with Aikido Security (see issue #163)
          # - SAST with CodeQL

  # Build application once
  build:
    name: Build Application
    needs: [check-validation, security-check]
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/reusable-build.yml
    with:
      environment: production

  # Deploy to Vercel Production
  deploy:
    name: Deploy to Production
    runs-on: ubicloud-standard-2
    needs: build
    environment:
      name: production
      url: https://slideheroes.com
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-production
          path: .

      - name: Deploy to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          org-id: ${{ secrets.VERCEL_ORG_ID }}
          project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          environment: production
          build-artifacts: true
          health-check-url: /api/health
          health-check-timeout: 120

      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              required_contexts: [],
              auto_merge: false,
              production_environment: true
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Deployed to production'
            });

  # Post-deployment monitoring
  health-check:
    name: Production Health Check
    runs-on: ubicloud-standard-2
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment propagation
        run: sleep 30

      - name: Check production health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ needs.deploy.outputs.url }}/api/health)
          if [ $response -eq 200 ]; then
            echo "✅ Production health check passed"
          else
            echo "❌ Production health check failed with status $response"
            exit 1
          fi

      - name: Run critical path tests
        run: |
          echo "Running critical user path validations"
          # TODO: Implement critical path E2E tests

  # Notify monitoring services
  notify:
    name: Notify Services
    runs-on: ubicloud-standard-2
    needs: [deploy, health-check]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Notify New Relic
        if: needs.health-check.result == 'success'
        uses: ./.github/actions/newrelic-notify
        with:
          api-key: ${{ secrets.NEW_RELIC_API_KEY }}
          app-id: ${{ secrets.NEW_RELIC_APP_ID }}
          account-id: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          insert-key: ${{ secrets.NEW_RELIC_INSERT_KEY }}
          environment: production
          deployment-url: ${{ needs.deploy.outputs.url }}
          health-check-status: ${{ needs.health-check.result }}

      - name: Notify Slack
        if: always()
        run: |
          if [ "${{ needs.health-check.result }}" == "success" ]; then
            echo "✅ Production deployment successful"
            # TODO: Send success notification to Slack
          else
            echo "❌ Production deployment failed"
            # TODO: Send failure notification to Slack
          fi

  # Auto-rollback workflow
  auto-rollback:
    name: Auto Rollback
    needs: deploy
    uses: ./.github/workflows/auto-rollback.yml
    with:
      environment: production
      deployment_url: ${{ needs.deploy.outputs.url }}
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # Create issue on rollback
  rollback-issue:
    name: Create Rollback Issue
    runs-on: ubicloud-standard-2
    needs: auto-rollback
    if: needs.auto-rollback.result == 'failure'
    steps:
      - name: Create rollback issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[URGENT] Production deployment failed - ${context.sha}`,
              body: `## Production Deployment Failure
              
              **Commit**: ${context.sha}
              **Actor**: ${context.actor}
              **Time**: ${new Date().toISOString()}
              
              ### Actions Taken
              - ✅ Automatic rollback initiated
              - ✅ Team notified
              
              ### Next Steps
              1. Check deployment logs
              2. Review health check failures
              3. Fix issues and redeploy
              
              cc @${context.actor}`,
              labels: ['bug', 'production', 'urgent']
            });