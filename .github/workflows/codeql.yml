name: CodeQL Security Analysis

on:
  schedule:
    # Run CodeQL analysis weekly on Sundays at 2 AM UTC
    # Semgrep handles PR/push scanning; CodeQL provides GitHub Security tab integration
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
        # CodeQL supports: 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Initializes the CodeQL tools for scanning
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list here with "+" to use these queries and those in the config file.
          
          # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          queries: security-extended,security-and-quality
          
          # Include queries for common web vulnerabilities
          config: |
            name: "SlideHeroes Security Configuration"
            queries:
              - uses: security-extended
              - uses: security-and-quality
            paths-ignore:
              - node_modules
              - .next
              - .turbo
              - dist
              - build
              - coverage
              - '**/*.test.ts'
              - '**/*.test.tsx'
              - '**/*.spec.ts'
              - '**/*.spec.tsx'
              - '**/__tests__/**'
              - '**/__mocks__/**'

      # Autobuild attempts to build any compiled languages (C/C++, C#, Go, Java, or Swift).
      # If this step fails, then remove it and run the build manually
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      # Performs the CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
          
      # Upload SARIF file to GitHub Security tab
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        
      # Comment on PR with security findings (only on PRs)
      - name: Comment Security Results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            
            // Get the workflow run URL
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`;
            
            // Create a comment about the security scan
            const comment = `## 🔒 CodeQL Security Analysis
            
            Security scan has completed for this pull request.
            
            **Language analyzed**: ${{ matrix.language }}
            **Query suites**: security-extended, security-and-quality
            
            View detailed results in the [Security tab](${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/security/code-scanning) or [workflow run](${runUrl}).
            
            If any security issues are found, they will appear as annotations on the changed files.`;
            
            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr,
            });
            
            const botComment = comments.data.find(
              c => c.user.type === 'Bot' && c.body.includes('CodeQL Security Analysis')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr,
                body: comment
              });
            }

      # Create a summary for scheduled runs
      - name: Create Summary for Scheduled Runs
        if: github.event_name == 'schedule'
        run: |
          echo "## 🔒 Scheduled CodeQL Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Language**: ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Security scan completed. Check the [Security tab](https://github.com/${{ github.repository }}/security/code-scanning) for any findings." >> $GITHUB_STEP_SUMMARY