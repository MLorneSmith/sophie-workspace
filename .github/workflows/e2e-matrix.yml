name: E2E Test Matrix

on:
  # Only run on pushes to main branches, not on PRs (smart tests handle PRs)
  push:
    branches: [main, staging]
    paths:
      - 'apps/web/**'
      - 'apps/e2e/**'
      - 'packages/**'
  schedule:
    # Run full E2E suite nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      browser_matrix:
        description: 'Browser matrix to run'
        required: false
        default: 'chromium,firefox,webkit'
        type: choice
        options:
          - 'chromium'
          - 'firefox'
          - 'webkit'
          - 'chromium,firefox'
          - 'chromium,firefox,webkit'
          - 'mobile'
          - 'all'

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_ENABLED: true

jobs:
  # Determine what browser configurations to test
  matrix-config:
    name: Configure Test Matrix
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    outputs:
      browsers: ${{ steps.config.outputs.browsers }}
      should_run: ${{ steps.config.outputs.should_run }}
    steps:
      - name: Configure matrix
        id: config
        run: |
          echo "E2E Matrix Test triggered by: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          
          # Default browser matrix for different triggers
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            BROWSERS='["chromium", "firefox", "webkit", "Mobile Chrome", "Mobile Safari", "Tablet Chrome"]'
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT="${{ github.event.inputs.browser_matrix }}"
            case "$INPUT" in
              "all")
                BROWSERS='["chromium", "firefox", "webkit", "Mobile Chrome", "Mobile Safari", "Mobile Firefox", "Tablet Chrome", "Tablet Safari"]'
                ;;
              "mobile")
                BROWSERS='["Mobile Chrome", "Mobile Safari", "Mobile Firefox"]'
                ;;
              "chromium")
                BROWSERS='["chromium"]'
                ;;
              "firefox")
                BROWSERS='["firefox"]'
                ;;
              "webkit")
                BROWSERS='["webkit"]'
                ;;
              "chromium,firefox")
                BROWSERS='["chromium", "firefox"]'
                ;;
              "chromium,firefox,webkit")
                BROWSERS='["chromium", "firefox", "webkit"]'
                ;;
              *)
                BROWSERS='["chromium", "firefox", "webkit"]'
                ;;
            esac
          elif [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Full suite for main branch
            BROWSERS='["chromium", "firefox", "webkit", "Mobile Chrome", "Mobile Safari"]'
          else
            # PR validation - core browsers only
            BROWSERS='["chromium", "firefox"]'
          fi
          
          echo "browsers=$BROWSERS" >> $GITHUB_OUTPUT
          echo "should_run=true" >> $GITHUB_OUTPUT

  # E2E tests with browser matrix and sharding
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }} - Shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-x64
    needs: matrix-config
    if: needs.matrix-config.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(needs.matrix-config.outputs.browsers) }}
        shard: [1, 2]  # Split tests into 2 shards for parallel execution
    env:
      # E2E Database Configuration - Local Supabase instance
      SUPABASE_URL: 'http://127.0.0.1:55321'
      NEXT_PUBLIC_SUPABASE_URL: 'http://127.0.0.1:55321'
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0'
      NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0'
      SUPABASE_SERVICE_ROLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU'
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:55322/postgres'
      DATABASE_URI: 'postgresql://postgres:postgres@localhost:55322/postgres'
      
      # Test environment configuration
      SUPABASE_DB_WEBHOOK_SECRET: 'test_webhook_secret'
      STRIPE_SECRET_KEY: 'sk_test_dummy'
      STRIPE_WEBHOOK_SECRET: 'whsec_test_dummy'
      DO_NOT_TRACK: 1
      PLAYWRIGHT_WEB_COMMAND: 'pnpm --filter=web dev:test'
      PLAYWRIGHT_PAYLOAD_COMMAND: 'pnpm --filter=payload dev:test'
      
      # Required for app to start
      NEXT_PUBLIC_BILLING_PROVIDER: 'stripe'
      PAYLOAD_PUBLIC_SERVER_URL: 'http://localhost:3020'
      PAYLOAD_SECRET: 'test_payload_secret_for_e2e_testing'
      NODE_ENV: 'test'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: ./.github/actions/setup-deps

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Playwright browsers
        run: |
          # Install browsers based on matrix configuration
          if [[ "${{ matrix.browser }}" == "chromium" ]]; then
            pnpm --filter web-e2e exec playwright install chromium --with-deps
          elif [[ "${{ matrix.browser }}" == "firefox" ]]; then
            pnpm --filter web-e2e exec playwright install firefox --with-deps
          elif [[ "${{ matrix.browser }}" == "webkit" ]]; then
            pnpm --filter web-e2e exec playwright install webkit --with-deps
          elif [[ "${{ matrix.browser }}" == *"Mobile"* ]] || [[ "${{ matrix.browser }}" == *"Tablet"* ]]; then
            # Mobile and tablet tests use chromium or webkit engines
            if [[ "${{ matrix.browser }}" == *"Safari"* ]]; then
              pnpm --filter web-e2e exec playwright install webkit --with-deps
            else
              pnpm --filter web-e2e exec playwright install chromium --with-deps
            fi
          else
            pnpm --filter web-e2e exec playwright install --with-deps
          fi

      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            apps/web/.next
            apps/payload/dist
            packages/*/dist
            .turbo
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build application
        run: |
          # Use Turbo cache for faster builds
          pnpm build --cache-dir=.turbo

      - name: Cache Supabase Docker images
        uses: actions/cache@v4
        with:
          path: |
            ~/.docker
            ~/Library/Containers/com.docker.docker/Data
          key: ${{ runner.os }}-supabase-docker-${{ hashFiles('apps/e2e/supabase/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-supabase-docker-

      - name: Set up E2E database
        run: |
          cd apps/e2e
          # Start E2E Supabase instance (uses cached Docker images)
          echo "Starting Supabase..."
          supabase start --ignore-health-check
          
          # Quick health check with timeout
          echo "Checking database health..."
          for i in {1..15}; do
            if supabase status 2>/dev/null | grep -q "API URL"; then
              echo "✓ Database is ready after $i checks"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "⚠️ Database health check timeout, proceeding anyway"
            fi
            sleep 1
          done
          
          # Run migrations in parallel with health check
          echo "Applying migrations..."
          supabase db reset --no-seed
          
          # Quick seed if needed
          if [ -f "./supabase/seed.sql" ]; then
            supabase db seed
          fi

      - name: Run E2E tests
        run: |
          cd apps/e2e
          # Run tests for specific browser project with sharding
          # The blob reporter is already configured in playwright.config.ts for CI
          echo "Running shard ${{ matrix.shard }} of 2 for ${{ matrix.browser }}"
          pnpm playwright test --project="${{ matrix.browser }}" --shard=${{ matrix.shard }}/2
        continue-on-error: false
        env:
          # Optimized Playwright timeouts for CI
          PLAYWRIGHT_NAVIGATION_TIMEOUT: 30000
          PLAYWRIGHT_ACTION_TIMEOUT: 15000
          # Enable parallel test execution
          PLAYWRIGHT_WORKERS: 4

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.browser }}-shard-${{ matrix.shard }}-${{ github.run_id }}
          path: |
            apps/e2e/test-results/
            apps/e2e/playwright-report/
            apps/e2e/blob-report/
          retention-days: 7

      - name: Upload screenshots and videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-artifacts-${{ matrix.browser }}-shard-${{ matrix.shard }}-${{ github.run_id }}
          path: |
            apps/e2e/test-results/
            apps/e2e/playwright-report/
          retention-days: 30

  # Merge test results and create unified report
  merge-reports:
    name: Merge Test Reports
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-x64
    needs: e2e-tests
    if: always() && needs.e2e-tests.result != 'skipped'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: merged-reports
          pattern: e2e-results-*-shard-*-${{ github.run_id }}

      - name: Merge Playwright reports
        run: |
          cd apps/e2e
          # Install Playwright for report merging
          pnpm exec playwright install --with-deps
          
          # Create directory for blob reports
          mkdir -p ./blob-reports
          
          # Find and copy all blob report files from downloaded artifacts
          find ../../merged-reports -path "*/blob-report/*.zip" -type f | while read zipfile; do
            echo "Processing: $zipfile"
            cp "$zipfile" ./blob-reports/
          done
          
          # Check if any blob reports were found
          if [ -z "$(ls -A ./blob-reports 2>/dev/null)" ]; then
            echo "No blob reports found in merged-reports"
            exit 1
          fi
          
          # Create unified HTML report
          pnpm playwright merge-reports --reporter html ./blob-reports/

      - name: Upload unified report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unified-e2e-report-${{ github.run_id }}
          path: apps/e2e/playwright-report/
          retention-days: 30

      - name: Create test summary
        if: always()
        run: |
          echo "## 🎭 E2E Test Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Full browser matrix tested (Desktop & Mobile)" >> $GITHUB_STEP_SUMMARY
          echo "- Sharding enabled for parallel execution" >> $GITHUB_STEP_SUMMARY
          echo "- Download artifacts for detailed results" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR with test results  
        uses: actions/github-script@v7
        if: false  # Disabled - PRs now use smart tests instead
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Count test results
            let totalPassed = 0;
            let totalFailed = 0;
            let browsers = [];
            
            try {
              const reportPath = 'apps/e2e/playwright-report';
              if (fs.existsSync(reportPath)) {
                browsers = ${{ toJson(needs.matrix-config.outputs.browsers) }};
                
                const comment = `## 🎭 E2E Test Matrix Results
                
                **Browsers Tested**: ${browsers.join(', ')}
                
                📊 **Unified Report**: Download the \`unified-e2e-report-${{ github.run_id }}\` artifact to view detailed results across all browsers.
                
                🔍 **Matrix Coverage**:
                - **Desktop**: Chrome, Firefox, Safari
                - **Mobile**: Chrome, Safari, Firefox  
                - **Tablet**: Chrome, Safari
                
                ${totalFailed > 0 ? '❌ **Some tests failed** - Please review the failures before merging.' : '✅ **All tests passed** - Ready for deployment!'}
                
                📱 **Device Testing**: This PR was tested across multiple viewports to ensure responsive compatibility.`;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (error) {
              console.log('Could not post E2E comment:', error);
            }

  # Final status check
  e2e-status:
    name: E2E Status Check
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [matrix-config, e2e-tests, merge-reports]
    if: always()
    steps:
      - name: Check E2E test status
        run: |
          if [[ "${{ needs.matrix-config.outputs.should_run }}" != "true" ]]; then
            echo "✅ E2E tests skipped (no relevant changes)"
            exit 0
          elif [[ "${{ needs.e2e-tests.result }}" == "failure" ]]; then
            echo "❌ E2E tests failed across browser matrix"
            exit 1
          elif [[ "${{ needs.e2e-tests.result }}" == "success" ]]; then
            echo "✅ E2E tests passed across all browsers in matrix"
            exit 0
          else
            echo "⚠️ E2E tests completed with warnings"
            exit 0
          fi