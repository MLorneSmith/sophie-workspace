name: Codespaces Prebuild

on:
  push:
    branches:
      - main
      - dev
  schedule:
    # Run daily at 2 AM UTC to keep prebuilds fresh
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  prebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and cache app container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/devcontainer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and cache e2e container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile.e2e
          push: true
          tags: ghcr.io/${{ github.repository }}/devcontainer-e2e:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and cache mcp container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile.mcp
          push: true
          tags: ghcr.io/${{ github.repository }}/devcontainer-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64