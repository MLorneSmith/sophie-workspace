name: E2E Smart Tests

on:
  pull_request:
    branches: [main, staging, dev]
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/web/**'
      - 'apps/e2e/**'
      - 'packages/**'

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.12.0'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_ENABLED: true

jobs:
  # Detect which tests need to run based on changed files
  detect-changes:
    name: Detect Test Scope
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    outputs:
      run_auth: ${{ steps.detect.outputs.auth }}
      run_billing: ${{ steps.detect.outputs.billing }}
      run_account: ${{ steps.detect.outputs.account }}
      run_all: ${{ steps.detect.outputs.all }}
      test_pattern: ${{ steps.detect.outputs.pattern }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: detect
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          # Default to not running specific tests
          RUN_AUTH=false
          RUN_BILLING=false
          RUN_ACCOUNT=false
          RUN_ALL=false
          TEST_PATTERN=""
          
          # Check for specific module changes
          if echo "$CHANGED_FILES" | grep -qE "(apps/web|packages)/.*(auth|sign-in|sign-up)"; then
            RUN_AUTH=true
            TEST_PATTERN="${TEST_PATTERN}auth|"
          fi
          
          if echo "$CHANGED_FILES" | grep -qE "(apps/web|packages)/.*(billing|stripe|payment|subscription)"; then
            RUN_BILLING=true
            TEST_PATTERN="${TEST_PATTERN}billing|"
          fi
          
          if echo "$CHANGED_FILES" | grep -qE "(apps/web|packages)/.*(account|profile|settings)"; then
            RUN_ACCOUNT=true
            TEST_PATTERN="${TEST_PATTERN}account|"
          fi
          
          # If E2E test files changed or major changes, run all tests
          if echo "$CHANGED_FILES" | grep -qE "apps/e2e/.*\.spec\.ts|packages/supabase|packages/shared"; then
            RUN_ALL=true
            TEST_PATTERN=".*"
          fi
          
          # Clean up pattern
          TEST_PATTERN=${TEST_PATTERN%|}
          if [ -z "$TEST_PATTERN" ]; then
            TEST_PATTERN=".*"
            RUN_ALL=true
          fi
          
          echo "auth=$RUN_AUTH" >> $GITHUB_OUTPUT
          echo "billing=$RUN_BILLING" >> $GITHUB_OUTPUT
          echo "account=$RUN_ACCOUNT" >> $GITHUB_OUTPUT
          echo "all=$RUN_ALL" >> $GITHUB_OUTPUT
          echo "pattern=$TEST_PATTERN" >> $GITHUB_OUTPUT
          
          echo "Changed files detected. Test pattern: $TEST_PATTERN"

  # Quick smoke test for targeted changes
  quick-test:
    name: Quick E2E Test (${{ needs.detect-changes.outputs.test_pattern }})
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-x64
    needs: detect-changes
    if: needs.detect-changes.outputs.run_all != 'true'
    env:
      SUPABASE_URL: 'http://127.0.0.1:55321'
      NEXT_PUBLIC_SUPABASE_URL: 'http://127.0.0.1:55321'
      SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0'
      NEXT_PUBLIC_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0'
      SUPABASE_SERVICE_ROLE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU'
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:55322/postgres'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Playwright (Chromium only)
        run: pnpm --filter web-e2e exec playwright install chromium --with-deps

      - name: Build application (with cache)
        run: pnpm build --cache-dir=.turbo

      - name: Quick database setup
        run: |
          cd apps/e2e
          supabase start --ignore-health-check
          supabase db reset --no-seed

      - name: Run targeted tests
        run: |
          cd apps/e2e
          echo "Running tests matching pattern: ${{ needs.detect-changes.outputs.test_pattern }}"
          pnpm playwright test --project=chromium --grep "${{ needs.detect-changes.outputs.test_pattern }}"
        env:
          PLAYWRIGHT_WORKERS: 4

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: quick-test-results-${{ github.run_id }}
          path: apps/e2e/test-results/
          retention-days: 7

  # Status check for PR
  smart-test-status:
    name: Smart Test Status
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64
    needs: [detect-changes, quick-test]
    if: always()
    steps:
      - name: Check test status
        run: |
          if [[ "${{ needs.quick-test.result }}" == "failure" ]]; then
            echo "❌ Smart E2E tests failed"
            exit 1
          elif [[ "${{ needs.quick-test.result }}" == "success" ]]; then
            echo "✅ Smart E2E tests passed for changed files"
            exit 0
          else
            echo "⚠️ Smart E2E tests skipped or incomplete"
            exit 0
          fi