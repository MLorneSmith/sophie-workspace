name: Deploy to Dev v2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-deps
      
      - name: Build application
        run: pnpm build
        
      - name: Deploy status
        run: echo "Deploy complete"