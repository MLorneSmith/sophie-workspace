# BPM Onboarding Campaign Manifest
# This file describes the campaign structure and sequence for Claude to understand
# the narrative arc and email relationships.
---
campaign:
  name: "Business Presentation Mastery Onboarding"
  slug: "bpm-onboarding"
  short_name: "BPM"

  description: |
    16-email onboarding sequence for new SlideHeroes subscribers who signed up
    for "Lesson Zero" of the Decks for Decision Makers (DDM) course. The sequence
    builds trust through massive free value delivery while teaching the core
    presentation framework.

  trigger: "Lesson Zero signup at SlideHeroes"

  audience: |
    Business professionals who need to create high-stakes presentations:
    - Corporate employees presenting to executives
    - Consultants creating client deliverables
    - Entrepreneurs pitching to investors
    - Anyone who wants McKinsey-style presentation skills

  goals:
    - Build trust and relationship through generous free content
    - Establish credibility through case studies and social proof
    - Address objections early (DDM Errors & Omissions)
    - Teach the 5S framework (Structure, Story, Substance, Style, Self-Confidence)
    - Warm subscribers for eventual DDM course offer

  narrative_arc: |
    Phase 1 - Welcome & Framework Introduction (Emails 1-5):
      Start with warm welcome and immediate value (free template + manifesto).
      Introduce "Presentations Reinvented" framework across 3-part series.
      Deliver blueprint summarizing the methodology.

    Phase 2 - Credibility & Objection Handling (Emails 6-9):
      Case study: Consultant critique (entertaining + expertise demo).
      Why presentation skills matter in the digital age.
      Case study: US Department of Energy (prestigious client proof).
      DDM Errors & Omissions (transparent objection handling).

    Phase 3 - The 5S Framework Deep Dive (Emails 10-16):
      Introduce the 5S methodology overview.
      Deep dive into each element:
      - Structure: The backbone of clear communication
      - Story: The Wise Man & the Cup (storytelling power)
      - Substance: Statistical visualization (2-part series)
      - Style: Ancient Buddha presentation secret
      - Self-Confidence: Conquering presentation fear

  cadence: "Daily emails for approximately 2-3 weeks"

  subject_line_patterns:
    welcome: "Welcome to SlideHeroes"
    bpm_series: "[BPM] {topic}"
    five_s_series: "[5S] {element}: {specific topic}"

# Email Sequence
# Each email includes its position, purpose, and role in the narrative
emails:
  - position: 1
    file: "01-welcome-to-slideheroes.yaml"
    subject: "Welcome to SlideHeroes"
    phase: "welcome"
    purpose: |
      Welcome new subscriber, set expectations for BPM series, deliver immediate
      value through free PowerPoint template (1000+ slides) and 10,000-word manifesto.
      Establish no-sell trust building approach.
    techniques:
      - "Social proof stacking (company names)"
      - "Testimonial integration"
      - "Multiple P.S. value bombs"
      - "Expectation setting"

  - position: 2
    file: "02-presentations-reinvented-1.yaml"
    subject: "[BPM] Presentations Reinvented (1 of 3)"
    phase: "framework"
    purpose: |
      Begin the core framework introduction. Part 1 of trilogy that establishes
      the intellectual foundation for the SlideHeroes methodology.
    techniques:
      - "Open loop (trilogy structure)"
      - "Educational content"
      - "Framework introduction"

  - position: 3
    file: "03-presentations-reinvented-2.yaml"
    subject: "[BPM] Presentations Reinvented (2 of 3)"
    phase: "framework"
    purpose: "Continue framework development. Build on Part 1 concepts."
    techniques:
      - "Callback to previous email"
      - "Deepening understanding"
      - "Open loop maintained"

  - position: 4
    file: "04-presentations-reinvented-3.yaml"
    subject: "[BPM] Presentations Reinvented (3 of 3)"
    phase: "framework"
    purpose: "Complete the trilogy. Close the open loop from Part 1."
    techniques:
      - "Loop closure"
      - "Framework completion"
      - "Setup for next phase"

  - position: 5
    file: "05-presentations-reinvented-blueprint.yaml"
    subject: "[BPM] Presentations Reinvented: The Blueprint"
    phase: "framework"
    purpose: |
      Summary and actionable blueprint from the trilogy. Transition piece
      between framework introduction and credibility building.
    techniques:
      - "Recap and synthesis"
      - "Actionable takeaways"
      - "Bridge content"

  - position: 6
    file: "06-case-study-consultant.yaml"
    subject: "[BPM] Case Study: Consultant Tricks Exposed"
    phase: "credibility"
    purpose: |
      Entertaining case study critiquing consultant presentation. Demonstrates
      expertise while being engaging. Shows what NOT to do.
    techniques:
      - "Tear-down format"
      - "Entertainment value"
      - "Expertise demonstration"
      - "Pattern interrupt"

  - position: 7
    file: "07-digital-age-skills-critical.yaml"
    subject: "[BPM] Digital Age -> Presentation Skills Critical"
    phase: "credibility"
    purpose: |
      Establish urgency and relevance. Why these skills matter NOW in the
      current business environment. Stakes elevation.
    techniques:
      - "Timely relevance"
      - "Future pacing"
      - "Stakes elevation"

  - position: 8
    file: "08-case-study-doe.yaml"
    subject: "[BPM] Case Study: Upskilling US Dep't of Energy"
    phase: "credibility"
    purpose: |
      Real-world case study demonstrating DDM success with prestigious
      government client. Social proof through results.
    techniques:
      - "Case study format"
      - "Authority building"
      - "Results focus"
      - "Prestigious client name-drop"

  - position: 9
    file: "09-ddm-errors-omissions.yaml"
    subject: "DDM Errors & Omissions"
    phase: "credibility"
    purpose: |
      Transparently address common questions/objections about DDM course.
      Build trust through honesty about limitations. Pre-emptive objection handling.
    techniques:
      - "Objection handling"
      - "Transparency"
      - "Trust building"
      - "Authenticity"

  - position: 10
    file: "10-5s-intro.yaml"
    subject: "[5S] Structure, Story, Substance, Style & Self-Confidence"
    phase: "5s-framework"
    purpose: |
      Introduce the 5S framework that will be explored over the next emails.
      Overview of all five elements before deep dives.
    techniques:
      - "Framework reveal"
      - "Preview/anticipation"
      - "Mnemonic structure"

  - position: 11
    file: "11-5s-structure.yaml"
    subject: "[5S] Presentations & Structure"
    phase: "5s-framework"
    purpose: |
      Deep dive into Structure - the first S. How to organize presentations
      for clarity and impact.
    techniques:
      - "Educational deep-dive"
      - "Practical examples"
      - "Actionable advice"

  - position: 12
    file: "12-5s-story.yaml"
    subject: "[5S] Presentations & Story: The Wise Man & the Cup"
    phase: "5s-framework"
    purpose: |
      Deep dive into Story - the second S. Uses parable format to teach
      storytelling principles.
    techniques:
      - "Story-driven teaching"
      - "Parable/metaphor"
      - "Memorable illustration"

  - position: 13
    file: "13-5s-substance-1.yaml"
    subject: "[5S] Substance: The Best Statistical Chart Ever"
    phase: "5s-framework"
    purpose: |
      Deep dive into Substance (Part 1) - the third S. Focus on data
      visualization and statistical communication.
    techniques:
      - "Visual example"
      - "Best-in-class showcase"
      - "Open loop (Part 2 coming)"

  - position: 14
    file: "14-5s-substance-2.yaml"
    subject: "[5S] Substance: Best Stats I Have Ever Seen Part 2"
    phase: "5s-framework"
    purpose: "Continue Substance exploration. More data visualization examples."
    techniques:
      - "Continuation"
      - "Multiple examples"
      - "Pattern recognition"

  - position: 15
    file: "15-5s-style.yaml"
    subject: "[5S] Style: An Ancient Buddha Presentation Secret"
    phase: "5s-framework"
    purpose: |
      Deep dive into Style - the fourth S. Uses ancient wisdom/cultural
      reference to teach visual design principles.
    techniques:
      - "Cultural reference hook"
      - "Unexpected wisdom source"
      - "Design principles"

  - position: 16
    file: "16-5s-self-confidence.yaml"
    subject: "[5S] Self Confidence: Conquering the Fear"
    phase: "5s-framework"
    purpose: |
      Deep dive into Self-Confidence - the fifth and final S. Addresses
      presentation anxiety and performance. Campaign conclusion.
    techniques:
      - "Empathy/relatability"
      - "Practical tactics"
      - "Framework completion"
      - "Series conclusion"

# Metrics and notes for optimization
notes: |
  This campaign was built following Andre Chaperon's "Art of Email" methodology:
  - Massive upfront value before any ask
  - Educational content that demonstrates expertise
  - Story-driven teaching with memorable hooks
  - Natural progression from value to offer

  Campaign structure insight:
  - Credibility phase (6-9) comes BEFORE deep educational content (10-16)
  - This builds trust and handles objections early
  - By the time 5S deep dives start, subscriber is already bought-in

  Key techniques used throughout:
  - Open loops between related emails
  - Subject line patterns for recognition ([BPM], [5S])
  - Multiple P.S. sections for secondary CTAs
  - Case studies for social proof
  - Cultural/historical references for hooks
