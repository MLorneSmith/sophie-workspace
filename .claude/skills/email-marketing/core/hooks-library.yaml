# Andre Chaperon - Hooks Library
# Categorized hook examples extracted from annotated email corpus
# Version: 1.0.0
# Last Updated: 2026-01-26

metadata:
  total_hooks: 45
  categories: 8
  source: "83 annotated emails from LEM, ARM, EMN, TWN, MMS campaigns"

# =============================================================================
# HOOK CATEGORIES
# =============================================================================

hooks:

  # ---------------------------------------------------------------------------
  # PERSONAL ANECDOTE
  # Stories from personal experience that create relatability
  # ---------------------------------------------------------------------------
  personal_anecdote:
    description: |
      Stories from personal experience that create relatability and trust.
      Use specific details (day, place, sensory elements) to ground the story.
      Vulnerability or admission of struggle increases connection.

    characteristics:
      - "Specific details (day, time, place, sensory elements)"
      - "Vulnerability or admission of struggle"
      - "Unexpected twist or realization"
      - "First-person perspective"

    when_to_use:
      - "Welcome sequences to establish human connection"
      - "Before teaching a lesson (story illustrates the point)"
      - "When building trust before a soft sell"
      - "To make abstract concepts concrete"

    examples:
      - source: "secret-journey"
        hook_text: |
          Hey, it's Andre today...

          Back, upgraded, and a little older...

          Last Tuesday, I turned 50 (while downhill skiing on foggy Sierra
          Nevada slops, a version of extreme sports, as it turned out)...
        why_it_works: "Vulnerability (aging) + specific activity creates intimacy"
        connects_to: "Life as a three-act structure framework"

      - source: "arm-domino-effect"
        hook_text: |
          I believe the reality is that there are a lot of people that just
          look to buy courses.

          ... because secretly they can keep pushing off the day they
          actually "scratch the ticket" to see if they have a zero or a
          hero.
        why_it_works: "Calls out behavior reader may recognize in themselves"
        connects_to: "Motivational push to take imperfect action"

      - source: "tw-new-frontier"
        hook_text: |
          Hey, it's Andre...

          Glad you made it, I've been waiting for you.
        why_it_works: "Creates sense of personal welcome, reader feels expected"
        connects_to: "Welcome sequence establishing relationship"

  # ---------------------------------------------------------------------------
  # CONTRARIAN
  # Challenges conventional wisdom to create intrigue
  # ---------------------------------------------------------------------------
  contrarian:
    description: |
      Challenges conventional wisdom to create intrigue and pattern interrupt.
      The reader expects one thing, but you deliver the opposite perspective.
      Bold stance differentiates from typical marketing noise.

    characteristics:
      - "Direct opposition to common belief"
      - "Confident, assertive tone"
      - "Promise of alternative perspective"
      - "Often followed by evidence or reasoning"

    when_to_use:
      - "When you have genuine insight that contradicts popular advice"
      - "To differentiate from competitors"
      - "Subject lines to drive opens"
      - "After establishing credibility (so contrarian stance is trusted)"

    examples:
      - source: "emn-aristotle-bruce-lee"
        hook_text: |
          There's no shortage of interviews, books and courses by writers
          for writers.

          [Lists authorities: Aristotle, Campbell, McKee, King...]

          But here's the thing we've learned the hard way over and over
          again - better, more persuasive writing doesn't happen because
          you have dozens of tools in your writing toolbox.
        why_it_works: "Stacks authority before pivoting - reader trusts the contrarian take"
        connects_to: "Bruce Lee 'one kick 10,000 times' lesson"

      - source: "emn-courage-perseverance"
        hook_text: |
          There are a lot of people selling easy in our little corner of
          the universe.

          But easy is a myth; smoke and mirrors.
        why_it_works: "Differentiates from get-rich-quick competitors"
        connects_to: "Courage and perseverance framework"

      - source: "emn-reveal-hand-raise"
        hook_text: |
          Copywriting has its own problems.

          The incessant drumbeat of "buy, buy, buy, now, now, now" wears
          your audience down until they stop paying attention.
        why_it_works: "Critiques the very industry they're in - shows self-awareness"
        connects_to: "Writing Masterclass announcement"

  # ---------------------------------------------------------------------------
  # MYSTERY / CURIOSITY GAP
  # Creates tension between what reader knows and wants to know
  # ---------------------------------------------------------------------------
  mystery:
    description: |
      Creates a gap between what the reader knows and what they want to know.
      Unlike open loops which are narrative-based, curiosity gaps can be
      informational - teasing a fact, insight, or revelation.

    characteristics:
      - "Teases valuable information without revealing it"
      - "Often uses words like 'secret', 'reveal', 'discover'"
      - "Specific enough to hook, vague enough to maintain curiosity"
      - "Promise of exclusive or insider knowledge"

    when_to_use:
      - "Subject lines to drive opens"
      - "Opening sentences to hook readers immediately"
      - "Before revealing a key insight or framework"
      - "Multi-part email series"

    examples:
      - source: "lem-evil-experiment"
        hook_text: |
          I ran this "experiment" a number of years ago.

          The results were pretty damn shocking.

          I'm going to share the whole process with you...
        why_it_works: "Vague but dramatic setup creates immediate curiosity"
        connects_to: "Experiment that tripled opt-in rates"

      - source: "secret-journey"
        hook_text: |
          I mentioned a "secret" in the subject of this email, which points
          to an insight available to you on your journey.

          While not sexy, it can't be monetized in a product, but it'll
          carry you to whatever you desire in your pursuit because it's a
          superpower.
        why_it_works: "The secret (consistency) is never explicitly stated - reader keeps guessing"
        connects_to: "James Schramko's 1000th podcast episode"

      - source: "lem-make-hungry"
        hook_text: |
          THE ANSWER TO the subject line is the (SIMPLE) SECRET to creating
          suspense in emails.

          But the big secret is already in this email.

          And it has been sprinkled in clear sight in most of the previous
          emails I've sent you so far.
        why_it_works: "Tells reader the secret is hidden in plain sight - they hunt for it"
        connects_to: "Zeigarnik Effect lesson"

  # ---------------------------------------------------------------------------
  # CULTURAL REFERENCE
  # Movies, books, news, quotes that illuminate a point
  # ---------------------------------------------------------------------------
  cultural_reference:
    description: |
      References to movies, books, news, or famous quotes that illuminate
      a point. Creates shared context and makes abstract concepts concrete
      through familiar stories.

    characteristics:
      - "Reference to widely-known story, movie, or person"
      - "Clear connection to the email's main point"
      - "Often nostalgic or emotionally resonant"
      - "Simplifies complex ideas through analogy"

    when_to_use:
      - "When explaining abstract concepts"
      - "To create emotional resonance"
      - "When your audience shares cultural touchstones"
      - "Sales emails where story softens the pitch"

    examples:
      - source: "mms-leap-of-faith"
        hook_text: |
          Today we're going to journey waaaay back in time to May 24, 1989.

          That was opening day for Indiana Jones and the Last Crusade.

          "It's a leap of faith," Indy whispers to himself as he stares
          into the darkness to face the final challenge.
        why_it_works: "Nostalgic movie reference creates immediate engagement"
        connects_to: "Gap/bridge metaphor for product"

      - source: "emn-aristotle-bruce-lee"
        hook_text: |
          Bruce Lee said it best - "I don't fear the man who has practiced
          10,000 kicks one time, but I do fear the man who has practiced
          one kick 10,000 times."
        why_it_works: "Perfect analogy that encapsulates lesson and is highly shareable"
        connects_to: "Few tools mastered > many tools known"

      - source: "mms-leap-of-faith"
        hook_text: |
          To borrow a phrase we both love from Mark Twain - that's the
          difference between a lightning bug and lightning.
        why_it_works: "Memorable quote elevates the point about systemic vs individual learning"
        connects_to: "Course bundle value proposition"

  # ---------------------------------------------------------------------------
  # VIVID METAPHOR
  # Unexpected comparisons that make concepts click
  # ---------------------------------------------------------------------------
  vivid_metaphor:
    description: |
      Original metaphors that make abstract concepts concrete and memorable.
      The best metaphors are unexpected yet immediately understandable.
      Often poetic or sensory in nature.

    characteristics:
      - "Unexpected comparison"
      - "Sensory or visual language"
      - "Illuminates something familiar in new way"
      - "Often quotable/shareable"

    when_to_use:
      - "When explaining complex or abstract concepts"
      - "To create memorable, quotable content"
      - "When you need to break through reader's defenses"
      - "Pattern interrupts"

    examples:
      - source: "arm-domino-effect"
        hook_text: |
          An unscratched lottery ticket in their warm dark pocket is a seed
          of hope.

          It might be a huge winner.
        why_it_works: "Poetic imagery makes abstract concept of procrastination viscerally felt"
        connects_to: "Motivation to take imperfect action"

      - source: "arm-domino-effect"
        hook_text: |
          But you can't steer a parked car.
        why_it_works: "Simple, vivid image for the impossibility of perfecting without doing"
        connects_to: "Write your first crappy email challenge"

      - source: "emn-courage-perseverance"
        hook_text: |
          But play the old "audience capturing games" perpetuated in our
          circles, and earning the attention and trust will be like wading
          through a mud-soaked marsh - a brutal affair.
        why_it_works: "Sensory image (mud-soaked marsh) creates visceral understanding"
        connects_to: "Why the right audience matters"

      - source: "secret-journey"
        hook_text: |
          André 2.0 would leverage the internet to build his boat and sail
          the digital seas in search of financial freedom and independence.
        why_it_works: "Extended nautical metaphor makes entrepreneurial journey tangible"
        connects_to: "Three-act life structure"

  # ---------------------------------------------------------------------------
  # QUESTION HOOK
  # Questions that engage the reader's mind immediately
  # ---------------------------------------------------------------------------
  question:
    description: |
      Questions that engage the reader's mind and demand a mental response.
      Can be rhetorical, challenging, or curiosity-inducing. Questions have
      10-15% higher engagement than statements.

    characteristics:
      - "Directly addresses reader"
      - "Creates mental engagement (reader answers internally)"
      - "Often challenges assumptions"
      - "Can be rhetorical or require actual response"

    when_to_use:
      - "Subject lines"
      - "Opening sentences"
      - "Before major points (to prime the reader)"
      - "Closing (to prompt replies)"

    examples:
      - source: "emn-courage-perseverance"
        hook_text: |
          What does it really take to do this work?
        why_it_works: "Universal question every entrepreneur asks themselves"
        connects_to: "Courage and perseverance framework"

      - source: "lem-superhero"
        hook_text: |
          Do you notice how his subscribers are PERCEIVING HIM?

          Think about that for a second.

          Because isn't that the whole point?
        why_it_works: "Guides reader to key insight through questions"
        connects_to: "Superhero metaphor for trusted marketers"

      - source: "lem-make-hungry"
        hook_text: |
          Think you know what it is?

          Here's another clue.

          It's the REASON WHY you're still reading.
        why_it_works: "Turns reader into active participant guessing the answer"
        connects_to: "Zeigarnik Effect teaching"

  # ---------------------------------------------------------------------------
  # CUSTOMER STORY
  # Third-party social proof through real customer experiences
  # ---------------------------------------------------------------------------
  customer_story:
    description: |
      Real customer names and experiences create authenticity and social proof.
      More credible than testimonial blocks because woven into narrative.
      Shows transformation rather than just claiming results.

    characteristics:
      - "Real customer name (not anonymous)"
      - "Specific results or transformation"
      - "Direct quotes when possible"
      - "Woven into narrative, not isolated testimonial"

    when_to_use:
      - "When credibility supports your point"
      - "Before soft CTAs"
      - "To show possibility (if they can, you can)"
      - "Mid-sequence after relationship is established"

    examples:
      - source: "lem-superhero"
        hook_text: |
          DAINIS is a new ARM customer.

          He excitedly emailed me the other day to share some results he's
          been having as a new ARM customer.

          "I keep receiving emails every day about how much they love this
          stuff..."
        why_it_works: "Real name + excitement + direct quote creates compelling proof"
        connects_to: "Superhero metaphor and caring philosophy"

      - source: "arm-domino-effect"
        hook_text: |
          Just like Sonja Wieck, who within hours of purchasing ARM, had
          already written an email and sent it out (and got a result):

          Or like Nichole Culver, who just like Sonja, is biased towards
          ACTION over first getting things perfect:
        why_it_works: "Multiple real names show pattern, not exception"
        connects_to: "Call to take imperfect action"

  # ---------------------------------------------------------------------------
  # TRANSPARENCY DECLARATION
  # Radical honesty that disarms and builds trust
  # ---------------------------------------------------------------------------
  transparency:
    description: |
      Radical honesty about intentions, struggles, or process that disarms
      the reader and builds trust. Counter-intuitive because most marketing
      hides these things.

    characteristics:
      - "Admits uncertainty, struggle, or limitation"
      - "Reveals process or behind-the-scenes"
      - "Often explicitly states intentions"
      - "Permission to leave or disagree"

    when_to_use:
      - "Newsletter openers to set honest tone"
      - "Before sales sequences"
      - "When you want to filter audience"
      - "After mistakes or course corrections"

    examples:
      - source: "twn-cards-on-table"
        hook_text: |
          I figured for this inaugural issue, I'll lay my cards on the
          table, face up, and be transparent about my intentions for this
          multi-year project I've embarked on.

          For one, I want to respect your attention...
        why_it_works: "Unusual honesty creates trust and curiosity"
        connects_to: "Newsletter relationship establishment"

      - source: "emn-courage-perseverance"
        hook_text: |
          You don't see the 1,140-word version of this email we wrote
          yesterday that we tossed in the trash...
        why_it_works: "Reveals creative struggle, builds credibility for 'easy is a myth'"
        connects_to: "Anti-easy positioning"

      - source: "twn-cards-on-table"
        hook_text: |
          The unknown, and your job, at this early point in our
          relationship, is to determine if you're one of the "right people"
          or not.

          And if not, no hard feelings...
        why_it_works: "Permission to leave paradoxically increases loyalty"
        connects_to: "Self-selection philosophy"

# =============================================================================
# HOOK DEVELOPMENT GUIDELINES
# =============================================================================

guidelines:

  finding_hooks:
    description: "Where to find hook inspiration"
    sources:
      - "Personal experiences (specific moments, not general stories)"
      - "Cultural references (movies, books, quotes your audience knows)"
      - "Customer stories and feedback"
      - "Contrarian observations about your industry"
      - "Universal human experiences (turning 50, facing fear, etc.)"
      - "Behind-the-scenes moments (struggles, process, failures)"

  testing_hooks:
    description: "How to evaluate if a hook is working"
    questions:
      - "Does it create curiosity without being clickbait?"
      - "Is it specific enough to be interesting?"
      - "Does it connect naturally to the email's main point?"
      - "Would I want to know what comes next?"
      - "Is it authentic to my voice?"

  common_mistakes:
    - "Being too vague (curiosity needs something to grab onto)"
    - "Hooks that don't connect to the email content"
    - "Overusing the same hook type"
    - "Trying to be clever at the expense of clarity"
    - "Generic openings ('I want to tell you a story...')"

  hook_to_body_transitions:
    description: "How to move from hook to main content"
    patterns:
      - "Story hook -> 'Here's why I'm telling you this...'"
      - "Question hook -> Answer or 'The answer might surprise you...'"
      - "Contrarian hook -> 'Here's what I mean...'"
      - "Mystery hook -> Partial reveal, then full reveal later"
      - "Cultural reference -> 'This reminds me of...' or direct analogy"
