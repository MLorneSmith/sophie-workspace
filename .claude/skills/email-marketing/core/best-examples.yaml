      type: "Welcome + anticipation"
      why_effective: "Creates sense of personal welcome and that the reader is expected/valued"

    quotable_lines:
      - "The 'new frontier' paradigm reflects venturing into unknown areas, seizing fresh opportunities, and adopting innovative thinking."
      - "I encourage you to have a pioneering spirit on a journey that will feel weird before it feels right (and eventually 'duh' obvious)."
      - "The most powerful change will come from your own observations."

    content: |
      Hey, it's Andre...

      Glad you made it, I've been waiting for you.

      By now, you should have read the manifesto, which frames how
      things are now, the problems as I see them with the accepted
      "best practices" of traditional internet marketing, and what I
      think is a better paradigm to strive for and why.

      [References paradigm-shifting thinkers...]

      Socrates, the ancient Greek philosopher, was famous for
      questioning traditional beliefs...

      Charles Darwin's Theory of Evolution, based on natural selection,
      met substantial resistance from religious and scientific groups.

      Louis Pasteur's germ theory revolutionized medicine...

      Thankfully 'the crazies' are no longer burnt at the stake for
      challenging conventional thinking.

      I say all of this to establish a frame of reference for this
      series.

      If anything, I hope this gives you the permission to challenge
      some of your beliefs about how marketing should be done.

      I encourage you to have a pioneering spirit on a journey that
      will feel weird before it feels right (and eventually 'duh'
      obvious).

      Andre

      P.S.

      So during this series, I'll "construct" a new TW from scratch,
      represented as a visual metaphor that develops from email to
      email.

