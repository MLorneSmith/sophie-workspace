  - id: "emn-reveal-hand-raise"
    source_file: "2022-11-18_072534_the-reveal-and-hand-raise.yaml"
    campaign: "EMN"
    email_type: "nurture"
    why_selected: |
      Perfect series conclusion. Builds on previous emails' credibility.
      Identifies quicksand before revealing solution. "Bullets to cannonballs"
      reference resonates with business readers. Hand-raise respects those not
      interested while capturing intent.

    subject_line: "The Reveal ... (and 'hand raise'...)"

    key_techniques:
      - "Quicksand Warning"
      - "Insider Credibility"
      - "Problem Reframe"
      - "Copywriting Critique"
      - "Partial Reveal"
      - "Experimentation Framing"

    hook:
      text: "The Reveal... (and 'hand raise'...)"
      type: "Promise Delivery"
      why_effective: "Signals payoff from series; reader knows this is the culmination"

    quotable_lines:
      - "We need to tell you where the quicksand is so we don't lead you astray."
      - "In our hearts and souls we're writers."
      - "The incessant drumbeat of 'buy, buy, buy, now, now, now' wears your audience down until they stop paying attention."
      - "This is a 'bullets to cannonballs' experiment."

    content: |
      Hey, it's Andre & Shawn...

      Welcome to the third and final email in this series.

      Today we're going to give you a peek inside our writing toolkit
      and share a few tools that make us better, faster, and more
      persuasive writers.

      Before we do that, however, we need to tell you where the
      quicksand is so we don't lead you astray.

      We've been drinking from the writing well for a looooong time.

      In our hearts and souls we're writers.

      But ... by itself, that's not enough.

      Here's why: most of the writing tools and tactics you'll learn,
      on their own, aren't specific to our needs as marketers.

      They're useful - but incomplete.

      But wait ... that can't be true of copywriting, right?

      Wrong.

      Copywriting has its own problems.

      The incessant drumbeat of "buy, buy, buy, now, now, now" wears
      your audience down until they stop paying attention.

      [Announces Writing Masterclass...]

      We're going to teach three of our favorite writing tools:

      * The Three-Act Structure
      * Structural Tension
      * Framing
      * #######REDACTED#######

      This is a 'bullets to cannonballs' experiment and we have no idea
      if we'll ever offer this masterclass again.

      If you are interested and want to know more, you'll need to raise
      your hand.

      Andre & Shawn

