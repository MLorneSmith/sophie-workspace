      Welcome to another issue of the Emergent Marketing Newsletter...

      Happy Friday.

      Today's email is the first in a multi-part series exploring a
      topic we're asked about a lot:

      What does it really take to do this work?

      You don't see the 1,140-word version of this email we wrote
      yesterday that we tossed in the trash...

      There are a lot of people selling easy in our little corner of
      the universe.

      But easy is a myth; smoke and mirrors.

      "I've always had the sense that the muse of the tormented
      artist..." - Elizabeth Gilbert

      We believe there are three questions you need to answer before
      you're ready to move forward...

      Earlier this year, we took a group of people through a workshop
      to answer these questions... we identified three critical
      ingredients that led to their success.

      Over the next several weeks, we'll explore each of these ideas.

      Andre & Shawn

      P.S.

      If you'd like to learn more, add yourself to the interest list
      by clicking this link...
