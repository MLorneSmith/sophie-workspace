examples:

  # ---------------------------------------------------------------------------
  # EXAMPLE 1: Welcome Sequence Opener
  # ---------------------------------------------------------------------------
  - id: "lem-prologue"
    source_file: "2019-08-09_163739_lem-lucrative-email-marketing-prologue.yaml"
    campaign: "LEM"
    email_type: "welcome"
    why_selected: |
      Perfect welcome sequence opener. Establishes credibility through social proof,
      creates multiple open loops, sets clear expectations, and uses P.S. to qualify
      audience. Demonstrates how to orient readers without being salesy.

    subject_line: "[LEM] Lucrative Email Marketing (Prologue)"

    key_techniques:
      - "Personal Greeting"
      - "Campaign Abbreviation"
      - "Social Proof (Implicit)"
      - "Soft Sell"
      - "Open Loop"
      - "Curiosity Gap"
      - "P.S. Subplot"

    hook:
      text: "Welcome to Lucrative Email Marketing (or 'LEM' for short). Real glad you're here."
      type: "welcome/orientation"
      why_effective: "Warm, personal, immediately establishes what they signed up for"

    quotable_lines:
      - "Email done right, is like magic."
      - "There is no better way to communicate and matter to an audience, than through the use of email."
      - "Strap yourself in."

    content: |
      Hey Mike,

      Welcome to Lucrative Email Marketing (or "LEM" for short).

      Real glad you're here.

      LEM is a Free Edition of my signature email marketing training
      called AutoResponder Madness (or "ARM" for short).

      Perry Belcher & Ryan Deiss say, "ARM is the best thing you're
      ever going to buy if you're sending emails."

      But for now though, don't worry about AutoResponder Madness.

      There is nothing for you to buy here.

      Enjoy this LEM (Lucrative Email Marketing) series, yours, on the
      house.

      Oh, and btw...

      Every email I send you that's part of this training, will have a
      subject line prefixed with [LEM], like this:

      [LEM] Subject Line (Part X)

      This way you'll instantly know it's associated with this training
      series.

      When you see that email hit your inbox each day, open it and read
      it.

      You'll get one "bite sized" email from me each day for the next
      three weeks.

      This is on purpose. So you can easily consume each email
      (lesson).

      Each email will be between 400 and 1,000 words long.

      I'm going to demonstrate to you a (very) different way to
      approach email marketing.

      In fact this approach works so well, that the effect it produces
      has been referred to like "Heroin on Paper".

      Just saying.

      You can do this, too.

      I'm going to show you how.

      I'm going to show you by actually demonstrating the effects on
      you, through this email-powered training series.

      So pay attention.

      Because what I'll be exposing you to will REFRAME how you look at
      email, and how you will soon choose to leverage it.

      Email done right, is like magic.

      There is no better way to communicate and matter to an audience,
      than through the use of email.

      In a few days I'll also reveal a little "evil experiment" I ran a
      few years ago. The result of this experiment did something
      strange.

      It directly allowed me to sell over 600 copies of a $67 product
      in ONE DAY.

      I'll be sharing the whole experiment with you.

      (But only if you PROMISE to use it responsibly, and not "for
      evil".)

      Anyhoo...

      Lot's more to come.

      Strap yourself in.

      See you tomorrow.

      Same time, same place.

      Andre "see PS" Chaperon

      P.S.

      This training PRESUMES you ALREADY have an email list of
      subscribers and customers (of at least 500).

      If you don't yet, you're in the wrong place.

  # ---------------------------------------------------------------------------
  # EXAMPLE 2: Mystery/Open Loop Mastery
  # ---------------------------------------------------------------------------
  - id: "lem-evil-experiment"
    source_file: "2019-08-14_110000_lem-my-evil-experiment-part-1-of-2.yaml"
    campaign: "LEM"
    email_type: "story"
    why_selected: |
      Masterclass in creating mystery and open loops. Uses specific results to
      build credibility while withholding the method. Reader engagement challenge
      gamifies the experience. Subversive P.S. rewards habitual P.S. readers.

    subject_line: '[LEM] My "Evil" Experiment (Part 1 of 2)'

    key_techniques:
      - "Open Loop"
      - "Curiosity Gap"
      - "Specific Results Tease"
      - "Reader Engagement Challenge"
      - "Subversive P.S."
      - "Clever Signature"

    hook:
      text: "I ran this 'experiment' a number of years ago. The results were pretty damn shocking."
      type: "mystery"
      why_effective: "Creates immediate curiosity through vague but dramatic setup"

    quotable_lines:
      - "The results were pretty damn shocking."
      - "But please don't abuse this! (Or it will backfire on you.)"
      - "Let's see how smart you are. {grin}"
      - "Nothing down here today, but thanks for checking anyway :-)"

    content: |
      Hey Mike,

      I ran this "experiment" a number of years ago.

      The results were pretty damn shocking.

      I'm going to share the whole process with you...

      But please don't abuse this! (Or it will backfire on you.)

      Reread what I wrote in the previous email about "giving a f*ck"
      and caring for your people.

      The result of this experiment almost TRIPLED my opt-in rate.

      But that wasn't the most important thing that happened.

      Something FAR MORE important happened as a result...

      It directly allowed me to sell over 600 copies of a $67 product
      in ONE DAY, a few months later...

      Anyhoo...

      Here's the experiment:

      [LINK]

      Now let's see if you've been paying attention.

      Let's see how smart you are. {grin}

      HIT REPLY and let me know why you think my email list become so
      much more POWERFUL after running this experiment.

      I won't reply personally.

      ... but I will give you the answer in the next email.

      The answer is right in front of you btw.

      Hit reply and lemme know.

      Andre "slightly evil" Chaperon

      PS.

      Nothing down here today, but thanks for checking anyway :-)

  # ---------------------------------------------------------------------------
  # EXAMPLE 3: Motivational with Vivid Metaphors
  # ---------------------------------------------------------------------------
  - id: "arm-domino-effect"
    source_file: "2019-08-22_094315_arm-the-domino-effect.yaml"
    campaign: "ARM"
    email_type: "nurture"
    why_selected: |
      Addresses the universal barrier of perfectionism and fear. The "lottery ticket"
      and "domino effect" metaphors are memorable and quotable. Challenges reader
      without being harsh. Social proof creates possibility.

    subject_line: "[ARM] The Domino Effect"

    key_techniques:
      - "Vivid Metaphor"
      - "Direct Challenge"
      - "Pattern Interrupt"
      - "Social Proof"
      - "P.S. Open Loop"
      - "Profanity for Impact"

    hook:
      text: "An unscratched lottery ticket in their warm dark pocket is a seed of hope."
      type: "observation"
      why_effective: "Poetic imagery makes abstract concept of procrastination concrete"

    quotable_lines:
      - "An unscratched lottery ticket in their warm dark pocket is a seed of hope."
      - "But you can't steer a parked car."
      - "Pucker up, tiger."
      - "What mediocre little email can I write today, right f*cking now?"

    content: |
      I'm really glad you've taken this step.

      You want to improve your email marketing, that's great.

      However...

      I believe the reality is that there are a lot of people that just
      look to buy courses.

      ... because secretly they can keep pushing off the day they
      actually "scratch the ticket" to see if they have a zero or a
      hero.

      An unscratched lottery ticket in their warm dark pocket is a seed
      of hope.

      It might be a huge winner.

      ... BUT first, let's LEARN a little more.

      Let's get this right.

      Let's be perfect.

      When in reality they're scared they'll find out they failed and
      can't leverage email to get better results.

      It doesn't take guts to buy a product.

      That's easy.

      You've already done that.

      And it doesn't take guts to even "read" (skim) through the latest
      shiny object purchase.

      That's easy, too.

      The hard part, though...

      The part that DOES take guts...

      Is to push beyond that scary as hell feeling of staring at a
      blank screen with a blinking cursor and wondering what the hell
      to write.

      The following analogy will help.

      I call it the "Domino Effect"...

      And if you replace the context of the commercial with emails,
      then it will help you realize that even your first crappy emails
      can have a huge effect.

      Watch this now:

      [VIDEO LINK]

      Now instead of "how much money do you have in your pocket right
      now?" (see video)

      ... think:

      "What mediocre little email can I write today, right f*cking
      now?"

      Think your email is rubbish?

      Too crappy?

      Too weak?

      ... then watch the video and see what massive result small and
      weak can produce down the line.

      Today's average email is the ingredient for the SOS (soap opera
      sequence) you'll one day be proud of...

      ... because it'll make a difference in the world (and your bank
      balance) by moving your audience to action.

      But you can't steer a parked car.

      Pucker up, tiger.

      Make a promise to yourself right now.

      That you'll have the guts to write your first crappy email
      sequence (what I call a "soap opera sequence") this week, or in
      the next two weeks, latest.

      You can do this.

      Speech over.

      Andre "soapbox" Chaperon

      PS.

      And if you're thinking...

      "Easy for you to talk, Andre - you can bloody write."

      Fair enough. Good point.

      Well ... not really. Not even close.

      I'll reveal to you a little embarrassing secret about me shortly.

  # ---------------------------------------------------------------------------
  # EXAMPLE 4: Meta-Teaching (Demonstrates While Teaching)
  # ---------------------------------------------------------------------------
  - id: "lem-make-hungry"
    source_file: "2019-08-18_110000_lem-make-someone-hungry-part-1-of-2.yaml"
    campaign: "LEM"
    email_type: "nurture"
    why_selected: |
      Brilliant meta-teaching: teaches the Zeigarnik Effect while demonstrating it.
      The reader experiences the technique as they learn about it. Scientific naming
      adds credibility. Social proof through exclusive mastermind pricing.

    subject_line: "[LEM] Make Someone Hungry (Part 1 of 2)"

    key_techniques:
      - "Subject Line Callback"
      - "Meta-Commentary"
      - "Psychological Principle Naming"
      - "Challenge Question"
      - "Social Proof Through Exclusivity"
      - "Open Loop"

    hook:
      text: "THE ANSWER TO the subject line is the (SIMPLE) SECRET to creating suspense in emails."
      type: "subject_line_callback"
      why_effective: "Creates immediate curiosity about what 'making someone hungry' means"

    quotable_lines:
      - "Readers are human, and humans are programmed (hardwired) to wait for answers to questions they've been exposed to."
      - "You ask a question. Or better yet, IMPLY a question, but then DON'T GIVE THE ANSWER."
      - "And suspense, tension, drama ... it all works to create ATTENTION."

    content: |
      Hey Mike,

      THE ANSWER TO the subject line is the (SIMPLE) SECRET to creating
      suspense in emails.

      And suspense in emails is the key ingredient to the narrative
      engine of your email sequence.

      ... the REASON for people to keep opening your emails and reading
      to the end.

      You know ... like you're doing here :-)

      I teach this in detail within ARM (with lots of examples)...

      But the big secret is already in this email.

      And it has been sprinkled in clear sight in most of the previous
      emails I've sent you so far.

      Think you know what it is?

      Here's another clue.

      It's the REASON WHY you're still reading.

      Readers are human, and humans are programmed (hardwired) to wait
      for answers to questions they've been exposed to.

      It's called the Zeigarnik Effect.

      You ask a question. Or better yet, IMPLY a question, but then
      DON'T GIVE THE ANSWER.

      You move on.

      It keeps people on the hook, so to speak.

      That's the simple secret to creating suspense (it builds more and
      more TENSION).

      And suspense, tension, drama ... it all works to create
      ATTENTION.

      Which is the whole point, right?

      I have two killer examples for you. The first one I read 8 years
      ago, and it blew me away.

      In fact it completely changed the game for me.

      Myself and 3 business partners run this small exclusive
      mastermind called Ocean's Four.

      We run it once, sometimes twice a year.

      We charge clients $5K for a ONE HOUR hot seat (this is over two
      days, and we only take 8 people, max).

      This last one, I purchased every attendee a (fiction) book. The
      same book that completely changed the game for me.

      ... and the same book I'll share with you in the next email.

      Same time, same place.

      Andre "suspense, tension, drama" Chaperon

  # ---------------------------------------------------------------------------
  # EXAMPLE 5: Story Hook with Movie Reference
  # ---------------------------------------------------------------------------
  - id: "mms-leap-of-faith"
    source_file: "2022-02-07_073447_a-leap-of-faith.yaml"
    campaign: "MMS"
    email_type: "sales"
    why_selected: |
      Masterful use of Indiana Jones story to introduce product without being salesy.
      The pattern interrupt ("That's comically, pathetically, ridiculously lame")
      calls out typical marketing tactics, building trust. Gap/bridge metaphor is
      more useful than typical sales messaging.

    subject_line: "A Leap of Faith..."

    key_techniques:
      - "Story Hook"
      - "Pattern Interrupt"
      - "Conversational Asides"
      - "Problem-Solution Framework"
      - "Soft Sell"
      - "Extended P.S."

    hook:
      text: "Today we're going to journey waaaay back in time to May 24, 1989. That was opening day for Indiana Jones and the Last Crusade."
      type: "Story Hook"
      why_effective: "Nostalgic movie reference creates immediate engagement and curiosity"

    quotable_lines:
      - "That's comically, pathetically, ridiculously lame."
      - "Zero has a powerful gravitational pull and it takes intelligent, step-by-step effort to break free."
      - "it's hard to hit fuzzy targets"
      - "the difference between a lightning bug and lightning"

    content: |
      Hey, it's Andre and Shawn...

      Today we're going to journey waaaay back in time to May 24, 1989.

      That was opening day for Indiana Jones and the Last Crusade.

      [Story continues with Indy facing the chasm...]

      "It's a leap of faith," Indy whispers to himself as he stares
      into the darkness to face the final challenge.

      What happens next?

      (Spoiler alert.)

      Indy takes a deep breath, steps into the unknown, and ...

      ... a bridge appears.

      Well, not exactly. The bridge was there all along, hidden by an
      optical illusion.

      In case you're wondering if we're going to ask you to take a
      "leap of faith" and purchase the Modern Marketing System, the
      answer is a resounding no.

      That's comically, pathetically, ridiculously lame.

      But, now that we think about it, we've probably read a thousand
      or more emails like that.

      Those emails seem to follow the same format.

      "The other day I was doing X ... which reminded me of Y ... and
      every time I think about Y I think about this thing I sell called
      Z ..."

      And away we go.

      Sorry ... we digressed a little.

      Back to bridges and gaps.

      [Continues with gap metaphor and product introduction...]

      Andre & Shawn

  # ---------------------------------------------------------------------------
  # EXAMPLE 6: Contrarian Positioning with Authority Stacking
  # ---------------------------------------------------------------------------
  - id: "emn-aristotle-bruce-lee"
    source_file: "2022-11-17_074008_aristotle-to-bruce-lee.yaml"
    campaign: "EMN"
    email_type: "nurture"
    why_selected: |
      Lists legendary authorities (Aristotle, Campbell, McKee, King, Ogilvy) before
      pivoting to contrarian insight. Bruce Lee quote is perfect analogy that sticks.
      Shows how to build credibility before challenging conventional wisdom.

    subject_line: "Aristotle to ... Bruce Lee?"

    key_techniques:
      - "Authority Stacking"
      - "False Choice Setup"
      - "Contrarian Pivot"
      - "Memorable Quote"
      - "Emphasis Instruction"
      - "Double Open Loop"

    hook:
      text: "Aristotle to ... Bruce Lee?"
      type: "Curiosity Gap"
      why_effective: "Unexpected pairing creates intrigue; reader wants to understand the connection"

    quotable_lines:
      - "I don't fear the man who has practiced 10,000 kicks one time, but I do fear the man who has practiced one kick 10,000 times."
      - "Read that last sentence again. It's important."
      - "Persuasive writing... happens when you have a few really powerful tools in your writing toolbox that you actually know how to use."

    content: |
      Hey, it's Andre & Shawn...

      If you're like us, the question you're asking yourself now is
      "how can I become a more persuasive writer fast?"

      On the surface, that seems simple enough.

      There's no shortage of interviews, books and courses by writers
      for writers.

      Start by learning the three-act structure from Aristotle's
      Poetics in ancient Greece.

      Dig deep into Joseph Campbell's Hero's Journey, then Robert
      McKee's Story...

      Get inspired by Stephen King's On Writing, Anne Lamott's Bird by
      Bird...

      [Lists more authorities...]

      Or, maybe you want to skip all of that and go straight for the
      jugular...

      To hell with the touchy-feely writing stuff - I want to sell,
      sell, sell ...

      In that case, copywriting is the magic elixir you're looking for.

      Begin with the legends - Swartz, Ogilvy, Collier, Hopkins,
      Halbert...

      Will this work?

      Maybe.

      But here's the thing we've learned the hard way over and over
      again - better, more persuasive writing doesn't happen because
      you have dozens of tools in your writing toolbox.

      Persuasive writing - the kind that makes the difference between
      "I'm sort of interested but maybe later" vs. "oh my God I want
      this right now!" - happens when you have a few really powerful
      tools in your writing toolbox that you actually know how to use.

      Read that last sentence again. It's important.

      Bruce Lee said it best - "I don't fear the man who has practiced
      10,000 kicks one time, but I do fear the man who has practiced
      one kick 10,000 times."

      Tomorrow we'll share a few of the tools we rely on most...

      Andre & Shawn

  # ---------------------------------------------------------------------------
  # EXAMPLE 7: Radical Transparency Newsletter Opener
  # ---------------------------------------------------------------------------
  - id: "twn-cards-on-table"
    source_file: "2024-08-16_180945_twn-issue-1-cards-on-the-table-face-up.yaml"
    campaign: "TWN"
    email_type: "newsletter"
    why_selected: |
      Radical honesty creates trust. Permission to unsubscribe paradoxically
      increases loyalty. Mechanism Design Theory callback rewards series readers.
      P.S. questions create two-way relationship from the start.

    subject_line: "TWN / Issue 1: Cards on the table (face up)"

    key_techniques:
      - "Campaign Abbreviation"
      - "Meta-Transparency"
      - "Permission to Leave"
      - "Callback Reference"
      - "Future Pacing"
      - "P.S. Questions"

    hook:
      text: "I figured for this inaugural issue, I'll lay my cards on the table, face up, and be transparent about my intentions"
      type: "Transparency Declaration"
      why_effective: "Unusual honesty creates trust and curiosity"

    quotable_lines:
      - "Life is too short to pay attention to everything."
      - "Attract the right audience, then earn their trust, and everything (everything!) becomes easier"
      - "But if you're sticking around, damn, this will be a transformative experience, make no mistake."

    content: |
      Hey, it's Andre...

      Technically, this is the first newsletter since putting "phase
      one" of Tiny Worlds live.

      I'll prepend every newsletter issue with TWN (Tiny Worlds
      Newsletter) so it'll be easy for you to identify.

      I figured for this inaugural issue, I'll lay my cards on the
      table, face up, and be transparent about my intentions for this
      multi-year project I've embarked on.

      For one, I want to respect your attention...

      The unknown, and your job, at this early point in our
      relationship, is to determine if you're one of the "right people"
      or not.

      And if not, no hard feelings...

      Life is too short to pay attention to everything. There's an
      opportunity cost in putting learning into practice.

      [Continues with value proposition and philosophy...]

      If this journey is not a fit for your needs, there's an
      UNSUBSCRIBE link in the footer of every email.

      But if you're sticking around, damn, this will be a
      transformative experience, make no mistake.

      Until next time...

      Andre

      P.S.

      If you have a sec...

      What are you most excited about from what you've seen (and felt)
      so far?

      What's most confusing?

  # ---------------------------------------------------------------------------
  # EXAMPLE 8: Personal Storytelling with Life Framework
  # ---------------------------------------------------------------------------
  - id: "emn-secret-journey"
    source_file: "2023-03-17_102514_secret-journey.yaml"
    campaign: "EMN"
    email_type: "newsletter"
    why_selected: |
      Vulnerable personal sharing (turning 50) combined with practical framework
      (three-act structure of life). The "secret" is never explicitly revealed
      (consistency/longevity), keeping reader engaged. Book recommendations add value.

    subject_line: "Secret + Journey"

    key_techniques:
      - "Personal Storytelling"
      - "Three-Act Narrative Structure"
      - "Open Loop / Mystery"
      - "Embedded Curiosity"
      - "Resource Stacking in P.S."

    hook:
      text: "Hey, it's Andre today... Back, upgraded, and a little older..."
      type: "Personal milestone"
      why_effective: "Creates warmth and curiosity about what 'upgraded' means at 50"

    quotable_lines:
      - "One of the insights we have to discover ourselves as we navigate the tightrope of Act II is that the whole point of the journey isn't some bright shiny 'goal'... but instead, being on the journey and what we learn along the way is the whole damn point."
      - "Sadly, I don't think most people ever leave Act I."
      - "While not sexy, it can't be monetized in a product, but it'll carry you to whatever you desire in your pursuit because it's a superpower."

    content: |
      Hey, it's Andre today...

      Back, upgraded, and a little older...

      Last Tuesday, I turned 50 (while downhill skiing on foggy Sierra
      Nevada slops, a version of extreme sports, as it turned out)...

      [Continues with reflection on 20-year journey...]

      An observation that would only reveal itself to me twenty years
      later is that life seems to fall nicely within a three-act
      structure...

      ACT I:
      Before reaching the point of no return, there is a pivotal moment
      when we choose to diverge from the conventional path.

      ACT II:
      Having spun the boat's wheel and pointed into the eye of the
      storm, this is life in the chaos of the messy middle...

      ... being on the journey and what we learn along the way is the
      whole damn point.

      ACT III:
      I think this is where Act III starts, which, for me, is twenty
      years into the journey...

      I mentioned a "secret" in the subject of this email, which points
      to an insight available to you on your journey.

      [The secret - consistency - is never explicitly stated]

      Andre (and Shawn)

      P.S.

      [Extensive book recommendations: Liminal Thinking, Mastery,
      A Life in Parts, A Million Miles in a Thousand Years,
      From Strength to Strength, Die with Zero]

  # ---------------------------------------------------------------------------
  # EXAMPLE 9: Social Proof Through Customer Story
  # ---------------------------------------------------------------------------
  - id: "lem-superhero"
    source_file: "2019-08-17_110000_lem-superhero-email.yaml"
    campaign: "LEM"
    email_type: "story"
    why_selected: |
      Real customer name (Dainis) creates authenticity. "Superhero" metaphor is
      aspirational and memorable. Revenue graph provides visual proof. Responsibility
      framing prevents abuse. P.S. creates anticipation for next email's technique.

    subject_line: "[LEM] Superhero Email"

    key_techniques:
      - "Customer Story Opening"
      - "Direct Quote"
      - "Rhetorical Question"
      - "Metaphor Introduction"
      - "Responsibility Framing"
      - "P.S. Open Loop"

    hook:
      text: "DAINIS is a new ARM customer. He excitedly emailed me the other day to share some results he's been having..."
      type: "customer_story"
      why_effective: "Real name + excitement + results creates compelling social proof"

    quotable_lines:
      - "And when THEY feel you care, THEY care back."
      - "Be the superhero to your people."
      - "When you do this consistently, attention and TRUST is the result."
      - "Because when you explain a 'magic trick', the best part is lost; the magic."

    content: |
      Hey Mike,

      DAINIS is a new ARM customer.

      He excitedly emailed me the other day to share some results he's
      been having as a new ARM customer.

      [Shows email screenshot]

      Do you notice how his subscribers are PERCEIVING HIM?

      "I keep receiving emails every day about how much they love this
      stuff..."

      Think about that for a second.

      Because isn't that the whole point?

      I mentioned this in a previous email. It's about caring, and
      using email to demonstrate that.

      And when THEY feel you care, THEY care back.

      They care back by hitting reply and letting you know that you're
      their badass "superhero".

      [Shows revenue graph]

      Be the superhero to your people.

      That said, with this "superhero" status comes responsibility.

      Andre "email superhero" Chaperon

      PS.

      Pay attention to what I'm doing in the NEXT email.

      No one is doing this.

      I'll explain WHY in a future email.

      (Because when you explain a "magic trick", the best part is
      lost; the magic.)

