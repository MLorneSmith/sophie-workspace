content:
  body: "You're receiving this email because you own one or more of our

    core courses (AoE, SOI, TDB or TTE). That means you qualify for a

    time-limited, customer-only discount for the Modern Marketing

    System. If you're not interested, that's OK. You can one-click

    unsubscribe (

    https://click.convertkit-mail.com/68uzp9k8mnu8h4gvxqio/08hz0zevu9hmq5n6n3hl/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vbXV0ZWQv

    ) from this segment at any time. You'll also find a full nuclear

    unsubscribe link in the footer of this email.


    Hey, it's André and Shawn...


    Today we're going to journey waaaay back in time to May 24, 1989.


    That was opening day for Indiana Jones and the Last Crusade.


    Panama hat-wearing archeologist Henry \"Indiana\" Jones, Jr.

    (played by Harrison Ford) set off on an adventure to find his

    father, Henry Jones, Sr. (played by Sean Connery), which

    eventually leads both of them to the Holy Grail.


    While Henry is dying from a gunshot wound, Indy has to make his

    way past three challenges before he can find the Grail and save

    his father.


    The final challenge is the most difficult.


    Jones stands at the edge of a chasm so deep he can't see the

    bottom.


    Behind him, his father is dying.


    In front of him, on the other side of the chasm, the Grail

    awaits.


    \"It's a leap of faith,\" Indy whispers to himself as he stares

    into the darkness to face the final challenge.


    What happens next?


    (Spoiler alert.)


    Indy takes a deep breath, steps into the unknown, and ...


    ... a bridge appears (

    https://click.convertkit-mail.com/68uzp9k8mnu8h4gvxqio/p8heh9h980rwrqbq/aHR0cHM6Ly93d3cueW91dHViZS5jb20vd2F0Y2g_dj1xLUpJZmpObm5NQQ==

    ).


    Well, not exactly. The bridge was there all along, hidden by an

    optical illusion.


    It's hard to say why we remember that scene from a movie more

    than three decades old.


    Especially when we can't reliably remember what we did last week.


    In case you're wondering if we're going to ask you to take a

    \"leap of faith\" and purchase the Modern Marketing System, the

    answer is a resounding no.


    That's comically, pathetically, ridiculously lame.


    But, now that we think about it, we've probably read a thousand

    or more emails like that.


    Those emails seem to follow the same format.


    \"The other day I was doing X ... which reminded me of Y ... and

    every time I think about Y I think about this thing I sell called

    Z ...\"


    And away we go.


    Sorry ... we digressed a little.


    Back to bridges and gaps.


    Despite all the hyped-up promises in the marketing world, there

    are very few things that are always true.


    However, if we had to bet $100 on something that comes close,

    it's this: every time you reach a new level of success you're

    going to discover a gap between where you are and where you want

    to be.


    Those gaps will be different for everyone. If you haven't made

    any money online then the gap is between you and $1.


    (Making your first dollar changes everything.)


    If you've made money online but you don't have a predictable,

    dependable system for creating results, the gap is between you

    and the peace of mind that comes from predictable, dependable

    results.


    If you've built a successful business and you're making a

    comfortable income, that gap can be found between you and

    whatever keeps you awake at night.


    When those gaps appear -- and they always do, no matter how

    successful you become -- one strategy is to take the Indiana

    Jones, leap of faith approach.


    That's great in the movies. But, if we're being honest, it

    doesn't work for us.


    (Neither one of us would look good in a Panama hat anyway.)


    The alternative -- hopelessly staring into the void -- isn't

    ideal either.


    We've had countless conversations with freelancers, business

    owners, and creative professionals who have purchased courses,

    done the work, and found themselves staring across a canyon

    separating them from where they want to go and not knowing what

    to do next.


    The Modern Marketing System is different...


    It's designed to ensure that the bridge between where you are and

    where you're going is always visible and actionable -- no leaps

    of faith needed.


    If you're just starting out, The Durable Business will show you

    how to build a business from $0 to $100,000.


    Often that's the most difficult part of the journey. Zero has a

    powerful gravitational pull and it takes intelligent,

    step-by-step effort to break free.


    (But when you do, hold the hell on...)


    If you're already making money, then you need to identify the gap

    between where you are and where you're going.


    You want that gap to be precise (it's hard to hit fuzzy targets).


    You also want it to be realistic.


    \"I'm at $0 and the gap is between me, $10 million in cash, and a

    garage full of Porsches\" isn't realistic.


    It's delusional.


    Finally, you want the bridge between where you are and where

    you're going to be actionable. One foot in front of the other so

    you can get from A to B efficiently.


    These are critical skills we want everyone who signs up for the

    Modern Marketing System to have.


    To help make that happen, we're going to host a gap-crushing,

    leverage-identifying, bridge-building masterclass for everyone

    who joins The System.


    We'll help you develop three critical skills:


    * Identifying where you are right now with precision,

    objectivity, and clarity...

    * Choosing where you're going next that'll create the biggest

    impact that's meaningful to you...

    * Creating an action plan with course material from The System to

    show you how to get there, step by step.


    We haven't set a date yet for that masterclass (sometime in the

    second half of February). It'll be open to everyone who owns The

    System and will include a live Q&A.


    We'll make the recording and transcript available too.


    As a reminder, we're selling The System at the lowest price we'll

    ever offer it until 11:59 p.m. PST Friday, Feb 11.


    When the clock strikes midnight The System will be full price

    ($1,495).


    (Details about The System from Friday's enrollment email appear

    in the P.S. below.)


    If you already own the four core courses, you were upgraded to

    The System last Friday for free (reply to this email if you

    didn't receive the welcome email yet).


    If you own three of our core courses, you'll be eligible to

    upgrade for $95.


    If you own two core courses, you'll be able to upgrade for $205.


    And, if you own one of our core courses, you'll be able to

    upgrade for $700 (or three payments of $250).


    To make sure you see the appropriate pricing, please log in to

    the Academy (

    https://click.convertkit-mail.com/68uzp9k8mnu8h4gvxqio/x0hph6hnx6kvk4t5/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vYWNhZGVteS8=

    ) before you click on the order link below.


    (If you run into any issues, please reply to this email and Nick

    will take care of you.)


    And if you decide that The System isn't right for you for any

    reason, let us know within 60 days and we'll issue a full, no

    questions asked refund (and you'll retain access to any

    individual courses you own).


    When you know you're ready to enroll in The System, you can

    access the order page here (

    https://click.convertkit-mail.com/68uzp9k8mnu8h4gvxqio/kkhmh6h84qz0z7il/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vcHJvZHVjdHMvdGhlLXN5c3RlbS8_dXRtX2NhbXBhaWduPW1tcy1jZSZ1dG1fbWVkaXVtPWVtYWlsJnV0bV9zb3VyY2U9ZW1haWwtYnJvYWRjYXN0JnV0bV90ZXJtPWV4aXN0aW5nLWxpc3Q=

    )...


    (If you still have any unanswered questions, hit reply and let us

    know.)


    André & Shawn


    .


    .


    P.S.


    \"The System\" represents our combined wisdom from forty-three

    years on the front lines of digital marketing.


    We believe it's the definitive, world-class, all you ever need to

    buy guide to modern marketing with integrity.


    Marketing that gets results.


    Marketing you can be proud of.


    Marketing that:


    * Earns and sustains your audience's attention...

    * Delivers your marketing messages effectively...

    * Moves readers in directions that benefit them (and you)...

    * Creates, channels, and intensifies desire for the value you

    offer...

    * Builds long-term relationships with prospects and customers...

    * Creates happy customers, fans, and superfans over time...


    The Modern Marketing Systems includes our four core courses.


    The Art of Email -- audience-focused, relationship-based,

    story-driven email marketing.


    Sphere of Influence -- a strategic approach to making better

    prospects.


    The Durable Business -- our principles-based framework for

    building a business from $0 to $100,000+ in revenue.


    And The Traffic Engine -- a strategic approach to paid traffic

    acquisition using Google Ads and Facebook.


    Individually, each course is exceptional.


    It's rare that a week goes by that someone doesn't email us a

    story about how one of those courses changed their life.


    But, the real profit-maximizing power of our teaching comes from

    the way our courses work together, systemically.


    To borrow a phrase we both love from Mark Twain -- that's the

    difference between a lightning bug and lightning.


    In addition to the core courses, everyone who owns The System

    also will get access to the MMS Community.


    While we have been putting the finishing touches on The System,

    Anita Chaperon has been preparing the Community.


    Anita has a long history of helping people make meaningful,

    transformational progress in their personal and professional

    lives.


    If there's an action-implementation book, course, or

    certification, you can bet Anita has read it, finished it, and

    achieved it.


    The System is where you'll learn from us.


    The Community is where you'll connect and interact with others

    who are on the same path you are.


    We couldn't call ourselves marketers if we didn't say: but wait,

    there's more...


    The System also includes the Momentum Builder Workshop (Lean

    Edition) -- our six-week 'implementation sprint' to connect an

    offer with an audience by creating a theme-driven Facebook ad,

    landing page, relationship-building and promotional email

    campaigns.


    But wait...there's still more...(sorry, we can't help

    ourselves)...


    We're also including all of the content from last fall's

    five-week Art of Email Workshop where we took a group of students

    through the Art of Email step by step.


    We're not holding anything back.


    This is where we say that, along with all the good news, we also

    have some bad news.


    Except there's no bad news.


    Everything in the Modern Marketing System (all of the courses,

    workshops, and the community) is available immediately after

    purchase.


    More importantly, everything we just described is the starting

    point for the Modern Marketing System.


    Immediately after this promotion, we're going to start creating

    System-specific content that connects the dots across all of our

    courses.


    We're not willing to settle for anything less than knowing that

    The System is the most effective marketing system in the world.


    And you'll have access to all of that content -- everything we

    create for The System and all of its component parts -- for life.


    When you know you're ready to enroll in The System, you can

    access the order page here (

    https://click.convertkit-mail.com/68uzp9k8mnu8h4gvxqio/kkhmh6h84qz0z7il/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vcHJvZHVjdHMvdGhlLXN5c3RlbS8_dXRtX2NhbXBhaWduPW1tcy1jZSZ1dG1fbWVkaXVtPWVtYWlsJnV0bV9zb3VyY2U9ZW1haWwtYnJvYWRjYXN0JnV0bV90ZXJtPWV4aXN0aW5nLWxpc3Q=

    )...


    BACK MATTER


    This email has been lovingly handcrafted and sent with the

    awesome ConvertKit (

