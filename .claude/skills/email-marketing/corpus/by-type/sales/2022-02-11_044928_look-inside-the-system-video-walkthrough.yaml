    ) | Email Archive (

    https://click.convertkit-mail.com/lmuq8w3nrltmhp8kxkc6/owhkhqh45qp3xmfv/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vZW1haWwtYXJjaGl2ZS8=

    )


    Update your Profile (

    https://preferences.convertkit-mail.com/lmuq8w3nrltmhp8kxkc6 )

    (Change your email address or update your name if we have it

    incorrect.)


    Finally: It's an honor for us to have the opportunity to be in

    touch with you, but if our communication is no longer of interest

