content:
  body: "Hi Michael,


    You're most productive when the only things in your inbox are for today.


    This creates a high-priority to-do list, and ensures nothing slips through the

    cracks.


    The Power of Inbox Zero

    [https://storage.googleapis.com/email-assets.superhuman.com/Inbox_zero_thumbnail.png]

    https://storage.googleapis.com/email-assets.superhuman.com/Inbox%20Zero%204K.mp4


    As you go through your email, ask yourself:


    Does it need action today?

    Keep it in your inbox.

    Hit J to check the next email. Swipe the Reply All bar to the left to check the

    next email.


    Can it wait?

    Snooze it for later.

    Hit H to set a reminder. Tap 🕓 on Mobile to set a reminder.


    Is no action needed?

    Mark it done.

    Hit E to mark done. It'll return if someone replies. Tap ✔️ to mark done. It'll

    return if someone replies.


    With just these three shortcuts, you'll fly through your inbox and hit Inbox

    Zero.


    And when you do, there's a little Superhuman surprise waiting for you 💜


    Speak soon,

    Rahul


