content:
  body: "Hey Mike,


    So...


    A buck gets ten your understanding of how to REALLY \"level up\"

    your email marketing, is ... how do I put it nicely?


    Somewhat flawed.


    Ok, probably very, very flawed (from a strategic meta point of

    view).


    Most people--and I'm going to lump you in with them--approach their

    email marketing much like this:


    1.) Squeeze (lead gen) page...


    This puts new leads (let's call 'em people, shall we?) onto your

    super-duper email list.


    Exciting!


    This can be hosted anywhere...


    DRIP ( http://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzU5MDQwMTYzOSIsInVybCI6Imh0dHA6Ly9kcmlwLmxhL2MvZXlKaFkyTnZkVzUwWDJsa0lqb2lOekF5TmpRMU5pSXNJblJ5YVdkblpYSmZhV1FpT2lJM01USXlNamcxTlNJc0luVnliQ0k2SW1oMGRIQTZMeTkwY25sa2NtbHdMbU52THlKOT9fX3M9eXp5bWlhcXR5aXRzaTJzaWFlbWkifQ ) (what I use, and it rocks!), ConvertKit, AWeber, Infusionsoft,

    Ontraport, ActiveCampaign, GetResponse, Constant Contact,

    MailChimp.


    ... whatever.


    Honestly doesn't matter where for this discussion.


    2.) Have 1, maybe 2 or 3 (best case) autoresponder emails loaded

    up to be sent out.


    (Typically though, it's just one \"thank you\" email that goes out

    automatically.)


    3.) Then all future communications are performed as BROADCAST

    emails.


    Write email.


    Click send.


    Swoosh!


    Done.


    Rinse and repeat (this is all a manual process, of course).


    It's a proven way to play the email marketing game. And, for the

    most part, it works pretty well.


    So why mess with something that ain't broke?


    Short answer is you don't have to change anything.


    Carry on doing it this way (the average way).


    Nothing wrong with that.


    Like I said, it works pretty well.


    However...


    As Albert Einstein so eloquently put it:


    \"The definition of insanity is doing the same thing over and over

    again, but expecting different results\"


    Are you happy with your current email results?


    I mean, REALLY HAPPY?


    Lemme tell ya...


    You can ABSOLUTELY get better results...


    I'll put money on it.


    And I'm talkin' all round better results.


    From doing a better job of using email to effectively build a

    loyal following (of super-fans and raving lifelong customers).


    ... to just flat out making more cold hard cash.


    Lots more.


    \"Whoa, whoa whoa Andre!\"


    (That's the sound of my lawyer about to develop a serious bout of

    hives.)


    He doesn't like me making promises I can't control.


    So in order to not violate any FTC guidelines, I have to do what

    my lawyer calls \"covering my ass\".


    DISCLAIMER:


    In these emails I may reveal how my customers, clients, and I

    have created some very successful email campaigns.


    Many of these customers mention specific sales figures they got

    from using my email system and strategic methodologies.


    Totaled up, these figures are in the millions.


    Please understand that I am absolutely NOT--repeat, am

    NOT--implying that these results are typical and that you'll match

    them.


    Such a claim would be ridiculous.


    Especially considering we've (probably) never met, and I don't

    know your product, your business, your price-points, or anything

    else about what you do.


    Just passively reading what I write in these emails won't make

    you millions. Or even anything at all.


    Wouldn't it be nice if it worked that way, eh? :-)


    Reading is not enough.


    Serious execution (action) is required on your part.


    And only YOU can do that!


    Having said this...


    What I'll be showing and revealing to you in these emails (and

    ESPECIALLY in my signature program, ARM ( http://t.dripemail2._X19zPXl6eW1pYXF0eWl0c2kyc2lhZW1pIn0 )) has worked very well for me and thousands of my clients and

    customers.


    What I teach is trusted by smart people like Ryan Deiss & Perry

    Belcher...


    Email from Ryan Deiss (NOTE: If you're seeing this text it means

    you have not allowed images to show for this email. Enable images

    to see this.)


    It's the system Ryan & Perry followed, and have since adapted for

    their own monster 8-figure business.


    Frank Kern & Jeff Walker are also customers of ARM.


    Not saying any of this to boast.


    I only say this to demonstrate that what I teach not only works

    for others...


    ... but it'll also completely shift how you approach ALL OF YOUR

    MARKETING, moving forward:


    Email from Charles Kirkland (you need to enable images if you

    don't see the image)


    With me so far?


    Anyhoo...


    I've been rambling on for way too long already in this email.


    Let's hook-up tomorrow, same place, same time.


    Will ratchet up the nitty-gritty stuff then.


    Andre \"dyslexic, but I cope\" Chaperon


    P.S.


    Dunno if you read my backstory of how I ended up getting kinda

    good at this email marketing stuff.


    It's kind of a funny story (I can say that now in hindsight).


    Involves Las Vegas...


    Stress...


    A strip club (just kidding!)...


    An asshole boss (not kidding)...


    You name it.


    You can read the whole damn mess here (enjoy!):


    https://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzU5MDQwMTYzOSIsInVybCI6Imh0dHBzOi8vdGlueWxpdHRsZWJ1c2luZXNzZXMuY29tL2Fib3V0Lz9fX3M9eXp5bWlhcXR5aXRzaTJzaWFlbWkifQ ( https://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzU5MDQwMTYzOSIsInVybCI6Imh0dHBzOi8vdGlueWxpdHRsZWJ1c2luZXNzZXMuY29tL2Fib3V0Lz9fX3M9eXp5bWlhcXR5aXRzaTJzaWFlbWkifQ )


    ---------------------

    To make sure you keep getting these emails, please add

    hello@tinylittlebusinesses.com to your address book or whitelist us. Want out of

    the loop? <a href=\"https://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzU5MDQwMTYzOSIsInVybCI6Imh0dHBzOi8vd3d3LmdldGRyaXAuY29tL3N1YnNjcmliZXJzL3l6eW1pYXF0eWl0c2kyc2lhZW1pL3N1YnNjcmlwdGlvbnM_ZD0wNTNsaWZhaWU3OWFpYXZqeDd4NFx1MDAyNmV4Y2x1ZGVfY2xpY2s9MVx1MDAyNmludGVudD11bnN1YnNjcmliZVx1MDAyNl9fcz15enltaWFxdHlpdHNpMnNpYWVtaSJ9\">Unsubscribe</a>.


