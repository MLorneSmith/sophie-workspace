content:
  body: "Hey Mike,


    Following on from the previous email...


    ... time to showcase my mad Photoshop skills.


    I knocked up a diagram that visualizes how the masses typically

    setup their email system:


    (NOTE: You need to enable images if you don't see the image

    diagram.) ( https://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzU5ODQ5OTY4NiIsInVybCI6Imh0dHBzOi8vZW1haWwtaW1ncy5zMy5hbWF6b25hd3MuY29tL2FybS9hcm0tc2NpZW5jZS1hdmVyYWdlLnBuZz9fX3M9eXp5bWlhcXR5aXRzaTJzaWFlbWkifQ )


    (Click the image to see a snazzy high-res version of the

    diagram.)


    The diagram is pretty self explanatory (especially if it's what

    you already do).


    Write email...


    Typically target your whole subscriber list...


    Click send...


    Swoosh!


    Cha-ching. Sales.


    lol.


    Not so fast, tiger :-)


    Because here's the thing...


    In the grand scheme of things, that system is pretty \"average\"

    (at creating raving fans that buy your stuff for years and years,

    who love you, and see you are their superhero).


    It can (and typically will) result in list burnout pretty damn

    quickly.


    And unless you have a ton of new lead flow, you'll be in more

    trouble than a virgin at a frat party.


    Just saying.


    Think about this...


    In the beginning it is pretty easy to guess at what your new

    prospect wants, right?


    Typically the REASON why they joined your list in the first place

    was to grab your \"carrot\" (bribe, lead magnet).


    * 7 Ways To Grow Huge Tomatoes


    * The 10 Most Dangerous Mistakes Men Make With Women


    * Ditch The Conventional Golf Swing To Drive The Ball Longer,

    Straighter, & More Consistently (Without Straining Your Body)!


    * 9 Proven Ways To Lose Stubborn Belly Fat (No. 2 and 3 are Best)


    * Dating With Tinder - The Definitive Guide To Doing Tinder Right


    * Crush Email Marketing Like President Barack Obama & Andre

    Chaperon


    Okay okay, I couldn't help lumping myself in with President Obama

    :-)


    It's a true story, though...


    President Barack Obama has a few elite email ninjas in his

    inner-circle...


    (Sadly I'm still waiting for the phone call from Barack.)


    During the 2008 U.S. presidential election campaign, the Obama

    camp sent out an email to a list of 2 million people.


    ... and raised $10 MILLION in donations from that SINGLE email

    (130,000 donors).


    ONE email.


    ONE day.


    130,000 ACTIONS inspired.


    $10 MILLION bucks.


    Not bad for a day's work, huh?


    Little wonder he won the election. The other guy didn't stand a

    freakin' chance.


    Then in 2012 he only went and did it again.


    Most of the $690 million (that's over half a BILLION dollars if

    you're good at math!) Obama raised online, came from fundraising

    emails.


    Impressive, yes?


    That's because email rocks!


    Anyhoo, I digress...


    Where were we? ... that's right - in the beginning it's easy to

    guess why a subscriber joined your email list.


    To get whatever you promised, right?


    But as time plays out, the level of market sophistication of your

    subscriber changes.


    Their needs \"shift\"...


    ... and your ability to \"guess\" where they're at is always going

    to be very compromised.


    To the point where MOST of the emails you send via broadcast will

    be irrelevant to MOST of your subscribers.


    With me so far?


    The broadcast-to-everyone system is broken, baby.


    Has been for many years.


    We live in world where we're bombarded by HUNDREDS of emails from

    people and marketing ads all trying to grab our \"goldfish like\"

    attention.


    ... every day!


    The instant the email you send someone becomes IRRELEVANT,

    they'll pull the ripcord and bail from your email list.


    It's all about RELEVANCE.


    It's how you get an insanely high EPS (earnings per subscriber).


    It's impossible to consistently deliver highly-relevant emails

    (at mass) to your audience, using broadcasting.


    It just can't be done effectively.


    Which is why I use autoresponders (follow-up sequences) to

    deliver the bulk of the emails I send.


    This is where you preload a number of emails into your email

    service provider...


    Email 1, Email 2, Email 3, Email 4, Email 5...


    You set the delay between each email.


    Then when someone joins your list, the system will automatically

    send out email 1...


    Then email 2 ... and then email 3... and so on and so on.


    This isn't rocket-science.


    This functionality has been around for years and years.


    The \"secret sauce\" comes next.


    But before I share that with you...


    YOU NEED TO UNDERSTAND THIS NEXT PART.


    Follow-up sequences allow you to do what, above all else?


    Remember, your emails will go out sequentially (hint hint).


    What does that allow you to do?


    Or rather ... what does it allow you to CONTROL?


    Think about it.


    I'll tell you tomorrow.


    I can guarantee you won't know the answer.


    Andre \"full of secrets\" Chaperon


    P.S.


    If you feel at all compelled to jump the line and fast-track your

    email marketing results.


    Then upgrade to AutoResponder Madness ( http://t.dripemail2._X19zPXl6eW1pYXF0eWl0c2kyc2lhZW1pIn0 ) (which would be a damn smart move).


