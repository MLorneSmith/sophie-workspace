content:
  body: "Welcome to a special edition of the Emergent Marketing

    Newsletter by André Chaperon & Shawn Twing. In this three-part

    series we're sharing ideas that can improve your writing and your

    marketing. If that's not interesting to you right now, you can

    mute this series (

    https://click.convertkit-mail.com/68uzp9k8mnu8hk6nn38uo/9qhd07zdtnhg54geeec9/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vbXV0ZWQv

    ). (If you decide you're in the wrong place entirely, you'll find

    a fully nuclear unsubscribe link in the footer of this email.)


    Hey, it's André & Shawn...


    Welcome to the third and final email in this series. (Read part I

    (

    https://click.convertkit-mail.com/68uzp9k8mnu8hk6nn38uo/08hwh9hmlnmp4oil/aHR0cHM6Ly9ja2FyY2hpdmUuY29tL2IvZ2t1bmg1aGRvbWs2eg==

    ) and part II (

    https://click.convertkit-mail.com/68uzp9k8mnu8hk6nn38uo/dpheh0hqpdq2x7bm/aHR0cHM6Ly9ja2FyY2hpdmUuY29tL2Ivemx1Z2huaDRyZWw3Nw==

    ) first if you haven't already.)


    Today we're going to give you a peek inside our writing toolkit

    and share a few tools that make us better, faster, and more

    persuasive writers.


    Tools that you can use too.


    And we're going to reveal something special we have planned for

    next week that requires an active hand-raise if you want to know

    more (link at the end of this email).


    Before we do that, however, we need to tell you where the

    quicksand is so we don't lead you astray.


    We've been drinking from the writing well for a looooong time.


    We've read the books, listened to the interviews, taken the

    courses, and polished our craft word by word, sentence by

    sentence, for decades.


    In our hearts and souls we're writers.


    But ... by itself, that's not enough.


    You could easily spend months — even years — studying writers and

    writing and never improve your results.


    Worse, it's easy to get frustrated along the way when you feel

    like the time, energy, and dollars you're investing to improve

    your writing should work, but for reasons you can't quite

    understand, they don't.


    Here's why: most of the writing tools and tactics you'll learn,

    on their own, aren't specific to our needs as marketers.


    They're useful — but incomplete.


    And when you try to use them you'll realize very quickly that

    they don't quite work as advertised.


    But wait ... that can't be true of copywriting, right?


    Wrong.


    Copywriting has its own problems.


    Copywriting is about persuading right now and, at any moment in

    time, most of your audience doesn't want to buy right now.


    When copywriting is the only tool in your toolbox, the incessant

    drumbeat of \"buy, buy, buy, now, now, now\" wears your audience

    down until they stop paying attention.


    But wait ... there's even more quicksand...


    Writing better isn't about theory.


    It's not enough to know principles of story, the three-act

    structure, structural tension, and more — you actually need to

    see those ideas in action to know how to use them in your own

    marketing-specific writing.


    Which brings us to an announcement we've wanted to make for a

    long time...


    Next week we're going to release our first ever writing course

    we're tentatively calling the Writing Masterclass (Vol. 1 —

    Email).


    Rather than present a bunch of theories and wish you the best,

    we're going to teach three of our favorite writing tools we've

    adapted specifically for creating interesting, compelling email

    campaigns, including:


    * The Three-Act Structure

    * Structural Tension

    * Framing

    * #######REDACTED#######


    (There's a fourth too, of course, but we don't want to give

    everything away just yet...)


    We'll show you how we used those tools in familiar, real-world

    examples that you've already experienced first hand...


    If you've ever wondered \"how the hell did they do that?\", we'll

    show you how in the upcoming Writing Masterclass.


    However, we want to be respectful of everyone's attention...


    If you're not interested in writing more persuasively, or you're

    not interested right now, you don't have to do anything.


    The next email you'll receive from us will be the 2022 Year in

    Review which we'll send before we turn off the lights and lock

    the doors on Dec. 9.


    But ... if you are interested and want to know more, you'll need

    to raise your hand (

    https://click.convertkit-mail.com/68uzp9k8mnu8hk6nn38uo/25hrw9vxfoh7ml7qxdt3/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vaGFuZC1yYWlzZS8=

    ).


    That series will start next Thursday, Nov. 24, enrollment will

    open on (Black) Friday Nov. 25, and enrollment will close at

    11:59 p.m. PST (Cyber) Monday, Nov. 28.


    This is a 'bullets to cannonballs' experiment and we have no idea

    if we'll ever offer this masterclass again.


    It all depends on what happens with the first group of daredevils

    who want to dive into the deep end of the pool with us. (The

    water is warm and drinks are cold.)


    As always, we appreciate your attention. We couldn't do any of

    this without you and we can't thank you enough for the

    opportunity.


    Enjoy your weekend.


    André & Shawn


