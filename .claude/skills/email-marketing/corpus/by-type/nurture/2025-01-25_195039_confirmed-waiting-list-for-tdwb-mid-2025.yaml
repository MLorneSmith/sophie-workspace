content:
  body: "Hey, this is Andre...


    This is an auto-reply to let you know you're on the waiting list

    for the public enrollment of Tiny Digital World Builders around

    mid-2025.


    I appreciate your attention, and so glad the content I'm sending

    you is resonating.


    Nothing for you to do at this point.


    I'll email you closer to the time when I know more precisely when

    the public release will be.


    Andre


    P.S.


    The reason I don't know yet is that between now and then, I'll be

    moving country, incorporating a new business, and all that fun

    stuff. lol.


    To respond to this email, just hit reply. I love getting replies,

    and read them all. However, I've come to realize that replying to

    each one is beyond my reach. I deeply regret this, but alas, the

    limitations of being a flawed human. So thank you for your

    understanding.


