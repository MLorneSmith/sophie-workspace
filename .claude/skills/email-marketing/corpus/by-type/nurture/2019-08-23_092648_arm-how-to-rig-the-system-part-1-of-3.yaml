content:
  body: "Here's something to think about...


    Any piece of information in isolation is very difficult for us

    humans to process and evaluate.


    We need to compare it to something else...


    Create an apples to apples or oranges to oranges comparison.


    This creates CONTEXT.


    ... and it allows us to assign a level of \"value\" to the new

    piece of information.


    Stick with me here ... this is stupid powerful.


    Smart marketers can take advantage of this trait of human

    behavior.


    Because we can \"rig\" the setup so that our audience ends up

    comparing apples to oranges, so to speak.


    There are tons of different ways to do this.


    Go back to where you were a prospect, evaluating whether you

    should invest in ARM.


    When you saw the price, what did you think?


    Was the $535 for ARM expensive or cheap?


    (Or for that matter, what if ARM cost $6,000?)


    Without me adding anything else to aid your decision-making

    process...


    ... I leave it up to YOU to create CONTEXT and CONTRAST, which is

    a damn risky business.


    Because you can just as easily compare the $535 to some $7 magic

    bullet email product you saw the week before on a Udemy.


    So this is why it's always smart to \"rig\" the system in your

    favor as much as possible.


    Like this...


    What if I said an hour of my time is $900 (which it is btw (

    https://el2.convertkit-mail2.com/c/r8uwz2e0mxt9u5oq0va2/08hwh9h9p0l25d/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9oaXJlLw== ))?


    And if you want me to fly out and strategize your email strategy

    with you for two days, it's $20K plus expenses.


    How does the $535 look now?


    For almost every person, when I frame (contrast) the $535 against

    the $900 and $20K, it'll suddenly seem a lot less expensive.


    ... and it completely removes the $7 product out the picture too

    (if it was even in the picture), because the mere mention of $20K

    puts this in a completely different category.


    Hope that makes sense.


    You can use context to create the perception of higher value (in

    your favor)...


    ... and you can also use it to create a path to belief (this is

    huge btw!).


    Both situations can be \"rigged\" (manipulated; in a good way of

    course) to your advantage.


    Not in a \"slimy\" evil way...


    But rather in a way that helps achieve the desired outcome that

    is beneficial to everyone.


    Now I'm a little biased of course.


    But IMHO there is no better more effective tool to \"connect\" with

    an audience...


    ... and ultimately, move to influence their behavior through the

    magic of (story-based) narrative emails.


    It's the perfect medium to use all these cool tricks and

    strategies I'll be sharing with you.


    Hope you're excited.


    To be continued tomorrow...


    Andre \"control contrast\" Chaperon


    --

