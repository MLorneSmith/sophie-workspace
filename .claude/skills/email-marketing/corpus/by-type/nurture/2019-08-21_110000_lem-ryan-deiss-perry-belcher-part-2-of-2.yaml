content:
  body: "Hey Mike,


    HERE'S SOME PERSPECTIVE for you...


    The part that most people struggle with when doing \"ARM style\"

    emailing, is the WRITING part.


    Last month I was in Austin TX attending a storytelling summit

    (Smarter Artist Summit):


    Andre speaking at SAS 2016 (NOTE: If you're seeing this text it

    means you have not allowed images to show for this email. Enable

    images to see this.)


    There were 150 odd attendees there. None of which were

    \"marketers\".


    This was my first time at an event like this.


    Almost everyone was an indie (fiction) writer. There were a few

    non-fiction writers, too.


    Now get this...


    Writers ... as in people who WRITE FOR A LIVING, are some of the

    worst email marketers on the planet.


    The. Worst.


    This blew me away.


    It's not what I was expecting.


    Many don't even have a damn email list.


    I mean, like seriously!?


    And those that do, are TOO SCARED to confidently email their

    list.


    WTF!?


    I found this trait very odd behavior.


    They're badass writers, after all, right?


    Writing is the part many ARM customers struggle with...


    Yet these writers have all the ingredients to make the best email

    marketers in the world.


    Yet they SUCK at it.


    They don't email because they're insecure and scared of what will

    happen.


    The perceived blowback.


    They're scared of upsetting their readers.


    I learnt a lesson that weekend.


    It gave me a different perspective that I had never been exposed

    to before.


    Or had ever considered.


    I believed the excuse marketers were telling me (or demonstrating

    through their behavior)...


    \"But I can't write well!\"


    Or, \"But I can't write like you, Andre!\"


    Then being around 150 writes I heard an altogether different

    reason (excuse).


    End result was the same, though.


    Inaction.


    Steven Pressfield has a fix (solution) for this.


    It works every time.


    It never fails.


    It works for me.


    It'll 100% work for you.


    But it's not always easy. That's the catch.


    Here's what Steven says:


    Quote from Steven Pressfield(NOTE: If you're seeing this text it

    means you have not allowed images to show for this email. Enable

    images to see this.)


    (Enable images if you don't see the image.)


    Think about that.


    It's not the fact that you may think you're a crap writer. That's

    not the constraint.


    When I started emailing I was totally crap.


    But I've got better over time.


    And writers that are too damn scared to email their audience,

    have the same problem.


    They're making an excuse.


    When you tell yourself whatever the excuse is, and it prevents

    you from action, you lose, your audience loses, and the

    Resistance wins.


    You're doing your audience a disservice by not emailing them.


    Even when it's a little shit.


    They WANT to hear from you. Like with the story of Dainis a few

    emails ago.


    Start. Now.


