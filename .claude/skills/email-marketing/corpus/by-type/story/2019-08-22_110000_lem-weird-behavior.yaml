content:
  body: "Hey Michael,


    I HAVE A FRIEND who used to operate under the name Clay Rogers.


    Clay is the dude behind The Hollywood Physique (he doesn't sell

    that product anymore).


    Earlier this year I emailed Clay to see how he was doing.


    He ended his email response to me with this:


    <CLAY>


    I thought you'd appreciate this... I quietly sold a $20 product

    back in 2013 as a test. Super simple product... that had a 21 day

    SOS autoresponder series tied to it (that people had to manually

    sign up for after they bought).


    Only sold roughly 1,000 copies... because I wasn't really sure

    what to do with it. Like I said, it was mostly a test.


    No selling at all in the 21 day series. And then, since I didn't

    know what to do, I just never mailed again.


    ...until I sent out a few blasts back in September. Literally

    more than 2 years since my last mail to this list.


    61% open rate!


    And that has been sustained with every message I've sent since

    then. Some of the messages I get from those old customers are

    nuts too, actually telling me to please never stop emailing (and

    to please sell them stuff -- seriously).


    So, long story short, thanks for ARM... and thanks for being a

    genuinely good dude in general. :)


    </END CLAY>


    Few things I have to say about that...


    FIRSTLY, it's never good to not email a list for over 2 years.

    It's an asset that needs nurturing.


    With that said though...


    Some strange and loony behavior can happen when your email

    marketing foundation has been built the right way.


    ... like Clay did years before when he first purchased ARM ( http://t.dripemail2._X19zPXl6eW1pYXF0eWl0c2kyc2lhZW1pIn0 ), then followed my methods.


    Imagine having subscribers that love your emails so much, they

    tell you to never stop emailing them.


    Oh yeah ... and that you should SELL MORE to them :-)


    lol


    It happens. You can do this too ( http://t.dripemail2._X19zPXl6eW1pYXF0eWl0c2kyc2lhZW1pIn0 ).


    Andre \"just saying\" Chaperon


