content:
  body: "4 min read


    Hey, it's Andre...


    As a citizen of the Tiny World I'm building for you to inhabit,

    such as you are, there's a level of attention that's required.


    This World is like an onion, with deeper layers to explore, each

    essay and newsletter an opportunity for me to present a layer of

    the onion and to draw your attention to some of the important

    parts of what we're building for our citizens to inhabit.


    The insights are revealed by seeing the connections between these

    onion layers.


    Today, I will build on what I shared in Issue 2 a few weeks ago.


    Then, in Issue 4, in a few weeks, I will 'breakdown' someone

    else's \"World\" from my observer perspective with no \"insider\"

    knowledge and share why I feel it's one expression, done well, of

    a multi-million-dollar a year Tiny World.


    If you're an overachiever, you'll want to revisit Issue 2 and the

    accompanying essay (

    https://click.convertkit-mail2.com/mvureqqlrqu6u6z473hmhrqmdlqqa3/z2hghnh388lpr4ap/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9jaXRpZXMtYW5kLWFtYml0aW9u

    ), then barrel into Issue 3 today.


    --
    1.
    --


    The essence I was pointing at in Issue 2, through the lens of a

    Paul Graham essay, is that a great city gives off a subtle

    \"message.\"


    And this message attracts ambitious people - \"collections\" of

    them.


    But the message can also push people away when it causes a

    feeling of dissonance. (This can be a bug or a feature.)


    When we build our Tiny World, we must thoughtfully architect and

    engineer the message that we want our 'city' to subtly convey to

    our citizens.


    (This is an emergent property, not something written in a

    headline, tagline, or about page.)


    Because if we don't (and I think I would be accurate in asserting

    that most people don't), make no mistake, there will be a

    \"message,\" and the people we seek to serve will pick up on it.


    Why is my 'shit' not converting as it should, you wonder?


    Why is everything underperforming?


    Why am I attracting the wrong audience?


    Because your metaphorical \"city\" unknowingly communicates

    something different from what you think.


    You're in the dark. But your citizens aren't.


    --
    2.
    --


    This dynamic points to one of the principles of a Tiny World,

    which I drew attention to at the end of the previous essay (

    https://click.convertkit-mail2.com/mvureqqlrqu6u6z473hmhrqmdlqqa3/z2hghnh388lpr4ap/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9jaXRpZXMtYW5kLWFtYml0aW9u

    ).


    What 'message' do you want your \"city\" to send to the ambitious

    citizens you aim to attract?

    While this message is something you can't turn off, an emergent

    property of all the parts of your business, website, messaging,

    and design, broadcasting subtly, implicitly, or \"by accident,\"

    it's there, talking to your citizens, whispering in their ears

    and influencing their behavior.


    Being a Tiny World Builder means knowing what we want our message

    to say and thoughtfully architecting and engineering it.


    --
    3.
    --


    Another principle of a Tiny World that's also \"invisible\" and

    only felt is the \"transformative experience\" we want to elicit.


    On the surface, elements of a traditional website/blog can \"seem\"

    nearly identical to what can be observed in the expressions of a

    Tiny World, like the one I'm building (or others here (

    https://click.convertkit-mail2.com/mvureqqlrqu6u6z473hmhrqmdlqqa3/p8heh9hzllqg52fq/aHR0cHM6Ly9qYW1lc2NsZWFyLmNvbS9hcnRpY2xlcw==

    ) and here (

    https://click.convertkit-mail2.com/mvureqqlrqu6u6z473hmhrqmdlqqa3/x0hph6hwllq9dzh5/aHR0cHM6Ly9mcy5ibG9nL2Jsb2cv

    )).


    They can seem the same - a collection of articles or blog posts.


    In the same way, an email series is just emails loaded into an

    autoresponder that are sent sequentially, right?


    Side by side, an email series on one traditional website or blog

    can seem much the same as another within a Tiny World - a

    collection of emails.


    But this surface-level analysis misses the essence of what makes

    a Tiny World so different from other websites and businesses

    wrapped within traditional marketing containers.


    It's like judging two books by just looking at them - well, they

    look the same - both have 400 pages, all text, separated by

    chapters.


    Yet one book elicits a visceral experience, a rollercoaster of

    emotions - tears one minute, raucous laughter a few pages later,

    all bound together with narrative suspense you can't peel away

    from.


    The other book, however, produces none of these emotions. It's

    forgettable. A week of reading you'll never get back.


    Two metaphorical books that look identical - the difference being

    in what you can't see but only can feel.


    But you will remember long afterward. A thematic \"message\" you

    can't let go, staying with you forever.


    That's what we're doing here.


    It's what this whole enterprise is about.


    We're in the resonance business, the experiences business.


    --
    4.
    --


    I've written a short essay about a moment I had about an

    experience I still remember seven years later as if it happened

    last weekend.


    Think about the insights you've discovered and internalized

    reading Issues 2 and 3, then read this:


    https://andrechaperon.com/experiences (

    https://click.convertkit-mail2.com/mvureqqlrqu6u6z473hmhrqmdlqqa3/6qheh8h7dd9n66ao/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9leHBlcmllbmNlcw==

    )


    An expression of a transformative experience; a miniature town, a

    Tiny World.

    In Issue 4, I'll be looking at someone else's TW, such as it is.


    Andre


    P.S.


    If you have a social following and think your followers will

    enjoy these perspectives, please share the essay link (or any

    others).


    It will help support the work I'm doing here, a rallying cry for

    sovereign creators like us, outlining how we can attract and grow

    audiences of true fans.


    We're not bound by the traditional marketing narrative.


    There is a better way: that's slower, calmer, and personal.


    It's a privilege to get to be able to do this work, and your

    attention is an honor.


    To respond to this email, just hit reply. I love getting replies,

    and read them all. However, I've come to realize that replying to

    each one is beyond my reach. I deeply regret this, but alas, the

    limitations of being a flawed human. So thank you for your

    understanding.


    (If you received this email from a friend, and would like to

    subscribe, please go here (

    https://click.convertkit-mail2.com/mvureqqlrqu6u6z473hmhrqmdlqqa3/kkhmh6hl33x623cl/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9qb2lu

    ).)


