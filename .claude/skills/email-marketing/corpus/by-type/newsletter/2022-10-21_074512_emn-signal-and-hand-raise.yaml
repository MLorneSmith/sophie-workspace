content:
  body: "Welcome to another issue of the Emergent Marketing Newsletter

    by André Chaperon & Shawn Twing. We focus on modern marketing,

    writing, and learning. We appreciate your attention and feel

    honored you're on this journey with us. (If you decide you're in

    the wrong place, you'll find an unsubscribe link in the footer of

    this email.)


    Hey, it's André & Shawn...


    Happy Friday!


    Buckle up because we're going full-nuclear supernova today.


    We see lots of bad marketing advice.


    Occasionally we see REALLY bad advice.


    And then there's a special category of absolutely terrible, avoid

    this at all costs, don't ever do it marketing advice!


    That's the subject of today's rant...


    We'll share that first, then steer you in the right direction to

    restore balance (and sanity) to the universe.


    Don't worry — today's email isn't all tricks. In the spirit of

    Halloween, we have some treats for you too.


    Let's get started...


    We don't spend much time on social media platforms — that's just

    not our thing.


    However, we're both deeply interested and invested in personal

    knowledge management (PKM) and tools for thought (TfT), and

    Twitter is the best place to keep our fingers on the PKM/TfT

    pulse.


    Twitter also likes to serve us marketing-related content (god

    bless them).


    Recently, we stumbled on this little gem:


    If we were smart, we would have hyperventilated for a few

    minutes, screamed into a pillow, and then moved on with our

    lives.


    If...


    Rather than continue to rage, we decided to turn this into a

    valuable lesson. That's cheaper than therapy.


    Let's be very, very, very clear: the world does not need more

    junk content.


    And you don't want an audience built on low-value, repurposed

    content...


    Plenty of others are doing that already.


    Spend any time on Twitter (and other platforms), and you'll

    quickly realize that a tiny minority of creators are doing the

    deep work (and reaping the rewards).


    The rest are \"adding their twists,\" which only adds noise to the

    already noisy signal. That's a race to the bottom you want to

    avoid.


    If you truly want to stand out — to attract and retain an

    interested, engaged, and committed audience — create signal.


    Don't contribute to the noise.


    We know what you're thinking — great idea, guys, but HOW DO I DO

    THAT?


    The answer probably will surprise you...


    Ready?


    You're already doing most of the work.


    Yes, you read that correctly.


    You're already filling the well with creative inputs. Books,

    articles, courses, emails, podcasts, and conversations...


    And you're already synthesizing those inputs into your own ideas.

    That's where those \"ah-ha\" moments come from when you're walking,

    exercising, taking a shower, and driving.


    You're already investing 90% of the effort.


    The problem is, you're missing the last 10% — and that makes ALL

    the difference.


    To do that, you need:


    * A system to capture the inputs you're already consuming.

    * And a method to effortlessly turn those inputs into ideas and

    insights — signal!


    When you get that right, you unlock the potential in all the work

    you've already done.


    That email you read reminding you of a podcast you listened to,

    which was related to a chapter you read a year ago, all come

    together into your unique view of something interesting and

    valuable to your audience.


    That's how you can truly stand out.


    It's the difference between being a category-of-one thought

    leader vs. the hundreds, maybe thousands, of add-your-own-twist

    followers.


    In Mark Twain's words, it's the difference between lightning and

    the lightning bug.


    That brings us to the treat we mentioned earlier...


    The question we hear most is, \"how do you two do it?\"


    How do we capture inputs...


    Connect the dots...


    Generate relevant ideas...


    Uniquely framed into a narrative and value proposition people

    want to hear about...


    ... and then turn those ideas into assets that create value for

    our audience and value for us in return.


    We answered those questions (and a helluva lot more) in a course

    we call Ideas to Assets (ITA).


    The first version of ITA captured a four-day adventure creating a

    customer-acquiring front-end for a client.


    We locked ourselves in a two-bedroom suite near JFK airport in

    November 2019 and documented our step-by-step process as it

    emerged.


    On day one, we had nothing except two blank screens. When we sat

    down for Thanksgiving dinner four days later, we had a

    ready-to-test asset for our client.


    Then we created an entirely new version of ITA for Black Friday

    last year.


    Version 2.0 captured the tools we use, how we use them, and the

    creative spaces, rituals, habits, and practices that drive and

    sustain us.


    We rarely mention Ideas to Assets. It's not for sale on our site.

    And we've only sold it twice in three years.


    However, we have big plans for ITA in 2023.


    We don't want to give too much away now, but we will say that ITA

    will become a standalone business next year.


    It's that important to us!


    Before we do that, we'll open ITA for enrollment one more time.


    This will be the last time we offer lifetime upgrades (trust us

    when we say you want lifetime access to what we have planned for

    ITA...)


    Enrollment for ITA will open on Friday, October 28, and close

    when the last of the ghosts and goblins drift off to sleep on

    Monday at 11:59 p.m. PDT, October 31.


    If you're not interested, you don't need to do anything.


    If you'd like to be notified when ITA opens, you'll need to raise

    your hand here (

    https://click.convertkit-mail.com/r8uwz2e0mxtoh27go59h2/g3hxodoru5he4wxl66cr/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vaGFuZC1yYWlzZS8=

    ).


    Enjoy your weekend.


    André & Shawn


