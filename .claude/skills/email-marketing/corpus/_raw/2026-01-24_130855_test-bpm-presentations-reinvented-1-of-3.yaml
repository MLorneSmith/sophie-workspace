content:
  body: "Influencing, inspiring, securing buy-in & navigating challengesView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=4&m=6&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l


    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email


    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    Hi Michael,


    Welcome back.


    Do you deliver


    **high-stakes presentations** - and fear your decks might not be up to the task?


    Do you struggle to:


    *


    **Strategically communicate** with and influence the C-Suite and senior executives?


    * Deliver


    **concise, coherent, consistent, compelling** narratives?


    * Overcome the notoriously short attention spans & zero tolerance for


    **waffle** of senior executives?


    You are not alone.


    You will recall that in Lesson Zero of DDM I talked about how MILLIONS of presentations are given every day and how nearly all of them stink.


    Here's why that is important.


    These bad presentations matter a lot.


    **They are how we represent ourselves and our work to the world. **


    They are the lingua franca of Corporate America.


    They are how we


    **influence**,


    **inspire others** to achieve goals,


    **get buy-in** for new concepts, and successfully


    **navigate challenging conversations**.


    And, as I said in the video, if we are honest with ourselves, they just aren't very good.


    Winging-it isn't the answer – our career success depends on these presentations not being bad.


    I am guessing (because you are HERE, reading this email) that you suspect you can get better results...


    Let me tell you...


    You can ABSOLUTELY get better results...


    I'll put money on it.


    And I'm talking about better presentations and better communication skills that act as


    **rocket fuel to your career**.


    Lift-off.


    \"Whoa, whoa whoa Michael!\"


    (That's the sound of my lawyer about to develop a serious bout of hives.)


    He doesn't like me making promises I can't control.


    So to not violate any FTC guidelines, I have to do what my lawyer calls \"cover my ass\".


    **DISCLAIMER:**


    In these emails I may reveal how my customers, clients, and colleagues have created some very successful business presentations.


    They have raised millions of dollars, convinced CEOs to spend billions, and inspired millions to ACT (seriously).


    Please understand that I am absolutely NOT—repeat, am NOT—implying that these results are typical and that you will match them.


    Such a claim would be ridiculous.


    Especially considering we've (probably) never met, and I don't know your business, your employees, or anything else about what you and your organization do.


    Just passively reading what I write in these emails won't transform the effectiveness of your presentations.


    Wouldn't it be nice if it worked that way, eh? :-)


    Reading is not enough.


    Serious execution (action) is required.


    And only YOU can do that!


    Having said this...


    What I'll be showing and revealing to you in these emails (and ESPECIALLY in my signature program, DDM) has worked very well for me and my clients and customers.


    What I teach is trusted by accomplished professionals - like the folks at


    **Goldman Sachs** (a multinational investment bank).


    **\"This is one of the best online training [programs] available.**


    **In a very short time it improved my storytelling skills and presentation abilities. The material was broken down just right, so that I could learn and take action piece-by-piece.**


    **Over a year later I'm about to study the material again and I'm looking forward to it. While content is king, the production value in the training is amazing. It's very enjoyable to watch.\"**


    ****- Nathan Slaughter, Vice President, Goldman Sachs****


    I only say this to demonstrate that what I teach not only works for others...


    ... but it'll also completely shift how you approach ALL OF YOUR PRESENTATIONS, moving forward:


    With me so far?


    Well...


    I've been rambling on for way too long already in this email.


    Let's hook-up tomorrow, same place, same time.


    Will ratchet up the nitty-gritty stuff then.


    **Michael 'serious action' Smith**


    **P.S.**


    **Your attention is precious.**


    **We're all struggling to keep up – with the news, social media, our inbox. The irony is not lost on me as I reach out to you via this email. But I believe a more personal connection can make good things even better.**


    **And since I'll be taking up space in your inbox, I'd like to tell you a bit more about myself.**


    **You might be wondering… Michael Smith... didn't he:**


    Win a Grammy https://en.wikipedia.org/wiki/Michael_W._Smith.


    Win a Nobel Prize https://en.wikipedia.org/wiki/Michael_Smith_(chemist).


    Spy for the KBG https://en.wikipedia.org/wiki/Michael_John_Smith_(espionage)!


    My name is also Michael https://www.linkedin.com/in/michaellornesmith/. You can read more about


    **THIS** Michael Smith's journey here https://www.linkedin.com/in/michaellornesmith/.


    **I always like to hear from readers, so don't hesitate to share your thoughts and feedback with me by simply hitting 'reply'.**


    **Your attention is a privilege I never take for granted. If this communication is no longer of interest to you, just click the unsubscribe link below to be removed from this email list:**


    Unsubscribe http://slideheroes.activehosted.com/proc.php?c=4&m=6&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&nl&act=unsub


    **SlideHeroes Incorporated, 125-720 King Street West Suite 2000, Toronto, Ontario M5V 3S5, Canada**"
