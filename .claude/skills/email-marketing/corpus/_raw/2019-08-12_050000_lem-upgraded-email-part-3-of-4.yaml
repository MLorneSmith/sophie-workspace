content:
  body: "Hey Mike,


    So ... did you guess correctly what autoresponders (follow-up

    emails) allow you to CONTROL?


    Here goes (and I bet you didn't guess this correctly)...


    The narrative...


    CONTEXT.


    The story you tell to your audience, in the ORDER you want them

    to consume it...


    Piece by piece...


    Bit by bit...


    Meaning...


    Someone has to first get (read) emails 1, 2 and 3, BEFORE reading

    email 4.


    Obviously.


    Therefore you CONTROL that FLOW of information.


    And you CONTROL in what ORDER they hear (learn) and are exposed

    to certain things...


    Which means you control the context of the conversation.


    I call this contextual flow of information a \"soap opera

    sequences\" (or SOS for short).


    It's where magic really happens within your email system.


    Make sense ... with me so far?


    (Come on, I need some head nodding. Work with me.)


    Okay, cool...


    Now it's time to ratchet things by up layering on the next piece

    of the puzzle.


    Behavior triggered soap opera sequences.


    Behavior. Triggered. Email. Baby.


    Remember, all these pieces work together holistically in a very

    strategic way.


    Nothing operates in isolation.


    With behavior triggered email sequences you get to deliver the:


    * right message,


    * to the right person,


    * at the right time.


    ... and everything is fully automated.


    BOOM!


    What's not to love, eh? :)


    Here's an illustration to help paint the picture for you...


    (NOTE: You need to enable images if you don't see the image

    diagram.) ( https://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzYwNzA0MzAxMyIsInVybCI6Imh0dHBzOi8vZW1haWwtaW1ncy5zMy5hbWF6b25hd3MuY29tL2FybS9hcm0tc2NpZW5jZS1iZXR0ZXIucG5nP19fcz15enltaWFxdHlpdHNpMnNpYWVtaSJ9 )


    (Click the image for the high-resolution version.)


    See that top line of 8 emails?


    That's your main SOS.


    It's what your subscribers get when they add themselves to your

    email list.


    Now take a look at email #5 (E5) on that top line...


    Within that email (which creates context pre-click, along with

    the previous emails leading up to that email)...


    ... is a special link that's coded to trigger another SOS.


    So, based on the BEHAVIOR of that subscriber (their intent), we

    get to deliver them more of what they care about.


    * right message,


    * to the right person,


    * at the right time.


    In the illustration example above you can visually see what

    happens.


    They get 3 new emails about whatever they clicked.


    This is HOW you get your EPS (earnings per subscriber) jacked

    right up.


    By being more RELEVANT.


    Let's say 500 people join your email list over a 30 day period.


    Of those, only 100 (20%) click that link in email #5.


    Guess what?


    Now you're ONLY exposing those 100 interested people to that 3rd

    email promotion.


    The other 400 people don't even see it (which is a GOOD thing).


    So they're happy because you're not hammering them with something

    they don't care about.


    But those 100 who ARE interested...


    They get that (extra) sequence.


    And if you look at the diagram above, there is a buy link in

    email #2.


    And BOOM! ... a percentage of the 100 will purchase.


    Using this strategic approach to email marketing...


    ... you get to GROUP people based on their behavior. Based on

    what MATTERS to them.


    Look ... we're all different.


    Just because you have an email list of 17,501 subscribers,

    doesn't mean their dreams, needs, desires, wants, are all inline.


    They're 100% not.


    We're all different.


    Unique.


    And your email marketing has to be rigged to operate in a way

    that delivers DIFFERENT emails to different people.


    Hope this is all making sense.


    In summary:


    1.) core follow-up sequence (autoresponder).


    2.) you get to control the flow and context of information

    through the use of a \"soap opera sequences\" (SOS).


    This is nothing more than a narrative played out over multiple

    emails, that delivers your marketing message.


    ... in a way that's congruent and inline with the needs, wants

    and desires of each subscriber.


    3.) based on their behavior, trigger other email automation

    sequences. Which results in...


    * more relevant messages,


    * to the right person,


    * at the right time.


    BOOM!


    You've just given your email marketing efforts a major upgrade

    (and pay raise).


    Better for you.


    But more importantly, better for your people.


    More tomorrow.


    Andre \"serialized\" Chaperon


    P.S.


    Notice how I've sent these last 4 emails out to you.


    I'm not broadcasting them to you.


    It's a follow-up sequence.


    A narrative that I've carefully written to lead you down the

    rabbit hole into Email Wonderland.


    You're in my sphere of influence now.


    Where I get to \"connect\" with you on a far deeper more personal

    level.


    And there's a good chance that, if not now, at some point you'll

    become a valued customer of mine.


    It's almost inevitable.


