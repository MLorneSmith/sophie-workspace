# =============================================================================
# USAGE GUIDELINES
# =============================================================================
usage:
  when_to_use: |
    Use these POVs when:
    - Writing campaigns about SlideHeroes AI features
    - Addressing AI-related concerns from prospects
    - Differentiating from AI-first competitors (Beautiful.ai, Tome, etc.)
    - Educating audience about smart AI usage

  tone_guidance: |
    SlideHeroes AI POVs should be:
    - Balanced (neither AI-dismissive nor AI-worshipping)
    - Practical (focus on real use cases, not theoretical)
    - Expert (we understand both AI capabilities AND presentation design)
    - Honest (acknowledge where AI helps and where it doesn't)

  avoid: |
    - Hype about AI being "magical" or "revolutionary"
    - Dismissing AI as useless or just a fad
    - Overpromising what AI can do
    - Technical jargon about AI/ML
