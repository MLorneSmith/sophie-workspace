# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# SlideHeroes CodeRabbit Configuration

language: en
early_access: true

# Focus on bugs, security, and logic — skip style nitpicks that CI catches
tone_instructions: >-
  Focus on bugs, security issues, logic errors, and missing error handling.
  Skip style and formatting issues — CI handles those. Be concise.
  Only comment when you're confident something is wrong or risky.

chat:
  auto_reply: true

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev
    ignore_title_keywords:
      - "WIP"
      - "DO NOT REVIEW"
    # Skip promoted PRs from Sophie on upstream — already reviewed on fork
    ignore_usernames:
      - "SophieLegerPA"

  # Review style - thorough but not nitpicky
  profile: chill

  # Summary and visualization
  high_level_summary: true
  sequence_diagrams: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  changed_files_summary: true

  # Disable walkthrough noise
  suggested_labels: false
  suggested_reviewers: false
  related_issues: false
  related_prs: false
  in_progress_fortune: false
  estimate_code_review_effort: false
  enable_prompt_for_ai_agents: false

  # Don't auto-approve once comments are resolved (Sophie iterates, Mike approves)
  request_changes_workflow: false

  # Exclude build artifacts, dependencies, and generated files
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/.next/**"
    - "!**/.turbo/**"
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/*.gen.ts"
    - "!**/.ai/**"
    - "!**/.claude/**"

  # Focused review instructions — only what CR can catch that CI can't
  path_instructions:
    - path: "**/*.{ts,tsx}"
      instructions: |
        This is a Next.js 15 monorepo (Turborepo) with Supabase, Tailwind v4,
        Payload CMS, and Biome for linting/formatting.

        Focus on:
        - Logic errors and incorrect business logic
        - Security: RLS bypass, exposed secrets, injection risks
        - Missing error handling, uncaught promise rejections
        - Architectural concerns (wrong abstractions, tight coupling)
        - Race conditions and concurrency issues
        - Server vs Client component misuse

        Skip (CI handles these):
        - Formatting, import ordering, unused imports
        - Type narrowing that Biome catches
        - Naming convention nitpicks

    - path: "packages/supabase/**/*.sql"
      instructions: |
        CRITICAL: Verify RLS policies exist on all new tables.
        Check for: SQL injection risk, missing indexes on filtered columns,
        overly permissive policies (USING (true) on sensitive tables),
        unsafe migration patterns that could lose data.
        Skip: naming convention nitpicks, comment formatting.

    - path: "**/*.env*"
      instructions: |
        CRITICAL: Flag any real secrets, API keys, or credentials.
        Only .env.example files should be committed.

    - path: "**/*.test.{ts,tsx}"
      instructions: |
        Check for: meaningful assertions, missing edge cases,
        improper async handling, tests that always pass.
        Skip: assertion style preferences, test naming nitpicks.

  # Disable tools that overlap with CI (Biome lint/format runs in PR Validation)
  tools:
    biome:
      enabled: false
    eslint:
      enabled: false
    markdownlint:
      enabled: false
    languagetool:
      enabled: false

# Issue Planner - Rabbit Plan integration
issue_enrichment:
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels:
        - "plan-me"
        - "!no-plan"
