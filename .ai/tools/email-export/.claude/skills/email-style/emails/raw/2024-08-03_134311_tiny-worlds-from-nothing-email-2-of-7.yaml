content:
  body: "Hey, it’s André...


    Glad you made it back.


    In Part II of the Manifesto (

    https://click.convertkit-mail2.com/gku5vwwz5wiwu8o22ktrh89o3999cm/g3hnh5h3n2noelbr/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9tYW5pZmVzdG8=

    ), I presented three ideas, the first setting up the important

    frame…


    The Internet is like Tokyo is a metaphor I heard in an interview

    with Derek Thompson, a staff writer at The Atlantic.


    Selling 1980s whisky in a Des Moines suburb (the capital city of

    Iowa) is unlikely to be a successful venture.


    With a population of just over 200K, being too specific is a poor

    strategy. Game over, thanks for playing.


    This is why a broad appeal is a safe bet, the business model of

    billion-dollar chains like Subway, McDonald’s, and Starbucks,

    which thrive in little Des Moines.


    But the moment we recognize our sandbox is a city 13 times the

    size of Tokyo, all accessible within a “click,” how we think

    about mass vs. specificity changes.


    Completely!


    In this dynamic, there’s a liability to being too broad. It’s a

    game of high-risk and deep pockets.


    But we’re creators, not unicorns.


    We play different games.


    We’re Tiny, so we’re nimble.


    We can course-correct and adapt in real time.


    Unicorns eventually die off when the next bigger and badder

    unicorn arrives to eat the lunch of the weaker one unable to

    maintain its grasp on mindshare (Vine, Friendster, Google Wave,

    Google+, Ping, Orkut…).


    Survival of the fittest, a digital expression of the Darwinian

    theory of evolution in full swing.


    But Tiny means we can embrace inefficiency. TW is all about being

    inefficient (but that’s a lesson for another day).


    Once we recognize that Tiny thrives in the City of the Internet,

    the second idea clicks into place.


    Delighting the Weird.


    Fancy a bottle of Yamazaki Pure Malt Whisky distilled and bottled

    in Japan by Suntory Limited in the 1980s?


    No problem…


    The City of the Internet has it, stores that are “invisible” to

    the masses but where aficionados know exactly where to go to have

    their needs served.


    Maybe it’s Flaviar.com 🥃, a members-only spirits club whose

    business model is purpose-built to serve and delight the weird

    spirit drinkers in the City of the Internet.


    We forage the World of Spirits for the finest, rarest and most

    unique expressions out there and pack it all into a 21st century

    Members Club. We, ladies and gents, lead the speakeasy movement

    of the modern day.

    Flaviar, like us, is a sovereign creator, and we’re all

    expressions of a 1,000 True Fans business.


    This third idea is a conceptual “container” for being

    intentionally Tiny, proudly serving the Weird, and in doing so,

    creating a ‘true fans’ factory from which happy customers emerge.


    With our website as our canvas…


    With our words (and/or voice) as our paint…


    With our brush as the interface (keyboard, camera, software) we

    use to paint color on our canvas…


    … and led with the spirit of empathy, we take our ideas and build

    a World for our audience to inhabit, rich and engaging for them

    to explore and experience, pulling them in because it creates an

    environment that feels useful and meaningful on their journey.


    Is this resonating? (Hit reply and let me know.)


    In the next email, I’ll draw attention to a superpower of

    ‘open-world’ marketing that seems counterintuitive at face value.


    We’ve been conditioned to believe that internet marketing is a

    game of awareness and discovery, then when we have someone’s

    attention, there is a limited window of opportunity to drive home

    a sale!


    So the first thing we do is add people to a linear sales funnel,

    and if we’ve done our job well, a single-digit percentage will

    “convert” into a customer, keeping the system turning over.


    It’s a system that’s always worked.


    Which begs the question, why mess with it?


    If Elon thought that, there would be no Space X or Tesla, and the

    fossil fuel incumbents wouldn’t be scrambling to retool their

    businesses for fear of being rendered irrelevant tomorrow.


    Change is like that.


    It can sneak up on those not paying attention.


    If we know one thing about change, it’s an inevitable requirement

    of progress.


    André


    P.S.


    Our world has expanded from the previous email.


    ​

    It’s now a place worth exploring for some people.


    To respond to this email, just hit reply. I love getting replies,

    and read them all. However, I've come to realize that replying to

    each one is beyond my reach. I deeply regret this, but alas, the

    limitations of being a flawed human. So thank you for your

    understanding.


