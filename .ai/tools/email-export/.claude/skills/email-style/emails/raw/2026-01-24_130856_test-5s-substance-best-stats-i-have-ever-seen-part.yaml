    World Health, TED and GoogleView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=16&m=18&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l

    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email

    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**

    **"It is perfectly okay to write garbage—as long as you edit brilliantly."**

    **- C. J. Cherryh**

    Hi Michael,

    I really like that quote.

    Anyway...

    Got a question for you...

    What is

    **your biggest challenge** with presentations?

    You know, the part you struggle with the most.

    Or put another way...

    If you could wake up tomorrow morning and be a ROCKSTAR at this one thing (in regards to presentations), what would that be?

    HIT REPLY and let me know.

    It would mean the world to me.

    **Michael "waiting patiently" Smith**

    **P.S.**

    **You may have been wondering what 'The best stats I have ever seen Part 2' are.**

    **Good question. Glad you're paying attention.**

    **Just before I wrote this email to you, I was on TED.com re-watching a talk from Hans Rosling.**

    **Guy was a real trail-blazer.  He presented the following talk at TED in TED's early days. Sergey Brin and Larry Page were in the audience. They ended up buying the presentation technology Hans had developed for this talk.**

    **Anyway, I digress...**

    The talk is called "The Greatest Stats You Have Ever Seen" https://www.ted.com/talks/hans_rosling_shows_the_best_stats_you_ve_ever_seen

    **And they are.**

    **If you're at all like me and love data, you'll probably enjoy it (a lot)**

    https://www.ted.com/talks/hans_rosling_shows_the_best_stats_you_ve_ever_seen

    It's been watched nearly 14 million times as I write this.

    Oh yeah. There's also a sequel https://www.ted.com/playlists/474/the_best_hans_rosling_talks_yo#targetText=The%20best%20Hans%20Rosling%20talks%20you've%20ever%20seen&targetText=You've%20never%20seen%20data,%2Dcalled%20%22developing%20world.%22.

