  body: |
    A parableView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=14&m=16&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l

    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email

    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**

    Hi Michael,

    Let me tell you a

    **Story**.

    In a faraway land, a boy went to learn at the feet of a wise man day after day.

    The wise man always instructed the boy through stories.

    One day, the boy asked

    **"Master, why do you always teach through stories? Would it not be faster to teach me directly?"**

    To this, the wise man answered

    **"Please bring me some tea."**

    The boy rose and prepared a cup of tea in a white china cup.

    The wise man took the cup from the boy and sipped it, then asked

    **"Why did you bring me a cup when I only asked for the tea?"**

    Why, indeed.

    Story is particularly powerful when we leverage it to ENRICH the MEANING of what is happening at times and in ways that our audience doesn't expect.

    There are at least three key ways to incorporate story into a high-stakes presentation:

    **1. Start well** - grab your audience's interest by the throat

    **2. Add meaning and modulate pacing through anecdotes** - inject color to illuminate and entertain

    **3. Reinforce your main message through parable** - a simple story to illustrate the lesson

    But, contrary to popular opinion, a good story isn't well told.

    **It is well designed.**

    There are many, many frameworks for a great story.  For high-stakes presentations, simple is often better.

    Pixar, the animation studio behind Toy Story and Finding Nemo, claim their stories are built on the following, simple spine:

    1. Once upon a time there was ___________________.

    2. Ever day, ___________________.

    3. One day ___________________.

    4. Because of that, ___________________.

    5. Because of that, ___________________.

    6. Until finally ___________________.

    I have learned an absolute ton about story from Chip and Dan Heath, who I first came across via their tremendous book Made to Stick https://amzn.to/2I27W0r.

    Dan and Chip have identified 5 elements that that make any great story memorable:

    **simplicity, unexpectedness, concreteness, emotion, and credibility**.

    Incorporating all of these elements into business stories isn't always possible.  But we can try.

    You will find that applying Pixar's template and Chip and Dan Heath's elements to the design of even a simple example will dramatically improve its impact.

    Have a listen to Steve Jobs, a master storyteller, as he introduces the iPhone https://www.youtube.com/watch?time_continue=29&v=MnrJzXM7a6o for the first time and see how many of these elements you can identify him using.

    https://www.youtube.com/watch?time_continue=29&v=MnrJzXM7a6o

    Amazing to look back on that isn't it?

    **Michael 'Storytime' Smith**

    **P.S.**

    **Our next S is Substance.**

    **By this I mean depth of critical thinking. Facts. Data. Evidence.**

    **Often it is hard to present our evidence simply, clearly (recall some of the research presentation examples from a few days ago).**

    **Tomorrow I'll share with you one of the greatest examples of clear, easy to interpret, data intensive 'slides' ever.**

    **Until then.**

