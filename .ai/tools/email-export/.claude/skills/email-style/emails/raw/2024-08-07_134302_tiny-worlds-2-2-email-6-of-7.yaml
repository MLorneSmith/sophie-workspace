content:
  body: "Hey, it's Andre...


    In the previous (

    https://click.convertkit-mail2.com/o8urw33lr3uwumlz4guvhqrekrrrio/6qheh8h76v9750io/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9lbWFpbHMvd2F5ZmluZGluZw==

    ) email, I spoke about wayfinding, a tool to orient people toward

    something useful, meaningful, and inevitable.


    The insight is that the path is intentionally not a straight one.


    It's non-linear, an expression of choose-your-own-adventure

    (CYOA).


    This flies in the face of what we've come to believe as the

    \"best\" way to move someone between two endpoints - a linear

    series of optimized conversion points in an effort to prevent

    \"leakage\" and compress the sales cycle.


    Both work.


    But as I've made a case for across this email series, an

    'open-world' marketing funnel comes with benefits tied directly

    to happiness - prioritizing, by design, the self-interest of each

    person entering our Tiny World.


    A friend recently read an article on Forbes (Google Is About To

    Turn The Online Publishing Industry Upside Down (

    https://click.convertkit-mail2.com/o8urw33lr3uwumlz4guvhqrekrrrio/kkhmh6hl2gxl5zul/aHR0cHM6Ly93d3cuZm9yYmVzLmNvbS9zaXRlcy9tYXR0bm92YWsvMjAyMy8wNS8xMS9nb29nbGUtaXMtYWJvdXQtdG8tZHJvcC1hLW51Y2xlYXItYm9tYi1vbi10aGUtb25saW5lLXB1Ymxpc2hpbmctaW5kdXN0cnkv

    )), asking me about my take on the potential implications of how

    search engines are changing how they display results to users and

    how we get traffic.


    I said:


    \"We're in the experiences business, not the answers business. (...)

    I suspect I'll need to visit fewer 'websites' when I search for a

    specific question I need a quick answer to. But we're not in that

    business.


    Implicit in this email series is a theme that should by now be

    obvious.


    Implicated throughout Tiny Worlds is a sense of adventure.


    It's easy to think we're in the answers business because the

    people we serve have questions, and we answer them through our

    solutions to their problems (codified as products)...


    But that's not the best framing for what we do.


    Life isn't about endpoints - achieving personal and professional

    goals.


    When you slow down and think about what matters in life, it's

    about your journey.


    And within that larger arc are many journeys.


    What matters is the process.


    Every product I've created has never been a lexicon of answers.


    Instead, they've provided customers with 'tools' to better engage

    in their journey.


    * Tools that help explore and navigate new or unfamiliar

    territories (example: a different expression of email marketing),

    * Engaging in challenging tasks (example: a better way to build

    trust and attention),

    * Participating in thrilling events (example: using serialized

    narratives),

    * or overcoming challenges (example: creating better prospects).


    The Unifying Theory of 2 + 2 (as expressed (

    https://click.convertkit-mail2.com/o8urw33lr3uwumlz4guvhqrekrrrio/58hvh7hmop6mnqf6/aHR0cHM6Ly93d3cueW91dHViZS5jb20vd2F0Y2g_dj1LeUR3aWVLcGF3Zw==

    ) by Andrew Stanton) is an elegant metaphor to remember.


    Giving people \"4\" (an answer) undermines the work required in

    formulating the best answer for the self-interest of each person

    in our World.


    When we read a book or watch a TV series, we don't start at the

    end to see the twist and discover whodunnit.


    The experience is in the journey of discovering \"2 + 2\" along the

    way, putting the pieces together ourselves from the evidence

    discovered.


    Tiny Worlds is a canvas, a container, for having experiences

    informed by one's self-interest, which pulls people along, the

    \"tools\" discovered allow our audience to be upgraded as they

    navigate their journey.


    The unpredictability and necessity of decision-making are key

    elements that contribute to the excitement and engagement of a

    journey or adventure.


    And implicated in that decision-making is an 'open-world'

    offering different paths (CYOA) towards an endpoint that feels

    inevitable.


    These elements introduce uncertainty and risk, heightening the

    sense of adventure.


    The choices can lead to different outcomes or experiences, adding

    to the intrigue and suspense of the journey.


    This is often why adventure stories involve crossroads, decision

    points, and unexpected challenges.


    As I told my friend, \"We're in the experiences business, not the

    answers business.\"


    Final email in the series next.


    Andre


    P.S.


    The previous five metaphorical illustrations were expressions of

    Tiny Worlds that had a fun-in-the-sun vibe as they expanded.


    Not wanting to alienate any urban lovers, today and the final

    expression in the following email have a city vibe.


    These illustrations aren't meant to be accurate \"maps\" of

    whatever you're building.


    We're not world-building for a fictional fantasy world where

    locations on a map are expressed in the words of a book and

    brought to vivid life.


    Rather, it's a fun way to create a visual mental model of the

    World you're building around your central idea.


    I live in Gibraltar, an area of 6.7 km2 (2.6 sq mi), located at

    the southern tip of the Iberian Peninsula.


    This is an actual aerial image taken a few years ago:


    (And yeah, we have a 1778-meter runway dissecting the country.)


    The landscape is dominated by the Rock of Gibraltar (a nature

    reserve), at the foot of which is a densely populated town area,

    home to some 32,000 people, me being one.


    Many people are drawn to Gibraltar to live. Some people love

    Gibraltar. Others don't. Which is the point.


    The illustrations I've been dawning loosely represent an

    expression of the place I live.


    It'll be different for you, just as your creator-based business

    differs from mine. Which is the point.


    To respond to this email, just hit reply. I love getting replies,

    and read them all. However, I've come to realize that replying to

    each one is beyond my reach. I deeply regret this, but alas, the

    limitations of being a flawed human. So thank you for your

    understanding.


