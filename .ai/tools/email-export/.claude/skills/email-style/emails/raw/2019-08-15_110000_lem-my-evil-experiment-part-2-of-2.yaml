content:
  body: "Hey Mike,


    Let's see if you guessed correctly...


    The end result of that \"evil experiment\" was ATTENTION.


    And when I leveraged that attention, I was able to generate more

    sales than I ever had up till that point.


    Here's why...


    Because I had suddenly made it really DIFFICULT (hint hint) to

    get onto my \"free\" email list...


    ... I earned their attention.


    (People crave what they can't have, or what's hard to get. It's a

    universal human trait.)


    Counterintuitive, I know, but...


    Suddenly--even thought it was a free newsletter--that's not how

    they perceived it.


    I gave the \"perceived value\" a real tangible price.


    So now suddenly it wasn't \"free\" that was anchored to the offer.


    ... it was $97.


    BOOM! ... suddenly perceived as more valuable!


    This ratcheted up the tension they were feeling (coupled with the

    fear of loss, and fear of missing out and not being included).


    Which increased the level of attention I controlled.


    Making sense?


    Once on my list, do you think they then just mentally

    \"opted-out\"?


    No sir. Not a damn chance.


    Not only didn't they mentally opt-out like they do on other

    \"bribe driven\" lists.


    ... but I owned and controlled their attention from the very

    START.


    I then layered on \"email awesomeness\" al la ARM ( http://t.dripemail2._X19zPXl6eW1pYXF0eWl0c2kyc2lhZW1pIn0 ), that I had been using, honing, and tweaking for a couple of

    years already...


    Which 2 years later, in 2009, I packaged up as AutoResponder

    Madness (version 1.0).


