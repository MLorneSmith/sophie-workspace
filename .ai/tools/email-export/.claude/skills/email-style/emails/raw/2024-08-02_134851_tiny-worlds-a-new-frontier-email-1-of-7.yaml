content:
  body: "Hey, it’s André...


    Glad you made it, I’ve been waiting for you.


    By now, you should have read the manifesto (

    https://click.convertkit-mail2.com/gku5vwwz5wiwu8o242brh89o3999cm/e0hph7h0ednrqxc8/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9tYW5pZmVzdG8=

    ), which frames how things are now, the problems as I see them

    with the accepted “best practices” of traditional internet

    marketing, and what I think is a better paradigm to strive for

    and why.


    If you haven’t read the manifesto (shocker!), or have only

    skimmed through it, you can access it here (

    https://click.convertkit-mail2.com/gku5vwwz5wiwu8o242brh89o3999cm/e0hph7h0ednrqxc8/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9tYW5pZmVzdG8=

    ).


    In this short email series, I’m going to continue to explore some

    of the ideas in the manifesto, but from slightly different

    perspectives.


    I’ll also be covering new ground.


    Hit reply anytime and let me know what “shift” in your thinking

    has changed. Or if you disagree with any of my assessments, I

    would love to hear your perspective.


    I read every email.


    Each email will take no longer than five minutes to read. I want

    these ideas to be accessible to you while respecting your time.


    Let’s get started.


    –


    Socrates, the ancient Greek philosopher, was famous for

    questioning traditional beliefs. He faced accusations of

    corrupting the youth and rejecting Athens’ gods. In 399 BCE,

    Plato’s Phaedo tells us he was sentenced to death by drinking

    poison hemlock.


    Charles Darwin’s Theory of Evolution, based on natural selection,

    met substantial resistance from religious and scientific groups.

    Today, it’s the foundation of modern biology and our

    understanding of the natural world.


    Louis Pasteur’s germ theory revolutionized medicine and hygiene

    by suggesting that microorganisms cause diseases. Initially met

    with skepticism, it later became the foundation for modern

    medicine.


    In a similar vein, electric vehicles (EVs) were initially viewed

    with skepticism. That changed when Elon Musk disrupted the

    industry, showing a boldness that traditional incumbents lacked,

    causing a fundamental shift in perspective.


    Thankfully 'the crazies' are no longer burnt at the stake for

    challenging conventional thinking.


    I say all of this to establish a frame of reference for this

    series.


    If anything, I hope this gives you the permission to challenge

    some of your beliefs about how marketing should be done.


    The “new frontier” paradigm reflects venturing into unknown

    areas, seizing fresh opportunities, and adopting innovative

    thinking that questions traditional internet marketing norms.


    Tiny Worlds will cause you to push up against some of your

    beliefs around internet marketing.


    I encourage you to take risks and test these ideas yourself…


    It’s easy for me to tell you this works better than anything else

    I’ve experienced in two decades of doing this…


    But the most powerful change will come from your own

    observations.


    The work I’m doing here is to demonstrate through practice,

    teaching, by showing.


    I encourage you to embrace curiosity (a value (

    https://click.convertkit-mail2.com/gku5vwwz5wiwu8o242brh89o3999cm/7qh7h8ho8x4nzvhz/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS92YWx1ZXM=

    ) I hold dear) and have a bias toward action over theory.


    I encourage you to innovate in order to create a better

    expression of how you use marketing as a tool to attract and

    serve your audience.


    And I encourage you to have a pioneering spirit on a journey that

    will feel weird before it feels right (and eventually ‘duh’

    obvious).


    Tiny Worlds is based on a controlling idea of building an “open

    world” that affords non-linear funnel paths, creating

    (transformative) experiences for the people we seek to serve…


    The byproduct of this “pulls” people to want to be in our orbit,

    inhabit our World, and for customers to emerge from interactions

    that feel altogether different.


    There’s a lot here to chew on, so I’ll wrap up this email.


    More tomorrow, same place same time.


    André


    P.S.


    The page you used to add yourself to this email list had two

    images as a visual metaphor representing two example expressions

    of a Tiny World (TW).


    Both symbolized “a world,” representing a creator website that

    already attracts an audience.


    But deconstructing a system in order to understand the individual

    parts is problematic because the emergent properties of a World

    aren’t something you “find” but rather something that’s

    experienced through the interaction between the parts.


    So during this series, I’ll “construct” a new TW from scratch,

    represented as a visual metaphor that develops from email to

    email.


    As such, our TW starts with just you and your novel or central

    idea. There’s no audience – no one knows you exist yet.


    ​

    For me, that novel idea is TW.


    For you, it’s whatever is at the center of your creator-based

    business. Even if that’s you as the personality (a coach for

    example), there’ll be some unique mechanism you do that no one

    else does.


    That’s the starting point.


    P.P.S.


    One final note before I let you go:


    If you use Gmail, be sure to move (drag) this message into your

    “Priority Inbox.” If you don’t, you’ll miss stuff because my

    emails will probably be sent to the “Promotions” tab or your spam

    folder. That’s where you should check if you think you’re missing

    emails.


    To respond to this email, just hit reply. I love getting replies,

    and read them all. However, I've come to realize that replying to

    each one is beyond my reach. I deeply regret this, but alas, the

    limitations of being a flawed human. So thank you for your

    understanding.


