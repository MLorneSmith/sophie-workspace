content:
  body: "High Stakes Business Presentation TrainingView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=3&m=5&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l


    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email


    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    Hi Michael,


    Thanks for signing up for 'Lesson Zero' of SlideHeroes' signature business presentation training 'Decks for Decision Makers' (or DDM for short).


    Really glad you are here.


    (If you have not had a chance to watch the lesson, you can see it here https://learn.slideheroes.com/products/lesson-zero.)


    And welcome to the


    **'Business Presentation Mastery'** email series (or


    **'BPM'**, for short), where I will dive deeper into many of the ideas we touch on in Lesson Zero and throughout the DDM course.


    DDM is used by employees at large companies (e.g. Walmart, Pfizer, npower), financial service providers and investment banks (Goldman Sachs, Swiss Re, Travelers), Silicon Valley start-ups (OneLeap), non-profits (Teach for America), the public sector (US Department of Energy) and is part of the teaching curriculum at colleges in Canada and the United States.


    Over the last few years we have had thousands of graduates.


    Here's what venture capitalists say about DDM:


    **'As soon as I saw the first video of the course, I told myself: every entrepreneur should watch this! It will help them determine what to convey in their presentation and how to display their ideas clearly and convincingly.**


    **I recommend SlideHeroes to every entrepreneur that needs to communicate with a VC!'**


    **- Vanesa Kolodziej (GRUPO CLARIN Venture Capital)**


    And John Lushetsky, the Chief Operating Officer of the Office of Policy at the US Department of Energy, had this to say about DDM:


    **'10 out of 10.**


    **Great content and support materials!**


    **Michael's delivery and the flexibility of the pre-recorded online format were fantastic.'**


    But for now though, don't worry about Decks for Decision Makers.


    There is nothing for you to buy here.


    Enjoy this BPM (Business Presentation Mastery) series, yours, on the house.


    My expectation is that it is going to provide you with AMAZING value.


    Oh, and btw...


    Every email I send you that's part of this training, will have a subject line prefixed with [BPM], like this:


    **[BPM] Subject line (Part X)**


    This way you'll instantly know it's associated with this training series.


    When you see that email hit your inbox each day, open it and read it.


    You'll get one \"bite sized\" email from me each day for the next week.


    This is on purpose. So you can easily consume each email (lesson).


    I'm going to show you a (very) powerful way to approach creating, writing and designing business presentations.


    In fact this approach works so well that companies pay salaries in the hundreds of thousands of dollars to people who have these skills.


    Just saying.


    You can do this, too.


    And I'm going to show you how.


    So pay attention.


    Because what I'll be exposing you to will


    **REFRAME** how you engage with your business audiences – be they your executives, your partners, your investors, your customers, or your employees.


    In a few days I'll also reveal a \"case study\" where I have a bit of fun critiquing a presentation from a leading management consultancy.


    I'll be sharing the whole tear down with you.


    Anyway...


    Lot's more to come.


    Strap yourself in.


    **Michael \"See PS\" Smith**


    **P.S.**


    **Got a question for you...**


    **What is your


    **biggest challenge** with presentations?**


    **You know, the part you struggle with the most.**


    **Or put another way...**


    **If you could wake up tomorrow morning and be a ROCKSTAR at this one thing (in regards to presentations), what would that be?**


    **HIT REPLY and let me know.**


    **It would mean the world to me.**


    **P.P.S.**


    **Hungry for more?  Let's not waste any time and jump right into the good stuff. **


    **Here is a link to our Manifesto.**


    Advanced Guide to Creating McKinsey-style Business Presentations https://s3-us-west-2.amazonaws.com/slideheroes-ebook/SlideHeroes+Advanced+Guide+to+Business+Presentations.pdf. At 10,000 words, it is the size of a short novel. Download it and follow along.


    **P.P.P.S**


    **We are also thrilled to offer you our PowerPoint template for free.**


    **This template includes over 1,000 professionally designed slides:**


    Free Download of the SlideHeroes Presentation template https://s3.amazonaws.com/SlideHeroesLeadMagnet/SlideHeroes+Presentation+Template.zip


    **8 PPTX files and 8 PPT files (4 designs 16×9 aspect ratio; 4 in 4×3)**


    *


    **2 color variations in each file – colorful and white style**


    *


    **The required custom font files**


    *


    **Dozens of live, data-driven charts**


    *


    **Fully animated and editable slides**


    Download your free presentation template by clicking here https://s3.amazonaws.com/SlideHeroesLeadMagnet/SlideHeroes+Presentation+Template.zip.


    **P.P.P.S.**


    **Remember: If we don't add meaningful value to your life or the work you do, please use the unsubscribe link at the bottom of this email. No hard feelings. Promise.  **


    **See you tomorrow. Same time, same place.**


    **Your attention is a privilege I never take for granted. If this communication is no longer of interest to you, just click the unsubscribe link below to be removed from this email list:**


    Unsubscribe http://slideheroes.activehosted.com/proc.php?c=3&m=5&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&nl&act=unsub


    **SlideHeroes Incorporated, 125-720 King Street West Suite 2000, Toronto, Ontario M5V 3S5, Canada**"
