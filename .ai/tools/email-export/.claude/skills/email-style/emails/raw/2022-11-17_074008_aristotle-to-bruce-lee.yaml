content:
  body: "Welcome to a special edition of the Emergent Marketing

    Newsletter by André Chaperon & Shawn Twing. In this three-part

    series we're sharing ideas that can improve your writing and your

    marketing. If that's not interesting to you right now, you can

    mute this series (

    https://click.convertkit-mail.com/38u5xkomqgukho93prrsr/7qh9l579s8h0n3d645az/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vbXV0ZWQv

    ). (If you decide you're in the wrong place entirely, you'll find

    a fully nuclear unsubscribe link in the footer of this email.)


    Hey, it's André & Shawn...


    Welcome back.


    Yesterday we showed you why writing is a life-changing skill.

    (Read that email first (

    https://click.convertkit-mail.com/38u5xkomqgukho93prrsr/p8heh9h9q8r270iq/aHR0cHM6Ly9ja2FyY2hpdmUuY29tL2IvZ2t1bmg1aGRvbWs2eg==

    ) if you haven't already.)


    If you're like us, the question you're asking yourself now is

    \"how can I become a more persuasive writer fast?\"


    On the surface, that seems simple enough.


    There's no shortage of interviews, books and courses by writers

    for writers.


    Start by learning the three-act structure from Aristotle's

    Poetics in ancient Greece.


    Dig deep into Joseph Campbell's Hero's Journey, then Robert

    McKee's Story: Style, Structure, Substance, and the Principles of

    Screenwriting.


    Get inspired by Stephen King's On Writing, Anne Lamott's Bird by

    Bird, John McPhee's Draft No. 4, and Elmore Leonard's 10 Rules of

    Writing.


    Months (or years) later, sit at the feet of modern masters like

    Malcolm Gladwell, Neil Gaiman, Margaret Atwood, and Lee Child at

    MasterClass, BBC Maestro, and other online learning platforms.


    Or, maybe you want to skip all of that and go straight for the

    jugular...


    To hell with the touchy-feely writing stuff — I want to sell,

    sell, sell ...


    In that case, copywriting is the magic elixir you're looking for.


    Begin with the legends — Swartz, Ogilvy, Collier, Hopkins,

    Halbert — then move on to contemporary masters like Carlton,

    Deutsch, and Kennedy.


    Will this work?


    Maybe.


    And only if you're willing to spend a lot of time and do a lot of

    work.


    But here's the thing we've learned the hard way over and over

    again — better, more persuasive writing doesn't happen because

    you have dozens of tools in your writing toolbox.


    Persuasive writing — the kind that makes the difference between

    \"I'm sort of interested but maybe later\" vs. \"oh my God I want

    this right now!\" — happens when you have a few really powerful

    tools in your writing toolbox that you actually know how to use.


    Read that last sentence again. It's important.


    Bruce Lee said it best — \"I don't fear the man who has practiced

    10,000 kicks one time, but I do fear the man who has practiced

    one kick 10,000 times.\"


    Tomorrow we'll share a few of the tools we rely on most, and

    we'll let you in on a little secret no one else will tell you.


    See you then...


    André & Shawn


    P.S.


    Quick heads up that tomorrow's email will have a time-sensitive

    opportunity to raise your hand for something special we have

    planned for next week.


    That's the only opportunity to raise your hand so keep an eye on

    your inbox tomorrow.


