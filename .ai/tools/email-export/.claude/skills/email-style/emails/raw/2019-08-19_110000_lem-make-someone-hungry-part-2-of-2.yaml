content:
  body: "[Continued...]


    Hey Mike,


    GLAD YOU'VE MADE it to the other side.


    Ever watched Lost Season 1?


    It's genius on so many levels.


    It's the best storytelling I've ever seen that IMPLIES QUESTIONS,

    but never answers them.


    Anyhoo...


    That book I mentioned, right?


    Here is how the book opens (and the lesson I'm teaching you):


    \"The cop climbed out of his car exactly four minutes before he

    got shot.\"


    Whoa!


    I remember my internal dialog freaking out when I read that first

    sentence.


    I remember re-reading the sentence again and again before moving

    on.


    \"... exactly four minutes before he got shot.\"


    WTF!?


    That right there opens a can of worms of implied questions. From

    that one short 14 word sentence.


    I was on the hook.


    The book is called Persuader ( http://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzY5MzQzODMyMyIsInVybCI6Imh0dHA6Ly9hbXpuLmNvbS9CMDAwRkJKREYyP19fcz15enltaWFxdHlpdHNpMnNpYWVtaSJ9 ),

    written by my favorite author, Lee Child:


    Persuader, by Lee Child (NOTE: If you're seeing this text it

    means you have not allowed images to show for this email. Enable

    images to see this.)


    There's the opening few sentences of another Lee Child book:


    \"Moving a guy as big as Keever wasn't easy. It was like trying to

    wrestle a king-size mattress off a waterbed. So they buried him

    close to the house. Which made sense anyway. The harvest was

    still a month away, and a disturbance in a field would show up

    from the air. And they would use search planes, and helicopters,

    and maybe even drones.\"


    Boom! ... another smorgasbord of implied and unanswered

    questions.


    Do this in your emails, and you'll have your subscribers eating

    up every email you send out, like STARVING wolves.


    To finally answer the question to the subject line of these past

    two emails...


    How do you make someone hungry?


    Starve them ... a little :-)


    You make them wait four hours for dinner.


    Get your hands on ARM and then devour every work of it (and

    become a superhero to your people)... ( http://t.dripemail2._X19zPXl6eW1pYXF0eWl0c2kyc2lhZW1pIn0 )


    Andre \"suspense\" Chaperon


    PS.


    If you liked these last two emails, you'll probably dig this

    article ( http://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzY5MzQzODMyMyIsInVybCI6Imh0dHA6Ly9vcGluaW9uYXRvci5ibG9ncy5ueXRpbWVzLmNvbS8yMDEyLzEyLzA4L2Etc2ltcGxlLXdheS10by1jcmVhdGUtc3VzcGVuc2UvP19fcz15enltaWFxdHlpdHNpMnNpYWVtaSJ9 ) by Lee Child.


