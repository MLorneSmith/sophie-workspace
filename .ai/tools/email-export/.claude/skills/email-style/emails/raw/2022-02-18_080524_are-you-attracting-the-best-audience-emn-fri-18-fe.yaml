content:
  body: "Welcome to another issue of the Emergent Marketing Newsletter, a

    (mostly) fortnightly newsletter by us, André Chaperon & Shawn

    Twing, with a focus on modern marketing, writing, and learning.

    We appreciate your attention and feel honored you're on this

    journey with us. (If you decide you're in the wrong place, no

    worries. You'll find an unsubscribe link in the footer of this

    email.)


    Hey, it's André (& Shawn)...


    Happy Friday!


    NOTE: — If you were in our MMS launch loop last week, you would

    have missed a \"shadow newsletter\" we stealthily sent to everyone

    not part of our MMS launch. So, if you missed it, you can read it

    here (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/6qheh8hpxkgrkefo/aHR0cHM6Ly9ja2FyY2hpdmUuY29tL2Ivdjh1M2hyaDZ6bnJ6

    ). (We each shared a few books and resources that have consumed

    our attention this year we think you would enjoy.)


    I've muscled the keyboard from Shawn for this newsletter because

    I want to reflect on lessons learned building an audience over 15

    years.


    Mistakes were made.


    Many.


    (Oh god, so many...)


    And the implications of some of those mistakes have revealed

    themselves only now, a million years later in internet years.


    To this end, Shawn has inherited those past indiscretions.

    Together, we've recognized the same activities will not attract

    the audience we need to serve as we race into 2022 (and years

    beyond), having bundled all our courses into a single unified

    product, the Modern Marketing System (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/25h2hoh7lvz9vki3/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vcHJvZHVjdHMvdGhlLXN5c3RlbS8=

    ).


    Change, after all, is a companion we all need to live with.


    We can accept change, ignore it, fight it — but as with gravity,

    it's invisible, but its effect is felt everywhere.


    In many ways, future André is writing this email for the André of

    2006, roughly when he started to build this email list of

    followers.


    I wish I had this email 15 years ago to give me some perspective.


    But, more importantly, this email is for you — because: you need

    an audience in order to have a thriving, durable business.


    No audience, no business. It's not rocket science.


    But not just any audience...


    An audience that will grow with your business years into the

    future.


    Hence the framing question in the subject line of this email: Are

    you attracting the best audience?


    It's a question meant to interrogate your assumptions.


    I thought I knew the answer to this many times in the past.


    But, as I'll unpack in this email, I didn't, not entirely.


    I'll start with a proposition I think no one will disagree with.


    Customers aren't created equal.


    The same can be said for prospects, of course, but because we're

    all in the (happy) customer business, I'll focus only on

    customers. None of us are in the non-customer business. (At least

    not for long.)


    Accepting the proposition that customers aren't created equal (we

    see evidence of this all around us), we can also say: audiences

    aren't created equal.


    An audience is a group of people with a shared worldview...


    All of us see the world through \"filters,\" and it's these filters

    — beliefs, biases, nested value structures, expectations we have

    about the world and our future, etc. — that shape and color our

    subjective reality; our worldview.


    At the level of abstraction that matters when thinking of this

    definition of an audience, we're only looking at psychographics

    (our psychological traits).


    Some people have deeper pockets than others.


    Some people have desperate needs or intense desires they'll move

    heaven and earth to meet or satisfy.


    Others have superficial needs and lukewarm desires.


    People with the highest levels of dissatisfaction, who refuse to

    settle for mediocrity, are more motivated than people satisfied

    with the status quo.


    There's a spectrum of people that broadly represents all of us...


    People with (desperate) needs for approval, control, status,

    power, and security...


    ... Maslow's theory of motivation, subconsciously expressed in

    our emotional behavior responsible for varying levels of anxiety

    and unhappiness that can move our hearts and motivate action for

    change.


    No single trait is good or bad in isolation...


    Context matters like oxygen matters.


    We are all subject to the human condition of biases...


    Any number of psychological, emotional, and environmental forces

    constantly acting on us: bullying us, advancing us, pulling us

    down into the mud, squirting us with dopamine to go another

    round...


    All this is to say, the world is a chaotic mess of people who

    broadly overlap in weird and unpredictable ways.


    Imagine, if you can, billions of dots, each representing a

    uniquely (dysfunctional) human like us trying their hardest to

    live their best expression of a happy life.


    (Image credit (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/9qhzhnhg4qmwq8t9/aHR0cHM6Ly9tZWRpdW0uY29tL0Bzd2FpbmpvL2JyZXhpdC1vbi10d2l0dGVyLXdlZWstZW5kaW5nLWp1bmUtM3JkLTIyNWRjZmZiZjFhNg==

    ): Brexit on Twitter, John Swain.)


    These tiny dots cluster around diverse and narrow topics of

    interest colored by our lens on the world and our place in it

    (our worldviews).


    People shift in and out of these invisible groups that match

    their needs, desires, and worldview.


    None of us exist within a single interest silo.


    We're diverse, like Frankie, a vegan, plant-based advocate and

    eclectic hairdresser from a borough of London...


    When Frankie's not cutting bobs, blunt chops, modern shags, and

    bangs, she's also hustling to run Google Ads to bring in new

    business into her little salon.


    Covid almost destroyed her business (with payroll to meet for

    people she cares about).


    When Frankie's not working on a plant-based recipe book she hopes

    to self-publish by Christmas, her attention is focused on

    leveling up her advertising chops on Google and Facebook.


    Audiences are diverse.


    Frankie's attention is broadly drawn to self-publishing,

    plant-based living, and wanting to get better at advertising her

    hairdressing salon on Google and Facebook.


    Like Frankie, Shawn has diverse interests, as do I.


    I'm an amateur fiction writer...


    I've built a racing simulator and race competitively on it...


    I'm a lifelong learner with broad interests...


    I'm a student of modern marketing, and I'm constantly working to

    improve my craft across my diversity of interests.


    (I spend a lot of money in these diverse interest categories.)


    Same with you.


    It's our job as modern marketers to find the signal in the noise

    and parse out groups of people who most likely represent

    worldviews that match our best audience profile.


    People who desperately need and want what we have, have the means

    to pay for it and at a volume that's viable for long-term growth.


    When I was still green around the gills, one of the first books I

    picked up was Positioning: The Battle for Your Mind (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/wnh2hghrm5p7kkc7/aHR0cHM6Ly9nZW5pLnVzL2Ftem5Qb3NpdGlvbmluZw==

    ) by Al Ries and Jack Trout.


    I still have the paperback. It's probably the most lent-out book

    I own, battered and dog-eared, belying the value within.


    Positioning starts with a product, which can show up as a widget,

    a service, a digital course, a company, or even a person.


    But positioning is not what you do to a product...


    Positioning is what you do to the mind of the prospect related to

    your product and the value it can bring to bear for the prospect.


    One of the primary levers of positioning is pricing.


    (In late 2011 or early 2012, I wrote a lesson on positioning I

    had included in ARM2, which is still accessible here (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/8ghqhohgw0vd2xik/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vcG9zaXRpb25pbmcv

    ) if you fancy reading it. It's weird reading what I wrote a

    decade ago. Weirdness aside, it's a short, fun read.)


    When I first priced ARM in 2009, I picked $97 from thin air.


    I had been curating an audience for a few years. But this was the

    first time I had codified my expertise into a guide to sell.


    With $97 selected and scared of what would happen (what if no one

    purchases?), I applied a quantity limit of 100 to the offer.


    If I remember correctly, I shut the cart down within an hour,

    with people bursting in while I tried to pull the order button

    down. (You can see in the screenshot 102 people came in.)


    It worked!


    But...


    There were lessons to learn — three obvious ones:


    Firstly: $97 was too low. The perceived value far exceeded what I

    was asking people to pay. (The 46.8% conversion rate a giveaway!)


    Secondly: It was dumb, really (really) dumb, to apply a 100 unit

    limit on a digital course. (Don't do that, oh god, please never

    do that!)


    Thirdly: The name (another factor of positioning). I mean, who

    adds \"Madness\" to the name of a legitimate course?


    I was in Las Vegas some years later in the private suite of Ryan

    Deiss, and Perry Belcher was laughing his head off at the name I

    had thought was smart. I had no comeback.


    I was 0 for 3 in the mistakes column for my first foray into

    selling a digital marketing course.


    I forged on...


    With lessons tucked under my belt, a year later, ARM2 had no

    quantity limit, I had doubled the price to $197, but the name had

    stuck. (It wouldn't be until 2021 that we would change the name

    to Art of Email (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/25h2hoh7lvz9vki3/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vcHJvZHVjdHMvdGhlLXN5c3RlbS8=

    ).)


    $197 was still ridiculously low.


    People will gladly pay a premium price for whatever you're

    selling if they honestly believe it is significantly better than

    the alternatives.


    For me, the alternatives were considerably more expensive than

    ARM.


    Perry Marshall, for example, was selling (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/m2h7h5ho2gp5q8bm/aHR0cHM6Ly93ZWIuYXJjaGl2ZS5vcmcvd2ViLzIwMTIwNTAxMTcxMzEyL2h0dHA6Ly93d3cucGVycnltYXJzaGFsbC5jb20vcHJvZHVjdHMvbGlzdC1idWlsZGluZy9hdXRvcmVzcG9uZGVyLWJvb3QtY2FtcA==

    ) his autoresponder course for between $895 - $4,895 (Bronze,

    Silver, Gold).


    If I was paying attention and had considered asking myself why

    Perry was charging so much more, I may have noticed a lesson

    hiding in plain sight.


    (If you've read my positioning article (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/8ghqhohgw0vd2xik/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vcG9zaXRpb25pbmcv

    ), I was selling the equivalent of a Nespresso machine, Perry a

    JURA.)


    Consequently, ARM blew up — thousands of customers purchased in

    the following years. I was a genius.


    But I wasn't, not really.


    OK, not at all.


    Perry was attracting a different audience, which responded to

    four-figure digital courses, in-person seminars, and year-long

    continuity.


    An audience with the means to pay thousands per year for

    marketing advice. His best audience realized early.


    Perry was smarter than me back then.


    The implications of all these decisions would only reveal

    themselves years later.


    Sometimes it's impossible to read the label on the bottle when

    one's hustling on the inside, not stopping to read the tea

    leaves.


    Through my unintentional low-price positioning, I had curated an

    audience that reflected a group of people who broadly responded

    to relatively low-priced offers.


    Ryan Deiss and Perry Belcher gave ARM some mad love from the

    stage (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/7qh7h8h0dk7l6zbz/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLTEud2lzdGlhLmNvbS9tZWRpYXMveDVrNnI2MnNodw==

    ) at Traffic & Conversion Summit, 2012. Through that unexpected

    exposure, I earned the attention of an entirely new audience.


    I gradually raised prices and focused on the best prospects only.


    Each time I was slightly adjusting the type of people I was

    attracting.


    But I continuously operated within a positioning \"category\" in

    the mind of the customers I was unintentionally resonating with.

    (Oops!)


    In many ways, $197 to $495 is within the same broad category in a

    customer's mind. But $197 is not the same mental category as

    $1997 (orders of magnitude more expensive).


    In contrast, Perry Marshall's pricing was altogether more

    sophisticated.


    I suspect his $4,895 (Gold) was only there to price anchor, and

    most of his sales were $1,895 (Silver) and $895 (Bronze).


    An audience with the means to pay thousands per year for

    marketing advice. Perry's best audience realized early.


    Business is the ultimate school of learning.


    Early on, the audience I was attracting was into a version of

    affiliate marketing I had become very good at, where I shared

    freely, personally, and regularly.


    Then I sidestepped into the role of digital course author (having

    externalized and codified my best thinking), attracting an

    audience wanting what I had, and at the price I was positioning

    it at.


    Each pivot...


    Each iteration...


    Each time I was exposed to other people's audiences, I attracted

    an ever more segmented audience, people with diverse needs and

    interests, people who responded to different prices, people with

    varying levels of sophistication.


    I forged on.


    Eventually, in 2018 I settled on $495 for all our courses.


    Now, here we are in early 2022...


    Our TLB audience is an assortment of people attracted into our

    sphere of influence over 15 years years.


    We have new people fresh on their journey, hungry to capture

    their first dollar.


    We have old grizzly veterans in our fold.


    We have people who seek world-class free information but don't

    have the guts, burning desire, or levels of dissatisfaction to

    motivate action.


    We have businesses in the 6 figure range...


    7 figure, 8 figure, and even 9 figure range.


    If the lessons in this newsletter haven't been explicit enough,

    I'll summarize them like this (see illustration below).


    Your starting point is defining and getting crystal clear about:

    who you seek to serve?


    This is not a trivial question. Dig deep.


    (If you're in The System, you'll find how to do this in our

    Audience & Offer Masterclass (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/owhkhqh4xkv965fv/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vYWNhZGVteS9hb20v

    ), along with people like Angel (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/x0hph6hnkr62p2f5/aHR0cHM6Ly9jb21tdW5pdHkudGlueWxpdHRsZWJ1c2luZXNzZXMuY29tL2MvY2VsZWJyYXRlL291ci1qb3VybmV5LXdpdGgtdGxi

    ) in our MMS Community sharing his journey doing the work of

    going through our Audience & Offer Masterclass.)


    All decisions have downstream (future) implications.


    As I've demonstrated through the somewhat embarrassing and

    humbling story I've started, pricing plays a significant role in

    who (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/6qheh8hpxkgr5eio/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vY2hlZnMtdnMtY29va3Mv

    ) you attract.


    2009 André wanted to sell lots of copies of his relatively

    low-priced email marketing course.


    And guess what? That's precisely what he did.


    He attracted thousands and thousands of customers.


    ... for his relatively low-priced email marketing course.


    But now the world is different. We're not in the (relatively)

    low-priced marketing course business anymore.


    The Modern Marketing System (

    https://click.convertkit-mail.com/92uvo86n9lhnh88o62f9/25h2hoh7lvz9vki3/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vcHJvZHVjdHMvdGhlLXN5c3RlbS8=

    ) (\"The System\") combines our best thinking from more than a

    combined four decades of doing this work (for ourselves and

    hundreds of clients).


    End of March we'll be releasing TLB Lab to our System customers

    along with Lab Elite, each perfectly catering to a smaller subset

    of our best audience.


    * MMS is for everyone (a prerequisite for all our customers).

    * TLB Lab is for some.

    * Lab Elite is for just a few.


    Our \"B\" (in the above illustration) has changed, which means our

    point \"A\" (our activities and behaviors) needs to change to

    attract the audience we seek to serve long into this next decade.


    Our site is going to change a lot over the coming months.


    And if you're already inside of \"The System,\" you'll get to see a

    whole new world of opportunities opening up over 2022.


    Fun times...


    Enjoy your weekend!


    André (& Shawn)


