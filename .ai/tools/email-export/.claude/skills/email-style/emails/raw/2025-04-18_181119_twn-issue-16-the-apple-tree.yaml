content:
  body: "[ 5 min read ]


    Hey, it's Andre...


    Being a visual person, I have a love affair with metaphors.


    Few tools are as powerful as metaphors for quickly capturing and

    conveying complex ideas.


    Recently, a subscriber, Scott M, sent me a wonderful email

    wishing me well and thanking me for the work I'm doing.


    Scott shared a metaphor from Celine Dion's introduction to the

    new documentary about her: I am Celine Dion (linked below).


    \"We are not here for the apple; we are here for the tree.\" --

    Celine Dion (reflecting on a metaphor from her documentary, I Am: Celine Dion)


    As so often happens, interesting ideas rarely show up in

    isolation...


    I had just read an email from CJ Chilvers about the hostility towards personal

    publishing. The confluence of these two seemingly unrelated ideas

    gently landed on me like a sprinkle of magical fairy dust.


    It's worth reading CJ's email because the context is important,

    the implications relevant. This excerpt, when combined with the

    apple and tree metaphor, points to something incredibly

    interesting:


    You should probably establish that connection with an audience

    now, under your name. Soon, it may be impossible to tell if the

    person behind your favorite content is a person at all. That's

    when what's cheap and easy about establishing trust now becomes

    expensive and difficult through in-person publishing (speaking

    and performing may take off again).


    We all know personal publishing is swimming against the current.

    But it always has. Our strength is in our flexibility and

    authenticity. I don't see that changing. This post remains under

    my name.


    -

    S

    -


    This idea of personal publishing and trust becomes even more

    crucial when we consider the current state of our digital

    landscape.


    We're navigating a wild, unpredictable era for

    creators leveraging the internet to reach, connect, and serve our

    audiences.


    In our service, we earn a living and freedom.


    However, in the shadows, we have AI companies eating our IP to

    train their models, then directly feeding it back to their users,

    cutting us out of the value chain.


    However, the insight that gently hit me is that this really

    doesn't matter.


    What the best models can re-produce from copyrighted IP are, at

    best, misshapen, bland-tasting \"apples.\"


    \"We are not here for the apple; we are here for the tree.\" --

    Celine Dion

    Allow the implication and imagery of this metaphor to land for

    you.


    Let it sink in...


    Creators are the trees (we produce apples)...


    Perhaps another way of viewing digital world-building is akin to

    an orchard.


    When we layer on other principles, like Kevin Kelly's 1000 True

    Fans, then turn the creative kaleidoscope, new \"fractal buds\"

    reveal themselves, cracks in the surface of knowledge. (See Issue

    15.)


    Orchard ... 1000 True Fans ... what happens when we unfold this

    fractal bud?


    If you've read \"The Overstory\" by Richard Powers, you'll see where I'm going in exploring

    another fascinating layer to this metaphor.


    There's a complex, interconnected nature between trees,

    particularly through their root systems and the \"wood wide web\" --

    the underground network of fungi that facilitates communication

    and resource sharing between trees.


    This concept beautifully extends our tree / orchard metaphor for

    digital world-building, where \"community\" is at the hub of the

    forest (or orchard).


    The dialectic power of a community can't be captured in any AI

    model. Not now, not ever.


    -

    S

    -


    \"As generative AI fills our feeds with regurgitated mush, our

    innate trust in individuals over brands will determine the

    winners of both attention and revenue. Everyone in media should

    be racing to become a trusted individual right now.\" -- CJ

    Chilvers (source)


    Trust is the center of the bull's eye.


    However, everyone's obsession is with attention!


    When attention is the commodity everyone is optimizing for, the

    only way to win that game (outside of being the billion-dollar

    aggregators of attention) is trust -- something that can't be

    easily hacked or shortcutted.


    A weird, nerdy mental model I like to think about for 'trust' is

    that of VO2 max as a biomarker for lifespan.


    \"VO2 max is the single most important biomarker we have for

    lifespan,\" -- Petter Attia (MD)


    This is because VO2 max reflects a remarkable integrator of work

    that has been done, and the benefits of that work are captured in

    the VO2 max number (source).


    I think about (individual) trust in much the same way.


    That makes trust so durable, especially individual trust, as CJ

    points out.


    I've been 'betting on' optimizing for trust for years because it

    takes time to build. It can't be half-assed.


    Obsessing over trust feels like a strategic moat in the era where

    everyone is optimizing for attention and mass audience capture.


    If we're in the (individual) trust business, I suppose we're also

    in the \"orchard\" business:


    * Is it individual apples you want (a commodity, nothing more)...

    * or to be adjacent to the tree that produces the best fruit in

    the world (or a tree in the orchard of other like-minded trees)?


    -

    S

    -


    Looking ahead, we can see how this obsession with trust and being

    the 'tree' might be the keystone for sovereign creators and

    digital world-builders.


    When we look back from 2029 -- five years pass in the blink of an

    eye, after all -- the successful creators rocking the personal

    indie publishing game will be those who have doubled down in

    becoming the \"tree\" (orchard) for their niche pocket of weirdos.


    Little guys like us can prosper in this new world dominated by

    algorithms built by companies that make decisions counter to our

    interests.


    \"We are not here for the apple; we are here for the tree.\"


    So be the tree. (Grow an orchard.)


    Optimize for (individual) trust.


    Like Celine Dion. Like Taylor Swift.


    And the little tiny fish like us.


    One way to do that -- perhaps the \"best\" way to do that -- is to

    build a digital world -- an orchard -- around yourself and your

    ideas and your art.


    Have a wonderful weekend!


    Andre \"a tree\" Chaperon


    P.S.


    In the 'BEFORE' section of 'Tiny Digital Worlds: The Principles'

    I write about the antagonists in the game we're all playing

    (excerpt below):


    The project of Tiny Digital Worlds is for people who choose to

    build meaningful businesses with integrity for \"people who care.\"

    The antagonists are many, who all engineer a kind of endlessness:

    the billion-dollar platforms incentivizing creators to keep

    playing the short-term attention-capturing game; the

    entertainment platforms, transforming entertainment from

    something we choose, channel by channel or stream by stream or

    feed by feed, into something we inhabit; the traditional

    direct-response digital marketing playbook that emphasizes the

    coercive tactics of fear and scarcity.

    So how do we not only survive but thrive in this \"shark-infested\"

    sea?


    Hahaha, if I hold you, I would have to kill you cos it points to

    the premise of 'Tiny Digital Worlds: The Principles'...


    The 'secret' to thriving from my perspective...


    ... as Tiny Digital World Builders, we target a different type of

    person.


    I'll leave you to think about that. It changes everything. We're

    playing a completely different game to everyone else. {grin}


    Suite 23, Portland House, Gibraltar, Gibraltar GX11 1AA"
