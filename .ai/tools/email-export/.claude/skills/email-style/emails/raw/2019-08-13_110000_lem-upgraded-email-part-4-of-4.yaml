content:
  body: "Hey Mike,


    I've been banging on about RELEVANCE a lot.


    That's because it's so fundamental ... so critical.


    You see...


    There is a misconception that clicking send to thousands of

    subscribers doesn't cost anything.


    But nothing could be more wrong.


    Attention isn't free at all.


    It's earned (over time).


    And it can literally vanish overnight if you abuse that

    (temporary) trust someone has attached to you.


    ATTENTION is one of your most valuable resources when it comes to

    email marketing.


    There's an underlying philosophy that you need to wrap your head

    around, if you want to control the attention of your people.


    It's how you build trust and attention from the ground up.


    Think of this as the foundation layer on which to stack

    everything else.


    Like Lego.


    It turns out that if we work hard to show people that we care,

    THEY CARE BACK.


    Gary Vaynerchuk is a little more direct in how he states this. He

    says--and I quote--\"It's about giving a f*ck.\"


    Go figure, eh?


    Research conducted into how people are persuaded proves that the

    way we are treated (and the way that treatment makes us feel)

    affects our opinions and our behavior.


    Reread that again.


    It's kind of important.


    One of the biggest challenges marketers and entrepreneurs like us

    have is understanding how to make our messages resonate.


    How to connect with our email readers on a deep emotional level

    (in a way that builds empathy).


    And you know what?


    It's really not all that hard to achieve...


    When we can authentically show our people that they matter to us.


    ... then we have a better chance of mattering to them.


    Here's somethin' for you to chew on...


    What if email marketing was less about promotion and coercion and

    more about reaching out to people and helping them to solve

    problems?


    What if marketing was where we began our journey towards

    understanding what people need and want?


    As marketers, what if we start seeing the world through the eyes

    of our prospects and customers?


    (Hint hint!)


    You think that would make a difference to how you write emails

    and \"sell\" to them?


    Because one thing is for sure...


    Treat them well, with care, and empathy...


    Basically, show that you \"give a a f*ck\", and you'll be rewarded

    with their trust and attention.


    (Hint hint!)


    Email marketing is the way we communicate how our ideas and

    products translate to value (solve their problems) for the people

    in our sphere of influence.


    Think about that.


    It's what I'm doing to you with these emails.


    Andre \"no hard sell\" Chaperon


    P.S.


    There's something strange that happens when you treat your people

    with respect, and care for their best interests (above your own).


    It doesn't happen right away.


    Like with any friendship, it develops over time.


    For example...


    What if you're really into reading good business books. And your

    best friend knew this.


    What if they had just finished reading a really really good book,

    and knew you would love it, too.


    So they shot you an email:


    ======


    Hey Mike,


    You're going to love this book I just finished reading. Dude, you

    should pick it up for sure.


    Pay close attention to Chapter 3. It really changed my perception

    on how business should be done.


    LINK TO BOOK ON AMAZON


    Jeff


    ======


    ... do you think you'd buy that book?


    Damn right you probably would.


    Click. Buy. Done.


    Similar thing happens when people on your email list trust you

    and your advice.


    In fact, it's not uncommon for some nutty behavior to play out,

    too. Like this email I got from Nick Chalker:


    Email from Nick Chalker (you need to enable images if you don't

    see the image)


    Trust baby.


    But it can't be abused.


    It's a fragile and non-permanent resource.


    Consistently look after your people by sending them

    hyper-RELEVANT emails, and you win.


    You win because along with their trust...


    ... comes money, fame, fortune, champagne and bikini models.


    Okay, maybe not the bikini models :-)


