content:
  body: "Hey, it’s André…


    This is part-two of a themed series. If the previous email isn’t

    fresh in your mind, perhaps reread it (

    https://click.convertkit-mail2.com/d0uxkpprxpumu3em58tmhzp25244cl/25h2hoh2m7rx5ni3/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9uZXdzbGV0dGVyL2tpbQ==

    ) (4 mins).


    ⦿

    -


    “Art is what we call it when we create something new that changes

    someone.” – Seth Godin (The Practice, Shipping Creative Work)

    Full credit upfront, this two-part series was inspired by a video

    I recently watched of Van Neistat externalizing, “How I Would

    Start My Life if I Were 18 Now (

    https://click.convertkit-mail2.com/d0uxkpprxpumu3em58tmhzp25244cl/qvh8h7hrk8g3xeal/aHR0cHM6Ly95b3V0dS5iZS9rbG9MSTBqMWhBWT9zaT05WXpIelI4Y3BoWHFQaGh5JnQ9NjY=

    ).”


    The video is about ten minutes long, unpacking five moves Van

    would make.


    Of course, I’m not 18 any more, and it’s unlikely you are,

    either.


    However, what I loved about Van’s ‘five moves’ is the wisdom and

    nuance embedded in them.


    The correlation to what I (we) do now, especially through the

    lens of a TDW-inspired lens, instantly landed, which I’ll unpack,

    hopefully revealing the value hidden beneath.


    Van’s first task is to get $15,000. He gives his 18-year-old self

    a year.


    But why $15K?


    To achieve two goals. Watch the video (

    https://click.convertkit-mail2.com/d0uxkpprxpumu3em58tmhzp25244cl/qvh8h7hrk8g3xeal/aHR0cHM6Ly95b3V0dS5iZS9rbG9MSTBqMWhBWT9zaT05WXpIelI4Y3BoWHFQaGh5JnQ9NjY=

    ).


    “I will not skew up the easy stuff…”

    Love that.


    From about 4 mins in, Van points out utility trucks. They’re all

    while, plain, utilitarian.


    “I’m choosing the utility truck I end up with based on: budget,

    reliability, and soul.”

    Soul.


    Damn, that’s talkin’ my language…


    “And I’m gonna love my utility truck; I’m gonna tweak it and

    customize it in my free time…”

    “The third move, this is the scariest and most radical part; this

    is the belly of the whale; this is where I feel like I’m going to

    die, and I am going to die in a way the old Towny Van Neistat,

    Connecticut Van Neistat will die and the new independent Van

    Neistat will be born…”

    Watch the video to see what he would do next.


    I won’t spoil it here. But it’s genius. It’s really good.


    The pièce de résistance, imho, is what Van does with the

    remainder of his money:


    I go to Chastin HandPainted, he’s somewhere in Georgia and I get

    the most beautiful handpainted sign painted on the doors of my

    truck whatever the name of my business is, and then in

    parentheses “detail oriented,” and then my phone number.

    Beautiful handpainted doors and this is for my inspiration; this

    is my Dumbo’s Feather…”

    (Dumbo’s Feather is an enchanted feather given to Dumbo to grant

    him flight.) Loved that connection!


    I couldn’t help looking up Chastin HandPainted (

    https://click.convertkit-mail2.com/d0uxkpprxpumu3em58tmhzp25244cl/g3hnh5h3qe72vrbr/aHR0cHM6Ly9jaGFzdGluaGFuZHBhaW50ZWQuY29t

    ). On the ‘about’ page (first place I always look), he (Chastin,

    presumably) writes this:


    “I’ve been going to car shows since before I could walk. The art

    surrounding the traditional hot rod car culture has stuck with me

    ever since. I would watch the old guys at car shows pinstripe and

    asking as many questions as they would allow.”

    “One day a guy gave me a brush and a can of paint and told me to

    meet him at a house he was pinstriping at that evening. Ever

    since I’ve been hooked.”

    “I have settled in central Georgia and travel all over the

    southeast painting. Most of the work that I do is hand drawn and

    painted.”


    Image credit from chastinhandpainted.com

    Then Van’s fourth move…


    Again, I’m not going to spoil the fun here, go watch the video.


    But if you remember the second email I sent you, From Nothing

    (email 2 of 7) (

    https://click.convertkit-mail2.com/d0uxkpprxpumu3em58tmhzp25244cl/9qhzhnhp5gk87wt9/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9lbWFpbHMvbm90aGluZw==

    ), which spoke about ‘The Internet is like Tokyo’ and ‘Delighting

    the Weird’…


    … well, this is what, but in the non-digital world.


    Then comes Move 5: Buying the Magic Beans…


    “… there’s something out there now that almost nobody’s doing and

    I’d be prepared if I was starting out now at 18 with the wisdom I

    have now at 49, I’d be prepared to discover my magic beans…”

    I loved the endnote in the video, but repeating it here won’t do

    it justice (it’s visual and text).


    ⦿

    -


    When Van points out utility trucks, they all look the same.

    They’re invisible in their likeness.


    But what happens when “soul” is injected into something?


    The hand-painted lettering is part of that soul, as is the

    message (“detail oriented”), along with the specificity (watch

    the video).


    All of this contributes to this feeling of having “soul.”


    In my essay, Cities and Ambition (

    https://click.convertkit-mail2.com/d0uxkpprxpumu3em58tmhzp25244cl/3ohphkh7pq68wgur/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9jaXRpZXMtYW5kLWFtYml0aW9u

    ), “soul” is part of that makes what we do stand out, giving off

    a subtle “message” of either resonance or dissonance.


    It “speaks” to the right people.


    In a sea of white plain Jane utility trucks, Van’s would be the

    beacon, pulling in attention – not in a clickbait-y way, but one

    of authenticity.


    It’s what we do as Tiny Digital World Builders (

    https://click.convertkit-mail2.com/d0uxkpprxpumu3em58tmhzp25244cl/n2hohvh37nw4dpi6/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9tZW1iZXJzaGlw

    ).


    Enjoy your weekend!


    André “Magic Beans” Chaperon


    P.S.


    Thank you for being a subscriber. If you’ve enjoyed reading this,

    please consider sending it or recommending it to a few friends.


    I’m building a (tiny) movement among weirdos, sovereign creators

    and indie publishers who value and resonate with this weird

    esoteric thing called Tiny Digital Worlds.


