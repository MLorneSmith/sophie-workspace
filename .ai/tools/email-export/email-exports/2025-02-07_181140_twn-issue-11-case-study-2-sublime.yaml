content:
  body: "“The greatest discovery of the 21st century will be the discovery

    that Man was not meant to live at the speed of light.” – Marshall

    McLuhan (

    https://click.convertkit-mail2.com/92upx33ep3bdu54540s9hzeql333uw/x0hph6hw3e2q39u5/aHR0cHM6Ly93d3cuZ29vZHJlYWRzLmNvbS9xdW90ZXMvOTY1MTgxLXRoZS1ncmVhdGVzdC1kaXNjb3Zlcnktb2YtdGhlLTIxc3QtY2VudHVyeS13aWxsLWJlLXRoZQ==

    )​


    Hey, it’s André…


    I’m excited to bring you a second case study. (Ryan Holiday being

    the first one (

    https://click.convertkit-mail2.com/92upx33ep3bdu54540s9hzeql333uw/6qheh8h7olr9oouo/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9uZXdzbGV0dGVyL3J5YW4taG9saWRheQ==

    ) in Issue 4.)


    I don’t like the term ‘case study’ cos it feels too clinical or

    impersonal. Perhaps ‘Profile’ is better.


    ‘Profile’ suggests a detailed and insightful examination of a

    particular digital world, focusing on its uniqueness and the

    story behind it.


    Semantics aside, over time, I’m excited about sharing a broad

    spectrum of expressions found in tiny digital worlds, recognizing

    their unique differences while highlighting the underlying

    principles that unite them.


    We all have our favorite websites we visit, a mix of properties

    we trust to get our news and knowledge from, contributing to our

    sense of “our world” online.


    However, our behavior tends to cluster around digital properties

    we trust, which have cultivated a certain coherence around

    virtues like style, voice, ethos, curiosity, depth, diversity,

    etc.


    But I love discovering new worlds.


    I wanted to profile something completely different today.


    One of the features of the site/service/platform I’m profiling in

    this issue is that it helps us discover other worlds outside of

    the well-trodden clusters to which we gravitate.


    Anyhoo…


    I hope you find this valuable. If so, let me know.


    ​https://andrechaperon.com/newsletter/sublime (

    https://click.convertkit-mail2.com/92upx33ep3bdu54540s9hzeql333uw/kkhmh6hlmnwxm4sl/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9uZXdzbGV0dGVyL3N1YmxpbWU=

    )​


    (Or, if you know of a site/service/platform that you think would

    make for an interesting profile, please share it.)


    Enjoy your weekend.


    André


    P.S.


    In the next issue, I’ll share a ‘Survival Guide’ I’ve been

    working on.


    To respond to this email, just hit reply. I love getting replies,

    and read them all. However, I've come to realize that replying to

    each one is beyond my reach. I deeply regret this, but alas, the

    limitations of being a flawed human. So thank you for your

    understanding.


