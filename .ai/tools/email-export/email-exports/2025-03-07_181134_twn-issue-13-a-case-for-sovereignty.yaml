content:
  body: "6 min read


    Hey, it’s André…


    When I started in this weird business in 2003, email quickly

    became a touchstone, an elegant and magical mechanism for

    communicating with an audience en masse.


    For an incredibly shy introvert, email was a tool from the gods.


    Of course, by design, email is part of the fabric of the

    internet, a set of application layer protocols (SMTP for sending

    and IMAP and POP3 for receiving) that run on TCP/UDP, the

    transport layer of the internet used for data delivery.


    Tom Kulzer, AWeber’s founder, recognizing the business

    opportunity implicit in this design, created the first

    autoresponder service in 1998 and instantly became the market

    leader.


    It’s fair to say my love affair with email marketing has been

    passionate and monogamous.


    In the intervening years, social media rose, capturing the hearts

    and minds of almost everyone from the 2010s to today – the death

    of email, many experts proclaimed – yet social media turned out

    to be a toxic race to the bottom.


    I’m not suggesting social isn’t useful. It can be, of course. And

    I’m not suggesting it’s a toxic affair for everyone.


    But for many, it has become the hub of their businesses and,

    hence, subject to the whims of algorithmic changes. (And, let’s

    not forget the wrecking ball of being de-platformed for those at

    the fringes.)


    Perhaps the “fediverse (

    https://click.convertkit-mail2.com/v8u2m00x20bmuq26e0fghv4erlllf9/8ghqhohlk8000zbk/aHR0cHM6Ly93d3cudGhldmVyZ2UuY29tLzI0MDYzMjkwL2ZlZGl2ZXJzZS1leHBsYWluZWQtYWN0aXZpdHlwdWItc29jaWFsLW1lZGlhLW9wZW4tcHJvdG9jb2w=

    )” will fix social media one day. However, it’s hard to see how

    human behavior will change.


    More recently, however, we’ve seen the renaissance of the email

    newsletter. Platforms like Substack, Ghost (Pro), beehiiv,

    ConvertKit, etc., have contributed to this shift, allowing

    creators to become niche micro-publishers and directly monetize

    attention without a middleman (in contrast to social).


    While this renaissance has been empowering for creators, there’s

    also a “sinister” dimension that’s not always obvious.


    I make no bones (

    https://click.convertkit-mail2.com/v8u2m00x20bmuq26e0fghv4erlllf9/vqh3hrhp86xxx0ug/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9zb3ZlcmVpZ24tY3JlYXRvcnM=

    ) about the difference between a creator and a “sovereign”

    creator. The latter emphasizes independence, which is to say,

    someone who owns their patch of digital dirt.


    We’re in complete control and ownership of our work, with the

    freedom to determine how, when, where, and why our creation is

    produced, distributed, and monetized.

    Being a sovereign creator doesn’t preclude using social media for

    reach and discoverability. And it doesn’t preclude using email

    newsletter platforms, of course (I use and love ConvertKit (

    https://click.convertkit-mail2.com/v8u2m00x20bmuq26e0fghv4erlllf9/l2hehmh3wp0007t6/aHR0cHM6Ly9hbmRyZS50by9jb252ZXJ0a2l0

    ), after all).


    The problem emerges when these platforms become the “hubs” of our

    businesses, where sovereignty is undermined because the lure of

    building a business “on” these platforms is so damn enticing

    (and, of course, just a few clicks easy).


    In March, I enjoyed a podcast episode (

    https://click.convertkit-mail2.com/v8u2m00x20bmuq26e0fghv4erlllf9/m2h7h5h8wxgggptm/aHR0cHM6Ly93d3cudGhldmVyZ2UuY29tLzI0MDg3ODM0L2hhbmstZ3JlZW4tZGVjb2Rlci1wb2RjYXN0LWdvb2dsZS15b3V0dWJlLXdlYi1tZWRpYS1wbGF0Zm9ybXMtZGlzdHJpYnV0aW9uLWZ1dHVyZQ==

    ) with Nilay Patel, the co-founder and now editor-in-chief of The

    Verge.


    While he said a number of interesting things, an observation that

    stood out was his distinction between ‘getting traffic’ and

    ‘building an audience.’


    It’s pretty easy to get traffic in the world. You can go on

    TikTok today and get some traffic and get some views. It is

    really hard to build an audience. And I think a lot of the

    destruction we see in the media community right now is no one

    built an audience. They try to get traffic and then they try to

    sell that traffic, and they assumed that traffic would last

    forever. The platforms have no incentives to let you keep having

    traffic forever, and they absolutely do not have incentive for

    you to have so much audience that you get leverage over the

    platforms such that they might have to pay you a higher rate.

    (Emphasis is mine.)


    One of the reasons building an audience is so challenging is that

    fostering relationships requires a long-term commitment. This

    extended effort demands continuous work and dedication, unlike

    strategies aimed at quickly capturing pageviews and clicks, which

    often prioritize immediate results over lasting engagement.


    When I asked ChatGPT for the definition of “traffic,” it said

    something like “the amount of data sent and received by visitors

    to a website.”


    Oh gosh. (Head in hands.)


    I like the way it substituted humans for data. +1 to the humans!


    While the LLM definition may be technically accurate, it’s a

    definition that’s not useful.


    So, I’ll define traffic as a human being with intent.


    Of course, context is everything here.


    Intent can be mindlessly watching cat videos for a laugh.


    I think it’s safe to say that most intent (and attention) is

    fleeting. Goldfish-level fleeting.


    Curiosity is a powerful psychological driver of the human

    condition, all too easily manipulated, especially when powerful

    algorithms are optimized for playing the “get clicks” game.


    However, intent also comes in stronger signals when we choose to

    play a different game.


    For example, a referral from a friend – “Dude, if you want to

    read an epic-style spy thriller that clocks in at 800-odd-pages,

    you’ll love ‘The Year of the Locust’ by Terry Hayes!”


    Now, intent and curiosity are altogether different.


    In no small part, implicit in that example is the existence of a

    relationship.


    I believe there’s a correlation between sovereign creators who

    recognize that building an audience is hard and time-consuming.

    These creators understand that the best way to lay the foundation

    for audience growth as the hub of their business is by using a

    self-hosted platform that they fully own and control.


    No, it’s not easy. (But, should it be?)


    Many creators, perhaps even most, are choosing to build their

    online presence on platforms they don’t own or fully control,

    perceiving it as an easier path.


    However, this raises the question of whether self-hosted websites

    will become less competitive in the coming decade. As Jack

    Reacher says, “Hope for the best, plan for the worst.”


    The guest host of that podcast episode (

    https://click.convertkit-mail2.com/v8u2m00x20bmuq26e0fghv4erlllf9/m2h7h5h8wxgggptm/aHR0cHM6Ly93d3cudGhldmVyZ2UuY29tLzI0MDg3ODM0L2hhbmstZ3JlZW4tZGVjb2Rlci1wb2RjYXN0LWdvb2dsZS15b3V0dWJlLXdlYi1tZWRpYS1wbGF0Zm9ybXMtZGlzdHJpYnV0aW9uLWZ1dHVyZQ==

    ) I mentioned earlier, Hank Green, commented that “websites” feel

    almost anachronistic (because all the influencers and creators

    are building on platforms, not websites): “It’s weird to be us,

    our age, and hear that the word website feels almost

    anachronistic. It feels of another era.”


    In response, Nilay Patel said something else I flagged as

    noteworthy.


    “The way I think about it is that I don’t have anyone else’s

    algorithm to think about, and that is really important to me,” he

    said. “I think there’s a tension there where that’s what the

    website affords you – if you can build an audience for the

    website. But building an audience for a website is almost

    impossible.”


    I appreciated Nilay Patel’s honesty.


    He continued, “Our little insight was, ‘Well, what if we just

    don’t do that? (optimize for Google Search and algorithm) What if

    we only write for the people who come directly to our website

    instead of the people who find our articles through Search or

    Google Discover or whatever other Google platforms are in the

    world?’ And so we just made these little blog posts, and the idea

    was, if you just come to our website one more time a day because

    there’s one more thing to look at that you’ll like, we will be

    fine.”


    “And I think, if you look around the media landscape right now,

    more and more people are starting to realize, ‘Oh, we should just

    make the websites more valuable.’ And the easiest way to make the

    websites more valuable is to have our talented people make more

    stories, and not just more stories but openly have more fun on

    the website. Business Insider is doing that. Semafor is doing

    that in other ways.”


    Just make the websites more valuable, huh? What an idea! :)


    This points to another idea I plan to develop over a few

    newsletters, perhaps the following few.


    Websites, unlike social media platforms, allow us to meaningfully

    shape and direct our audience’s intent and attention. Implicit in

    this includes the ability to attract specific individuals into

    our fold, our sphere of influence.


    The essence of being valuable is implicit in how we go about

    shaping and focusing intent.


    Here’s a formula:


    We have a core idea that intersects with our skills or expertise

    (whatever that is for you) that a subset of people overvalue…


    … then we “hug” – think a slow, warm, welcoming embrace – a

    website around that idea, developing it in ways and directions

    that amplify its value.


    When we do this by recognizing a few organizing principles (I

    cover nine in 'The Principles,' which form part of Tiny Digital

    World Builders (

    https://click.convertkit-mail2.com/v8u2m00x20bmuq26e0fghv4erlllf9/e0hph7h08omlw8u8/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9tZW1iZXJzaGlw

    ), my customer-supported paid tier), a Tiny Digital World

    emerges. And just like that, we're playing an entirely different

    game.


    It’s not the quick ‘getting traffic’ game but the slower, more

    durable ‘building an audience’ and ‘fostering a relationship’

    game.


    Enjoy your weekend!


    André


    P.S.


    “Almost everything will work again if you unplug it for a few

    minutes, including you.” ~ Anne Lamott

    Your attention and support mean the world to me.


    It’s a privilege to be able to build this little movement among

    sovereign creators who value and resonate with this weird-ass

    esoteric thing I call Tiny Digital Worlds.


    I appreciate you.


    To respond to this email, just hit reply. I love getting replies,

    and read them all. However, I've come to realize that replying to

    each one is beyond my reach. I deeply regret this, but alas, the

    limitations of being a flawed human. So thank you for your

    understanding.


