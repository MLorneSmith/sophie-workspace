    ) 🔊]


    In terms of sustainable career progression, the fast way, is the

    slow way, because the slow way, is the only way.

    Short-cuts feel good for the ego in the short-term, but they put

    you in positions that you’re unable to succeed in.

    Learn yourself, focus inwardly, you vs you.

    – Steven Bartlett (tweet (

    https://click.convertkit-mail2.com/n4u7388l78fqul35r5t6h6dxngggil/48hvhehrw7q2eeix/aHR0cHM6Ly94LmNvbS9TdGV2ZW5CYXJ0bGV0dC9zdGF0dXMvMTE2MDk5MzUxNzAxMjk0Njk0NT9sYW5nPWVu

    ))

    Hey, it’s André…


    I’m a dreamer.


    Most nights, I experience dreams, is what I mean.


    However, details of most fade as I awake, like sands running

    through my hand, unrecognizable remnants remain of what had just

    played out in such vivid detail.


    But sometimes, when I’m lucky – which typically happens when I’m

    immersed in a creative project up to the eyeballs – I have what

    feels more like lucid dreams about some aspect of my creative

    work. I awake with these fully formed, as if I had been

    workshopping them all night.


    The other night, I had one of these experiences, and the

    following emerged fully formed. Of course, since then, I’ve

    thought about it a lot. And I’ve made connections with ideas I’ve

    since read.


    At high school and shortly thereafter, we (best friend and I)

    used to purchase print magazines to get news about PCs and

    computer games – PC Format, Computer and Video Games (CVG), PC

    Zone, PC Gamer, Your Computer, and PC Magazine are the ones I

    remember.


    We built our own PCs. We overclocked them (cooking a few

    processors as we experimented with the limits). And we loved

    playing games!


    This was sometime in the 90s. Oh, how things have changed!

    There was no internet back then. So we didn’t miss something we

    had never experienced. Going to the local newsagent was the most

    normal thing in the world, something we did most weekends.


    New games were featured months before their release. Long-form

    exposes, speculative reviews, and even full-level demos were

    included on CD-ROMs in shrieked-wrapped magazines (and cassette

    tapes for the ZX Spectrum even before then).


    48K ZX Spectrum. This must have been in the late 80s (I entered

    high school in 1987)

    I’m showing my age talking about ZX Spectrum. :)


    (Last year, I read Masters of Doom: How Two Guys Created an

    Empire and Transformed Pop Culture (

    https://click.convertkit-mail2.com/n4u7388l78fqul35r5t6h6dxngggil/wnh2hghwmlvop2b7/aHR0cHM6Ly9nZW5pLnVzL2Ftem5NYXN0ZXJzb2ZEb29t

    ) by David Kushner, about video game company id Software,

    focusing on the two co-founders John Carmack and John Romero. I

    LOVED reading it so much!)


    Anyhoo…


    Anticipation emerged from months of buying magazines, reading

    about upcoming games, and hours of excited hype-building with

    friends. By the time a game dropped, expectations were off the

    charts!


    Super fans were created long before games hit the streets. Doom,

    Quake, Warcraft.


    I loved the Sierra On-Line series: King’s Quest, Space Quest,

    Police Quest, and, of course, Leisure Suit Larry! F$#k, I loved

    LSL.


    Then the internet happened…


    Things got even better.


    Fandoms sprang up like mushrooms after a rainstorm. WordPress was

    released in 2003, the same year I became a full-time online

    something-or-other.


    Blogging became a thing.


    Superfans became indie bloggers and spawned an industry of true

    followers. The internet was all upside, from what I can remember.


    Fans read blogs and commented (go figure!). I recall receiving

    hundreds of comments on blog posts I published.


    These were the days when I could sell 600 copies of a course as

    an affiliate from a tiny email list. All of this was powered by

    anticipation, which is downstream of attention.


    Then social media happened…


    … and it broke everything.


    The 2010s marked a shift in attention as algorithms prioritized

    engagement.


    It didn’t take long for the social media networks to realize that

    optimizing for the marginal user was critical to building network

    effects, which paved the way for their advertising-funded

    business models.


    And hence began the race to the bottom.


    With it, our attention fragmented, becoming fleeting, as we tried

    to cope with a firehose of inputs and FOMO.


    There was no coming back from the brink.


    Somewhere along the way, we lost the art of anticipation. When

    attention fragmented, it was hard for anticipation to take hold.


    Anticipation feels like a lost art today.


    -

    §

    -


    In a exceptionally written essay for The Atlantic (Jan 30, 2023)

    – WE’VE LOST THE PLOT (

    https://click.convertkit-mail2.com/n4u7388l78fqul35r5t6h6dxngggil/reh8hoh0kov5rgu2/aHR0cHM6Ly93d3cudGhlYXRsYW50aWMuY29tL21hZ2F6aW5lL2FyY2hpdmUvMjAyMy8wMy90di1wb2xpdGljcy1lbnRlcnRhaW5tZW50LW1ldGF2ZXJzZS82NzI3NzMvP3JlZj1hbmRyZWNoYXBlcm9uLmNvbQ==

    ) – Megan Garber artfully unfolds the shit show we find ourselves

    in today. (The article comes with audio narration.)


    -

    §

    -


    Immediate gratification is so ingrained in us that I suspect many

    of us have forgotten what pure vibrating anticipation feels like

    anymore.


    Our anticipation glands have atrophied.


    For the marginal user, I don’t think their goldfish attention

    span (

    https://click.convertkit-mail2.com/n4u7388l78fqul35r5t6h6dxngggil/08hwh9hdnpw75lul/aHR0cHM6Ly90d2l0dGVyLmNvbS9qc3BlY3Rvci9zdGF0dXMvMTc3ODUyMTQzNzIzMTUzODUzMA==

    ) allows a place for anticipation to take hold and establish

    roots. Next!


    Tim Ferriss has two-plus million email subscribers. He charges

    six figures for two sponsored ads, I believe. Yet he receives

    fewer than ten blog comments on new posts, many just two or

    three. But look back at his earlier archives (when he had far

    fewer subscribers), and you’ll see hundreds of comments for every

    post. Hundreds!


    So, with attention at an all-time low, are we, as indie

    publishers and sovereign creators, doomed?


    .


    .


    Well, in my estimation, it depends. :)


    Personally, I’m not worried…


    (But many/most people playing the attention-capturing game

    probably should be. This tweet from Josh Spector reveals (

    https://click.convertkit-mail2.com/n4u7388l78fqul35r5t6h6dxngggil/08hwh9hdnpw75lul/aHR0cHM6Ly90d2l0dGVyLmNvbS9qc3BlY3Rvci9zdGF0dXMvMTc3ODUyMTQzNzIzMTUzODUzMA==

    ) the kind of engagement some of the biggest experts using “X” in

    our space are seeing with the framing question: What % of an

    expert’s followers typically see their tweets?)


    It’s a choice of who we target and who we serve.


    We can chase a version of the “marginal user” like many people

    do. It’s a choice, like I said, even if that choice is

    accidental.


    Or, we can choose to attract non-marginal people.


    Either way, we have agency.


    -

    §

    -


    Robin Hanson, an associate professor of economics at George Mason

    University, wrote a compelling and concise essay in 2010 titled

    “Chase Your Reading (

    https://click.convertkit-mail2.com/n4u7388l78fqul35r5t6h6dxngggil/8ghqhohlw7p5v7sk/aHR0cHM6Ly93d3cub3ZlcmNvbWluZ2JpYXMuY29tL3AvY2hhc2UteW91ci1yZWFkaW5naHRtbD9yZWY9YW5kcmVjaGFwZXJvbi5jb20=

    ).”


    In this essay, Hanson argues that readers are more intellectually

    productive when they adopt a goal-oriented, critical approach

    (chasing) rather than a passive, exploratory one (searching). By

    focusing on specific questions or problems, readers can better

    integrate new information, critically evaluate sources, and

    generate new ideas.


    Hanson’s concept is a powerful metaphor or mental model for

    effective reading habits. But it also implicitly points to the

    habits of the people we seek to serve.


    I have often fallen into the trap of blindly reading material

    without a specific focus – what Hanson frames as “searching” –

    under the guise of satisfying my curiosity…


    However, it’s far more productive to read with a clear purpose,

    striving to make sense of something specific. This approach not

    only sharpens our critical thinking but also enhances the value

    we extract from our reading.


    After I dreamed about the lost art of anticipation, I read an

    essay by Henrik Karlsson (of Escaping Flatland) titled “On

    shortcuts and longcuts (

    https://click.convertkit-mail2.com/n4u7388l78fqul35r5t6h6dxngggil/vqh3hrhpmq3k76cg/aHR0cHM6Ly93d3cuaGVucmlra2FybHNzb24ueHl6L3Avb24tc2hvcnRjdXRzLWFuZC1sb25nY3V0cz9yZWY9YW5kcmVjaGFwZXJvbi5jb20=

    ).”


    His essay provided language, or perhaps a different framing would

    be more accurate, for an idea I’ve long held.


    There’s this design heuristic that if people cut across the

    grass, you should pave the shortcut they make. This gives the

    path a lovely human fit.

    But sometimes you want to do the opposite. You want to design

    ways to get people to take a longer path, a longcut, so they can

    see or do things they’d miss otherwise.

    In my estimation, the erosion (or perhaps ‘dissolution’ fits more

    aptly) of our attention from the proliferation of conforming to

    social media algorithms (read Megan Garber’s essay (

    https://click.convertkit-mail2.com/n4u7388l78fqul35r5t6h6dxngggil/reh8hoh0kov5rgu2/aHR0cHM6Ly93d3cudGhlYXRsYW50aWMuY29tL21hZ2F6aW5lL2FyY2hpdmUvMjAyMy8wMy90di1wb2xpdGljcy1lbnRlcnRhaW5tZW50LW1ldGF2ZXJzZS82NzI3NzMvP3JlZj1hbmRyZWNoYXBlcm9uLmNvbQ==

    ) for a chilling articulation of this) is akin to the “shortcut”

    mentality.


    Ivan Vendrov (who worked at Google for six years) argues a

    similar point in The Tyranny of the Marginal User (

    https://click.convertkit-mail2.com/n4u7388l78fqul35r5t6h6dxngggil/l2hehmh3qdvk9gb6/aHR0cHM6Ly9ub3RoaW5naHVtYW4uc3Vic3RhY2suY29tL3AvdGhlLXR5cmFubnktb2YtdGhlLW1hcmdpbmFsLXVzZXI_cmVmPWFuZHJlY2hhcGVyb24uY29t

    ):


    Here’s what I’ve been able to piece together about the marginal

    user. Let’s call him Marl. The first thing you need to know about

    Marl is that he has the attention span of a goldfish on acid.

    Once Marl opens your app, you have about 1.3 seconds to catch his

    attention with a shiny image or triggering headline, otherwise

    he’ll swipe back to TikTok and never open your app again.

    We don’t usually think about Marl, or identify with him. But the

    structure of the digital economy means most of our digital lives

    are designed to take advantage of this state. A substantial

    fraction of the world’s most brilliant, competent, and empathetic

    people, armed with near-unlimited capital and increasingly

    god-like computers, spend their lives serving Marl.

    By contrast, consumer software tools that enhance human agency,

    that serve us when we are most creative and intentional, are

    often built by hobbyists and used by a handful of nerds. If such

    a tool ever gets too successful one of the Marl-serving

    companies, flush with cash from advertising or growth-hungry

    venture capital, will acquire it and kill it. So it goes.

    Yet, as digital world builders, we’re perfectly positioned to

    optimize for “longcuts,” to use Henrik Karlsson’s language.


    We want to design ways to get people to take a longer path, a

    longcut, so they can see or do things they’d miss otherwise.


    While “Marl” is both a user archetype and state of mind, “Harper”

    – the archetype I use in my writing and heavily within the paid

    tier training, which is almost ready – represents people seeking

    deeper engagement that’s meaningful.


    The weird, as I like to call them (phrasing stolen from Seth

    Godin). Or the hobbyists and nerds in Vendrov’s piece.


    The essence of TDW embodies anticipation (on the other side of

    earning trust and attention).


    Delayed gratification is embedded into the system, so

    anticipation builds as tension builds.


    We serve the weirdos. We are the anti-marginal movement.


    There’s something beautiful about that, don’t you think?


    Writing essays is a lot like this. I walk the landscape to find

    interesting and overlooked spots, and then I make a path there.

    The words you are reading right now are not the fastest way to

    get from A to B.

    Instead, we’re trying to create a path to encourage you to walk

    in a direction you wouldn’t otherwise because we think that it’s

    going to be an interesting experience for you.

    – Henrik Karlsson (On shortcuts and longcuts)

    This idea is embedded into every aspect of Tiny Digital Worlds.

    It’s for people serving the Harpers of the world, not the Marls.


    Yet, most people are (perhaps unknowingly) optimizing for Marls;

    the marginal users. But this is not where we thrive.


    Enjoy your weekend!


    André “longcuts” Chaperon


