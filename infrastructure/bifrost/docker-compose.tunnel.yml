services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bifrost-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run bifrost-gateway
    volumes:
      - ./cloudflared.yml:/etc/cloudflared/config.yml:ro
      - cloudflared-data:/etc/cloudflared
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info", "bifrost-gateway"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cloudflared-data:
    driver: local
