content:
  body: "Welcome to another issue of the Emergent Marketing Newsletter

    by André Chaperon & Shawn Twing. We focus on modern marketing,

    writing, and learning.


    Hey, it's André today...


    Back, upgraded, and a little older...


    Last Tuesday, I turned 50 (while downhill skiing on foggy Sierra

    Nevada slops, a version of extreme sports, as it turned out)...


    (Caption: This was halfway down a run, gravity my only compass;

    and the odd blue-ish marker indicating an edge to avoid at all

    costs. Thankfully, March 8th was all sun and fun.)


    One of the benefits of having a milestone birthday is that my old

    \"long lost\" friends reached out from the woodwork. If that were

    the only gift for turning 50, it would have been all I needed.


    And then there's Shawn ... the old bugger famous for jumping out

    of airplanes with crazy hare-brained ideas (then constructing his

    parachutes on the way down, which is always such fun when I'm the

    copilot).


    Shawn is all high stakes (or what the hell is the point). His

    bday pressie was something extraordinary indeed.


    What a pal!


    (As it turns out, I'm writing solo today because he is testing

    for his 'Master' level black belt in Taekwondo later today.)


    All this hubbub got me reflecting on a juxtaposition of feelings

    of being both old and young simultaneously, which may be worth

    unpacking to the degree I can in this email.


    I think there are some valuable observations to share between the

    lines.


    As I turned 50, on that same day, twenty years earlier, I was

    working a job in the basement of a building in London, knowing I

    needed to get out, to do something else, to build a \"boat\" and be

    the rower, to head in the direction of my choosing on my terms.


    There had been rumors the IT department would all be replaced

    when an imminent merger had been penned by the powers that would

    become richer from the merger, while staff not needed anymore

    would be jettisoned like old shabby clothing.


    The chop came seven months later, the IT department culled (bar

    one sod), along with redundant positions in other departments.


    For everyone with their newly minted P45s (equivalent to a W-2 in

    the U.S.), this was just a bump in the road, part of the contract

    of being a replaceable pawn in the game that is a pyramid of the

    capitalist system of winners and losers.


    Yet, while my colleagues consoled over their pints of beer right

    after the culling, I sported a smile on my face, perhaps the only

    one wearing a pair of deluded rose-tinted glasses, too stupid to

    internalize the implications ahead...


    It was odd when I think about it now because I had no freakin'

    idea what I was heading into.


    André 2.0 would leverage the internet to build his boat and sail

    the digital seas in search of financial freedom and independence.

    But the poor bastard didn't know what he was in for.


    (And lol, remember, this was 2003 — commerce on the internet was

    barely a thing on the Mad Max plains of the digital wild west.

    Twenty years later, generative AI will eat the world at a speed

    none of us can yet appreciate.)


    I was a thirty-year-old punk who knew nothing about how to use

    the internet to build his little boat. But in the face of

    imminent financial famine, one learns pretty damn quickly. :)


    An observation that would only reveal itself to me twenty years

    later is that life seems to fall nicely within a three-act

    structure...


    ACT I:

    ------


    Before reaching the point of no return, there is a pivotal moment

    when we choose to diverge from the conventional path.


    Our decision to leave the safety of the group, the warmth of the

    status quo, and head into the scary unknown to face certain

    peril, challenges, and conflict.


    But as the heroes of our own stories, this is the path we need to

    take, to face the uncertainty and obstacles with action, and

    through this conflict, grow and transform.


    It's important to note that leaving Act I requires agency, which

    establishes the conflict and propels us into action, driving the

    plot forward.


    While I lost my job, I chose not to seek new employment and

    instead jumped out of a moving airplane with no parachute.

    (Funny, I know someone else who does this.)


    Sadly, I don't think most people ever leave Act I. I'm not making

    a judgment here. And that's not to say they don't face trauma,

    hardship, and untold challenges.


    ACT II:

    -------


    Having spun the boat's wheel and pointed into the eye of the

    storm, this is life in the chaos of the messy middle as we go on

    our hero's journey into the unknown to face the peril of monsters

    (internal and external) in pursuit of something better.


    A creative calling, perhaps...


    Or to escape the glass ceiling of a \"normal life\" as a compliant

    pawn in a game we don't control or can never win to any degree.


    One of the insights we have to discover ourselves as we navigate

    the tightrope of Act II is that the whole point of the journey

    isn't some bright shiny \"goal\" marking the completion of a game

    we've just won for ourselves...


    ... but instead, being on the journey and what we learn along the

    way is the whole damn point.


    Because then we're constantly winning each time we fail, as we

    discover insights and knowledge and buried treasure through the

    fail-learn-upgrade loop embedded in Act II.


    The boat I started constructing in 2003 was initially to find

    financial freedom and independence in a system I did not have

    agency over.


    While I achieved the base-level desire I sought in Act II, I

    discovered the story didn't end when the desired \"thing\" was

    achieved.


    New opportunities and realizations constantly present themselves

    as we transverse our story, invisible at the start but gifts when

    found.


    THAT was the point!


    (Or is the point of Act II, now that I can look back from this

    new vantage point.)


    ACT III:

    --------


    I think this is where Act III starts, which, for me, is twenty

    years into the journey, only now crossing the threshold of Act II

    and into Act III.


    More than anything, exiting Act II and into Act III is a feeling

    you'll know (feel) when you get there — and once again, agency is

    required to let go of Act II and move into Act III.


    Like moving from Act I to Act II, it's not easy leaving the

    comfort of Act II and into the unknown of Act III.


    This final chapter, for me and you, will be different but share

    similar properties or characteristics unique to Act III.


    For one, the journey through the membrane of Act I and across the

    rough seas of Act II gives us the experience and the expertise to

    enter Act III (and what lies beyond) if we choose the challenge.


    It's exciting because part of that excitement is the fear of the

    new unknown within an ever-changing environment. (Looking at you,

    GPT4!)


    I mentioned a \"secret\" in the subject of this email, which points

    to an insight available to you on your journey.


    Paired with your hero's journey, this 'secret' points to

    inevitable success, whatever that looks like for each of us.


    While at the ski resort last week, James Schramko, a dear friend,

    sent me this:


    Chappy I'm recording a 1000 episode for my podcast in about a

    week from now.


    Would you be interested in sending me a short video to include in

    the celebration?


    Maybe just encouraging me or some insight about our friendship?


    I don't do videos, so I sent James something to read from me,

    which started like this:


    Implicit in this monumental milestone is a secret to success in

    business and life, hidden in the shadows because it's not sexy.

    Yet this secret points to James' phenomenal success and is

    available to everyone who can see past the smoke and mirrors of

    marketing hacks and shortcuts.


    I never mention what the secret is because it should be obvious,

    the hint embedded in the milestone.


    The same little secret is implicit in what has carried me through

    my twenty-year journey through Act II and into Act III.


    While not sexy, it can't be monetized in a product, but it'll

    carry you to whatever you desire in your pursuit because it's a

    superpower.


    Shawn and I are both in Act III, which is handy for us and will

    be immensely valuable to you if we have anything to do with it.


    Act III is going to be so much fun (if GTP4 doesn't render us

    unemployed).


    It'll not be more of the same, but just a little better.


    No.


    Instead, the synthesis of experience and expertise, at this point

    in the journey, changes how someone in Act III shows up,

    interacts with the world, and the value they have to share.


    We have work to do in Act III, and if you give us your attention,

    you'll see it over the coming year (and years ahead), whatever

    the future looks like for us.


    Enjoy your weekend.


    André (and Shawn)


    P.S.


    Inevitably after writing emails like this, I get asked for

    \"extra\" resources that have influenced my thinking.


    While Act II is the journey you need to navigate on your own,

    learning each time you stumble, fall, and bloody your nose, here

    are some books that have helped.


    (I'm sure there has been many others, but these are the ones that

    came to mind when thinking about this question.)


    Liminal Thinking (

    https://click.convertkit-mail.com/mvukox682pu5hgoqkm5am/m2h7h5h8k0v6w5fm/aHR0cHM6Ly9nZW5pLnVzL2Ftem5MaW1pbmFsVGhpbmtpbmc=

    ) by Dave Gray helped me appreciate that our beliefs shape our

    reality, often influenced by our experiences, culture, and

    upbringing. These beliefs can create self-reinforcing loops,

    making it difficult to change our perspectives and limiting our

    ability to adapt to new situations or solve problems. Liminal

    Thinking is about exploring the spaces in between our beliefs,

    assumptions, and perspectives to create new ways of understanding

    and navigating the world.


    George Leonard's book Mastery (

    https://click.convertkit-mail.com/mvukox682pu5hgoqkm5am/dpheh0h0zwv9rnam/aHR0cHM6Ly9nZW5pLnVzL2Ftem5NYXN0ZXJ5

    ) has helped me to care less about results and more about the

    process of creating great work I'm proud of.


    As did academy award-winning actor Bryan Cranston in his memoir,

    A Life in Parts (

    https://click.convertkit-mail.com/mvukox682pu5hgoqkm5am/e0hph7h09w635gb8/aHR0cHM6Ly9nZW5pLnVzL2Ftem5BTGlmZUluUGFydHM=

    ). And too, the brilliantly written memoir, A Million Miles in a

    Thousand Years (

    https://click.convertkit-mail.com/mvukox682pu5hgoqkm5am/7qh7h8hovpq232fz/aHR0cHM6Ly9nZW5pLnVzL2Ftem5NTWlhVFk=

    ), by Donald Miller.


    More recently, two books have helped me identify the doorway from

    Act II into Act III: From Strength to Strength (

    https://click.convertkit-mail.com/mvukox682pu5hgoqkm5am/owhkhqhr3lpm52uv/aHR0cHM6Ly9nZW5pLnVzL2Ftem5TdHJlbmd0aFRvU3RyZW5ndGg=

    ) by Arthur C. Brooks and Die with Zero (

    https://click.convertkit-mail.com/mvukox682pu5hgoqkm5am/z2hghnh39rn20lip/aHR0cHM6Ly9nZW5pLnVzL2Ftem5EaWVXaXRoWmVybw==

    ) by Bill Perkins, both authors having been interviewed by Peter

    Attia not long ago (search YouTube).


