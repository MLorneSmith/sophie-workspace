content:
  body: "Entire DDM system blueprint; The secret sauceView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=7&m=9&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l


    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email


    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    Hi Michael,


    Today I am going to share with you the ENTIRE blueprint of


    **Decks for Decision Makers**. (you read that right.)


    This is a system I've honed through


    **in-the-trenches** practice over the past twenty years.


    It is a process and strategy that eliminates all of the common pitfalls and traps professionals encounter when creating business presentations.


    And I am going to share all of it with you right now...


    But first, let me ask you...


    Did you pick-up a copy of Barbara Minto's book? Pretty useful, eh? (I know I just told you about it a few days ago - but hey, Amazon Prime delivers next day!).


    Barbara does an outstanding job of explaining how to structure your ideas.


    But here's the thing.


    Structure isn't the


    **complete** answer.


    I love Barbara. But in today's world there is a whole lot more to a presentation than just structuring your ideas.


    No point in structuring a great answer to the


    **wrong question**...


    No point in presenting a


    **bunch of assertions**, without clearly communicating supporting facts and data that prove those assertions...


    No point in presenting a great argument if it is so


    **complicated and boring** that no one can understand or remember it...


    No point in presenting at all if your slides are so


    **ugly that you lose all credibility** before you even start speaking...


    To create a killer presentation requires a more HOLISTIC approach.


    Here's an illustration to help paint the picture for you...


    See that Who, Why, What, How row?  This is a


    **simple conceptual framework** designed to do a couple of things that most people COMPLETELY GET WRONG.


    * Understand, in depth,


    **who** it is you are presenting to


    * Plant


    **a question** in the mind of that audience and then answer it (rather than talk about a topic)


    * Communicate that answer


    **clearly, concisely, convincingly**


    *


    **Inspire** your audience to


    **act** through your delivery


    The SECRET SAUCE is in the tools that allow you to accomplish this.


    In future emails, I will cover the key components of this Decks for Decision Makers process - in particular the 5S-es of communicating your answer clearly, concisely, convincingly.


    (and we go into MUCH more DEPTH in DDM itself).


    So hang on tight!


    More to come.


    Same time, same place tomorrow.


    **Michael \"follow a Blueprint\" Smith**


    **P.S.**


