content:
  body: "He profits most who serves best. -- ARTHUR F. SHELDON


    Hey Michael,


    I really like that quote.


    Anyhoo...


    Got a question for you...


    What is your biggest challenge with email?


    You know, the part you struggle with the most.


    Or put another way...


    If you could wake up tomorrow morning and be a rockstar at this

    one thing (in regards to email), what would that be?


    HIT REPLY and let me know.


    It would mean the world to me.


    Andre \"waiting patiently\" Chaperon


    PS.


    You may have been wondering what the hell 4 a.m. is all about.


    Good question. Glad you're paying attention.


    Just before I wrote this email to you, I was on TED.com watching

    two talks from a dude named, Rives.


    I dunno if that's his first or last name. I checked on

    Wikipedia...


    \"Rives (born 1968) is an American poet, storyteller, and author.\"


    I guess that's it then, just plain Rives.


    Anyhoo, I digress...


    The talk is called The 4 a.m. mystery ( https://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzc0MzU0NzQ5NCIsInVybCI6Imh0dHBzOi8vd3d3LnRlZC5jb20vdGFsa3Mvcml2ZXNfb25fNF9hX20_X19zPXl6eW1pYXF0eWl0c2kyc2lhZW1pIn0 ).


    It's odd, but in a really good way.


    It has nothing at all to do with email. But if you're at all like

    me, you'll enjoy it (a lot).


    Oh yeah. There's also a sequel ( https://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzc0MzU0NzQ5NCIsInVybCI6Imh0dHBzOi8vd3d3LnRlZC5jb20vdGFsa3Mvcml2ZXNfYV9tdXNldW1fb2ZfNF9vX2Nsb2NrX2luX3RoZV9tb3JuaW5nP19fcz15enltaWFxdHlpdHNpMnNpYWVtaSJ9 ).


    ---------------------

    To make sure you keep getting these emails, please add

    hello@tinylittlebusinesses.com to your address book or whitelist us. Want out of

    the loop? <a href=\"https://t.dripemail2.com/c/eyJhY2NvdW50X2lkIjoiNzAyNjQ1NiIsImRlbGl2ZXJ5X2lkIjoiNzc0MzU0NzQ5NCIsInVybCI6Imh0dHBzOi8vd3d3LmdldGRyaXAuY29tL3N1YnNjcmliZXJzL3l6eW1pYXF0eWl0c2lyc2lhZW1pL3N1YnNjcmlwdGlvbnM_ZD01cnY4aXVscWFwbml3ZzB0NmVvelx1MDAyNmV4Y2x1ZGVfY2xpY2s9MVx1MDAyNmludGVudD11bnN1YnNjcmliZVx1MDAyNl9fcz15enltaWFxdHlpdHNpMnNpYWVtaSJ9\">Unsubscribe</a>.


