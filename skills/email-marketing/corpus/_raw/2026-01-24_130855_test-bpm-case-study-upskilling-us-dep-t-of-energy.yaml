    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    Hi Michael,


    John Lushetsky is the


    **Chief Operating Officer** of the Office of Policy at the


    **U.S. Department of Energy.**


    John's team is the main office advising the


    **Secretary of Energy** on U.S. Energy policy.


    A couple of years ago John came to me early in Secretary Rick Perry's term as Secretary with a problem.


    You see – US Energy Policy is pretty complex.  It is a complex market, with complex technologies. You know – nuclear reactors and all.


    **\"Michael, I have a team of world-class experts – but we can improve how we communicate our recommendations and insights to non-experts.  **


    **Sometimes we can get lost in the data.  Sometimes we can get lost in explaining how things work.  **


    **Sometime we are not as CLEAR as we need to be in communicating what we have to say.' **


    **Can you help?\"**


    I put together a week long structured program for 35 of John's top analysts, with the Decks for Decision Makers video course at its core.


    Here is what John had to say about Decks for Decision Makers:


    **\"10 out of 10.**


    **Great content and support materials!**


    **Michael's delivery and the flexibility of the pre-recorded online format were fantastic.\"**


    Here are some more comments from members of John's team:


    **\"The training was detailed, insightful, professional, and directly impacted the work that I do.\" **


    – Stephen Hendrickson, Policy Analyst, DOE


    **\"Concise treatment of the most important points--not too much \"fluff\" in this course.\"**


    – Nathaniel Horner, Policy Analyst, DOE


    John got promoted shortly after the team went through DDM.  Correlation does not equal causation but… I'm just sayin'…


    See you tomorrow,


    **Michael 'just sayin' Smith**


    **P.S.**


    **If you have a team at work that could benefit from Decks for Decision Makers, we offer Team packages. Hit reply to this email to set-up a call so we can discuss your needs.**


