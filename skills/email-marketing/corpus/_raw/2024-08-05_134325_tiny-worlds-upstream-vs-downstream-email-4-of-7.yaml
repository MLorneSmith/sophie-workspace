content:
  body: |
    Hey, it's André...


    I hope you're finding interesting insights in this series.


    Hit reply anytime and let me know how your thinking has shifted.

    I read every email.


    I'm going to draw attention to thinking that is near and dear to

    me, shaping how I think about building marketing systems.


    This is what informed the system I created in the mid-2000s that

    allowed me to build an email list of followers so engaged many

    still read my emails today, a decade and a half later.


    ​Mechanism Design Theory (

    https://click.convertkit-mail2.com/68u7o33l73fou86qkpcohpk4vkkkh9/08hwh9hdx8v7rxul/aHR0cHM6Ly93d3cubm9iZWxwcml6ZS5vcmcvdXBsb2Fkcy8yMDE4LzA2L2FkdmFuY2VkLWVjb25vbWljc2NpZW5jZXMyMDA3LnBkZg==

    ), also referred to as reverse game theory, is a method of

    economic analysis that seeks to deduce the best outcome possible

    under given circumstances, which are usually imperfect or lacking

    in completeness.


    While traditional economic theory often looks at the outcomes

    that arise from given systems, mechanism design theory takes a

    reversed approach.


    It starts with the outcome and tries to identify the type of

    system or mechanism that could achieve that outcome.


    What's interesting about the concept is that it involves

    designing a game or situation so that the desired outcomes occur

    when each participant acts in their own self-interest.


    Take a sec and stop to think about that before moving on.


    (Dramatic pause.)


    This means setting up the 'rules of the game' to achieve a

    specific result, despite the motivations of the individual

    players.


    Framed another way, the aim is to design a system (with

    strategies) that prevent undesirable problems from occurring

    rather than dealing with the consequences after they occur.


    Implicit in the traditional marketing funnel when it's placed at

    the center of a business is that, while it can accelerate the

    rate at which sales are generated, the negative implications of

    the experience come along for the ride.


    Here's the image from the previous email:


    FIG 1: A Closed System (Linear) Funnel

    This model is optimized for sales throughput.


    And it does this well.


    However, reality tells us there's perpetual lead fatigue and

    burnout within this system, a byproduct of upstream tactics.


    Without constant lead flow, the negative feedback loop implicated

    in this system (the loss of trust and attention over time) is

    constantly undermining what the system is optimized for (sales

    throughput).


    Turn the lead faucet off, and the system dies as the negative

    feedback loop overwhelms it, causing it to atrophy over time.


    So long as leads are flowing into the system at an appropriate

    rate, it's easy not to see the negative feedback loop in play.

    But like gravity, it's there, pulling in the other direction.


    Through Mechanism Design Theory, the system's behavior becomes

    clear, and we get to observe the system's dynamics more

    objectively.


    Now let's revisit the example illustration of an 'open world'

    funnel from the previous email:


    FIG 2: An 'Open-World' (Non-Linear) Funnel

    Once again, this time with the benefit of Mechanism Design

    Theory, let's consider some of the dynamics of this redesigned

    system in contrast to the former.


    The first distinction is that this system is not optimized for

    sales throughput.


    Wait, what?!


    No…


    Rather, "sales" (new customers) are the byproduct of optimizing

    for something else entirely…


    Before I get there, let's review one of the dynamics of Mechanism

    Design Theory, which I stated earlier (pay attention to the

    bolding):


    What's interesting about the concept is that it involves

    designing a game or situation so that the desired outcomes occur

    when each participant acts in their own self-interest.


    Let's unpack this a little more because it's important.


    With the traditional marketing funnel, "sales throughput" is

    universally what's optimized for.


    But it's self-serving from the creator's perspective! (Re-read

    this a few times.)


    Sure, creators like us who believe our products and services are

    created overwhelmingly for the benefit and betterment of our

    customers, it's also an easy story we can over-emphasize, making

    a case for the over-reliance on persuasion tactics, engineering

    urgency to shorten the sales cycle unnaturally.


    But as long as the system is being optimized for "sales

    throughput," the design of the system and its implications create

    a reality that negatively affects the system's behavior.


    So, we need a better metric that we're optimizing for.


    For a long time, I've been obsessed with the idea of optimizing

    for 'happy customers,' which may seem similar to sales, but it's

    not. It's a world apart.


    But a Tiny World is more than just optimizing for 'happy

    customers' because a happy customer is downstream of other

    dynamics.


    In a broader sense, I suggest that optimizing for 'happy' should

    be the function (goal) of a well-designed marketing system.


    Tiny Worlds is about building a World, an environment that

    fosters happy, from which 'happy customers' emerge.


    Mo Gawdat, a former Google executive, in his book Solve for Happy

    (

    https://click.convertkit-mail2.com/68u7o33l73fou86qkpcohpk4vkkkh9/8ghqhohl34z5npuk/aHR0cHM6Ly9nZW5pLnVzL2FtbnpTb2x2ZUZvckhhcHB5

    ) (2017), has helped me see this more clearly.


    "A powerful personal story woven with a rich analysis of what we

    all seek in a way we can act upon." – Sergey Brin, cofounder of

    Google


    And implicit in 'solving for happy' is creating a World that

    affords and facilitates engaging experiences.


    So, what do I optimize for?


    Happy.


    Or said another way, a Happy Tiny World.


    Happy customers emerge downstream of _Happy _ inhabitants, the

    denizens of our World – the byproduct being revenue.


    There's a lot here.


    André


    P.S.


    Remember, desired outcomes occur when everyone entering our Tiny

    World acts in their own self-interest.


    Which points to something upstream of Happy. :)


    That'll be a deep-dive topic I'll explore later, which points to

    one of the principles of a Tiny World.


    Our Tiny World from email 3 is expanding – the word is out, and

    people are sharing their experiences with their social circles,

    attracting more denizens to our World…


    ​

    (Another creator is building their own Tiny World adjacent to

    ours, opening up opportunities for "multiplayer" experiences.)


    To respond to this email, just hit reply. I love getting replies,

    and read them all. However, I've come to realize that replying to

    each one is beyond my reach. I deeply regret this, but alas, the

    limitations of being a flawed human. So thank you for your

    understanding.


    (If you received this email from a friend, and would like to

