content:
  body: "Business presentations vs. TED-style speechesView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=5&m=7&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l


    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email


    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    Hi Michael,


    I have a confession to make…


    When I first started... I was no different than anyone else.  My decks (presentations) stunk.


    They were awful. LOL!


    Here are some examples of the kinds of business presentations being created every day:


    This one is a lot more fun than you'd expect!  Have a listen...


    https://youtu.be/nSGqp4-bZQY


    When I finally said


    **enough is enough** and started getting serious about turning my presentation handicap into a MAJOR professional advantage I initially turned to books and other training materials.


    I was shocked at how LITTLE material is oriented towards the types of business presentations I needed to create.


    Sit-down business discussions.


    Learning to create a presentation is not the same as learning to give a presentation.


    Advice on giving auditorium-style speeches emphasizes the use of imagery and simple, easy to read slides.


    When the setting changes, when the audience changes, and you are creating a document for a


    **board meeting**, or to update your


    **boss's boss** – the communication requirements change as well. (No pictures of cats please!)


    'Sit-down' business presentations require a completely different approach to presentation design.


    The focus shifts to the crafting of a tight story:


    * The presentation takes you step by step through an argument


    * There is a clear, logical structure that is sound (bullet proof!)


    * The argument is complete


    * The presentation is data intensive, with assertions proven with facts


    Excellence comes from mastery of a SET of skills:


    * Ordering ideas in a logical and structured way


    * Utilizing words succinctly, powerfully, accurately


    * Dealing with numbers and communicating data effectively


    * Creating aesthetically pleasing design


    * Commanding a room with charisma and executive presence


    Only some of these skills are taught in schools or formally in organizations.  Many from this list are either very challenging to master, or are seen (by many) as simply innate.


    'How to use PowerPoint' courses do not teach these skills either.


    yikes. Bit of work there.


    (as an aside, DDM is purposefully designed to methodically build these exact skills, step by step)


    I am going to reveal some of the DDM \"secret sauce\" next.


    But before I share that with you...


    YOU NEED TO UNDERSTAND THIS NEXT PART.


    Business presentations allow you to do what, above all else?


    (If you have watched Lesson Zero of DDM, then you already know the answer! Well done!).


    Remember, your slides get presented/read sequentially (hint hint).


    What does that allow you to do?


    Or rather ... what does it allow you to CONTROL?


    Think about it.


    I'll tell you tomorrow.


    **Michael 'full of secrets' Smith**


