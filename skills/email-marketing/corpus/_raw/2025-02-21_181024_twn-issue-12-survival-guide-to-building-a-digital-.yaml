content:
  body: "When you find people who perform at a high level, and whose work

    you love, there are layers upon layers of insight to be gleaned

    from their work and the process behind it. If they are at the top

    of their field, it is sometimes the case that no one else has the

    mental models they have, it can't be learned any other way; it

    can't be found in a textbook. -- Henrik Karlsson, On limitations

    that hide in your blindspot (

    https://click.convertkit-mail2.com/27uglddngda9umzlogu3hgl9n444hg/owhkhqhro0v896iv/aHR0cHM6Ly93d3cuaGVucmlra2FybHNzb24ueHl6L3AvbGltaXRhdG9ucw==

    )


    Hey, it's Andre...


    Over the past week, I've worked to finish the new 'Survival

    Guide' (to Building a Digital World), which I had promised a few

    issues ago.


    I think it has turned out OK, although I've had to omit a few

    parts because of time constraints (which I'll add a little

    later).


    It juxtaposes the conventional thinking of traditional marketing

    with that of building a digital-inspired world. The guide not

    only highlights the differences between these two approaches but

    also draws attention to some of the implications.


    I hope you find this Survival Guide both enjoyable and useful.


    I had fun writing it. Be sure to read the Epilogue at the end.


    https://andrechaperon.com/survival-guide (

    https://click.convertkit-mail2.com/27uglddngda9umzlogu3hgl9n444hg/p8heh9hzxp0765uq/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9zdXJ2aXZhbC1ndWlkZQ==

    )


    As an experiment, I've provided digital narration via OpenAI's

    text-to-speech (using Shimmer). I like her voice. (I plan to

    synthesize a digital version of my voice using ElevenLabs when I

    have some time.)


    Enjoy your weekend.


    Andre


    P.S.


    This version of the Survival Guide is an example of me working

    with the garage door open. So please consider it unfinished, a

    \"first draft\" that I'll keep returning to as I refine my thinking

    and language and incorporate feedback.


    Think of it as a work-in-progress, shared openly to invite

    collaboration and input.


    As always, your thoughts, reactions, and suggestions are welcome

    and genuinely appreciated as I continue developing this resource

    and the other essays I write.


    To respond to this email, just hit reply. I love getting replies,

    and read them all. However, I've come to realize that replying to

    each one is beyond my reach. I deeply regret this, but alas, the

    limitations of being a flawed human. So thank you for your

    understanding.


    (If you received this email from a friend, and would like to

    subscribe, please go here (

    https://click.convertkit-mail2.com/27uglddngda9umzlogu3hgl9n444hg/x0hph6hw34672la5/aHR0cHM6Ly9hbmRyZWNoYXBlcm9uLmNvbS9qb2lu

    ).)


