content:
  body: "Napoleon Bonaparte and the Display of DataView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=15&m=17&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l


    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email


    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    Hi Michael,


    The year is 1812.


    His Imperial and Royal Majesty


    **Napoleon I** is doing pretty well for himself.


    He has most of Europe under his control.


    Except for England. No matter how many times he has tried to invade, he can't break through the English defenses.


    His plan is to place an embargo on England, forcing other European countries to stop trade and weaken England enough so that Napoleon can invade.


    Czar Alexander of Russia, believing that Napoleon is becoming too powerful, refuses to participate in this embargo.


    On June 24, 1812, ignoring the advice of his closest advisors, Napoleon invades Russia.


    Never in living memory has so large an army been assembled — Italians, Poles, German, French — more than


    **600,000** men from every corner of his empire.


    Napoleon prophesies that the war will be over in twenty days.


    **\"I know Alexander,\" Napoleon says. \"I once had influence over him; it will come back. If not, let destiny be accomplished and let Russia be crushed under my hatred of England.\"**


    Napoleon's army marches.


    Woops.


    In 1869, Charles Joseph Minard sets about to create what will become recognized as the


    **\"the best statistical graphic ever drawn\"**.


    But he faces an incredible challenge.


    Humans can't accurately grasp large numbers. Our cognitive systems are very much tied to our PERCEPTIONS. And we have no experience perceiving large numbers.


    (Think about your everyday life experiences.  When you set the table you ask your child (brother, sister, Mom, Dad), how many knives do we need? It's never going to be 10,000 - unless you have a very big dinner party!)


    And, in telling the story of Napoleon's March, Minard is dealing with


    **some very large numbers**.


    Six months after invading, on 14 December 1812, the last of Napoleon's 600,000 troops retreat from Russia.  Only


    ****27,000**** soldiers are left.


    So Minard invents an entirely new way to graphically present this information – dialing into our visual perception to allow our cognitive systems to process what losing 563,000 men means.


    As a statistical chart, the map unites six different sets of data:


    **Geography:** rivers, cities and battles are named and placed according to their occurrence on a regular map


    **The army's course:** the path's flow follows the way in and out that Napoleon followed


    **The army's direction:** indicated by the colour of the path, gold leading into Russia, black leading out of it


    **The number of soldiers remaining:** the path gets successively narrower, a plain reminder of the campaigns human toll, as each millimetre represents 10.000 men


    **Temperature:** the freezing cold of the Russian winter on the return trip is indicated at the bottom


    **Time:** in relation to the temperature indicated at the bottom, from right to left


    Visit this page https://www.masswerk.at/minard/ for a terrific interactive version (and a larger image) of Minard's map.


    Nearly 150 years later,


    **the skill to translate data graphically** so your audience can


    **understand** its meaning is


    **more important than ever**.


    **Michael \"show me some proof\" Smith**


    **P.S.**


    If you liked this email, you'll probably dig this article from Popular Science https://www.popsci.com/greatest-infographic-history/. Charles Minard was hardly a one hit wonder.


