content:
  body: "Welcome to another issue of the Emergent Marketing Newsletter,

    a (mostly) fortnightly newsletter by us, André Chaperon & Shawn

    Twing, with a focus on modern marketing, writing, and learning.

    We appreciate your attention and feel honored you're on this

    journey with us. (If you decide you're in the wrong place, no

    worries. You'll find an unsubscribe link in the footer of this

    email.)


    Hey, it's André and Shawn...


    Happy Friday.


    Today we're going to give you something to add to your

    'get-stuff-done-and-make-a-dent-in-the-universe' toolbox.


    Two simple words more powerful than dynamite.


    Seriously...


    But, before we get ahead of ourselves, let's make sure we're all

    on the same page. We're going to be spending some time together

    soon, and we want to set the stage so you know what to expect.


    If you missed our last newsletter (

    https://click.convertkit-mail.com/e5u8rvexo7u7hz0dm8u8/8ghqhohgkxgm6luk/aHR0cHM6Ly90aW55bGl0dGxlYnVzaW5lc3Nlcy5jb20vaGVsbG8tMjAyMi8=

    ), you'll want to read (or listen to) that first. We made a HUGE

    announcement.


    The short version is: we've taken all of our courses off the

    market.


    Wait, what?


    (Go read the last email to find out why. If you're a customer,

    you definitely want to get caught up.)


    Thanks to everyone who sent feedback and questions about the

    Modern Marketing System. Your enthusiasm makes us even more

    excited...


    (And we didn't think that was possible. As we get ready for the

    next chapter in this adventure, we've been acting like two kids

    in a candy store.)


    If you've been with us for a while, you know we like to show and

    tell. (There's no daylight between what we teach and what we do.)


    To share our best thinking with all of you, we're creating a

    four-part email series called the Modern Marketing Manifesto

    (M³).


    (Hey, what can we say: we like alliteration and superscript

    numbers...)


    There's no need to do anything; you'll receive M³ automatically

    beginning on Monday, Jan 31.


    If we get it right (gulp...no pressure!), we'll give you three

    significant advantages to supercharge your marketing in 2022 (and

    beyond).


    Firstly:


    It is a no-nonsense assessment of what it takes to be an

    effective modern marketer — someone who creates a durable, happy

    customer generating factory that creates value day after day

    (after day after day...).


    No fluff, no BS, and no ideas we cobbled together from something

    we did that sort of worked once years ago (and haven't been able

    to repeat since)...


    Just the cold, hard, as real as gravity FACTS...


    The rules of the marketing game are changing blindingly fast, and

    yesterday's 'best practices' are tomorrow's fatal mistakes.


    We'll show you where the quicksand is, so you don't find yourself

    stuck in it, neck deep wondering why you're not making any

    meaningful forward motion.


    Secondly:


    M³ is a way to think about modern marketing for the long haul.


    Tactics and strategies held together with bubble gum and hope

    aren't enough anymore.


    That may have worked in the Wild West days of the early Internet.


    Today, not so much. (2005 called, and it wants its marketing

    'hacks' back.)


    At the risk of giving away the punchline, the secret to success

    is knowing a few principles that apply to everything, and that's

    what we'll share.


    (When you know the principles, you will have learned how to fish,

    and we're in the 'teach people to fish business,' not the 'sell

    people a new fish every month' business.)


    Thirdly:


    Is...well, come on! It wouldn't be any fun if we told you

    everything in advance...


    Keep an eye on your inbox on Jan 31.


    We're pouring our hearts and souls into that Manifesto and can't

    wait to get your feedback.


    Before we talk about the two powerful words we mentioned earlier,

    we also need to share a little bit of housekeeping.


    The Modern Marketing System (MMS) will be available at the lowest

    price we'll ever sell it between Feb 4 and 11.


    If you own at least one of our qualifying courses — AoE, SOI,

    TDB/LBC, and TTE — you'll receive that promotion automatically

    (with an easy option to mute those emails if they're not right

    for you right now).


    If you don't own any of our qualifying courses, you'll have to

    raise your hand (we'll let you know when).


    Anyhoo...


    Let's talk about those two explosive words we mentioned...


    What if?


    Simple enough, right?


    Simple, but not simplistic.


    Let's explore a few ways to use these two words to squeeze more

    of what we want out of life.


    And, no offense intended to anyone, but \"what if the universe

    rewards me with infinite riches while I sip margaritas on the

    beach all day and visualize #livingmybestlife\" isn't what we have

    in mind.


    We both love to write, but Fairy Tales aren't our thing.


    (Our good pal Barry Randall says it best — \"If you want to make

    money while you sleep, you'd better be prepared to work while

    you're awake.\")


    Let's embed \"what if?\" into a simple framework to help us think

    about when and how to get the most value.


    We'll start with questions you might ask yourself daily to focus

    your attention and jumpstart motivation.


    What if I did one thing today to improve my business (or health,

    relationships, finances, etc.) — what would it be?


    Not ten things.


    Not five things.


    ONE thing.


    Make progress easy.


    Consistency beats intensity every day of the week.


    Next up are questions you can ask to organize activities over a

    longer period of time.


    Somewhere between a week and a month probably is the right time

    horizon (but those are loose guidelines — use your best

    judgment).


    What if I asked the most responsive segment of my audience what

    they want most and then created a minimum viable version of that

    as quickly as possible?


    (This is an excellent question if you're struggling to identify

    an offer that'll resonate with your audience or find yourself

    overthinking too many ideas.)


    Finally, \"what if...?\" is a powerful prompt for longer-term

    goals.


    We don't get too caught up in hair-splitting definitions of

    goals, but in general, we're thinking about significant

    accomplishments or experiences that have a meaningful impact on

    your life.


    Somewhere in the neighborhood of a few months to a year probably

    is the right time horizon.


    What if I committed 100% — no exceptions, no excuses — to take

    consistent action towards the life I've been dreaming about?


    That last one is scary.


    Not a little scary either...PROPER scary.


    Full-blown, 100% unwavering commitment is not something to be

    taken lightly.


    It's a lot easier to stay inside our comfort zones. But the magic

    happens outside of it.


    Easier to wake up at the end of 2022 and realize it looks a lot

    like the end of 2021.


    Which looked eerily similar to the end of 2020.


    But...everything you want is waiting for you on the other side of

    that commitment.


    All you have to do is ask yourself...what if..?


    Enjoy your weekend!


    André & Shawn


    .


    .


    P.S. — OFF THE RECORD:


    If we were the type of people who wrote a memoir, this upcoming

    moment would be in it, no question.


    There's excitement ... but, that's not exactly what we're

    feeling...


    Anxious excitement; yeah, that's closer. But that still doesn't

    get all the way there.


    Why the anxiety?


    Well...


    This feeling of 'anxious excitement' is always tethered like an

    umbilical cord to a new launch or meaningful promotion, it's a

    little different this time.


    You see, like a pair of old circus crystal ball readers, we can

    see into the future ... sort of.


    We can see what we're up to, of course, what we have planned for

    now, and what our foreseeable future looks like for those we

    serve.


    And if you could only see what we can, our Feb 4 - 11 promotion

    would be wrapped with only \"excitement\" minus the anxious bit.


    This idea is worth unpacking, so we'll try...


    Usually, when we have a new course (or an updated older course),

    a promotion is about drawing attention to the benefits of

    enrolling for a segment of people with unmet needs.


    We attract new eyeballs and people buy.


    Yet, we never know how many people will respond — our guesses are

    always incorrect. Always! Sometimes less than 100 people enroll,

    other times it's a few hundred. And if all the stars have

    aligned, it could be 400 or so.


    But his time it's different.


    Very different.


    We want all(!) of our customers — of which there are thousands —

    to upgrade to 'The System' come Feb 4 - 11.


    We know the value we have to share is extraordinary, and, at the

    risk of sounding like used car salesmen, life-changing.


    Day after day we read (unsolicited) emails from people who have

    transformed their lives.


    Not always A to B. Plenty of stories are from people who bought a

    course, got excited, and then life got in the way.


    But later, when they dusted off their credentials, put their butt

    in a chair, did the work, and took action — BOOM, success

    followed.


    Funny how life works like that...


    The bottom line is this — we want everyone to upgrade because we

    know the value we have to share.


    And, if we could wave a magic wand, we also want everyone who has

    been lurking and wondering if now is the time to act to jump with

    us into the deep end of the pool.


    Most won't. That's reality.


    We hope you do, though.


    We're going to look back on 2022 as a pivotal moment in the

    memoir of our lives. We hope you do too.


    This year is going to be insanely profitable for everyone willing

    to do the work.


    See you on Jan 31st...


    BACK MATTER


