content:
  body: "Frameworks for imposing structure on your business presentationView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=13&m=15&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l


    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email


    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    Hi Michael,


    Structure is a


    **beautiful thing.**


    It brings order, clarity. It enables understanding.


    Effective structure is the first commandment of presentation creation.


    But what is it? And how do you create a presentation that has it?


    Part of the challenge in answering that question is - there are a lot of different ways to do so!


    And 'Have a Beginning, Middle, and End' is only so helpful.


    One way to break down this problem is to think of Structure at three different levels:


    **The Structure of Your Presentation**


    In order for us to lead our audience through the STORY we want to tell, we need to have our audience


    **ask themselves** the question that we plan on answering.


    We do this by carefully crafting a structure for the entire presentation that follows a


    **Context, Catalyst, Question, Answer** format.


    The Context, is everything the audience already knows (that goes first). The Catalyst is what has changed that has given rise to a Question (which may be implicit and go unstated), that we then Answer.


    For example:


    **CONTEXT:** We currently sell our products in these markets, via these distribution channels.


    **COMPLICATION:** We are seeing increased competition, our growth is slowing, but market growth is accelerating.


    **QUESTION:**  How do we change what we are doing to accelerate our growth?


    **ANSWER:** Improve our product to close gap with competition; Develop new direct distribution channels to follow our customers; Enter new less mature markets where growth is faster.


    **The Structure of your Argument**


    Once the question has been planted in the mind of our audience, we must structure our answer.  To do this, we follow the Pyramid Principle (see email 3 of BPM https://www.slideheroes.com/bpm-presentations-reinvented-3).


    **The Structure of your Supporting Facts, Evidence and Ideas**


    Our answer will inevitably contain facts, evidence and ideas. Structuring these coherently is key.


    And while our minds are automatically imposing order on everything around us, all the time (we crave order), doing so requires energy and effort.  Your audience doesn't want to have to do the work for you.


    Help them out by being aware of the number of discrete ideas you are sharing at any one time.  Recent research suggests that people can only really process 4-5 concepts - and only one at a time.  Structure your ideas into groups of 4-5 or less.


    When you are structuring those ideas, make your lists MECE:


    -


    **Mutually Exclusive** (individually, each idea in the list is distinct from each of the other ideas, there is no overlap between ideas)


    -


    **Collectively Exhaustive** (collectively, the ideas in the list cover all possible components of the idea)


    See you next time.


    **Michael 'Logical Structure' Smith**


    **P.S.**


    For more on Structure, have a read of our Advanced Guide to McKinsey-Style Business Presentations https://www.slideheroes.com/mckinsey-business-presentations?utm_source=5s_sequence&utm_medium=email.


