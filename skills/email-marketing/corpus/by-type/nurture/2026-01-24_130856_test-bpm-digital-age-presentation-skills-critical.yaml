    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**

    Hi Michael,

    In 1982, the futurist and writer Buckminster Fuller (great name!) coined the term

    **Knowledge Doubling Curve** to measure the rate at which human knowledge increased.

    For most of human history, all that we knew doubled about every century or so, until the end of the Second World War.

    Then it started doubling every 25 years. And in the last few years knowledge has doubled

    **every 12 to 18 months.**

    IBM predicts that soon knowledge will be doubling every 11 to 12 hours!

    This change is causing a

    **shift** in how we engage with information and in

    **what skills are valuable.**

    • Information overload is creating

    **heightened BS detectors,**

    • Shrinking attention spans are leading to growing

    **impatience with a lack of precision** & clarity, and

    • As barriers to getting information are eliminated, there is a growing

    **expectation of insight, synthesis**, and a focus on 'what's in it for me'.

    Knowing stuff is just not as valuable as it once was – one can only ever hope to know an INFINTESIMALLY SMALL portion of what is knowable.

    As a consequence,

    **packaging, framing, communicating and distributing** knowledge has become MORE IMPORTANT than ever.

    This is what DDM teaches you.

    Millennials and Generation Z have been fully immersed in this high-tech, smartphone-driven world from the day they were born.

    That is why Alex and John are students of DDM.

    Have a listen to how DDM is helping them develop the skills to navigate the Knowledge Doubling Curve.

    https://www.youtube.com/watch?v=zCyZ-tBSvYM

    https://www.youtube.com/watch?v=Hn3CHpcXJtA

    **Michael "Shift Happens" Smith**

    **P.S.**

