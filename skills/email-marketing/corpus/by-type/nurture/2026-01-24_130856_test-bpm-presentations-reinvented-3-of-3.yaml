content:
  body: "Common pitfalls and trapsView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=6&m=8&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l


    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email


    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    Hi Michael,


    Today I will share the 4


    **Biggest Mistakes** I see people make when creating high-stakes presentations (and I'll map out what to do to avoid them).


    But first... did you guess correctly what presentations (killer, tightly structured presentations) allow you to CONTROL?


    Here goes...


    The narrative...


    CONTEXT.


    The story you tell to your audience, in the ORDER you want them to consume it...


    Piece by piece...


    Bit by bit...


    Meaning...


    And this... is real POWER.


    The question is 'how do you tap into this POWER?'.


    The answer... is through STRUCTURE.


    And it won't surprise you that failing to focus on structure is one of the four


    **Biggest Mistakes**.


    But, I am getting ahead of myself.


    Yesterday we started to peal back the onion and explore what makes high-stakes business presentations


    **uniquely** challenging.


    And because this stuff is


    **hard** (mastery is


    **very hard**), mistakes are inevitable.


    But not all mistakes are created equal.


    Sometimes mistakes are a result of a lack of


    **application** (intentionality), sometime they are a result of


    **pushing ourselves** in directions we have previously not been (and are a source of learning).


    ** **


    Here are four critically important mistakes commonly made when developing high-stakes presentations (have a read here for 6 more https://slideheroes.com/10-business-presentation-tips/)


    **'Sloppy'**


    **Mistake #1: Worrying about your opening joke, your 'intro', your hair**


    Yesterday we talked about how high-stakes business presentations around a board table are FUNDAMENTALLY DIFFERENT to public speaking and require a completely different approach to communication


    This is not a performance. It is business. Your presentation to your board, boss, customer, or investor is not a TED Talk. It is not a speech. It is not public speaking.


    **'Sit-down' business presentations require:** That your message is


    **written down** (not every word, just enough that you aren't needed);


    **Clarity** of purpose, tailored to the need of your audience (what is their question?); Transparent, ruthless


    **structure** (a well constructed answer);


    **Facts**, in high resolution; Style,


    **minimalist** is design


    **To Do's:** Write, write, and Rewrite; Focus on structure; Don't be the joke, skip the joke


    **'Sloppy' BONUS Mistake (The corollary of Mistake #1): Not worrying about your hair**


    Have I convinced you of the fundamental differences between sit-down business presentations and public speaking? Good. Now ignore what I said. Because you better believe business presentations are a performance. Just not in the same way speeches are.


    And Performance is certainly NOT where you should start. But once your deck is in place, once your answer to the question is nailed, a focus on your performance in the room can make a huge difference.


    **To Do's:** Develop a script; Practice, practice, practice; Plan for answering questions; Have conviction in the material you are presenting (If you don't, polish further); Demonstrate passion and enthusiasm (If you are not feeling it, drink some coffee); Manage public speaking anxiety with these tips https://slideheroes.com/public-speaking-anxiety/


    **'Aha' Mistake #2: Presenting a topic, rather than answering a question**


    The most effective formula to ensuring your audience connects with your material and is engaged with your presentation is to give a presentation about something they care about. The best way to do this is to


    **answer a question** that they have.


    Rather than presenting about 'Customer Relationship Management Software', instead a presentation that answers the question 'Our CRM software is old, does it need to be replaced?' will prove to be much more relevant and topical for the audience.


    Here are a couple of examples:


    **Question:** 'Do I have the problem your product solves?'


    **NOT Topic:** 'This is what our product does'


    **Question:** 'What is the best plan for accelerating growth?'


    **NOT Topic:** '2015 Marketing Plan'


    This process will very often result in much greater clarity around what EXACTLY the presentation should focus on.


    The topic Customer Relationship Management Software could, for example, answer: 'Our CRM Software is old, does it need to be replaced?', or 'Our CRM software is inefficient and needs to be replaced, how do we go about installing and selecting an alternative?'


    The resulting presentations for each of these questions, as you can image, would be very different.


    **To Do's:** Always present a 'topic' that is the answer to a question that is in the mind of your audience; Plant the question in the mind of the audience before answering it


    **'Stretch' Mistake #3: Failing to leverage the SUPERPOWER of Structure**


    Your job is to communicate your answer to your audience's question.


    When the audience cannot follow your logic, or the flow of your argument, they become frustrated. They get pissed off. They stop paying attention to you.


    Your audience wants to follow what you are saying; the logic of your argument. But they need your help. Structure is how you signpost where you are going and help your audience internalize what you are saying.


    Listen, structure is a very, very good thing. But sometimes it just isn't easy. Expect


    ****half your time**** to be spent working on structure.  We talked about this extensively in Lesson Zero (and DDM goes


    **much** deeper).


    If you are looking for additional help, have a listen to this amazing training from Barbara Minto below. It is a little dated, a little long, and a whole lot AWESOME.


    **To Do's:** Adopt common presentation structure blueprints; Focus on structure obsessively; Apply MECE principles (mutually exclusive, collectively exhaustive); Limit your lists to no more than 5 items (If you have more, bucket these ideas into a new set of groupings, one level of abstraction higher)


    https://www.dailymotion.com/video/x55i5wq


    **'High-Stakes' Mistake #4: Not identifying the 'Power Behind The Throne'**


    Who is your audience? Who has power? Who makes decisions?


    Sometimes it is not clear who the real decision makers are, or where power lies.


    This is especially true when you are presenting to a group, are an 'outsider' or are not part of the company.


    Once you have identified who you are really speaking to, determine what they are like. How do they like to consume information? What is the best way to reach them?


    **To Do:** Profile your Audience – understand the power, personality, communication preferences and sources of resistance amongst your audience (who you are really presenting to, what are they like)


    **Michael 'making


    **new** mistakes' Smith**


    **P.S.**


    Tomorrow I will reveal the ENTIRE blueprint of


    **Decks for Decision Makers**.


    **Be sure not to miss it.**


    **Your attention is a privilege I never take for granted. If this communication is no longer of interest to you, just click the unsubscribe link below to be removed from this email list:**


