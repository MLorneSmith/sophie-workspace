content:
  body: 'Hi Michael,


    Email can slow you down when you encounter tricky questions. Superhuman changes

    that.


    With Superhuman, you can share a conversation and get input effortlessly. Unlike

    forwarding, sharing a conversation provides everyone with full context — past

    messages, internal team discussions, and even future replies.


    And, you can share with anyone — even if they don''t use Superhuman!


    Keep everything in one place. No need to switch apps or forward endlessly.


    Here are three ways to share a conversation:


    Share drafts in one click ⚡


    Need quick input? On a draft, hit Cmd+S (Mac) or Ctrl+S (Windows) to share.


    Superhuman Shared Drafts

    [https://storage.googleapis.com/email-assets.superhuman.com/shared%20drafts%20toggle.gif]

    Discuss with internal comments 💬


    Leave internal comments directly on a draft or email. External recipients won''t

    see them! Just hit M and @mention anyone to start discussing. They''ll get

    notified and be able to comment back.


    Superhuman Commenting

    [https://storage.googleapis.com/email-assets.superhuman.com/Commenting_compressed.gif]

    Share links anywhere 🔗


    Screenshots become outdated once you get a new reply.


    Share a conversation link in Slack or Teams instead. Even people who don''t use

    Superhuman can stay aligned. Just hit Cmd+S or Ctrl+S for a sharable link.


    Superhuman Shared Conversations

    [https://storage.googleapis.com/email-assets.superhuman.com/SlackCommentingcompressed.gif]

    What else would help you and your team? Reply and let me know 😊


    Speak soon,

    Rahul

    ps. learn more about how Superhuman can supercharge your team here

    [https://help.superhuman.com/article/590-shared-conversations] 🎓


    Take me to Superhuman [https://mail.superhuman.com]


    If you don''t want to hear from me again, please let me know

    [https://iterable-links.superhuman.com/e/eh?_t=745eb48f80414c6f895aa53319f24f24&amp;_m=6b4257424c0b4f13b47eb02e99d78ac5&amp;_e=WO0KwMVRhvfYfOxPXLSNU65-4t0nbbznUy1z3LqiqUtw8xIp6jZHS0DAOFl-4LNuJxT00hiK6X7tXdtpTBmYZPyLOKAkhJgstHDMb0X6BDzHIIvmzPk_5t7CdZ5ZLscCNifM4uQ6R5WARqYlI4mRySJob-N6hfwhDl7aO5_9k4-AwIDBaMRJaAWeC2C6mv97uia3NfmEvMMqpLW9U0-sKOXl491ISvy98vHHeMm0aIi5NcDC3Eg6R6fC46_cXmLgL_a_oLS6ePthuq4t_gk0r0TLG1v9YhXfN-uvASeZDoawowdHubnR0pFPaiZZtp-E5zC6VBhhW92glo_UTmbFhSkLacD8v9EqshPMYWpu__UxPygQnn_aO4srKhqcwvnX]'
