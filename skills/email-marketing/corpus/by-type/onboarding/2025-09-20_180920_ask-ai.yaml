content:
  body: 'Hi Michael,


    We each receive 3 million words of email every single year.


    This includes project updates, deal execution, customer communication, travel

    details, and so much more.


    How do we find what matters?


    Ask AI 🧠

    Hit ? and simply ask: "where is the q2 offsite" or "when is my flight to sfo".

    In the inbox, pull down to search, tap Ask AI, then simply ask: "where is the
    q2

    offsite" or "when is my flight to sfo".


    You can also combine information from many emails: "what was the customer

    feedback from our last launch?"


    You can even ask about your calendar and create meetings: "find time with @Alice

    next tuesday".

    [https://storage.googleapis.com/email-assets.superhuman.com/asi_ai_athena_4.gif]

    Search 🔎

    Hit / to search by sender, keyword, subject, and more. In the inbox, pull down

    to search by sender, keyword, subject, and more.


    Try it out, and reply to let us know what you think 💜


    Speak soon,

    Rahul


    ps. to share Superhuman with your team, hit Cmd+K or Ctrl+K → Add to Team ps.
    to

    share Superhuman with your team, tap the gift icon in your inbox and select Add

    to Team.


    Take me to Superhuman [https://mail.superhuman.com]


    If you don''t want to hear from me again, please let me know

