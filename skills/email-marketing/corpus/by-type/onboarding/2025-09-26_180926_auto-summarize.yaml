content:
  body: 'Hi Michael,


    In Superhuman, you can see a 1-line summary above every conversation.


    As new emails arrive, it updates instantly.


    If you want more detail, just hit i. If you want more detail, just tap the

    summary to expand.


    Auto Summarize

    [https://storage.googleapis.com/email-assets.superhuman.com/%20Auto%20Summarize%20Video/Static%20Image%20with%20Play%20Button.png]

    https://storage.googleapis.com/email-assets.superhuman.com/Auto%20Summarize.mp4


    For long conversations, try reading the summary first.


    It''s there when you want it, and out of the way when you don''t.


    We''ve been using Auto Summarize for a while, and it''s changed how we work.


    We always read the 1-line summary first, and sometimes we don''t even read the

    email. As a result, we''re moving faster than ever before!


    Speak soon,

    Rahul


    Take me to Superhuman [https://mail.superhuman.com]


    If you don''t want to hear from me again, please let me know

