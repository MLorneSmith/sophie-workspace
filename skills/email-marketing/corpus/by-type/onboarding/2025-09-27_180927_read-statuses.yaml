content:
  body: 'Hi Michael,


    In Superhuman, you can see how and when people read your email!


    If someone doesn''t reply, Read Statuses can show why. Maybe they never opened

    your email. Or perhaps they did, but on their phone. Now you can follow up with

    just the right message.


    To turn Read Statuses on, hit Cmd+K (Mac) or Ctrl+K (Windows) → Read Statuses.


    To see Read Status details:

    * On desktop, hover over the names in the bottom-right corner, or over the

    double check marks at the top of a sent message ☑️

    * On mobile, tap the names in the bottom-right corner of a sent message


    Read statuses are also shared across your team. Let''s say a teammate sends an

    email and CCs you. Even though you did not send the email, you can still see

    when people read that email. To grow your team, click here

    [https://mail.superhuman.com/deeplink/add-to-team]. To grow your team, tap the

    gift icon in your inbox and select Add to Team.


    Use Read Statuses to close high-value deals, hire elusive candidates, and work

    more effectively with your team.


    What do you think? Reply and let me know 😊


    Speak soon,

    Rahul


    Take me to Superhuman [https://mail.superhuman.com]


    If you don''t want to hear from me again, please let me know

