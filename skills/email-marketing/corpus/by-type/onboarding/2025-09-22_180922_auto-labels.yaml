content:
  body: 'Hi Michael,


    Superhuman AI doesn''t just help you write, read, schedule, and search faster
    —

    it also organizes your inbox, so you don''t have to.


    Auto Labels 🏷 Superhuman automatically labels emails like marketing, cold

    pitches, and social network updates. These emails stay out of your Important

    split, so you can focus on what matters most.


    Custom Auto Labels ✨ Our built-in Auto Labels are great, but what''s even better

    is making your own. Just write a prompt, like "requests to review work". You can

    then immediately see when people ask you to review work.


    You can even combine these prompts with rules based on senders, recipients,

    subject lines, and labels. This combines best of both worlds: the power of AI

    with the reliability of rules!

    Create Auto Label [https://mail.superhuman.com/deeplink/auto-labels-settings]


    To create an Auto Label, pull down for Superhuman Command, then type New Auto

    Label (iOS only).


    Split Inbox & Auto Labels 💌 You can then split your inbox using your own Auto

    Labels. So even when your inbox is overflowing, you can jump to a specific topic

    — and then get through emails of the same type, at the same time.

    Create Split Inbox [https://mail.superhuman.com/deeplink/split-inbox-settings]


    Pull down to open Superhuman Command, then type Split Inbox Settings.


    Auto Archive 🧹 Want to keep certain low-priority emails out of sight? Turn on

    Auto Archive, and eliminate clutter for good.

    Open Auto Archive Settings

    [https://mail.superhuman.com/deeplink/auto-archive-settings]


    To enable, pull down for Superhuman Command, then type Auto Archive Settings.


    We''d love to know how you''re organizing your inbox. Just hit reply and let us

    know!


    Speak soon,

    Rahul


    Take me to Superhuman [https://mail.superhuman.com]


    If you don''t want to hear from me again, please let me know

