content:
  body: 'Hi Michael,


    Superhuman sports an alternative look: dark, minimal, and with a premium finish.


    We call it Carbon — after carbon fiber — the lightweight graphite weave that

    enabled a new era of aerospace performance.


    The Carbon theme is not only beautiful; it can reduce eyestrain, help you focus,

    and performs especially well in low light conditions.


    To enable Carbon, just hit Cmd+K (Mac) or Ctrl+K (Windows) → Carbon or head to

    settings in the mobile app.


    It''s surprisingly hard to design a delightful dark theme. To learn how we did

    it, check out this article

    [https://blog.superhuman.com/how-to-design-delightful-dark-themes-7b3da644ff1f]!


    We love hearing from you! Please reply and let us know what you think 😃


    Thank you,

    Rahul


    ps. learn more ways to customize your Superhuman here

    [https://help.superhuman.com/article/585-making-superhuman-your-own] 🎓


    Take me to Superhuman [https://mail.superhuman.com]


    If you don''t want to hear from me again, please let me know

    [https://iterable-links.superhuman.com/e/eh?_t=745eb48f80414c6f895aa53319f24f24&amp;_m=7e1edd47b7fd457090c38c20bd810f8d&amp;_e=4b5i3DkVzhDa8X-lQtQ1RNb_7cfJnm9GRBP06UMRezwOt_b1XGYjr_9odmwWKNE9_qr95Ovo7zAOxCXq1NgsSFayxcyb1O4Z9KLRSbGiZk8jQTKCp8aXLvRnrhFFuDiDF6niRwfZw4bQZyVxFNAMqxLr92O60sUU_ljKxkOQNvxBZINOyR9WdKht4V9sR-RsewszTVDQFp1s8qPRqeB_JjPCkwyDZ9FUHpZArM3zoVujtElTJYPOA3XNLkKZ03cIlcOFcFuGKVtrlatoSEwKHaPqyhB1pCbb5puscN62Zsa6c6Chmck7Ad61xQrjX93bGuCHh3dEPh_pl08lP4MjD5K7D-dCogsnF7NmQ47Peb6B1FAy21_uzc9LTk7xuPqQ]'
