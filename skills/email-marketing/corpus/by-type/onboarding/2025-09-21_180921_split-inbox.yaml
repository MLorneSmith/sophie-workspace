content:
  body: 'Hi Michael,


    We all get too much email.


    The urgent buries the important. We don''t reply to our team or VIPs. We miss

    notifications from tools like Google Docs.


    As a result, we lose opportunities. Or worse, we let down the people who count

    on us.


    Split Inbox puts you back in control. You can stay focused and in flow, while

    responding faster to what matters.


    Getting started 📥

    Superhuman comes with a few Split Inboxes ready to go:

    * Important — person-to-person and high priority emails

    * Calendar — calendar invites and updates

    * Other — everything else


    Hit Tab and Shift+Tab to move between Split Inboxes.


    Make it your own ✍️

    You can also choose from 50+ prebuilt Split Inboxes. You can even make your own

    Split Inbox based on an AI prompt.

    Create Split Inbox [https://mail.superhuman.com/deeplink/split-inbox-settings]


    Pull down to open Superhuman Command → Split Inbox Settings.


    To learn more, see here:


    https://help.superhuman.com/article/581-split-inbox-basics


    Speak soon,

    Rahul


