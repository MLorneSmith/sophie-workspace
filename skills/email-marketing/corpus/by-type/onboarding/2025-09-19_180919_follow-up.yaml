content:
  body: 'Hi Michael,


    You''re sending a crucial email — closing a deal, delegating a task, landing a

    meeting. But people are busy. You might not hear back.


    So what do you do? Maintain a spreadsheet? Keep it all in your head?


    Superhuman makes it effortless.


    Auto Reminders & Auto Drafts ✨

    If your email needs a response, Superhuman AI will automatically remind you to

    follow up. We''ll even write the email for you, so all you need to do is hit

    send. You''ll never drop the ball again.


    To customize your Auto Reminders, click Settings ⚙️ → Reminders.


    DIY Reminders ⏰

    When you send an email, just choose a time — for example, in 2 days. If you

    don''t hear back by then, we''ll remind you to follow up. You''ll follow up on

    time, every time.


    Just hit Cmd+K (Mac) or Ctrl+K (Windows) → Remind Me. Just tap Remind me.


    Speak soon,

    Rahul


    ps. click here [https://mail.superhuman.com/deeplink/add-to-team] to help your

    team follow up every time ps. to help your team follow up every time, tap the

    gift icon in your inbox and select Add to Team.


    Take me to Superhuman [https://mail.superhuman.com]


    If you don''t want to hear from me again, please let me know

