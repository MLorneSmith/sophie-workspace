content:
  body: 'Hi Michael,


    Superhuman helps you get through your inbox twice as fast as before ⚡


    For most actions, the keyboard is significantly faster than the mouse. That''s

    why we''ve included keyboard shortcuts for every single action.


    If you don''t know a shortcut, hit Cmd+K (Mac) or Ctrl+K (Windows) to open

    Superhuman Command:


    Superhuman Command

    [https://d1pgqke3goo8l6.cloudfront.net/Ouz0eEvQmGe1D3AvEIeQ_superhuman-command.gif]


    Enter just a few characters for what you want. Enter "com" to Compose. Enter

    "sen" to go to Sent Mail. Next to each command, see shortcuts to do it even

    faster next time.


    Last but not least, enter "shortcuts" in Superhuman Command to see the full list

    of available shortcuts.


    We''d love to hear what you think: please reply and say hello :)


    Speak soon,

    Rahul


    ps. learn more about Superhuman Command, shortcuts, and other Superhuman

    fundamentals here

    [https://help.superhuman.com/article/580-superhuman-fundamentals] 🎓


    Take me to Superhuman [https://mail.superhuman.com]


    If you don''t want to hear from me again, please let me know

    [https://iterable-links.superhuman.com/e/eh?_t=745eb48f80414c6f895aa53319f24f24&amp;_m=31d5f2883e2742b39255ebd8d45ac2d6&amp;_e=IF3gw-bmkb5rVNZfrYaAUfeaWDBITnd5SEwRRQDCY36TiQAPwFdDazUkvUL4BQ_9DW9TJhZG3WVOoG4Gh0oo5fssraj7pZ-ifUbd_45mYIX1DmVsh2KLLL-AmNwGIqF6o2jRmv2coiRnGF66QW5tfieLiAPiDgiW1d6hYEbmsfWdfUSA-_4wvbXdhF84IiOyMEQw22OzLLwmMjX0KOdYD1nYgAHXysDxZpgx9dw9fDuiOqUkRIKYQzVKOOD2CW02eAz6L2AOvL9ffq0OK0QKEOqwc5As18aicQxJN6hB4zf7kFjib_U0pM8Rr1a3mwDnmGAQGPGdgqO4D1BNq7GhUTBaErUmKRJdvEodqS3-S3te8cZIexw-P9u8Bc8KvolT]'
