    Hi Michael,


    It often begins with butterflies.


    In the pit of your stomach.


    Then, your heart begins to race. Your head starts to swim. Your palms start to sweat.


    Not the first-blush of love. Not the excruciating climb to the top of a roller-coaster.


    The fear of public speaking. Public speaking anxiety.


    For near 30% of Americans, it doesn't get worse than public speaking.


    But this anxiety is a natural, human reaction. Everyone feels some level of anxiety when standing in front of a crowd to give a speech.


    And in fact this anxiety, or 'physiological arousal', is necessary for everything from scoring goals in hockey and kicking field goals in football to performing well on a test.


    And it is necessary for delivering a great presentation.


    The adrenaline kick from moderate arousal makes you more motivated, more alert and energized, and ready to perform.


    Too much adrenaline, on the other hand, can be debilitating.


    The trick then, is simple (to describe). We should NOT focus on


    **eliminating** the feelings of arousal (low levels of nervousness and anxiety), but, instead, work on keeping these feelings


    ****in check**** so that they do not interfere with our ability to speak effectively.


    This is not necessarily easy. But it is possible.


    The major triggers of speech anxiety are lack of preparation, the fear of making mistakes, concerns about appearance, projections about a lack of audience interest, and a lack of previous experience speaking in public.


    **With that in mind, here are eight steps to managing public speaking anxiety:**




    **Stage One: Before**


    **1. Adopt Right Mindset**


    - Understand how stress works. Work to accept the need for some stress to perform optimally


    - Give up the belief that you have to be perfect. None of us are


    - Regulate any negative 'self-talk'. No more 'What if I forget what I want to say?'. Instead ask yourself 'What if they give me a standing ovation?'. seriously.


    **2. Create Content**


    - Reduce stress by developing content in advance. Don't 'wing it'.


    - Create a written presentation. Develop a script.


    **3. Practice**


    - Practice makes perfect.


    - Practice until you memorize your script, then use the script as a safety net


    **4. Prepare**


    - Set the right tone in advance by sending a thoughtfully written agenda


    - Exercise, Get some rest


    - Prepare a 'flight-check' to ensure you have everything you need 1 hour before your speech


    **Stage Two - During**


    **5. Stay Calm**


    - Quite your mind; Breathe


    - Laugh; Smile


    - Visualize your optimal outcome (a successful presentation)


    **6. Humanize the Audience**


    - Remind yourself that your audience has flaws just like you


    - Assume your audience is friendly (they are)


    **7. Set the Right One, Be Yourself**


    - Adopt the right disposition


    - Have conviction


    **Stage Three - After**


    **8. Relax and Debrief**


    - Breathe deeply. This will help to reduce your heart rate.


    - Minimize self-talk. You can mentally review your presentation later.


    - Write down any comments, outstanding to-do's or feedback for review later.


    You can do this.


    **Michael 'Conquering the Fear' Smith**


