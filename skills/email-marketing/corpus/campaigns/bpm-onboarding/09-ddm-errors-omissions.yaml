    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email


    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    Hi Michael,


    As fantastic as DDM is, marketing experts tell me that only about


    **10%** of people receiving these emails will enroll in


    **Decks for Decision Makers**.


    And that's ok with me from a business standpoint. But it still bothers me personally.


    You see, I know how much professionals will benefit from DDM.


    I read their emails.


    I talk to them on the phone, I see them personally, and dozens tell me each year that DDM 'is one of the best online training programs available'...


    **\"This is one of the best online trainings available. In a very short time it improved my storytelling skills and presentation abilities. **


    **The material was broken down just right, so that I could learn and take action piece-by-piece.**


    **Over a year later I'm about to study the material again and I'm looking forward to it. While content is king, the production value in the training is amazing. It's very enjoyable to watch.\"**


    ****- Nathan Slaughter, VP, Goldman Sachs****


    Because of this, I just hate the thought of someone not getting this training due to some


    **error or omission** in my explanation.


    That's why I had a special brainstorming session with a group of past students and trusted advisors to try and figure out why you might say 'no' to


    **Decks for Decision Makers**.


    After a bit if time, we came up with a couple of key reasons.


    Here they are:


    **You're skeptical of how important investing in presentation skills REALLY is**


    Great presentation skills can be worth, literally, millions of dollars.


    I am not exaggerating. Many, many executives, start-up founders, and consultants make their entire CAREERS off the back of lights-out business communication skills.


    ROI is why I teach this stuff. These skills can by worth their weight in gold.


    It is my passionate belief that there are few, if any, areas of study with greater potential ROI than becoming great at executive communication.


    And if your are in sales, are fundraising money, or need to convince a demanding business audience of anything - these skills can be the difference between


    ****winning and losing****.


    But beyond that, Decks for Decision Makers provides industry leading ROI because of our business model.


    You see, unlike live training, our video platform is highly scalable.


    This means we are able to provide training at a fraction of the cost live training of comparable quality would cost.


    **Your uncertain of my expertise**


    The BPM (Business Presentation Mastery 1 https://learn.slideheroes.com/bpm-presentations-reinvented-1?utm_source=bpm_sequence&utm_medium=email, 2 https://learn.slideheroes.com/bpm-presentations-reinvented-2?utm_source=bpm_sequence&utm_medium=email, 3 https://learn.slideheroes.com/bpm-presentations-reinvented-3?utm_source=bpm_sequence&utm_medium=email, 4 https://learn.slideheroes.com/bpm-presentations-reinvented-4?utm_source=bpm_sequence&utm_medium=email) email series and Lesson Zero are designed to address this head on. Because, unfortunately, the online education market is filled with charlatans.


    So who am I? Ex-Oliver Wyman management consultant. Currently run Strategy, M&A and Marketing for the largest services group of a global payments provider.


    But, better than all that – read this Advanced Guide to McKinsey-style Business Presentations https://www.slideheroes.com/mckinsey-business-presentations?utm_source=bpm_sequence&utm_medium=email. It is 10,000 words of pure gold. Because it is about more than just knowing this stuff, it is a question of


    **being able to explain it**.  And that Advanced Guide is just the teaser to DDM.


    **What did I miss?**


    Did I miss something?  Hit Reply and let me know.


    I hope to see you inside.


    **Michael 'always learning' Smith**


    **P.S.**


    **Some housekeeping things…**


    **Thing #1:** DDM costs $497/student.


    **As a policy I don't discount released products, the only exception being for students who are enrolled in full-time study. If you are a student, send me proof of enrollment (e.g. a current student card) to receive a discount.**


    ****Thing #2:** If you have any questions about DDM, reply to this email and let me know.**


    **I'll respond to every question I receive. If I receive the same questions from a number of people, I'll collate them together and provide an answer for every**


    **one at once.**


    ****Thing #3:** Yes, all enrollments are covered by our 30 day money-back guarantee.**


    ****Thing #4:** Every enrollment comes with lifetime access including updates. You'll never need to purchase again for new versions.**


    ****Thing #5:** Here's what you'll get when you enroll…**


    **+ Presentation advice you use (not advice on speeches,


    **presentations**). **


    **+ Bite-sized


    **VIDEO lessons** (better than books)**


    **+ Deep,


    **expert-level content**, explained clearly**


    **+


    **Step-by-step process** telling you EXACTLY what to do to create smart, impactful, professional presentations. **


    **Thing #6:** Here is the enrollment page https://learn.slideheroes.com/offers/GYF86QXW/checkout?utm_source=bpm_sequence&utm_medium=email


    **P.P.S.**


    **In the next sequence of emails, I am going to dive deeper into the


    **SKILLS** needed to consistently create killer, high-stakes business presentations... The ability to wield


    **Structure**, tell


    **Stories**, leverage facts to convey


    **Substance**, design with


    **Style**,  and exude


    **Self-Confidence**.**


    **Our [


    **5S**] Series in next.**


    **Your attention is a privilege I never take for granted. If this communication is no longer of interest to you, just click the unsubscribe link below to be removed from this email list:**


    Unsubscribe http://slideheroes.activehosted.com/proc.php?c=11&m=13&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&nl&act=unsub


