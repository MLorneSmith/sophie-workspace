content:
  body: "BCG Consulting Presentation ReviewView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=8&m=10&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l


    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email


    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    **There is no easy way to train an apprentice. My two tools are example and nagging.**


    **― Lemony Snicket, Who Could That Be at This Hour?**


    Hi Michael,


    In my last email, I shared with you a Blueprint for creating business presentations that will help you influence key stakeholders, inspire others to achieve goals, get buy-in for new concepts, and successfully navigate challenging conversations (You can read that email here https://learn.slideheroes.com/bpm-presentations-reinvented-4?utm_source=bpm_sequence&utm_medium=email if you missed it).


    But what does that look like in practice?  Or, put another way, show me an example!


    You'll want to check this out.


    My customers tell me that these


    **presentation 'teardowns'** are amazingly helpful (some of the best stuff I do).


    Basically I take a presentation, and review it - providing commentary and suggestions on how it can be improved.


    In this case I have turned my sights on Boston Consulting Group (a renowned management consultancy).


    Check out this teardown of Boston Consulting Group's 'Data Privacy By The Numbers' https://www.slideheroes.com/presentation-review-bcg?utm_source=bpm_sequence&utm_medium=email deck.


    https://www.slideheroes.com/presentation-review-bcg/


    Enjoy.


    **Michael \"Presentation Teardowns\" Smith**


    **P.S.**


    Web-version (with video and audio narration) of this teardown is here https://www.slideheroes.com/presentation-review-bcg?utm_source=bpm_sequence&utm_medium=email should you have the desire to share it.


    **P.P.S.**


    If you are looking for further inspiration and reference presentations, here are some lists of publicly available decks from the likes of McKinsey https://www.consultantsmind.com/2017/04/23/30-mckinsey-presentations/, Boston Consulting Group https://www.consultantsmind.com/2017/11/26/bcg-presentations/, and Bain https://www.mekkographics.com/wp-content/uploads/2013/10/Examples-of-Strategy-Consulting-Firm-Client-Presentations.pdf


    **.**


