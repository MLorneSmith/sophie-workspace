content:
  body: "The 5 Skills Disciplines You Must MasterView in Web Browser http://slideheroes.activehosted.com/p_v.php?c=12&m=14&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&l


    **'Lesson Zero'**Log-in https://app.slideheroes.com/users/sign_in?utm_source=bpm_sequence&utm_medium=email


    **You are receiving this email because you signed-up at SlideHeroes to watch 'Lesson Zero' of our Decks for Decision Makers high-stakes business presentation course. (If you decide you're in the wrong place, no worries. You'll find an unsubscribe link in the footer of this email.)**


    Hi Michael,


    Welcome back.


    OK. Let's take stock.


    We know what we are trying to accomplish (our OBJECTIVE): gain the skills to create killer presentations for high-stakes meetings.


    We have a Who, Why, What, How PROCESS blueprint for creating these killer presentations (read more here https://www.slideheroes.com/bpm-presentations-reinvented-4 if you missed that email)


    But a roadmap is not enough.


    Crafting successful presentations is a


    **multi-disciplinary challenge** that requires the mastery of a broad set of distinct SKILLS:


    • The ability to order ideas in a logical and structured way


    • The skill to utilize words succinctly, powerfully, accurately


    • Numeracy, and the ability to communicate data effectively


    • Taste - the appreciation for and ability to create aesthetically pleasing design


    • Charisma and executive presence


    Over the next few days we are going to dive a little deeper into each of these '5S' skills DISIPLINES:


    **Structure:** Exploiting the Power of Logical Structure


    **Story:** Mastering the Art of Storytelling


    **Substance:** Learning the Science of Fact-based Persuasion


    **Style:** Understanding the Harmony of Design


    **Self-Confidence:** Deploying the Drama of Performance


    Until tomorrow,


    **Michael **


    **P.S.**


    **We have talked about STRUCTURE already, because it is just so damn important.  The Pyramid Principle is a powerful framework for structuring your answer to the question that your audience has.**


    **But how do you know what that question is?  And, better yet, how do you plant that question in the mind of the audience so that you can answer the question you want to answer?**


    **Ah! That is the trick, isn't it?**


    **Frameworks to do just that up next.**


    **Your attention is a privilege I never take for granted. If this communication is no longer of interest to you, just click the unsubscribe link below to be removed from this email list:**


    Unsubscribe http://slideheroes.activehosted.com/proc.php?c=12&m=14&s=254303af226d1e258d117bd0fb6519ce&d=0&v=2&nl&act=unsub


    **SlideHeroes Incorporated, 125-720 King Street West Suite 2000, Toronto, Ontario M5V 3S5, Canada**"
