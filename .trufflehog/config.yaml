# TruffleHog Configuration
# Custom regex patterns for detecting secrets specific to our tech stack

detectors:
  # Supabase patterns
  - name: Supabase Anon Key
    regex:
      pattern: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+'
      groups:
        - 0
    keywords:
      - supabase
      - anon
      - NEXT_PUBLIC_SUPABASE_ANON_KEY

  - name: Supabase Service Role Key
    regex:
      pattern: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+'
      groups:
        - 0
    keywords:
      - service_role
      - SERVICE_ROLE_KEY
      - SUPABASE_SERVICE_ROLE_KEY

  - name: Supabase Database Password
    regex:
      pattern: 'postgres://[^:]+:([^@]+)@'
      groups:
        - 1
    keywords:
      - DATABASE_URL
      - POSTGRES_PASSWORD
      - SUPABASE_DB_PASSWORD

  # Stripe patterns
  - name: Stripe Secret Key
    regex:
      pattern: 'sk_(test|live)_[a-zA-Z0-9]{24,99}'
      groups:
        - 0
    keywords:
      - stripe
      - STRIPE_SECRET_KEY
      - sk_

  - name: Stripe Webhook Secret
    regex:
      pattern: 'whsec_[a-zA-Z0-9]{24,64}'
      groups:
        - 0
    keywords:
      - webhook
      - STRIPE_WEBHOOK_SECRET
      - whsec_

  - name: Stripe Publishable Key
    regex:
      pattern: 'pk_(test|live)_[a-zA-Z0-9]{24,99}'
      groups:
        - 0
    keywords:
      - stripe
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
      - pk_

  # Payload CMS patterns
  - name: Payload Secret
    regex:
      pattern: 'PAYLOAD_SECRET["\']?\s*[:=]\s*["\']([a-zA-Z0-9_-]{32,})["\']'
      groups:
        - 1
    keywords:
      - PAYLOAD_SECRET
      - payload

  - name: Payload Database URI
    regex:
      pattern: 'PAYLOAD_DATABASE_URI["\']?\s*[:=]\s*["\']([^"\']+)["\']'
      groups:
        - 1
    keywords:
      - PAYLOAD_DATABASE_URI
      - mongodb

  # Portkey AI patterns
  - name: Portkey API Key
    regex:
      pattern: 'portkey_[a-zA-Z0-9]{32,}'
      groups:
        - 0
    keywords:
      - PORTKEY_API_KEY
      - portkey

  # OpenAI patterns
  - name: OpenAI API Key
    regex:
      pattern: 'sk-[a-zA-Z0-9]{48}'
      groups:
        - 0
    keywords:
      - openai
      - OPENAI_API_KEY

  # Anthropic patterns
  - name: Anthropic API Key
    regex:
      pattern: 'sk-ant-[a-zA-Z0-9]{90,}'
      groups:
        - 0
    keywords:
      - anthropic
      - ANTHROPIC_API_KEY

  # AWS patterns
  - name: AWS Access Key ID
    regex:
      pattern: 'AKIA[0-9A-Z]{16}'
      groups:
        - 0
    keywords:
      - aws
      - AWS_ACCESS_KEY_ID

  - name: AWS Secret Access Key
    regex:
      pattern: 'aws_secret_access_key["\']?\s*[:=]\s*["\']([a-zA-Z0-9/+=]{40})["\']'
      groups:
        - 1
    keywords:
      - AWS_SECRET_ACCESS_KEY
      - aws_secret

  # GitHub patterns
  - name: GitHub Personal Access Token
    regex:
      pattern: 'ghp_[a-zA-Z0-9]{36}'
      groups:
        - 0
    keywords:
      - github
      - GITHUB_TOKEN
      - ghp_

  - name: GitHub OAuth Token
    regex:
      pattern: 'gho_[a-zA-Z0-9]{36}'
      groups:
        - 0
    keywords:
      - github
      - oauth

  # Vercel patterns
  - name: Vercel Token
    regex:
      pattern: 'vercel_[a-zA-Z0-9]{24}'
      groups:
        - 0
    keywords:
      - vercel
      - VERCEL_TOKEN

  # Generic patterns
  - name: Generic API Key
    regex:
      pattern: 'api[_-]?key["\']?\s*[:=]\s*["\']([a-zA-Z0-9_-]{32,})["\']'
      groups:
        - 1
    keywords:
      - api_key
      - apikey
      - API_KEY

  - name: Generic Secret
    regex:
      pattern: 'secret["\']?\s*[:=]\s*["\']([a-zA-Z0-9_-]{16,})["\']'
      groups:
        - 1
    keywords:
      - secret
      - SECRET

  - name: Private Key
    regex:
      pattern: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
      groups:
        - 0
    keywords:
      - private_key
      - PRIVATE_KEY

  - name: Bearer Token
    regex:
      pattern: 'bearer["\']?\s*[:=]\s*["\']([a-zA-Z0-9_-]{20,})["\']'
      groups:
        - 1
    keywords:
      - bearer
      - authorization

# Paths to exclude from scanning
exclude_paths:
  - .git/**
  - node_modules/**
  - .next/**
  - .turbo/**
  - coverage/**
  - dist/**
  - build/**
  - out/**
  - .cache/**
  - "*.min.js"
  - "*.map"
  - pnpm-lock.yaml
  - package-lock.json
  - yarn.lock

# File types to include (scan only these)
include_paths:
  - "**/*.ts"
  - "**/*.tsx"
  - "**/*.js"
  - "**/*.jsx"
  - "**/*.json"
  - "**/*.env*"
  - "**/*.yml"
  - "**/*.yaml"
  - "**/*.md"
  - "**/*.sh"
  - "**/Dockerfile*"
  - "**/.github/**"

# Verification endpoints for detector validation
verifiers:
  - name: Supabase
    endpoint: https://api.supabase.com/v1/verify
    
  - name: Stripe
    endpoint: https://api.stripe.com/v1/charges
    
  - name: GitHub
    endpoint: https://api.github.com/user
    
  - name: OpenAI
    endpoint: https://api.openai.com/v1/models

# Alert thresholds
thresholds:
  high_entropy: 4.5  # Entropy threshold for detecting high-entropy strings
  min_secret_length: 12  # Minimum length for a potential secret