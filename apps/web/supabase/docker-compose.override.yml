# Docker Compose override for Supabase containers
# Adds native health checks to containers that lack them
# This enables proper health status in `docker ps` and the Claude Code statusline

services:
  rest:
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  edge-runtime:
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x deno || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
